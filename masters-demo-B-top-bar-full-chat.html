<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>大师对话B · 全屏对话+顶部大师选择</title>
<style>
:root{--bg:#F6F8FC;--paper:#fff;--soft:#EDF0F7;--border:#E2E7F0;--ink:#2B3140;--ink2:#646B7D;--ink3:#99A1B3;--accent:#8B93C7;--a-soft:#ECEEF9;--purple:#9B85C7;--orange:#D6A85C;--green:#6FAE8F;--serif:"Noto Serif SC",Georgia,serif;--sans:system-ui,-apple-system,sans-serif;--r:14px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--sans);background:var(--bg);color:var(--ink);height:100vh;overflow:hidden;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--paper);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.topbar .back{font-size:13px;cursor:pointer;border:none;background:none;color:var(--ink2);padding:4px 8px;border-radius:6px}
.topbar h2{font-family:var(--serif);font-size:18px}
.topbar .sp{flex:1}
.topbar .mode{display:flex;gap:4px;background:var(--soft);border-radius:999px;padding:3px}
.topbar .mode button{border:none;background:transparent;padding:6px 16px;border-radius:999px;font:600 12px var(--sans);cursor:pointer;color:var(--ink3)}
.topbar .mode button.active{background:var(--paper);color:var(--accent);box-shadow:inset 0 0 0 1px var(--border)}
/* 大师头像横条 */
.master-bar{display:flex;gap:8px;padding:10px 20px;background:var(--paper);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0}
.master-chip{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 10px;border-radius:10px;cursor:pointer;transition:.15s;min-width:60px;border:1px solid transparent}
.master-chip:hover{background:var(--a-soft)}
.master-chip.active{background:var(--a-soft);border-color:var(--accent)}
.master-chip .av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font:700 14px var(--serif);color:#fff}
.master-chip .nm{font-size:10px;color:var(--ink2);white-space:nowrap}
.master-chip.active .nm{color:var(--accent);font-weight:600}
.chat{flex:1;overflow-y:auto;padding:20px 24px}
.chat-inner{max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
.msg{font-size:14.5px;line-height:1.9;max-width:90%}
.msg.ai{background:var(--a-soft);align-self:flex-start;padding:14px 18px;border-radius:16px 16px 16px 6px}
.msg.me{background:var(--accent);color:#fff;align-self:flex-end;padding:14px 18px;border-radius:16px 16px 6px 16px}
.msg .src{font-size:11px;color:var(--ink3);margin-bottom:6px;font-weight:600}
.msg.ai b{color:var(--accent)}
.input-row{display:flex;gap:8px;padding:14px 24px;border-top:1px solid var(--border);flex-shrink:0;max-width:720px;margin:0 auto;width:100%}
.input-row input{flex:1;border:1px solid var(--border);border-radius:12px;padding:13px 18px;font:14.5px var(--sans);outline:none;background:var(--bg)}
.input-row input:focus{border-color:var(--accent)}
.input-row button{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:13px 26px;font:600 14px var(--sans);cursor:pointer}
</style>
</head>
<body>
<div class="topbar">
  <button class="back">← 返回</button><h2>大师对话</h2><span class="sp"></span>
  <div class="mode"><button class="active">一对一</button><button>圆桌</button></div>
  <button style="border:1px solid var(--border);background:var(--paper);border-radius:8px;padding:5px 12px;font:12px var(--sans);cursor:pointer;color:var(--ink2)">+ 新对话</button>
</div>
<div class="master-bar">
  <div class="master-chip active"><div class="av" style="background:var(--accent)">温</div><span class="nm">温尼科特</span></div>
  <div class="master-chip"><div class="av" style="background:var(--purple)">拉</div><span class="nm">拉康</span></div>
  <div class="master-chip"><div class="av" style="background:var(--green)">弗</div><span class="nm">弗洛伊德</span></div>
  <div class="master-chip"><div class="av" style="background:var(--orange)">荣</div><span class="nm">荣格</span></div>
  <div class="master-chip"><div class="av" style="background:var(--green)">克</div><span class="nm">克莱因</span></div>
  <div class="master-chip"><div class="av" style="background:var(--purple)">比</div><span class="nm">比昂</span></div>
  <div class="master-chip"><div class="av" style="background:var(--green)">罗</div><span class="nm">罗杰斯</span></div>
  <div class="master-chip"><div class="av" style="background:var(--green)">贝</div><span class="nm">贝克</span></div>
  <div class="master-chip"><div class="av" style="background:var(--purple)">亚</div><span class="nm">亚隆</span></div>
  <div class="master-chip"><div class="av" style="background:var(--orange)">阿</div><span class="nm">阿德勒</span></div>
  <div class="master-chip"><div class="av" style="background:var(--red)">苏</div><span class="nm">苏珊·约翰逊</span></div>
</div>
<div class="chat"><div class="chat-inner">
  <div class="msg ai"><div class="src">温尼科特</div>你好，我是唐纳德·温尼科特。你想讨论什么临床材料？</div>
  <div class="msg me">来访者反复确认丈夫是否还爱自己，你怎么看？</div>
  <div class="msg ai"><div class="src">温尼科特</div>这让我想到<b>独处能力</b>（capacity to be alone）的问题。来访者无法在内部维持一个稳定的客体，所以需要不断从外部获取确认。这与早期抱持环境不足有关。<br><br>母亲「再闹就不要你了」的威胁破坏了这种抱持。来访者「不敢哭」指向<b>真自体</b>（true self）被压抑的过程。</div>
</div></div>
<div class="input-row"><input placeholder="输入问题，回车发送…"><button>发送</button></div>
</body>
</html>
