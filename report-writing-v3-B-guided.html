<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心镜 · 撰写报告 B · 全宽引导式</title>
<style>
:root{--bg:#F6F8FC;--paper:#FFFFFF;--soft:#EDF0F7;--border:#E2E7F0;--ink:#2B3140;--ink2:#646B7D;--ink3:#99A1B3;--accent:#8B93C7;--a-soft:#ECEEF9;--green:#6FAE8F;--serif:"Noto Serif SC","Songti SC",Georgia,serif;--sans:system-ui,-apple-system,"Segoe UI",sans-serif;--radius:14px;--r-sm:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh}
.page{max-width:940px;margin:0 auto;padding:32px 24px 48px;display:flex;flex-direction:column;gap:24px}
.topbar{display:flex;align-items:center;gap:12px}
.topbar .back{color:var(--ink2);font-size:13px;cursor:pointer;border:none;background:none;padding:4px 8px;border-radius:6px}
.topbar h2{font-family:var(--serif);font-size:20px;margin:0}.topbar .spacer{flex:1}
.topbar select{border:1px solid var(--border);border-radius:8px;padding:6px 10px;font:13px var(--sans);background:var(--paper)}
.topbar button{padding:9px 18px;border-radius:9px;font:600 13px var(--sans);cursor:pointer}
.topbar .btn-primary{background:var(--accent);color:#fff;border:none}.topbar .btn-ghost{border:1px solid var(--border);background:var(--paper);color:var(--ink2)}

.control-bar{display:flex;align-items:center;gap:12px;padding:14px 20px;background:var(--paper);border:1px solid var(--border);border-radius:var(--radius);flex-wrap:wrap}
.control-bar .lbl{font-size:12px;color:var(--ink3);font-weight:600}
.control-bar .chip{border:1px solid var(--border);border-radius:999px;padding:5px 14px;font-size:12px;cursor:pointer;color:var(--ink2);background:var(--paper)}
.control-bar .chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.control-bar .sp{flex:1}
.control-bar .ai-btn{border:1px solid var(--accent);background:var(--a-soft);color:var(--accent);border-radius:999px;padding:6px 14px;font-size:12px;cursor:pointer}
.control-bar .ai-btn:hover{background:var(--accent);color:#fff}

.doc{background:var(--paper);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.doc-section{padding:24px 32px;border-bottom:1px solid var(--border)}
.doc-section:last-child{border:none}
.doc-section .sec-num{font-size:11px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.doc-section .sec-title{font-family:var(--serif);font-size:17px;color:var(--ink);margin-bottom:12px}
.doc-section textarea{width:100%;min-height:80px;border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;font:14px/1.8 var(--sans);color:var(--ink);resize:vertical;outline:none;background:var(--bg)}
.doc-section textarea:focus{border-color:var(--accent);background:var(--paper)}
.doc-section .ai-fill{display:none;margin-top:8px;padding:10px 14px;background:var(--a-soft);border-radius:var(--r-sm);font-size:13px;line-height:1.7;border-left:3px solid var(--accent);color:var(--ink2)}
.doc-section .ai-fill.show{display:block}
.doc-section .ai-fill .accept-btn{display:inline-block;margin-top:6px;padding:4px 14px;border-radius:6px;background:var(--accent);color:#fff;font-size:12px;cursor:pointer;border:none}
.sessions-strip{display:flex;gap:8px;flex-wrap:wrap;padding:10px 20px;background:var(--soft);border-radius:var(--r-sm);margin-bottom:16px}
.sessions-strip .sess-chip{display:flex;align-items:center;gap:6px;padding:4px 10px 4px 4px;background:var(--paper);border:1px solid var(--border);border-radius:999px;font-size:12px;cursor:pointer}
.sessions-strip .sess-chip input{margin:0}
.sessions-strip .sess-chip.selected{border-color:var(--accent);background:var(--a-soft)}

@media(max-width:768px){.doc-section{padding:16px 20px}}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <button class="back">&#x2190; 返回</button>
    <h2>撰写报告</h2>
    <span class="spacer"></span>
    <select style="max-width:180px"><option>林小满</option><option>陈默</option></select>
    <button class="btn-ghost">上传格式模板</button>
    <button class="btn-primary">导出 Word</button>
  </div>

  <div class="control-bar">
    <span class="lbl">基于节次：</span>
    <span class="sessions-strip" style="margin:0;padding:0;background:none">
      <label class="sess-chip selected"><input type="checkbox" checked> 第1节</label>
      <label class="sess-chip selected"><input type="checkbox" checked> 第2节</label>
      <label class="sess-chip selected"><input type="checkbox" checked> 第3节</label>
      <label class="sess-chip selected"><input type="checkbox" checked> 第4节</label>
      <label class="sess-chip selected"><input type="checkbox" checked> 第5节</label>
    </span>
    <span class="sp"></span>
    <button class="ai-btn" onclick="document.querySelectorAll('.ai-fill').forEach(e=>e.classList.toggle('show'))">让 AI 填写全部 &#x2728;</button>
  </div>

  <div class="doc">
    <div class="doc-section">
      <div class="sec-num">1 / 基本信息</div>
      <div class="sec-title">来访者基本信息与转介来源</div>
      <textarea placeholder="姓名、年龄、性别、职业、婚姻状况、转介渠道等……">林小满（化名），女，29岁，已婚，公司行政人员。自行通过网络搜索找到咨询师。</textarea>
    </div>
    <div class="doc-section">
      <div class="sec-num">2 / 主诉</div>
      <div class="sec-title">主诉与求助原因</div>
      <textarea placeholder="来访者自述的困扰、持续时间、严重程度……">反复确认丈夫是否还爱自己，持续约 6 个月。每日花费 1-2 小时反复回忆对话细节。伴有睡眠质量下降，入睡困难。</textarea>
      <div class="ai-fill">AI 建议：基于第1-5节逐字稿，来访者在 5 次会谈中共 23 次提及"害怕他不要我"，核心焦虑围绕被抛弃恐惧与童年依恋创伤的再现。第3节起睡眠有所改善，但确认行为频率未明显下降。AI 还可补充：症状首次出现时间、对日常生活的影响程度。 <span class="accept-btn" onclick="this.parentElement.previousElementSibling.value=''">采用此段</span></div>
    </div>
    <div class="doc-section">
      <div class="sec-num">3 / 发展史</div>
      <div class="sec-title">个人发展史与家庭背景</div>
      <textarea placeholder="童年经历、家庭关系、重要生活事件……">来访者述母亲在其童年时期常以「再闹就不要你了」的威胁进行管教。父亲长期出差，家庭情感支持匮乏。无明显的创伤性事件报告，但来访者描述童年为"一个人长大的"。</textarea>
    </div>
    <div class="doc-section">
      <div class="sec-num">4 / 心理动力学理解</div>
      <div class="sec-title">心理动力学评估与个案概念化</div>
      <textarea placeholder="运用所选理论取向对个案形成理解……">基于温尼科特取向，来访者对"被抛弃"的反复确认可被理解为童年抱持环境不足的复现。来访者尚未形成独处能力（capacity to be alone），在亲密关系中重复寻求"不入侵他者"的在场确认。过渡性空间尚未建立。</textarea>
    </div>
    <div class="doc-section">
      <div class="sec-num">5 / 治疗过程与进展</div>
      <div class="sec-title">治疗过程概述与关键转折</div>
      <textarea placeholder="历次咨询的进展、关键转折、来访者的变化……">第 1-2 节以来访者描述困扰为主，建立治疗联盟。第 3 节起触及童年与母亲的关系模式，出现首次明显的移情反应（来访者说「你也觉得我太粘人了吗」）。第 4-5 节治疗师引入身体感受的探索，来访者首次将"胸口发紧"命名为"害怕消失的恐惧"。</textarea>
    </div>
    <div class="doc-section">
      <div class="sec-num">6 / 展望</div>
      <div class="sec-title">后续方向与反思</div>
      <textarea placeholder="下一阶段的目标、可能的挑战、咨询师的自我反思……">下一阶段目标：继续巩固治疗师作为抱持他者的在场体验，逐步朝向独处能力的建立。挑战在于来访者可能因移情议题加深而出现短暂的退行。咨询师需警惕自身的保护欲，保持不入侵的在场。</textarea>
    </div>
  </div>
</div>
</body>
</html>
