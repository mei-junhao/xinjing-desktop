<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>心理咨询记账系统 · 状态统计</title>
    <!-- 心镜桥接层：把记账的 localStorage 读写翻译成对心镜 Store(IndexedDB) 的操作，实现单一真相源 -->
    <script src="js/billing-sync.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f4f9; min-height: 100vh; padding: 20px 16px 60px; color: #1e293b;
        }
        .app {
            max-width: 1000px; margin: 0 auto; background: rgba(255,255,255,0.93);
            backdrop-filter: blur(12px); border-radius: 28px; padding: 24px 28px 32px;
            box-shadow: 0 18px 50px rgba(0,20,40,0.07); border: 1px solid rgba(255,255,255,0.5);
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px; margin-bottom: 24px;
            padding-bottom: 14px; border-bottom: 2px solid rgba(148,163,184,0.18);
        }
        .header h1 { font-size: 22px; font-weight: 700; color: #0f172a; }
        .header h1 small { font-size: 12px; color: #64748b; margin-left: 4px; }

        /* 统计面板 */
        .stats-panel {
            display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
            background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
            padding: 10px 18px; border-radius: 16px; border: 1px solid #bae6fd;
        }
        .stats-panel select {
            padding: 6px 12px; border: 1.5px solid #bae6fd; border-radius: 8px;
            background: #fff; font-size: 13px; font-weight: 500; color: #0c4a6e; outline: none;
        }
        .stats-grid {
            display: flex; gap: 24px; font-size: 13px; flex-wrap: wrap;
        }
        .stat-item {
            display: flex; flex-direction: column; align-items: flex-start;
        }
        .stat-label { color: #0369a1; font-weight: 500; font-size: 11px; }
        .stat-value { font-weight: 700; font-size: 16px; color: #0f172a; }

        .stack { display: flex; flex-direction: column; gap: 20px; margin-bottom: 20px; }
        .card {
            background: #fff; border-radius: 18px; padding: 18px 20px 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.025); border: 1px solid rgba(226,232,240,0.55);
        }
        .card-title {
            font-size: 16px; font-weight: 600; color: #0f172a; margin-bottom: 12px;
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
        }
        .card-title .badge { background: #e2e8f0; color: #475569; font-size: 11px; padding: 0 10px; border-radius: 30px; line-height: 22px; }
        .client-top-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
        .client-search { flex: 1; min-width: 140px; }
        .client-search input {
            width: 100%; padding: 8px 12px; border: 1.5px solid #e2e8f0; border-radius: 10px;
            font-size: 14px; background: #f8fafc;
        }
        .client-search input:focus { outline: none; border-color: #0ea5e9; background: #fff; }
        .client-list { max-height: 300px; overflow-y: auto; margin-top: 8px; }
        .client-group { margin-bottom: 4px; }
        .client-group h4 {
            font-size: 12px; font-weight: 600; color: #94a3b8; padding: 2px 6px;
            background: #f8fafc; border-radius: 6px; margin-bottom: 2px;
        }
        .client-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 7px 10px; border-radius: 8px; cursor: pointer;
            border: 1px solid transparent; transition: background 0.12s;
        }
        .client-item:hover { background: #f1f5f9; }
        .client-item.active { border-color: #0ea5e9; background: #f0f9ff; }
        .client-item .info { flex: 1; min-width: 0; }
        .client-item .info .name { font-weight: 600; font-size: 14px; }
        .client-item .info .meta { font-size: 10.5px; color: #64748b; display: flex; gap: 6px; flex-wrap: wrap; }
        .client-item .actions { display: flex; gap: 1px; }
        .client-item .actions button {
            background: none; border: none; font-size: 13px; cursor: pointer;
            padding: 3px 7px; border-radius: 5px; color: #94a3b8;
        }
        .client-item .actions button:hover { background: #e2e8f0; color: #0f172a; }
        .client-form { margin-top: 10px; padding: 10px 12px; background: #f8fafc; border-radius: 14px; }
        .client-form .row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
        .client-form .row input, .client-form .row select {
            padding: 7px 10px; border: 1.5px solid #e2e8f0; border-radius: 8px;
            font-size: 13px; background: #fff;
        }
        .client-form .row input:focus, .client-form .row select:focus { outline: none; border-color: #0ea5e9; }
        .btn {
            padding: 8px 16px; border: none; border-radius: 40px; font-size: 13px; font-weight: 600;
            cursor: pointer; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
            transition: all 0.15s;
        }
        .btn-primary { background: #0ea5e9; color: #fff; }
        .btn-primary:hover { background: #0284c7; transform: translateY(-1px); }
        .btn-secondary { background: #f1f5f9; color: #475569; }
        .btn-secondary:hover { background: #e2e8f0; }
        .btn-success { background: #059669; color: #fff; }
        .btn-outline { background: #fff; border: 1.5px solid #0ea5e9; color: #0ea5e9; }
        .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 30px; }
        .record-form { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px 16px; }
        @media (max-width: 640px) { .record-form { grid-template-columns: 1fr 1fr; } }
        .record-form .group { display: flex; flex-direction: column; gap: 3px; }
        .record-form .group.full { grid-column: 1 / -1; }
        .record-form .group label { font-size: 12px; font-weight: 600; color: #475569; }
        .record-form .group input, .record-form .group select {
            padding: 8px 10px; border: 1.5px solid #e2e8f0; border-radius: 9px;
            font-size: 13px; background: #f8fafc;
        }
        .record-form .group input:focus, .record-form .group select:focus {
            outline: none; border-color: #0ea5e9; background: #fff;
        }
        .record-form .form-actions {
            grid-column: 1 / -1; display: flex; gap: 10px; justify-content: flex-end;
            padding-top: 6px; border-top: 1px solid #f1f5f9; flex-wrap: wrap;
        }
        .batch-panel {
            display: none; background: #f8fafc; border: 2px dashed #94a3b8;
            border-radius: 16px; padding: 14px 16px; margin-top: 8px; grid-column: 1 / -1;
        }
        .batch-panel.show { display: block; }
        .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 8px; }
        .cal-nav button { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 5px 10px; cursor: pointer; font-size: 14px; }
        .cal-nav .month-label { font-weight: 600; font-size: 14px; color: #0f172a; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; text-align: center; font-size: 12px; }
        .cal-grid .day-header { color: #94a3b8; font-weight: 600; padding: 4px 0; font-size: 11px; }
        .cal-grid .day-cell {
            padding: 7px 2px; border-radius: 6px; cursor: pointer; transition: 0.12s;
            border: 1px solid transparent; user-select: none; color: #334155;
        }
        .cal-grid .day-cell:hover { background: #e0f2fe; }
        .cal-grid .day-cell.empty { cursor: default; }
        .cal-grid .day-cell.selected { background: #0ea5e9; color: #fff; font-weight: 600; border-color: #0284c7; }
        .cal-grid .day-cell.today { border-color: #f59e0b; }
        .cal-info { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        .cal-info .count { font-weight: 600; color: #0ea5e9; }
        .cal-months { display: flex; gap: 20px; flex-wrap: wrap; }
        .import-panel {
            display: none; background: #fffbeb; border: 2px dashed #f59e0b;
            border-radius: 14px; padding: 14px 16px; margin-top: 8px; grid-column: 1 / -1;
        }
        .import-panel.show { display: block; }
        .import-panel h4 { font-size: 13px; color: #92400e; margin-bottom: 6px; }
        .import-panel textarea {
            width: 100%; min-height: 110px; padding: 8px 12px; border: 1.5px solid #fcd34d;
            border-radius: 10px; font-size: 12px; font-family: 'Menlo', 'Consolas', monospace;
            resize: vertical; background: #fff7ed;
        }
        .import-panel .hint { font-size: 11px; color: #a16207; margin-top: 4px; }
        .import-panel .match-results { margin-top: 8px; max-height: 180px; overflow-y: auto; }
        .import-panel .match-row {
            display: flex; align-items: center; gap: 6px; padding: 3px 0;
            border-bottom: 1px solid #fed7aa; font-size: 12px;
        }
        .import-panel .actions { display: flex; gap: 6px; margin-top: 8px; }
        .detail-section {
            background: #fff; border-radius: 18px; border: 1px solid rgba(226,232,240,0.55);
            overflow: hidden; margin-top: 16px;
        }
        .detail-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 20px; flex-wrap: wrap; gap: 8px;
            background: #fafcff; border-bottom: 1px solid #f1f5f9;
        }
        .detail-header h2 { font-size: 16px; font-weight: 600; }
        .view-tabs { display: flex; gap: 4px; background: #f1f5f9; border-radius: 40px; padding: 3px; }
        .view-tabs button {
            background: transparent; border: none; padding: 5px 14px; border-radius: 30px;
            font-size: 12px; cursor: pointer; color: #64748b; white-space: nowrap;
        }
        .view-tabs button.active { background: #fff; color: #0f172a; box-shadow: 0 2px 6px rgba(0,0,0,0.04); font-weight: 600; }
        .export-dropdown { position: relative; display: inline-block; }
        .export-menu {
            display: none; position: absolute; right: 0; top: 100%; background: #fff;
            border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.12); z-index: 99;
            min-width: 160px; padding: 6px 0; border: 1px solid #e2e8f0;
        }
        .export-menu.show { display: block; }
        .export-menu button {
            display: block; width: 100%; text-align: left; padding: 8px 16px;
            background: none; border: none; font-size: 13px; cursor: pointer; color: #334155;
        }
        .export-menu button:hover { background: #f1f5f9; }
        .group-card { border-bottom: 1px solid #f1f5f9; }
        .group-toggle {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 18px; cursor: pointer; user-select: none; gap: 10px;
        }
        .group-toggle:hover { background: #f8fafc; }
        .group-toggle .arrow { font-size: 12px; transition: transform 0.2s; color: #94a3b8; min-width: 16px; text-align: center; }
        .group-toggle .arrow.open { transform: rotate(90deg); }
        .group-toggle .gname { font-weight: 600; font-size: 14px; }
        .group-toggle .gmeta { font-size: 12px; color: #64748b; display: flex; gap: 10px; flex-wrap: wrap; }
        .sub-records { overflow: hidden; max-height: 0; opacity: 0; transition: all 0.25s ease; }
        .sub-records.open { max-height: 3000px; opacity: 1; }
        .month-block { padding: 6px 18px; border-bottom: 1px solid #f8fafc; }
        .month-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; padding: 5px 0; font-size: 13px; font-weight: 500; color: #475569; flex-wrap: wrap; }
        .month-records { overflow: hidden; max-height: 0; opacity: 0; transition: all 0.25s ease; }
        .month-records.open { max-height: 2000px; opacity: 1; }
        .sub-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .sub-table th { padding: 8px 14px 6px 18px; text-align: left; font-weight: 600; font-size: 11px; color: #64748b; text-transform: uppercase; border-bottom: 1px solid #e2e8f0; background: #f8fafc; }
        .sub-table td { padding: 8px 14px 8px 18px; border-bottom: 1px solid #f1f5f9; }
        .status-tag { display: inline-block; padding: 0 10px; border-radius: 20px; font-size: 11px; font-weight: 500; line-height: 22px; }
        .status-tag.paid { background: #dcfce7; color: #166534; }
        .status-tag.unpaid { background: #fee2e2; color: #991b1b; }
        .balance { font-weight: 600; padding: 1px 10px; border-radius: 20px; font-size: 12px; }
        .balance.clear { background: #dcfce7; color: #166534; }
        .balance.owe { background: #fee2e2; color: #991b1b; }
        .balance.over { background: #dbeafe; color: #1e40af; }
        .settle-btn { background: #f0f9ff; border: 1px solid #bae6fd; color: #0369a1; padding: 3px 10px; border-radius: 16px; font-size: 11px; cursor: pointer; margin-left: 4px; }
        .settle-btn:hover { background: #e0f2fe; }
        .empty-detail { text-align: center; padding: 40px 20px 36px; color: #94a3b8; }
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: #0f172a; color: #fff; padding: 10px 24px; border-radius: 50px;
            font-weight: 500; font-size: 13px; z-index: 9999; opacity: 0;
            transition: all 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { background: #059669; }
        .toast.warning { background: #d97706; }
        .client-list::-webkit-scrollbar { width: 4px; }
        .client-list::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .client-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .total-sessions-badge {
            display: inline-block; background: #f0f9ff; color: #0c4a6e; padding: 2px 10px;
            border-radius: 16px; font-size: 12px; font-weight: 500; margin-left: 4px;
            border: 1px solid #bae6fd;
        }
        .client-status {
            display: inline-block; padding: 1px 8px; border-radius: 12px;
            font-size: 10px; font-weight: 500; margin-left: 4px; vertical-align: middle;
        }
        .client-status.active { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .client-status.paused { background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }
        /* 修改/删除按钮样式 */
        .action-btn {
            background: none; border: none; cursor: pointer; font-size: 12px; margin-left: 4px;
            color: #64748b;
        }
        .action-btn:hover { color: #0f172a; }
    </style>
    <link rel="stylesheet" href="billing-theme.css">
</head>
<body>
<div class="app" id="app">
    <header class="header">
        <h1>心理档案记账 <small>状态统计</small></h1>
        <div class="stats-panel" id="statsPanel">
            <select id="statsMonth"></select>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-label">总小时数</span>
                    <span class="stat-value" id="statTotalHours">0h</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">收入</span>
                    <span class="stat-value" id="statIncome">¥0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">本月小时数</span>
                    <span class="stat-value" id="statMonthHours">0h</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">本月均价</span>
                    <span class="stat-value" id="statAvgPrice">¥0</span>
                </div>
            </div>
        </div>
    </header>

    <div class="stack">
        <div class="card">
            <div class="card-title">来访者档案 <span class="badge" id="clientCount">0 人</span></div>
            <div class="client-top-row">
                <div class="client-search">
                    <input type="text" id="clientSearch" placeholder="搜索姓名..." />
                </div>
            </div>
            <div class="client-list" id="clientList"></div>
            <div class="client-form" id="clientForm">
                <div class="row">
                    <input type="text" id="clientNameInput" placeholder="姓名" style="flex:1;min-width:80px;" />
                    <input type="number" id="clientFeeInput" placeholder="单价" min="0" step="0.01" style="width:80px;" />
                    <select id="clientModeInput" style="width:72px;">
                        <option value="per-session">次结</option>
                        <option value="monthly">月结</option>
                    </select>
                    <input type="number" id="clientManualSessions" placeholder="手动次数" min="0" value="0" style="width:90px;" />
                    <select id="clientStatusInput" style="width:90px;">
                        <option value="active">正在进行</option>
                        <option value="paused">暂停</option>
                    </select>
                </div>
                <div class="row">
                    <button class="btn btn-primary btn-sm" id="clientConfirmBtn">确认</button>
                    <button class="btn btn-secondary btn-sm" id="clientCancelBtn" style="display:none;">取消</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">咨询记录</div>
            <form id="recordForm" class="record-form">
                <div class="group full">
                    <label>选择来访者 <span id="totalSessionsLabel" class="total-sessions-badge" style="display:none;">总次数：0</span></label>
                    <select id="recordClient" required><option value="">— 请先添加档案 —</option></select>
                </div>
                <div class="group"><label>日期</label><input type="date" id="recordDate" required /></div>
                <div class="group"><label>次数</label><input type="number" id="recordSessions" min="1" value="1" /></div>
                <div class="group"><label>单价</label><input type="number" id="recordFee" min="0" step="0.01" readonly /></div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">添加记录</button>
                    <button type="button" class="btn btn-outline btn-sm" id="batchBtn">批量选日期</button>
                    <button type="button" class="btn btn-success btn-sm" id="pasteBtn">粘贴参会</button>
                </div>
                <div class="batch-panel" id="batchPanel">
                    <div class="cal-nav">
                        <button id="calPrev">◀</button>
                        <span class="month-label" id="calLabel1"></span>
                        <span class="month-label" id="calLabel2" style="margin-left:16px;"></span>
                        <button id="calNext">▶</button>
                    </div>
                    <div class="cal-months">
                        <div><div class="cal-grid" id="calGrid1"></div></div>
                        <div><div class="cal-grid" id="calGrid2"></div></div>
                    </div>
                    <div class="cal-info">
                        <span>已选 <span class="count" id="calCount">0</span> 个日期</span>
                        <button class="btn btn-sm btn-secondary" id="calClear">清空</button>
                        <button class="btn btn-sm btn-primary" id="batchConfirm">批量添加</button>
                        <button class="btn btn-sm btn-secondary" id="batchCancelBtn">取消</button>
                    </div>
                </div>
                <div class="import-panel" id="pastePanel">
                    <h4>粘贴腾讯会议参会名单</h4>
                    <textarea id="pasteInput" placeholder="粘贴参会成员列表..."></textarea>
                    <div class="hint">自动模糊匹配来访者，绿色=成功，红色=需手动选择</div>
                    <div class="match-results" id="matchResults"></div>
                    <div class="actions">
                        <button type="button" class="btn btn-primary btn-sm" id="pasteConfirm">确认导入</button>
                        <button type="button" class="btn btn-secondary btn-sm" id="pasteCancel">取消</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="detail-section">
        <div class="detail-header">
            <h2>记账明细 <span class="badge" id="detailCount">0 条</span></h2>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                <div class="view-tabs" id="viewTabs">
                    <button data-view="client" class="active">按来访者</button>
                    <button data-view="month">按月</button>
                    <button data-view="unpaid">未缴费</button>
                </div>
                <button class="btn btn-secondary btn-sm" id="expandAllBtn">展开全部</button>
                <div class="export-dropdown">
                    <button class="btn btn-outline btn-sm" id="exportBtn">导出</button>
                    <div class="export-menu" id="exportMenu">
                        <button data-export="all">导出全部记录</button>
                        <button data-export="client">导出当前来访者</button>
                        <button data-export="month">按月导出</button>
                        <button data-export="year">按年导出</button>
                    </div>
                </div>
            </div>
        </div>
        <div id="groupList"></div>
        <div class="empty-detail" id="emptyDetail"><p>暂无记录</p></div>
    </div>
</div>
<div class="toast" id="toast"></div>

<script>
(function() {
    'use strict';
    const STORAGE_KEY = 'psyc_billing_v8';
    let data = { clients: [], records: [], monthlyPayments: [] };
    let viewMode = 'client';
    let editingClientId = null;
    let calendarDate = new Date();
    let selectedDates = new Set();

    function loadData() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                const parsed = JSON.parse(raw);
                data.clients = (parsed.clients || []).map(c => ({
                    ...c,
                    billingMode: c.billingMode || 'per-session',
                    manualSessions: c.manualSessions || 0,
                    status: c.status || 'active'
                }));
                data.records = parsed.records || [];
                data.monthlyPayments = parsed.monthlyPayments || [];
                data.clients.forEach(c => { if (!c.id) c.id = genId('c'); });
                data.records.forEach(r => { if (!r.id) r.id = genId('r'); });
                data.monthlyPayments.forEach(p => { if (!p.id) p.id = genId('mp'); });
            } else {
                data.clients = [
                    { id: 'c1', name: '张明', feePerSession: 300, billingMode: 'per-session', manualSessions: 0, status: 'active' },
                    { id: 'c2', name: '李静', feePerSession: 250, billingMode: 'monthly', manualSessions: 0, status: 'active' }
                ];
                data.records = [
                    { id:'r1', clientId:'c1', date:'2025-04-10', sessions:1, feePerSession:300, paid:false },
                    { id:'r2', clientId:'c2', date:'2025-04-12', sessions:2, feePerSession:250, paid:false },
                ];
                data.monthlyPayments = [];
                saveData();
            }
        } catch(e) { data = { clients:[], records:[], monthlyPayments:[] }; }
        data.records.sort((a,b) => a.date > b.date ? -1 : 1);
    }

    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
    function genId(p) { return p+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7); }
    function formatDate(s) { if(!s) return '—'; const d=new Date(s+'T00:00:00'); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
    function formatMonth(s) { if(!s) return ''; const d=new Date(s+'T00:00:00'); return `${d.getFullYear()}年${String(d.getMonth()+1).padStart(2,'0')}月`; }
    function formatMoney(n) { return '¥'+Number(n).toFixed(2); }
    function getClient(id) { return data.clients.find(c=>c.id===id); }
    function getRecordsByClient(cid) { return data.records.filter(r=>r.clientId===cid); }
    function calcAmount(r) { return r.sessions * r.feePerSession; }
    function getMonthlyDue(clientId, month) {
        return data.records.filter(r => r.clientId===clientId && r.date.startsWith(month))
            .reduce((sum, r) => sum + calcAmount(r), 0);
    }
    function getMonthlyPayment(clientId, month) {
        const p = data.monthlyPayments.find(mp => mp.clientId===clientId && mp.month===month);
        return p ? p.amount : 0;
    }
    function calcClientStats(cid) {
        const recs = getRecordsByClient(cid);
        const c = getClient(cid);
        let totalAmount = 0, totalSessions = 0, unpaidAmount = 0;
        if (c?.billingMode === 'monthly') {
            recs.forEach(r => { totalAmount += calcAmount(r); totalSessions += r.sessions; });
            const months = new Set(recs.map(r => r.date.slice(0,7)));
            let totalPaid = 0;
            months.forEach(m => { totalPaid += getMonthlyPayment(cid, m); });
            unpaidAmount = totalAmount - totalPaid;
        } else {
            recs.forEach(r => {
                totalAmount += calcAmount(r);
                totalSessions += r.sessions;
                if (!r.paid) unpaidAmount += calcAmount(r);
            });
        }
        return { totalSessions, totalAmount, unpaidAmount, recordCount: recs.length };
    }
    function getTotalSessions(cid) {
        const c = getClient(cid);
        if (!c) return 0;
        const systemSessions = data.records.filter(r=>r.clientId===cid).reduce((s,r)=>s+r.sessions,0);
        return systemSessions + (c.manualSessions || 0);
    }

    function populateMonthOptions() {
        const monthsSet = new Set(data.records.map(r => r.date.slice(0,7)));
        const months = Array.from(monthsSet).sort((a,b) => b.localeCompare(a));
        const currentMonth = new Date().toISOString().slice(0,7);
        if (!months.includes(currentMonth)) months.unshift(currentMonth);
        let html = '<option value="all">全部时间</option>';
        months.forEach(m => {
            html += `<option value="${m}">${formatMonth(m+'-01')}</option>`;
        });
        $('statsMonth').innerHTML = html;
        $('statsMonth').value = 'all';
    }

    function updateStats() {
        const month = $('statsMonth').value;
        const totalSysSessions = data.records.reduce((s,r) => s + r.sessions, 0);
        const totalManual = data.clients.reduce((s,c) => s + (c.manualSessions||0), 0);
        const totalHours = totalSysSessions + totalManual;

        let income = 0, monthSessions = 0;
        if (month === 'all') {
            income = data.records.reduce((s,r) => s + calcAmount(r), 0);
            monthSessions = totalSysSessions;
        } else {
            const mRecords = data.records.filter(r => r.date.startsWith(month));
            income = mRecords.reduce((s,r) => s + calcAmount(r), 0);
            monthSessions = mRecords.reduce((s,r) => s + r.sessions, 0);
        }
        const avgPrice = monthSessions > 0 ? (income / monthSessions) : 0;

        $('statTotalHours').textContent = totalHours + 'h';
        $('statIncome').textContent = formatMoney(income);
        $('statMonthHours').textContent = monthSessions + 'h';
        $('statAvgPrice').textContent = formatMoney(avgPrice);
    }

    const $ = id => document.getElementById(id);
    const toastEl = $('toast');
    let toastTimer;
    function toast(msg, type) {
        if(toastTimer) clearTimeout(toastTimer);
        toastEl.textContent = msg; toastEl.className = 'toast '+(type||'');
        void toastEl.offsetWidth; toastEl.classList.add('show');
        toastTimer = setTimeout(()=>{toastEl.classList.remove('show');},2200);
    }
    function escHtml(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

    // ── 来访者 ──
    function renderClients(searchTerm = '') {
        const term = searchTerm.trim().toLowerCase();
        let filtered = data.clients;
        if (term) filtered = data.clients.filter(c => c.name.toLowerCase().includes(term));
        const groups = {};
        filtered.forEach(c => {
            const first = c.name.charAt(0).toUpperCase();
            const key = /[A-Za-z]/.test(first) ? first : '#';
            if (!groups[key]) groups[key] = [];
            groups[key].push(c);
        });
        let html = '';
        const sortedKeys = Object.keys(groups).sort((a,b) => a === '#' ? 1 : b === '#' ? -1 : a.localeCompare(b));
        for (const key of sortedKeys) {
            html += `<div class="client-group"><h4>${key}</h4>`;
            groups[key].forEach(c => {
                const stats = calcClientStats(c.id);
                const modeText = c.billingMode === 'monthly' ? '月结' : '次结';
                const statusClass = c.status === 'active' ? 'active' : 'paused';
                const statusText = c.status === 'active' ? '进行' : '暂停';
                html += `<div class="client-item ${editingClientId===c.id?'active':''}" data-id="${c.id}">
                    <div class="info">
                        <div class="name">${escHtml(c.name)} <span style="font-size:10px;color:#0ea5e9;">${modeText}</span> <span class="client-status ${statusClass}">${statusText}</span></div>
                        <div class="meta">
                            <span>${formatMoney(c.feePerSession)}</span>
                            <span>${stats.totalSessions}次</span>
                            <span>${formatMoney(stats.totalAmount)}</span>
                            ${stats.unpaidAmount>0?`<span style="color:#dc2626;">${formatMoney(stats.unpaidAmount)}</span>`:''}
                        </div>
                    </div>
                    <div class="actions">
                        <button class="edit-client" data-id="${c.id}">✎</button>
                        <button class="del-client" data-id="${c.id}" title="删除">✕</button>
                    </div>
                </div>`;
            });
            html += `</div>`;
        }
        if (!html) html = '<div style="padding:16px;text-align:center;color:#94a3b8;">暂无匹配来访者</div>';
        $('clientList').innerHTML = html;
        $('clientCount').textContent = filtered.length + ' 人';
    }

    function startEditClient(id) {
        const c = getClient(id); if(!c) return;
        editingClientId = id;
        $('clientNameInput').value = c.name;
        $('clientFeeInput').value = c.feePerSession;
        $('clientModeInput').value = c.billingMode;
        $('clientManualSessions').value = c.manualSessions || 0;
        $('clientStatusInput').value = c.status || 'active';
        $('clientConfirmBtn').textContent = '确认修改';
        $('clientCancelBtn').style.display = 'inline-block';
        renderClients($('clientSearch').value);
    }

    function cancelEditClient() {
        editingClientId = null;
        $('clientNameInput').value = '';
        $('clientFeeInput').value = '';
        $('clientModeInput').value = 'per-session';
        $('clientManualSessions').value = '0';
        $('clientStatusInput').value = 'active';
        $('clientConfirmBtn').textContent = '添加来访者';
        $('clientCancelBtn').style.display = 'none';
        renderClients($('clientSearch').value);
    }

    function confirmClientAction() {
        const name = $('clientNameInput').value.trim();
        const fee = parseFloat($('clientFeeInput').value);
        const mode = $('clientModeInput').value;
        const manual = parseInt($('clientManualSessions').value) || 0;
        const status = $('clientStatusInput').value;
        if (!name) { toast('请输入姓名','warning'); return; }
        if (isNaN(fee) || fee <= 0) { toast('请输入有效价格','warning'); return; }
        if (editingClientId) {
            const c = getClient(editingClientId);
            if (c) {
                const exist = data.clients.find(cl => cl.name === name && cl.id !== editingClientId);
                if (exist) { toast('已存在同名来访者','warning'); return; }
                c.name = name; c.feePerSession = fee; c.billingMode = mode; c.manualSessions = manual; c.status = status;
                toast('已更新','success');
            }
        } else {
            if (data.clients.find(c => c.name === name)) { toast('来访者已存在','warning'); return; }
            data.clients.push({ id: genId('c'), name, feePerSession: fee, billingMode: mode, manualSessions: manual, status });
            toast(`已添加「${name}」`,'success');
        }
        saveData();
        cancelEditClient();
        renderAll();
    }

    function deleteClient(id) {
        const c = getClient(id); if(!c) return;
        if(!confirm(`确定删除「${c.name}」及其所有记录？`)) return;
        data.clients = data.clients.filter(x=>x.id!==id);
        data.records = data.records.filter(r=>r.clientId!==id);
        data.monthlyPayments = data.monthlyPayments.filter(mp=>mp.clientId!==id);
        if(editingClientId===id) cancelEditClient();
        saveData(); renderAll(); toast('已删除','info');
    }

    // ── 记录表单 ──
    function renderClientSelect() {
        const cur = $('recordClient').value;
        $('recordClient').innerHTML = `<option value="">— 选择来访者 —</option>` +
            data.clients.map(c => `<option value="${c.id}">${escHtml(c.name)}（${formatMoney(c.feePerSession)}｜${c.billingMode==='monthly'?'月结':'次结'}）${c.status==='paused'?' [暂停]':''}</option>`).join('');
        if(cur && getClient(cur)) $('recordClient').value = cur;
        onClientSelect();
    }

    function onClientSelect() {
        const c = getClient($('recordClient').value);
        $('recordFee').value = c ? c.feePerSession : '';
        if (c) {
            const total = getTotalSessions(c.id);
            $('totalSessionsLabel').style.display = 'inline-block';
            $('totalSessionsLabel').textContent = `总次数：${total}（系统${total-(c.manualSessions||0)}+手动${c.manualSessions||0}）`;
        } else {
            $('totalSessionsLabel').style.display = 'none';
        }
    }

    function addRecord() {
        const cid = $('recordClient').value;
        const date = $('recordDate').value;
        const sessions = parseInt($('recordSessions').value)||1;
        if(!cid) { toast('请选择来访者','warning'); return; }
        if(!date) { toast('请选择日期','warning'); return; }
        const c = getClient(cid); if(!c) return;
        data.records.push({ id:genId('r'), clientId:cid, date, sessions, feePerSession:c.feePerSession, paid:false });
        data.records.sort((a,b)=>a.date>b.date?-1:1);
        saveData(); renderAll();
        toast('记录已添加','success');
    }

    function togglePaid(id) {
        const r = data.records.find(x=>x.id===id); if(!r) return;
        r.paid = !r.paid;
        saveData();
        const row = document.querySelector(`tr[data-id="${id}"]`);
        if (!row) { renderAll(); return; }
        const statusTd = row.querySelector('td:first-child');
        if (statusTd) { statusTd.className = r.paid ? 'paid' : 'unpaid'; }
        const tag = row.querySelector('.status-tag');
        if (tag) {
            tag.className = 'status-tag ' + (r.paid ? 'paid' : 'unpaid');
            tag.textContent = r.paid ? '已缴' : '未缴';
        }
        const btn = row.querySelector('.toggle-paid-btn');
        if (btn) btn.textContent = r.paid ? '标记未缴' : '标记已缴';
        updateStatsDisplay();
    }

    // ★ 修改记录（新增函数）
    function editRecord(id) {
        const r = data.records.find(x => x.id === id);
        if (!r) return toast('记录不存在','warning');
        const newDate = prompt('修改日期（YYYY-MM-DD）', r.date);
        if (newDate === null) return;
        if (!/^\d{4}-\d{2}-\d{2}$/.test(newDate)) { toast('日期格式无效','warning'); return; }
        const newSessions = prompt('修改次数', r.sessions);
        if (newSessions === null) return;
        const sessionsNum = parseInt(newSessions, 10);
        if (isNaN(sessionsNum) || sessionsNum < 1) { toast('次数至少为1','warning'); return; }
        r.date = newDate;
        r.sessions = sessionsNum;
        data.records.sort((a,b) => a.date > b.date ? -1 : 1);
        saveData();
        renderAll();
        toast('记录已更新','success');
    }

    function updateStatsDisplay() {
        const activeIds = new Set(data.clients.filter(c => c.status !== 'paused').map(c => c.id));
        let totalRecs = data.records.filter(r => activeIds.has(r.clientId)).length;
        $('detailCount').textContent = totalRecs + ' 条';
        renderClients($('clientSearch').value);
        onClientSelect();
        updateStats();
    }

    function deleteRecord(id) {
        if(!confirm('删除此记录？')) return;
        data.records = data.records.filter(r=>r.id!==id);
        saveData(); renderAll();
    }

    function settleMonth(clientId, month) {
        const due = getMonthlyDue(clientId, month);
        const currentPayment = getMonthlyPayment(clientId, month);
        const input = prompt(`本月应缴 ${formatMoney(due)}\n已付 ${formatMoney(currentPayment)}\n请输入本次支付金额（累加）：`);
        if (input === null) return;
        const amount = parseFloat(input);
        if (isNaN(amount) || amount < 0) { toast('请输入有效金额','warning'); return; }
        let payment = data.monthlyPayments.find(mp => mp.clientId === clientId && mp.month === month);
        if (payment) {
            payment.amount += amount;
        } else {
            data.monthlyPayments.push({ id: genId('mp'), clientId, month, amount });
        }
        saveData(); renderAll();
        toast(`已记录付款 ${formatMoney(amount)}`,'success');
    }

    // ── 明细渲染（增加修改按钮）──
    function renderGroups() {
        const activeClients = data.clients.filter(c => c.status !== 'paused');
        const activeIds = new Set(activeClients.map(c => c.id));
        if(activeClients.length===0 || data.records.filter(r => activeIds.has(r.clientId)).length===0) {
            $('groupList').innerHTML=''; $('emptyDetail').style.display='block';
            $('detailCount').textContent='0 条'; updateStats(); return;
        }
        $('emptyDetail').style.display='none';
        let html='', totalRecs=0;

        if(viewMode==='client') {
            activeClients.forEach(c=>{
                const recs = getRecordsByClient(c.id);
                if(recs.length===0) return;
                const stats = calcClientStats(c.id);
                totalRecs += recs.length;
                const monthMap = {};
                recs.forEach(r=>{ const mk = r.date.slice(0,7); if(!monthMap[mk]) monthMap[mk]=[]; monthMap[mk].push(r); });
                const sortedMonths = Object.keys(monthMap).sort((a,b)=>b.localeCompare(a));
                let monthBlocks = '';
                sortedMonths.forEach(m=>{
                    const mrecs = monthMap[m]; const mAmt = mrecs.reduce((s,r)=>s+calcAmount(r),0);
                    let rows = '';
                    if(c.billingMode === 'monthly') {
                        rows = mrecs.map(r => {
                            return `<tr data-id="${r.id}"><td>${formatDate(r.date)}</td><td>${r.sessions}次</td><td>${formatMoney(calcAmount(r))}</td>
                            <td>
                                <button class="action-btn edit-rec-btn" data-id="${r.id}">修改</button>
                                <button class="action-btn del-rec-btn" data-id="${r.id}">删除</button>
                            </td></tr>`;
                        }).join('');
                    } else {
                        rows = mrecs.map(r => {
                            const amt=calcAmount(r), paid=r.paid;
                            return `<tr data-id="${r.id}"><td class="${paid?'paid':'unpaid'}">${formatDate(r.date)}</td><td>${r.sessions}次</td><td>${formatMoney(amt)}</td>
                            <td><span class="status-tag ${paid?'paid':'unpaid'}">${paid?'已缴':'未缴'}</span></td>
                            <td>
                                <button class="toggle-paid-btn" data-id="${r.id}">${paid?'标记未缴':'标记已缴'}</button>
                                <button class="action-btn edit-rec-btn" data-id="${r.id}">修改</button>
                                <button class="action-btn del-rec-btn" data-id="${r.id}">删除</button>
                            </td></tr>`;
                        }).join('');
                    }
                    let settlementHtml = '';
                    if(c.billingMode === 'monthly') {
                        const paid = getMonthlyPayment(c.id, m);
                        const balance = mAmt - paid;
                        let balanceClass='', balanceText='';
                        if(balance===0) { balanceClass='clear'; balanceText='已结清'; }
                        else if(balance>0) { balanceClass='owe'; balanceText=`欠 ${formatMoney(balance)}`; }
                        else { balanceClass='over'; balanceText=`多缴 ${formatMoney(-balance)}`; }
                        settlementHtml = `<span style="margin-left:6px;font-size:12px;">已付 ${formatMoney(paid)}</span> <span class="balance ${balanceClass}">${balanceText}</span> <button class="settle-btn" data-client="${c.id}" data-month="${m}">月结</button>`;
                    }
                    monthBlocks += `<div class="month-block">
                        <div class="month-toggle"><span class="arrow">▶</span> ${formatMonth(m+'-01')} · ${mrecs.length}次 · 合计 ${formatMoney(mAmt)} ${settlementHtml}</div>
                        <div class="month-records"><table class="sub-table">
                        <thead><tr>${c.billingMode==='monthly'?'<th>日期</th><th>次数</th><th>金额</th><th>操作</th>':'<th>日期</th><th>次数</th><th>金额</th><th>状态</th><th>操作</th>'}</tr></thead>
                        <tbody>${rows}</tbody></table></div>
                    </div>`;
                });
                html += `<div class="group-card"><div class="group-toggle"><span class="arrow open">▶</span><span class="gname">${escHtml(c.name)}</span><span class="gmeta">${stats.recordCount}条 · ${stats.totalSessions}次 · 应收 ${formatMoney(stats.totalAmount)} · ${stats.unpaidAmount>0?'还需 '+formatMoney(stats.unpaidAmount):'无欠款'}</span></div><div class="sub-records open">${monthBlocks}</div></div>`;
            });
        } else if(viewMode==='month') {
            const monthMap = {};
            data.records.filter(r => activeIds.has(r.clientId)).forEach(r=>{ const mk=r.date.slice(0,7); if(!monthMap[mk]) monthMap[mk]=[]; monthMap[mk].push(r); });
            Object.keys(monthMap).sort((a,b)=>b.localeCompare(a)).forEach(m=>{
                const recs=monthMap[m]; totalRecs+=recs.length; const mAmt=recs.reduce((s,r)=>s+calcAmount(r),0);
                let rows=recs.map(r=>{
                    const c=getClient(r.clientId); const amt=calcAmount(r);
                    const cn=escHtml(c?.name||'未知');
                    if(c?.billingMode==='monthly') return `<tr data-id="${r.id}"><td>${formatDate(r.date)}</td><td>${cn}</td><td>${r.sessions}次</td><td>${formatMoney(amt)}</td><td><button class="action-btn edit-rec-btn" data-id="${r.id}">修改</button> <button class="action-btn del-rec-btn" data-id="${r.id}">删除</button></td></tr>`;
                    return `<tr data-id="${r.id}"><td class="${r.paid?'paid':'unpaid'}">${formatDate(r.date)}</td><td>${cn}</td><td>${r.sessions}次</td><td>${formatMoney(amt)}</td><td><span class="status-tag ${r.paid?'paid':'unpaid'}">${r.paid?'已缴':'未缴'}</span></td><td><button class="toggle-paid-btn" data-id="${r.id}">${r.paid?'标记未缴':'标记已缴'}</button> <button class="action-btn edit-rec-btn" data-id="${r.id}">修改</button> <button class="action-btn del-rec-btn" data-id="${r.id}">删除</button></td></tr>`;
                }).join('');
                html+=`<div class="group-card"><div class="group-toggle"><span class="arrow open">▶</span><span class="gname">${formatMonth(m+'-01')}</span><span class="gmeta">${recs.length}条 · 合计 ${formatMoney(mAmt)}</span></div><div class="sub-records open"><table class="sub-table"><thead><tr><th>日期</th><th>来访者</th><th>次数</th><th>金额</th><th>状态</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
            });
        } else if(viewMode==='unpaid') {
            const unpaidRecs = data.records.filter(r=>{ const c=getClient(r.clientId); return activeIds.has(r.clientId) && c && c.billingMode==='per-session' && !r.paid; });
            const monthlyClients = {};
            activeClients.filter(c=>c.billingMode==='monthly').forEach(c=>{
                const recs=getRecordsByClient(c.id);
                const months=new Set(recs.map(r=>r.date.slice(0,7)));
                months.forEach(m=>{
                    const due=getMonthlyDue(c.id,m), paid=getMonthlyPayment(c.id,m);
                    if(due-paid>0) { if(!monthlyClients[c.id]) monthlyClients[c.id]=[]; monthlyClients[c.id].push({month:m,due,paid,balance:due-paid}); }
                });
            });
            let tempHtml='';
            if(unpaidRecs.length>0) {
                const map={}; unpaidRecs.forEach(r=>{ const cid=r.clientId; if(!map[cid]) map[cid]=[]; map[cid].push(r); });
                for(const [cid, recs] of Object.entries(map)){
                    const c=getClient(cid); if(!c) continue;
                    totalRecs+=recs.length; const a=recs.reduce((s,r)=>s+calcAmount(r),0);
                    tempHtml+=`<div class="group-card"><div class="group-toggle"><span class="arrow open">▶</span><span class="gname">${escHtml(c.name)} (次结)</span><span class="gmeta">${recs.length}条未缴 · 欠费 ${formatMoney(a)}</span></div><div class="sub-records open"><table class="sub-table"><thead><tr><th>日期</th><th>次数</th><th>金额</th><th>状态</th><th>操作</th></tr></thead><tbody>${recs.map(r=>`<tr data-id="${r.id}"><td>${formatDate(r.date)}</td><td>${r.sessions}次</td><td>${formatMoney(calcAmount(r))}</td><td><span class="status-tag unpaid">未缴</span></td><td><button class="toggle-paid-btn" data-id="${r.id}">标记已缴</button> <button class="action-btn edit-rec-btn" data-id="${r.id}">修改</button> <button class="action-btn del-rec-btn" data-id="${r.id}">删除</button></td></tr>`).join('')}</tbody></table></div></div>`;
                }
            }
            for(const [cid, items] of Object.entries(monthlyClients)){
                const c=getClient(cid); if(!c) continue;
                items.forEach(item=>{ totalRecs++;
                    tempHtml+=`<div class="group-card"><div class="group-toggle"><span class="arrow open">▶</span><span class="gname">${escHtml(c.name)} (月结) · ${formatMonth(item.month+'-01')}</span><span class="gmeta">应缴 ${formatMoney(item.due)} · 已付 ${formatMoney(item.paid)} · 欠 ${formatMoney(item.balance)}</span></div><div class="sub-records open"><div style="padding:8px 18px;"><button class="settle-btn" data-client="${cid}" data-month="${item.month}">月结</button></div></div></div>`;
                });
            }
            html=tempHtml;
        }
        $('groupList').innerHTML = html;
        $('detailCount').textContent = totalRecs + ' 条';
        updateStats();
    }

    function renderAll() {
        renderClients($('clientSearch').value);
        renderClientSelect();
        renderGroups();
        populateMonthOptions();
        document.querySelectorAll('#viewTabs button').forEach(b=>b.classList.toggle('active', b.dataset.view===viewMode));
    }

    // ── 日历多选 ──
    function renderCalendar() {
        const y = calendarDate.getFullYear();
        const m = calendarDate.getMonth();
        const m1 = m, y1 = y;
        const m2 = m + 1, y2 = m2 > 11 ? y + 1 : y;
        renderCalGrid('calGrid1', y1, m1);
        renderCalGrid('calGrid2', y2, m2 % 12);
        $('calLabel1').textContent = `${y1}年${m1+1}月`;
        $('calLabel2').textContent = `${y2}年${(m2%12)+1}月`;
        $('calCount').textContent = selectedDates.size;
    }

    function renderCalGrid(gridId, year, month) {
        const grid = $(gridId);
        const daysInMonth = new Date(year, month+1, 0).getDate();
        const firstDow = new Date(year, month, 1).getDay();
        const today = new Date().toISOString().slice(0,10);
        let html = '<div class="day-header">日</div><div class="day-header">一</div><div class="day-header">二</div><div class="day-header">三</div><div class="day-header">四</div><div class="day-header">五</div><div class="day-header">六</div>';
        for (let i = 0; i < firstDow; i++) html += '<div class="day-cell empty"></div>';
        for (let d = 1; d <= daysInMonth; d++) {
            const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const sel = selectedDates.has(ds) ? ' selected' : '';
            const tdy = ds === today ? ' today' : '';
            html += `<div class="day-cell${sel}${tdy}" data-date="${ds}">${d}</div>`;
        }
        grid.innerHTML = html;
    }

    function toggleDate(dateStr) {
        if (selectedDates.has(dateStr)) selectedDates.delete(dateStr);
        else selectedDates.add(dateStr);
        renderCalendar();
    }

    // ── 导出 ──
    function exportCSV(rows, filename) {
        const BOM = '\uFEFF';
        const csv = BOM + rows.map(r => r.map(c => '"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename + '.csv';
        a.click(); URL.revokeObjectURL(url);
        toast('导出成功','success');
    }

    function doExport(type) {
        const header = ['来访者','日期','次数','单价','金额','结算方式','缴费状态','备注'];
        let rows = [header];
        let filename = '心理咨询记录';
        const addRow = (r, c) => {
            const amt = calcAmount(r);
            const mode = c?.billingMode==='monthly'?'月结':'次结';
            let status = '';
            if(c?.billingMode==='monthly'){
                const m = r.date.slice(0,7);
                const due = getMonthlyDue(r.clientId, m);
                const paid = getMonthlyPayment(r.clientId, m);
                const bal = due - paid;
                status = bal===0?'已结清':(bal>0?`欠${formatMoney(bal)}`:`多缴${formatMoney(-bal)}`);
            } else {
                status = r.paid?'已缴':'未缴';
            }
            rows.push([c?.name||'未知', r.date, r.sessions, r.feePerSession, amt, mode, status, '']);
        };

        if (type === 'all') {
            const activeIds = new Set(data.clients.filter(c => c.status !== 'paused').map(c => c.id));
            filename = '全部记录';
            data.records.filter(r => activeIds.has(r.clientId)).forEach(r => addRow(r, getClient(r.clientId)));
        } else if (type === 'client') {
            const cid = $('recordClient').value;
            if (!cid) { toast('请先选择来访者','warning'); return; }
            const c = getClient(cid);
            filename = (c?.name||'来访者')+'_记录';
            getRecordsByClient(cid).forEach(r => addRow(r, c));
        } else if (type === 'month') {
            const ym = prompt('请输入年月（如 2025-04）：', new Date().toISOString().slice(0,7));
            if (!ym || !/^\d{4}-\d{2}$/.test(ym)) { toast('格式无效','warning'); return; }
            filename = ym+'_记录';
            data.records.filter(r=>r.date.startsWith(ym)).forEach(r=>addRow(r,getClient(r.clientId)));
        } else if (type === 'year') {
            const y = prompt('请输入年份（如 2025）：', String(new Date().getFullYear()));
            if (!y || !/^\d{4}$/.test(y)) { toast('格式无效','warning'); return; }
            filename = y+'_记录';
            data.records.filter(r=>r.date.startsWith(y)).forEach(r=>addRow(r,getClient(r.clientId)));
        }
        if (rows.length <= 1) { toast('没有可导出的记录','warning'); return; }
        exportCSV(rows, filename);
    }

    // ── 事件绑定 ──
    $('clientSearch').addEventListener('input', ()=> renderClients($('clientSearch').value));
    $('clientConfirmBtn').addEventListener('click', confirmClientAction);
    $('clientCancelBtn').addEventListener('click', cancelEditClient);
    $('clientList').addEventListener('click', e=>{
        const btn = e.target.closest('button');
        if(!btn) return;
        const id = btn.dataset.id;
        if(btn.classList.contains('edit-client')) startEditClient(id);
        else if(btn.classList.contains('del-client')) deleteClient(id);
    });

    $('recordClient').addEventListener('change', onClientSelect);
    $('recordForm').addEventListener('submit', e=>{ e.preventDefault(); addRecord(); });

    $('groupList').addEventListener('click', e=>{
        const settleBtn = e.target.closest('.settle-btn');
        if (settleBtn) {
            e.stopPropagation();
            settleMonth(settleBtn.dataset.client, settleBtn.dataset.month);
            return;
        }
        if(e.target.classList.contains('toggle-paid-btn')) { togglePaid(e.target.dataset.id); return; }
        if(e.target.classList.contains('del-rec-btn')) { deleteRecord(e.target.dataset.id); return; }
        // ★ 新增修改按钮事件
        if(e.target.classList.contains('edit-rec-btn') || e.target.closest('.edit-rec-btn')) {
            const btn = e.target.classList.contains('edit-rec-btn') ? e.target : e.target.closest('.edit-rec-btn');
            editRecord(btn.dataset.id);
            return;
        }
        const mtoggle = e.target.closest('.month-toggle');
        if(mtoggle) {
            const block = mtoggle.closest('.month-block');
            const sub = block?.querySelector('.month-records');
            const arrow = mtoggle.querySelector('.arrow');
            if(sub) { const is=sub.classList.contains('open'); sub.classList.toggle('open',!is); if(arrow) arrow.classList.toggle('open',!is); }
            return;
        }
        const toggle = e.target.closest('.group-toggle');
        if(toggle) {
            const card = toggle.closest('.group-card');
            const sub = card?.querySelector('.sub-records');
            const arrow = toggle.querySelector('.arrow');
            if(sub) { const is=sub.classList.contains('open'); sub.classList.toggle('open',!is); if(arrow) arrow.classList.toggle('open',!is); }
        }
    });

    $('viewTabs').addEventListener('click', e=>{
        const btn = e.target.closest('button');
        if(!btn || btn.classList.contains('active')) return;
        viewMode = btn.dataset.view; renderAll();
        setTimeout(()=>{ document.querySelectorAll('.sub-records,.month-records').forEach(el=>el.classList.add('open')); },30);
    });

    $('expandAllBtn').addEventListener('click', ()=>{
        const subs = document.querySelectorAll('.sub-records,.month-records');
        const anyClosed = Array.from(subs).some(el=>!el.classList.contains('open'));
        subs.forEach(el=>el.classList.toggle('open', anyClosed));
        $('expandAllBtn').textContent = anyClosed ? '折叠全部' : '展开全部';
    });

    $('exportBtn').addEventListener('click', e=>{ e.stopPropagation(); $('exportMenu').classList.toggle('show'); });
    $('exportMenu').addEventListener('click', e=>{
        const btn = e.target.closest('button');
        if(!btn) return;
        $('exportMenu').classList.remove('show');
        doExport(btn.dataset.export);
    });
    document.addEventListener('click', ()=> $('exportMenu').classList.remove('show'));

    $('batchBtn').addEventListener('click', ()=>{
        const vis = $('batchPanel').classList.contains('show');
        $('batchPanel').classList.toggle('show', !vis);
        $('pastePanel').classList.remove('show');
        if(!vis) { calendarDate = new Date(); selectedDates.clear(); renderCalendar(); }
    });
    $('batchCancelBtn').addEventListener('click', ()=>{ $('batchPanel').classList.remove('show'); selectedDates.clear(); });
    $('calPrev').addEventListener('click', ()=>{ calendarDate.setMonth(calendarDate.getMonth()-1); renderCalendar(); });
    $('calNext').addEventListener('click', ()=>{ calendarDate.setMonth(calendarDate.getMonth()+1); renderCalendar(); });
    $('calClear').addEventListener('click', ()=>{ selectedDates.clear(); renderCalendar(); });
    $('calGrid1').addEventListener('click', e=>{ const cell=e.target.closest('.day-cell'); if(cell&&cell.dataset.date) toggleDate(cell.dataset.date); });
    $('calGrid2').addEventListener('click', e=>{ const cell=e.target.closest('.day-cell'); if(cell&&cell.dataset.date) toggleDate(cell.dataset.date); });
    $('batchConfirm').addEventListener('click', ()=>{
        const cid = $('recordClient').value;
        if(!cid) { toast('请先选择来访者','warning'); return; }
        const c = getClient(cid); if(!c) return;
        if(selectedDates.size===0) { toast('请在日历中选择日期','warning'); return; }
        const sessions = parseInt($('recordSessions').value)||1;
        const dates = Array.from(selectedDates).sort();
        dates.forEach(d=>{
            data.records.push({ id:genId('r'), clientId:cid, date:d, sessions, feePerSession:c.feePerSession, paid:false });
        });
        data.records.sort((a,b)=>a.date>b.date?-1:1);
        saveData(); renderAll();
        toast(`已添加 ${dates.length} 条记录`,'success');
        $('batchPanel').classList.remove('show');
        selectedDates.clear();
    });

    $('pasteBtn').addEventListener('click', ()=>{
        const vis = $('pastePanel').classList.contains('show');
        $('pastePanel').classList.toggle('show', !vis);
        $('batchPanel').classList.remove('show');
    });
    $('pasteCancel').addEventListener('click', ()=>{ $('pastePanel').classList.remove('show'); });
    $('pasteInput').addEventListener('input', ()=>{
        const text = $('pasteInput').value.trim();
        if(!text) { $('matchResults').innerHTML=''; return; }
        const lines = text.split('\n').map(l=>l.trim()).filter(l=>l);
        const date = $('recordDate').value || new Date().toISOString().slice(0,10);
        const seen = new Set();
        const results = [];
        for(const line of lines) {
            const parts = line.split(/[\t,，\s]+/);
            let name = '';
            for(const p of parts) {
                const clean = p.replace(/[^a-zA-Z\u4e00-\u9fff·]/g,'');
                if(clean.length>=2 && /[\u4e00-\u9fff]/.test(clean)) { name=clean; break; }
            }
            if(!name) { const clean=line.replace(/[^a-zA-Z\u4e00-\u9fff·]/g,''); if(clean.length>=2) name=clean; else continue; }
            if(seen.has(name)) continue; seen.add(name);
            const match = data.clients.find(c=>c.name.toLowerCase()===name.toLowerCase()) || data.clients.find(c=>c.name.includes(name)||name.includes(c.name));
            results.push({raw:name, matched:match});
        }
        $('matchResults').innerHTML = results.map((p,i)=>{
            const opts = data.clients.map(c=>`<option value="${c.id}" ${p.matched?.id===c.id?'selected':''}>${escHtml(c.name)}</option>`).join('');
            const color = p.matched?'#059669':'#dc2626';
            return `<div class="match-row"><span style="color:${color};font-weight:500;">${escHtml(p.raw)}</span> → <select class="match-select" data-index="${i}"><option value="">跳过</option>${opts}</select></div>`;
        }).join('');
    });
    $('pasteConfirm').addEventListener('click', ()=>{
        const selects = document.querySelectorAll('.match-select');
        const date = $('recordDate').value || new Date().toISOString().slice(0,10);
        const sessions = parseInt($('recordSessions').value)||1;
        let imported = 0;
        selects.forEach(sel=>{
            const cid=sel.value; if(!cid) return;
            const c=getClient(cid); if(!c) return;
            data.records.push({ id:genId('r'), clientId:cid, date, sessions, feePerSession:c.feePerSession, paid:false });
            imported++;
        });
        if(imported===0) { toast('未选择任何来访者','warning'); return; }
        data.records.sort((a,b)=>a.date>b.date?-1:1);
        saveData(); renderAll();
        toast(`导入 ${imported} 条`,'success');
        $('pastePanel').classList.remove('show'); $('pasteInput').value=''; $('matchResults').innerHTML='';
    });

    $('statsMonth').addEventListener('change', updateStats);

    // 初始化
    loadData();
    $('recordDate').value = new Date().toISOString().slice(0,10);
    renderAll();
    setTimeout(()=>{
        document.querySelectorAll('.sub-records,.month-records').forEach(el=>el.classList.add('open'));
        $('expandAllBtn').textContent = '折叠全部';
    },80);
})();
</script>
</body>
</html>
