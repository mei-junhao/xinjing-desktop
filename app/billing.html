<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>心镜 · 记账</title>
    <!-- 心镜桥接层：把记账的 localStorage 读写翻译成对心镜 Store(IndexedDB) 的操作 -->
    <link rel="stylesheet" href="css/style.css">
    <script src="js/billing-sync.js"></script>
    <style>
        /* ============================================================
           心镜 XinJing · 记账 · v1.0.14 完全重构（编辑式奢华 / 同源令牌）
           三大区 → 顶部 Tab 切换：录入 / 明细 / 统计
           视觉令牌与 app/css/style.css 完全一致（Noto Serif SC + 暖棕陶土 + --shadow-bezel）
           数据契约：localStorage['psyc_billing_v8'] schema + 30+ 函数名 + 80+ ID 全部保留
           ============================================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        /* 视觉令牌已被 tokens.css 经 style.css @import 接管（v1.2.2 改造）：~ calm 皮肤 ~ */
        body {
            font-family: var(--sans); color: var(--ink);
            background: var(--paper);
            min-height: 100vh; padding: 0; line-height: 1.6;
        }

        /* ── 顶部品牌条（24px 高）── */
        .topbar {
            height: 56px; padding: 0 24px;
            display: flex; align-items: center; justify-content: space-between;
            background: var(--paper-2); border-bottom: 1px solid var(--hair);
        }
        .topbar .brand { display: flex; align-items: center; gap: 12px; }
        .topbar .mark {
            width: 32px; height: 32px; border-radius: 10px;
            background: var(--accent); color: #fff;
            display: grid; place-items: center; font-family: var(--serif); font-size: 16px;
            box-shadow: inset 0 1px 1px rgba(255,255,255,.3), 0 3px 8px var(--shadow-sm);
        }
        .topbar .name { font-family: var(--serif); font-size: 18px; font-weight: 600; letter-spacing: .02em; }
        .topbar .name small { font-size: 11px; color: var(--ink-3); margin-left: 6px; font-family: var(--sans); font-weight: 500; }
        .topbar .actions { display: flex; gap: 8px; }

        /* ── Tab 栏（48px 高，固定）── */
        .tabbar {
            position: sticky; top: 0; z-index: 10;
            height: 56px; padding: 0 24px;
            display: flex; align-items: center; gap: 16px;
            background: var(--paper-2); border-bottom: 1px solid var(--hair);
        }
        .tabs { display: flex; gap: 4px; background: var(--sidebar); border-radius: var(--r-btn); padding: 3px; border: 1px solid var(--hair); }
        .tabs button {
            background: transparent; border: none; padding: 8px 22px;
            border-radius: var(--r-btn); font-size: 13.5px; cursor: pointer;
            color: var(--ink-2); white-space: nowrap; font-family: var(--sans); font-weight: 500;
            transition: background .2s var(--ease), color .2s var(--ease);
        }
        .tabs button:hover { color: var(--ink); }
        .tabs button.active {
            background: var(--paper-2); color: var(--accent); font-weight: 600;
            box-shadow: var(--shadow-sm), inset 0 0 0 1px var(--accent-line);
        }
        .tabbar .month-picker { margin-left: auto; display: flex; align-items: center; gap: 8px; }
        .tabbar .month-picker select {
            padding: 6px 12px; border: 1px solid var(--hair-strong); border-radius: var(--r-ctl);
            background: var(--paper-2); font-size: 13px; color: var(--ink-2); outline: none;
            font-family: var(--sans); cursor: pointer;
        }
        .tabbar .month-picker select:focus { border-color: var(--accent); }

        /* ── 工作区容器 ── */
        .workspace { max-width: 1040px; margin: 0 auto; padding: 24px 32px 64px; }
        .tab-pane { display: none; animation: fadeIn .3s var(--ease); }
        .tab-pane.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

        /* ── 双层卡 ── */
        .card {
            position: relative;
            background: var(--paper-2); border: 1px solid var(--hair);
            border-radius: var(--r-card); padding: 22px 24px;
            box-shadow: var(--shadow-bezel); margin-bottom: 20px;
        }
        .card-title {
            font-family: var(--serif); font-size: 18px; font-weight: 600;
            margin-bottom: 16px; color: var(--ink);
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
        }
        .card-title .badge {
            background: var(--accent-soft); color: var(--accent-2);
            font-size: 11px; padding: 0 10px; border-radius: var(--r-btn);
            line-height: 22px; font-weight: 600; font-family: var(--sans);
        }

        /* ── 录入 tab：来访者大下拉 + 紧凑表单 ── */
        .client-selector {
            display: flex; align-items: center; gap: 16px;
            padding: 14px 18px; background: var(--sidebar);
            border-radius: var(--r-card); border: 1px solid var(--hair);
            margin-bottom: 14px;
        }
        .client-selector .avatar {
            width: 44px; height: 44px; border-radius: 14px; flex-shrink: 0;
            background: var(--accent-soft); color: var(--accent);
            font-family: var(--serif); font-size: 18px; font-weight: 600;
            display: grid; place-items: center;
            box-shadow: inset 0 1px 1px rgba(255,255,255,.4);
        }
        .client-selector select {
            flex: 1; padding: 10px 14px; border: 1px solid var(--hair-strong);
            border-radius: var(--r-ctl); font-size: 14px;
            background: var(--paper-2); color: var(--ink); font-family: var(--sans);
            cursor: pointer;
        }
        .client-selector select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
        .client-selector .summary {
            font-size: 12px; color: var(--ink-2);
            display: flex; gap: 12px; flex-wrap: wrap;
        }
        .client-selector .summary b { color: var(--ink); font-weight: 600; }
        .client-selector .summary .debt { color: var(--red); font-weight: 600; }

        .record-form { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
        .record-form .group { display: flex; flex-direction: column; gap: 5px; }
        .record-form .group.full { grid-column: 1 / -1; }
        .record-form .group label { font-size: 12px; font-weight: 600; color: var(--ink-2); }
        .record-form .group input, .record-form .group select {
            padding: 10px 13px; border: 1px solid var(--hair-strong);
            border-radius: var(--r-ctl); font-size: 14px;
            background: var(--paper); color: var(--ink); font-family: var(--sans);
        }
        .record-form .group input:focus, .record-form .group select:focus {
            outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); background: var(--paper-2);
        }
        .form-actions {
            grid-column: 1 / -1; display: flex; gap: 10px; justify-content: flex-end;
            padding-top: 6px; flex-wrap: wrap;
        }
        .total-sessions-badge {
            display: inline-block; background: var(--accent-soft); color: var(--accent-2);
            padding: 2px 12px; border-radius: var(--r-btn);
            font-size: 11.5px; font-weight: 600; margin-left: 4px;
        }
        @media (max-width: 640px) { .record-form { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 480px) { .record-form { grid-template-columns: 1fr; } }

        /* ── 抽屉面板（批量 / 粘贴）── */
        .batch-panel, .import-panel {
            display: none; background: var(--sidebar); border: 1px dashed var(--accent-line);
            border-radius: var(--r-card); padding: 16px; margin-top: 14px; grid-column: 1 / -1;
        }
        .batch-panel.show, .import-panel.show { display: block; }
        .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 8px; }
        .cal-nav button {
            background: var(--paper-2); border: 1px solid var(--hair-strong);
            border-radius: var(--r-sm); padding: 6px 12px; cursor: pointer; font-size: 14px; color: var(--ink);
        }
        .cal-nav button:hover { background: var(--accent-soft); }
        .cal-nav .month-label { font-weight: 600; font-size: 14px; color: var(--ink); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; font-size: 12px; }
        .cal-grid .day-header { color: var(--ink-3); font-weight: 600; padding: 4px 0; font-size: 11px; }
        .cal-grid .day-cell {
            padding: 8px 2px; border-radius: var(--r-sm); cursor: pointer;
            border: 1px solid transparent; user-select: none; color: var(--ink);
        }
        .cal-grid .day-cell:hover { background: var(--accent-soft); }
        .cal-grid .day-cell.empty { cursor: default; }
        .cal-grid .day-cell.selected { background: var(--accent); color: #fff; font-weight: 600; border-color: var(--accent-2); }
        .cal-grid .day-cell.today { border-color: var(--accent-line); }
        .cal-info { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
        .cal-info .count { font-weight: 700; color: var(--accent-2); }
        .cal-months { display: flex; gap: 22px; flex-wrap: wrap; }
        .import-panel h4 { font-size: 13px; color: var(--accent-2); margin-bottom: 8px; font-weight: 700; }
        .import-panel textarea {
            width: 100%; min-height: 110px; padding: 10px 12px; border: 1px solid var(--hair-strong);
            border-radius: var(--r-ctl); font-size: 12px; font-family: var(--mono);
            resize: vertical; background: var(--paper); color: var(--ink);
        }
        .import-panel textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
        .import-panel .hint { font-size: 11px; color: var(--ink-2); margin-top: 6px; }
        .import-panel .match-results { margin-top: 8px; max-height: 180px; overflow-y: auto; }
        .import-panel .match-row {
            display: flex; align-items: center; gap: 6px; padding: 4px 0;
            border-bottom: 1px solid var(--hair); font-size: 12px;
        }
        .match-select { padding: 4px 8px; border: 1px solid var(--hair-strong); border-radius: var(--r-sm); font-size: 12px; font-family: var(--sans); background: var(--paper-2); color: var(--ink); }
        .import-panel .actions { display: flex; gap: 6px; margin-top: 10px; }

        /* ── 来访者档案（录入 tab 底部）── */
        .client-top-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
        .client-search { flex: 1; min-width: 160px; }
        .client-search input {
            width: 100%; padding: 9px 13px; border: 1px solid var(--hair-strong);
            border-radius: var(--r-ctl); font-size: 14px;
            background: var(--paper); color: var(--ink); font-family: var(--sans);
        }
        .client-search input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
        .client-list { max-height: 360px; overflow-y: auto; }
        .client-group { margin-bottom: 6px; }
        .client-group h4 {
            font-size: 11px; font-weight: 600; color: var(--ink-3); padding: 4px 10px;
            background: var(--sidebar); border-radius: var(--r-sm); margin-bottom: 4px; letter-spacing: .3px;
        }
        .client-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 14px; border-radius: var(--r-ctl); cursor: pointer;
            border: 1px solid transparent; margin-bottom: 4px;
            transition: background .15s var(--ease), border-color .15s var(--ease);
        }
        .client-item:hover { background: var(--accent-soft); }
        .client-item.active { border-color: var(--accent-line); background: var(--accent-soft); }
        .client-item .info { flex: 1; min-width: 0; }
        .client-item .info .name { font-weight: 600; font-size: 14px; color: var(--ink); display: flex; align-items: center; gap: 6px; }
        .client-item .info .meta { font-size: 11.5px; color: var(--ink-2); display: flex; gap: 8px; flex-wrap: wrap; margin-top: 3px; }
        .client-item .info .meta .debt { color: var(--red); font-weight: 600; }
        .client-item .actions { display: flex; gap: 2px; }
        .client-item .actions button {
            background: none; border: none; font-size: 12px; cursor: pointer;
            padding: 4px 8px; border-radius: var(--r-sm); color: var(--ink-3);
            transition: background .15s, color .15s; font-family: var(--sans);
        }
        .client-item .actions button:hover { background: var(--hair); color: var(--ink); }
        .client-status {
            display: inline-block; padding: 1px 9px; border-radius: var(--r-btn);
            font-size: 10px; font-weight: 600; vertical-align: middle;
        }
        .client-status.active { background: var(--green-soft); color: var(--green); border: 1px solid #cdddd2; }
        .client-status.paused { background: var(--sidebar); color: var(--ink-2); border: 1px solid var(--hair-strong); }
        .client-status.ended { background: var(--red-soft); color: var(--red); border: 1px solid #e7cfc9; }
        .mode-tag {
            font-size: 10px; font-weight: 600; padding: 1px 8px; border-radius: var(--r-btn);
            background: var(--blue-soft); color: var(--blue);
        }
        .mode-tag.monthly { background: var(--orange-soft); color: var(--orange); }
        .quick-add {
            background: var(--accent-soft); border: 1px solid var(--accent-line);
            color: var(--accent-2); font-size: 12px; font-weight: 700;
            border-radius: var(--r-sm); padding: 4px 10px; cursor: pointer;
            transition: background .15s, color .15s;
        }
        .quick-add:hover { background: var(--accent); color: #fff; }
        .client-form { margin-top: 14px; padding: 14px 16px; background: var(--sidebar); border-radius: var(--r-card); border: 1px solid var(--hair); }
        .client-form .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
        .client-form .row input, .client-form .row select {
            padding: 8px 11px; border: 1px solid var(--hair-strong);
            border-radius: var(--r-ctl); font-size: 13px;
            background: var(--paper-2); color: var(--ink); font-family: var(--sans);
        }
        .client-form .row input:focus, .client-form .row select:focus {
            outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft);
        }

        /* ── 按钮 ── */
        .btn {
            padding: 9px 20px; border: none; border-radius: var(--r-btn);
            font-size: 13px; font-weight: 600; cursor: pointer;
            display: inline-flex; align-items: center; gap: 6px;
            white-space: nowrap; font-family: var(--sans);
            transition: background .18s var(--ease), transform .12s var(--ease), box-shadow .18s var(--ease);
        }
        .btn:active { transform: translateY(1px); }
        .btn-primary { background: var(--accent); color: #fff; box-shadow: var(--shadow); }
        .btn-primary:hover { background: var(--accent-2); }
        .btn-secondary { background: var(--sidebar); color: var(--ink-2); }
        .btn-secondary:hover { background: var(--hair); }
        .btn-success { background: var(--green); color: #fff; }
        .btn-success:hover { filter: brightness(.96); }
        .btn-outline { background: var(--paper-2); border: 1px solid var(--accent-line); color: var(--accent-2); }
        .btn-outline:hover { background: var(--accent-soft); }
        .btn-sm { padding: 6px 14px; font-size: 12px; }

        /* ── 统计 tab ── */
        .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
        @media (max-width: 720px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
        .stat-item {
            padding: 20px 22px;
            background: var(--paper-2); border: 1px solid var(--hair);
            border-radius: var(--r-card); box-shadow: var(--shadow-bezel);
            transition: transform .3s var(--ease), box-shadow .3s var(--ease);
        }
        .stat-item:hover { transform: translateY(-2px); }
        .stat-label { color: var(--ink-2); font-weight: 600; font-size: 12px; letter-spacing: .3px; }
        .stat-value {
            font-family: var(--mono); font-weight: 600; font-size: 24px;
            color: var(--ink); margin-top: 8px; font-variant-numeric: tabular-nums;
        }
        .stat-value.debt { color: var(--red); }
        .stat-value.received { color: var(--green); }

        /* 欠款排行 */
        .debt-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
        .debt-row {
            display: flex; align-items: center; gap: 14px;
            padding: 10px 14px; border-radius: var(--r-ctl);
            background: var(--paper-2); border: 1px solid var(--hair);
        }
        .debt-row .name { flex: 1; font-weight: 500; }
        .debt-row .amount { font-family: var(--mono); font-weight: 600; color: var(--red); }

        /* ── 明细 tab ── */
        .detail-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 4px 0 16px; flex-wrap: wrap; gap: 10px;
        }
        .detail-header h2 { font-family: var(--serif); font-size: 20px; font-weight: 600; color: var(--ink); }
        .view-tabs { display: flex; gap: 4px; background: var(--sidebar); border-radius: var(--r-btn); padding: 3px; border: 1px solid var(--hair); }
        .view-tabs button {
            background: transparent; border: none; padding: 6px 16px;
            border-radius: var(--r-btn); font-size: 12.5px; cursor: pointer;
            color: var(--ink-2); white-space: nowrap; font-family: var(--sans); font-weight: 500;
        }
        .view-tabs button.active { background: var(--accent); color: #fff; font-weight: 600; box-shadow: var(--shadow-sm); }
        .export-dropdown { position: relative; display: inline-block; }
        .export-menu {
            display: none; position: absolute; right: 0; top: 100%; background: var(--paper-2);
            border-radius: var(--r-card); box-shadow: var(--shadow-lg);
            z-index: 99; min-width: 168px; padding: 6px 0; border: 1px solid var(--hair-strong);
        }
        .export-menu.show { display: block; }
        .export-menu button {
            display: block; width: 100%; text-align: left; padding: 9px 16px;
            background: none; border: none; font-size: 13px; cursor: pointer;
            color: var(--ink); font-family: var(--sans); transition: background .12s;
        }
        .export-menu button:hover { background: var(--accent-soft); }

        .group-card { border: 1px solid var(--hair); border-radius: var(--r-card); background: var(--paper-2); margin-bottom: 12px; overflow: hidden; }
        .group-toggle {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 18px; cursor: pointer; user-select: none; gap: 10px;
            transition: background .15s;
        }
        .group-toggle:hover { background: var(--sidebar); }
        .group-toggle .arrow { font-size: 11px; transition: transform .2s var(--ease); color: var(--ink-3); min-width: 16px; text-align: center; }
        .group-toggle .arrow.open { transform: rotate(90deg); }
        .group-toggle .gname { font-family: var(--serif); font-weight: 600; font-size: 15px; color: var(--ink); }
        .group-toggle .gmeta { font-size: 12px; color: var(--ink-2); display: flex; gap: 10px; flex-wrap: wrap; }
        .sub-records { overflow: hidden; max-height: 0; opacity: 0; transition: all .25s var(--ease); }
        .sub-records.open { max-height: 4000px; opacity: 1; }
        .month-block { padding: 4px 18px; border-top: 1px solid var(--hair); }
        .month-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; padding: 8px 0; font-size: 13px; font-weight: 500; color: var(--ink-2); flex-wrap: wrap; }
        .month-records { overflow: hidden; max-height: 0; opacity: 0; transition: all .25s var(--ease); }
        .month-records.open { max-height: 3000px; opacity: 1; }
        .sub-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .sub-table th { padding: 10px 14px 8px 18px; text-align: left; font-weight: 600; font-size: 11px; color: var(--ink-2); letter-spacing: .3px; border-bottom: 1px solid var(--hair-strong); background: var(--sidebar); }
        .sub-table td { padding: 10px 14px 10px 18px; border-bottom: 1px solid var(--hair); color: var(--ink); font-variant-numeric: tabular-nums; }
        .sub-table tr:hover td { background: var(--paper); }
        .sub-table tr:last-child td { border-bottom: none; }

        .status-tag { display: inline-block; padding: 1px 11px; border-radius: var(--r-btn); font-size: 11px; font-weight: 600; line-height: 22px; }
        .status-tag.paid { background: var(--green-soft); color: var(--green); }
        .status-tag.unpaid { background: var(--red-soft); color: var(--red); }
        .balance { font-weight: 700; padding: 1px 11px; border-radius: var(--r-btn); font-size: 12px; }
        .balance.clear { background: var(--green-soft); color: var(--green); }
        .balance.owe { background: var(--red-soft); color: var(--red); }
        .balance.over { background: var(--blue-soft); color: var(--blue); }
        .settle-btn { background: var(--accent-soft); border: 1px solid var(--accent-line); color: var(--accent-2); padding: 4px 12px; border-radius: var(--r-btn); font-size: 11px; cursor: pointer; margin-left: 4px; font-weight: 600; transition: background .15s; }
        .settle-btn:hover { background: var(--accent); color: #fff; }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 12px; margin-left: 4px; color: var(--ink-2); border-radius: var(--r-sm); padding: 2px 6px; transition: background .15s, color .15s; font-family: var(--sans); }
        .action-btn:hover { color: var(--accent-2); background: var(--accent-soft); }
        .toggle-paid-btn { background: none; border: 1px solid var(--hair-strong); color: var(--ink-2); padding: 3px 10px; border-radius: var(--r-btn); font-size: 11px; cursor: pointer; font-family: var(--sans); transition: background .15s, color .15s, border-color .15s; }
        .toggle-paid-btn:hover { background: var(--accent-soft); color: var(--accent-2); border-color: var(--accent-line); }
        .empty-detail { text-align: center; padding: 60px 20px; color: var(--ink-3); font-size: 14px; }

        /* ── 弹层（修改记录 / 月结）── */
        .modal-overlay { position: fixed; inset: 0; background: var(--scrim); display: none; align-items: center; justify-content: center; z-index: 5000; padding: 16px; }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--paper-2); border: 1px solid var(--hair-strong);
            border-radius: var(--r-card); box-shadow: var(--shadow); padding: 20px 22px;
            width: min(380px, 94vw); animation: modalIn .2s var(--ease);
        }
        @keyframes modalIn { from { opacity: 0; transform: translateY(8px) scale(.98); } to { opacity: 1; transform: none; } }
        .modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; font-family: var(--serif); color: var(--ink); }
        .modal .m-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
        .modal .m-row label { font-size: 12px; font-weight: 600; color: var(--ink-2); width: 60px; flex: none; }
        .modal .m-row input { flex: 1; min-width: 0; padding: 8px 11px; border: 1px solid var(--hair-strong); border-radius: var(--r-ctl); font-size: 13px; background: var(--paper); color: var(--ink); font-family: var(--sans); }
        .modal .m-row input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
        .modal .m-info { font-size: 12px; color: var(--ink-2); margin-bottom: 12px; line-height: 1.7; }
        .modal .m-info b { color: var(--accent-2); font-weight: 700; }
        .modal .m-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 6px; }

        /* ── Toast ── */
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--ink); color: #fff; padding: 11px 24px; border-radius: var(--r-btn);
            font-weight: 500; font-size: 13px; z-index: 9999; opacity: 0;
            transition: all .3s var(--ease); pointer-events: none;
            box-shadow: var(--shadow-lg);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { background: var(--green); }
        .toast.warning { background: var(--accent-2); }

        /* 滚动条 */
        .client-list::-webkit-scrollbar, .sub-records::-webkit-scrollbar { width: 6px; }
        .client-list::-webkit-scrollbar-track, .sub-records::-webkit-scrollbar-track { background: var(--sidebar); border-radius: 6px; }
        .client-list::-webkit-scrollbar-thumb, .sub-records::-webkit-scrollbar-thumb { background: var(--hair-strong); border-radius: 6px; }

        /* ── 暗色模式（令牌进入 tokens.css 经 style.css 接管：calm dark）── */
        /* 以下保留组件级暗色规则（引用令牌变量，自动应用 calm dark 色） */
        :root.dark .sub-table tr:hover td { background: var(--paper-2); }
        :root.dark .client-status.active { border-color: var(--green-soft); }
        :root.dark .client-status.ended { border-color: var(--red-soft); }
        :root.dark .modal { box-shadow: var(--shadow-lg); }
        :root.dark .modal .m-row input { background: var(--paper); }
    </style>
    <script>
        /* 心镜主题同步：billing 是独立 document，需自行读 localStorage('xj_theme') */
        (function () {
            try {
                var mq = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');
                function sync() {
                    var t = localStorage.getItem('xj_theme');
                    var dark = t === 'dark' || (t === null && mq && mq.matches);
                    document.documentElement.classList.toggle('dark', !!dark);
                }
                sync();
                window.addEventListener('storage', function (e) { if (e.key === 'xj_theme') sync(); });
                if (mq && mq.addEventListener) mq.addEventListener('change', sync);
            } catch (err) {}
        })();
    </script>
</head>

<script>
/* ============================================================
   心镜 · 记账 · v1.0.14（Tab 切换版）
   逻辑层（30+ 函数 + 80+ DOM ID）完全保留自 1.0.13，
   仅增加：① tab 切换状态机 ② 月份选择器联动 ③ 欠款排行渲染
   ============================================================ */
(function() {
    'use strict';
    const STORAGE_KEY = 'psyc_billing_v8';
    let data = { clients: [], records: [], monthlyPayments: [] };
    let viewMode = 'client';
    let editingClientId = null;
    let calendarDate = new Date();
    let selectedDates = new Set();
    let typedFee = '';
    let currentTab = 'record';  // v1.0.14 新增：当前 tab

    function loadData() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                const parsed = JSON.parse(raw);
                data.clients = (parsed.clients || []).map(c => ({
                    ...c,
                    billingMode: c.billingMode || 'per-session',
                    manualSessions: c.manualSessions || 0,
                    status: c.status || 'active'
                }));
                data.records = parsed.records || [];
                data.monthlyPayments = parsed.monthlyPayments || [];
                data.clients.forEach(c => { if (!c.id) c.id = genId('c'); });
                data.records.forEach(r => { if (!r.id) r.id = genId('r'); });
                data.monthlyPayments.forEach(p => { if (!p.id) p.id = genId('mp'); });
            } else {
                data.clients = [
                    { id: 'c1', name: '张明', feePerSession: 300, billingMode: 'per-session', manualSessions: 0, status: 'active' },
                    { id: 'c2', name: '李静', feePerSession: 250, billingMode: 'monthly', manualSessions: 0, status: 'active' }
                ];
                data.records = [
                    { id:'r1', clientId:'c1', date:'2025-04-10', sessions:1, feePerSession:300, paid:false },
                    { id:'r2', clientId:'c2', date:'2025-04-12', sessions:2, feePerSession:250, paid:false },
                ];
                data.monthlyPayments = [];
                saveData();
            }
        } catch(e) { data = { clients:[], records:[], monthlyPayments:[] }; }
        data.records.sort((a,b) => a.date > b.date ? -1 : 1);
    }

    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
    function genId(p) { return p+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7); }
    function formatDate(s) { if(!s) return '—'; const d=new Date(s+'T00:00:00'); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
    function formatMonth(s) { if(!s) return ''; const d=new Date(s+'T00:00:00'); return `${d.getFullYear()}年${String(d.getMonth()+1).padStart(2,'0')}月`; }
    function formatMoney(n) { return '¥'+Number(n).toFixed(2); }
    function getClient(id) { return data.clients.find(c=>c.id===id); }
    function getRecordsByClient(cid) { return data.records.filter(r=>r.clientId===cid); }
    function calcAmount(r) { return r.sessions * r.feePerSession; }
    function getMonthlyDue(clientId, month) {
        return data.records.filter(r => r.clientId===clientId && r.date.startsWith(month))
            .reduce((sum, r) => sum + calcAmount(r), 0);
    }
    function getMonthlyPayment(clientId, month) {
        const p = data.monthlyPayments.find(mp => mp.clientId===clientId && mp.month===month);
        return p ? p.amount : 0;
    }
    function calcClientStats(cid) {
        const recs = getRecordsByClient(cid);
        const c = getClient(cid);
        let totalAmount = 0, totalSessions = 0, unpaidAmount = 0;
        if (c?.billingMode === 'monthly') {
            recs.forEach(r => { totalAmount += calcAmount(r); totalSessions += r.sessions; });
            const months = new Set(recs.map(r => r.date.slice(0,7)));
            let totalPaid = 0;
            months.forEach(m => { totalPaid += getMonthlyPayment(cid, m); });
            unpaidAmount = totalAmount - totalPaid;
        } else {
            recs.forEach(r => {
                totalAmount += calcAmount(r);
                totalSessions += r.sessions;
                if (!r.paid) unpaidAmount += calcAmount(r);
            });
        }
        return { totalSessions, totalAmount, unpaidAmount, recordCount: recs.length };
    }
    function getTotalSessions(cid) {
        const c = getClient(cid);
        if (!c) return 0;
        const systemSessions = data.records.filter(r=>r.clientId===cid).reduce((s,r)=>s+r.sessions,0);
        return systemSessions + (c.manualSessions || 0);
    }

    function populateMonthOptions() {
        const monthsSet = new Set(data.records.map(r => r.date.slice(0,7)));
        const months = Array.from(monthsSet).sort((a,b) => b.localeCompare(a));
        const currentMonth = new Date().toISOString().slice(0,7);
        if (!months.includes(currentMonth)) months.unshift(currentMonth);
        let html = '<option value="all">全部时间</option>';
        months.forEach(m => {
            html += `<option value="${m}">${formatMonth(m+'-01')}</option>`;
        });
        $('statsMonth').innerHTML = html;
        $('statsMonth').value = 'all';
    }

    function updateStats() {
        const month = $('statsMonth').value;
        const totalSysSessions = data.records.reduce((s,r) => s + r.sessions, 0);
        const totalManual = data.clients.reduce((s,c) => s + (c.manualSessions||0), 0);
        const totalSessions = totalSysSessions + totalManual;

        let received = 0;
        data.records.forEach(r => {
            const c = getClient(r.clientId);
            if (c && c.billingMode !== 'monthly' && r.paid) received += calcAmount(r);
        });
        data.monthlyPayments.forEach(p => { received += p.amount; });

        let income = 0, monthSessions = 0;
        if (month === 'all') {
            income = data.records.reduce((s,r) => s + calcAmount(r), 0);
            monthSessions = totalSessions;
        } else {
            const mRecords = data.records.filter(r => r.date.startsWith(month));
            income = mRecords.reduce((s,r) => s + calcAmount(r), 0);
            monthSessions = mRecords.reduce((s,r) => s + r.sessions, 0);
        }
        const avgPrice = monthSessions > 0 ? (income / monthSessions) : 0;

        $('statTotalHours').textContent = totalSessions + '次';
        $('statIncome').textContent = formatMoney(income);
        $('statReceived').textContent = formatMoney(received);
        $('statMonthHours').textContent = monthSessions + '次';
        $('statAvgPrice').textContent = formatMoney(avgPrice);
    }

    // v1.0.14: 欠款排行
    function renderDebtList() {
        const items = [];
        const activeIds = new Set(data.clients.filter(c => c.status !== 'paused').map(c => c.id));
        // 次结：未缴
        data.records.forEach(r => {
            if (!activeIds.has(r.clientId)) return;
            const c = getClient(r.clientId);
            if (c && c.billingMode === 'per-session' && !r.paid) {
                items.push({ name: c.name, amount: calcAmount(r), id: c.id });
            }
        });
        // 月结：欠款
        data.clients.filter(c => activeIds.has(c.id) && c.billingMode === 'monthly').forEach(c => {
            const recs = getRecordsByClient(c.id);
            const months = new Set(recs.map(r => r.date.slice(0,7)));
            months.forEach(m => {
                const due = getMonthlyDue(c.id, m), paid = getMonthlyPayment(c.id, m);
                const bal = due - paid;
                if (bal > 0) items.push({ name: c.name + ' · ' + formatMonth(m+'-01'), amount: bal, id: c.id });
            });
        });
        items.sort((a,b) => b.amount - a.amount);
        const top = items.slice(0, 8);
        $('debtList').innerHTML = top.length === 0
            ? '<div style="padding:20px;text-align:center;color:var(--ink-3);">无欠款 🎉</div>'
            : top.map(it => `<div class="debt-row">
                <span class="name">${escHtml(it.name)}</span>
                <span class="amount">${formatMoney(it.amount)}</span>
                <button class="action-btn switch-to-detail" data-cid="${it.id}">查看明细 →</button>
            </div>`).join('');
    }

    const $ = id => document.getElementById(id);
    const toastEl = $('toast');
    let toastTimer;
    function toast(msg, type) {
        if(toastTimer) clearTimeout(toastTimer);
        toastEl.textContent = msg; toastEl.className = 'toast '+(type||'');
        void toastEl.offsetWidth; toastEl.classList.add('show');
        toastTimer = setTimeout(()=>{toastEl.classList.remove('show');},2200);
    }
    function escHtml(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

    // ── 来访者 ──
    function renderClients(searchTerm = '') {
        const term = searchTerm.trim().toLowerCase();
        let filtered = data.clients;
        if (term) filtered = data.clients.filter(c => c.name.toLowerCase().includes(term));
        const groups = {};
        filtered.forEach(c => {
            const first = c.name.charAt(0).toUpperCase();
            const key = /[A-Za-z]/.test(first) ? first : '#';
            if (!groups[key]) groups[key] = [];
            groups[key].push(c);
        });
        let html = '';
        const sortedKeys = Object.keys(groups).sort((a,b) => a === '#' ? 1 : b === '#' ? -1 : a.localeCompare(b));
        for (const key of sortedKeys) {
            html += `<div class="client-group"><h4>${key}</h4>`;
            groups[key].forEach(c => {
                const stats = calcClientStats(c.id);
                const isMonthly = c.billingMode === 'monthly';
                const statusClass = c.status === 'active' ? 'active' : 'paused';
                const statusText = c.status === 'active' ? '进行' : '暂停';
                html += `<div class="client-item ${editingClientId===c.id?'active':''}" data-id="${c.id}">
                    <div class="info">
                        <div class="name">${escHtml(c.name)} <span class="mode-tag ${isMonthly?'monthly':''}">${isMonthly?'月结':'次结'}</span> <span class="client-status ${statusClass}">${statusText}</span></div>
                        <div class="meta">
                            <span>${formatMoney(c.feePerSession)}/次</span>
                            <span>${stats.totalSessions}次</span>
                            <span>${formatMoney(stats.totalAmount)}</span>
                            ${stats.unpaidAmount>0?`<span class="debt">欠 ${formatMoney(stats.unpaidAmount)}</span>`:''}
                        </div>
                    </div>
                    <div class="actions">
                        <button class="quick-add" data-id="${c.id}" title="快速为此来访者记一次">＋记</button>
                        <button class="edit-client" data-id="${c.id}" title="编辑">✎</button>
                        <button class="del-client" data-id="${c.id}" title="删除">✕</button>
                    </div>
                </div>`;
            });
            html += `</div>`;
        }

        editingClientId = null;
        $('clientNameInput').value = '';
        $('clientFeeInput').value = '';
        $('clientModeInput').value = 'per-session';
        $('clientManualSessions').value = '0';

    function confirmClientAction() {
        const name = $('clientNameInput').value.trim();
        const fee = parseFloat($('clientFeeInput').value);
        const mode = $('clientModeInput').value;
        const manual = parseInt($('clientManualSessions').value) || 0;
        const status = $('clientStatusInput').value;
        if (!name) { toast('请输入姓名','warning'); return; }
        if (isNaN(fee) || fee <= 0) { toast('请输入有效价格','warning'); return; }
        if (editingClientId) {
            const c = getClient(editingClientId);
            if (c) {
                const exist = data.clients.find(cl => cl.name === name && cl.id !== editingClientId);
                if (exist) { toast('已存在同名来访者','warning'); return; }
                c.name = name; c.feePerSession = fee; c.billingMode = mode; c.manualSessions = manual; c.status = status;
                toast('已更新','success');
            }
        } else {
            if (data.clients.find(c => c.name === name)) { toast('来访者已存在','warning'); return; }
            data.clients.push({ id: genId('c'), name, feePerSession: fee, billingMode: mode, manualSessions: manual, status });
            toast(`已添加「${name}」`,'success');
        }
        saveData();
        cancelEditClient();
        renderAll();
    }
    function deleteClient(id) {
        const c = getClient(id); if(!c) return;
        if(!confirm(`确定删除「${c.name}」及其所有记录？`)) return;
        data.clients = data.clients.filter(x=>x.id!==id);
        data.records = data.records.filter(r=>r.clientId!==id);
        data.monthlyPayments = data.monthlyPayments.filter(mp=>mp.clientId!==id);
        if(editingClientId===id) cancelEditClient();
        saveData(); refreshDetail(); toast('已删除','info');
    }

        if (isNaN(amount) || amount < 0) { toast('请输入有效金额','warning'); return; }
        let payment = data.monthlyPayments.find(mp => mp.clientId === settleCtx.clientId && mp.month === settleCtx.month);

        else data.monthlyPayments.push({ id: genId('mp'), clientId: settleCtx.clientId, month: settleCtx.month, amount });

    function renderGroups() {
        const activeClients = data.clients.filter(c => c.status !== 'paused');

        if(activeClients.length===0 || data.records.filter(r => activeIds.has(r.clientId)).length===0) {
            $('groupList').innerHTML=''; $('emptyDetail').style.display='block';
            $('detailCount').textContent='0 条'; updateStats(); return;

        let html='', totalRecs=0;

        if(viewMode==='client') {
            activeClients.forEach(c=>{
                const recs = getRecordsByClient(c.id);
                if(recs.length===0) return;
                const stats = calcClientStats(c.id);
                totalRecs += recs.length;
                const monthMap = {};
                recs.forEach(r=>{ const mk = r.date.slice(0,7); if(!monthMap[mk]) monthMap[mk]=[]; monthMap[mk].push(r); });
                const sortedMonths = Object.keys(monthMap).sort((a,b)=>b.localeCompare(a));
                let monthBlocks = '';
                sortedMonths.forEach(m=>{
                    const mrecs = monthMap[m]; const mAmt = mrecs.reduce((s,r)=>s+calcAmount(r),0);
                    let rows = '';
                    if(c.billingMode === 'monthly') {
                        rows = mrecs.map(r => {
                            return `<tr data-id="${r.id}"><td>${formatDate(r.date)}</td><td>${r.sessions}次</td><td>${formatMoney(calcAmount(r))}</td>
                            <td>
                                <button class="action-btn edit-rec-btn" data-id="${r.id}">修改</button>
                                <button class="action-btn del-rec-btn" data-id="${r.id}">删除</button>
                            </td></tr>`;
                        }).join('');
                    } else {
                        rows = mrecs.map(r => {
                            const amt=calcAmount(r), paid=r.paid;
                            return `<tr data-id="${r.id}"><td>${formatDate(r.date)}</td><td>${r.sessions}次</td><td>${formatMoney(amt)}</td>
                            <td><span class="status-tag ${paid?'paid':'unpaid'}">${paid?'已缴':'未缴'}</span></td>
                            <td>
                                <button class="toggle-paid-btn" data-id="${r.id}">${paid?'标记未缴':'标记已缴'}</button>
                                <button class="action-btn edit-rec-btn" data-id="${r.id}">修改</button>
                                <button class="action-btn del-rec-btn" data-id="${r.id}">删除</button>
                            </td></tr>`;
                        }).join('');
                    }
                    let settlementHtml = '';
                    if(c.billingMode === 'monthly') {
                        const paid = getMonthlyPayment(c.id, m);
                        const balance = mAmt - paid;
                        let balanceClass='', balanceText='';
                        if(balance===0) { balanceClass='clear'; balanceText='已结清'; }
                        else if(balance>0) { balanceClass='owe'; balanceText=`欠 ${formatMoney(balance)}`; }
                        else { balanceClass='over'; balanceText=`多缴 ${formatMoney(-balance)}`; }
                        settlementHtml = `<span style="margin-left:6px;font-size:12px;">已付 ${formatMoney(paid)}</span> <span class="balance ${balanceClass}">${balanceText}</span> <button class="settle-btn" data-client="${c.id}" data-month="${m}">月结</button>`;
                    }
                    monthBlocks += `<div class="month-block">
                        <div class="month-toggle"><span class="arrow">▶</span> ${formatMonth(m+'-01')} · ${mrecs.length}次 · 合计 ${formatMoney(mAmt)} ${settlementHtml}</div>
                        <div class="month-records"><table class="sub-table">
                        <thead><tr>${c.billingMode==='monthly'?'<th>日期</th><th>次数</th><th>金额</th><th>操作</th>':'<th>日期</th><th>次数</th><th>金额</th><th>状态</th><th>操作</th>'}</tr></thead>
                        <tbody>${rows}</tbody></table></div>
                    </div>`;
                });
                html += `<div class="group-card"><div class="group-toggle"><span class="arrow open">▶</span><span class="gname">${escHtml(c.name)}</span><span class="gmeta">${stats.recordCount}条 · ${stats.totalSessions}次 · 应收 ${formatMoney(stats.totalAmount)} · ${stats.unpaidAmount>0?'还需 '+formatMoney(stats.unpaidAmount):'无欠款'}</span></div><div class="sub-records open">${monthBlocks}</div></div>`;
            });
        } else if(viewMode==='month') {
            const monthMap = {};
            data.records.filter(r => activeIds.has(r.clientId)).forEach(r=>{ const mk=r.date.slice(0,7); if(!monthMap[mk]) monthMap[mk]=[]; monthMap[mk].push(r); });
            Object.keys(monthMap).sort((a,b)=>b.localeCompare(a)).forEach(m=>{
                const recs=monthMap[m]; totalRecs+=recs.length; const mAmt=recs.reduce((s,r)=>s+calcAmount(r),0);
                let rows=recs.map(r=>{
                    const c=getClient(r.clientId); const amt=calcAmount(r);
                    const cn=escHtml(c?.name||'未知');
                    if(c?.billingMode==='monthly') return `<tr data-id="${r.id}"><td>${formatDate(r.date)}</td><td>${cn}</td><td>${r.sessions}次</td><td>${formatMoney(amt)}</td><td><button class="action-btn edit-rec-btn" data-id="${r.id}">修改</button> <button class="action-btn del-rec-btn" data-id="${r.id}">删除</button></td></tr>`;
                    return `<tr data-id="${r.id}"><td>${formatDate(r.date)}</td><td>${cn}</td><td>${r.sessions}次</td><td>${formatMoney(amt)}</td><td><span class="status-tag ${r.paid?'paid':'unpaid'}">${r.paid?'已缴':'未缴'}</span></td><td><button class="toggle-paid-btn" data-id="${r.id}">${r.paid?'标记未缴':'标记已缴'}</button> <button class="action-btn edit-rec-btn" data-id="${r.id}">修改</button> <button class="action-btn del-rec-btn" data-id="${r.id}">删除</button></td></tr>`;
                }).join('');
                html+=`<div class="group-card"><div class="group-toggle"><span class="arrow open">▶</span><span class="gname">${formatMonth(m+'-01')}</span><span class="gmeta">${recs.length}条 · 合计 ${formatMoney(mAmt)}</span></div><div class="sub-records open"><table class="sub-table"><thead><tr><th>日期</th><th>来访者</th><th>次数</th><th>金额</th><th>状态</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
            });
        } else if(viewMode==='unpaid') {
            const unpaidRecs = data.records.filter(r=>{ const c=getClient(r.clientId); return activeIds.has(r.clientId) && c && c.billingMode==='per-session' && !r.paid; });
            const monthlyClients = {};
            activeClients.filter(c=>c.billingMode==='monthly').forEach(c=>{
                const recs=getRecordsByClient(c.id);
                const months=new Set(recs.map(r=>r.date.slice(0,7)));
                months.forEach(m=>{
                    const due=getMonthlyDue(c.id,m), paid=getMonthlyPayment(c.id,m);
                    if(due-paid>0) { if(!monthlyClients[c.id]) monthlyClients[c.id]=[]; monthlyClients[c.id].push({month:m,due,paid,balance:due-paid}); }
                });
            });
            let tempHtml='';
            if(unpaidRecs.length>0) {
                const map={}; unpaidRecs.forEach(r=>{ const cid=r.clientId; if(!map[cid]) map[cid]=[]; map[cid].push(r); });
                for(const [cid, recs] of Object.entries(map)){
                    const c=getClient(cid); if(!c) continue;
                    totalRecs+=recs.length; const a=recs.reduce((s,r)=>s+calcAmount(r),0);
                    tempHtml+=`<div class="group-card"><div class="group-toggle"><span class="arrow open">▶</span><span class="gname">${escHtml(c.name)} (次结)</span><span class="gmeta">${recs.length}条未缴 · 欠费 ${formatMoney(a)}</span></div><div class="sub-records open"><table class="sub-table"><thead><tr><th>日期</th><th>次数</th><th>金额</th><th>状态</th><th>操作</th></tr></thead><tbody>${recs.map(r=>`<tr data-id="${r.id}"><td>${formatDate(r.date)}</td><td>${r.sessions}次</td><td>${formatMoney(calcAmount(r))}</td><td><span class="status-tag unpaid">未缴</span></td><td><button class="toggle-paid-btn" data-id="${r.id}">标记已缴</button> <button class="action-btn edit-rec-btn" data-id="${r.id}">修改</button> <button class="action-btn del-rec-btn" data-id="${r.id}">删除</button></td></tr>`).join('')}</tbody></table></div></div>`;
                }
            }
            for(const [cid, items] of Object.entries(monthlyClients)){
                const c=getClient(cid); if(!c) continue;
                items.forEach(item=>{ totalRecs++;
                    tempHtml+=`<div class="group-card"><div class="group-toggle"><span class="arrow open">▶</span><span class="gname">${escHtml(c.name)} (月结) · ${formatMonth(item.month+'-01')}</span><span class="gmeta">应缴 ${formatMoney(item.due)} · 已付 ${formatMoney(item.paid)} · 欠 ${formatMoney(item.balance)}</span></div><div class="sub-records open"><div style="padding:8px 18px;"><button class="settle-btn" data-client="${cid}" data-month="${item.month}">月结</button></div></div></div>`;
                });
            }
            html=tempHtml;
        }
        $('groupList').innerHTML = html;
        $('detailCount').textContent = totalRecs + ' 条';
        updateStats();
    }

    // ── 日历多选 ──
    function renderCalendar() {
        const y = calendarDate.getFullYear();
        const m = calendarDate.getMonth();
        const m1 = m, y1 = y;
        const m2 = m + 1, y2 = m2 > 11 ? y + 1 : y;
        renderCalGrid('calGrid1', y1, m1);
        renderCalGrid('calGrid2', y2, m2 % 12);
        $('calLabel1').textContent = `${y1}年${m1+1}月`;
        $('calLabel2').textContent = `${y2}年${(m2%12)+1}月`;
        $('calCount').textContent = selectedDates.size;
    }
    function renderCalGrid(gridId, year, month) {
        const grid = $(gridId);
        const daysInMonth = new Date(year, month+1, 0).getDate();
        const firstDow = new Date(year, month, 1).getDay();
        const today = new Date().toISOString().slice(0,10);
        let html = '<div class="day-header">日</div><div class="day-header">一</div><div class="day-header">二</div><div class="day-header">三</div><div class="day-header">四</div><div class="day-header">五</div><div class="day-header">六</div>';
        for (let i = 0; i < firstDow; i++) html += '<div class="day-cell empty"></div>';
        for (let d = 1; d <= daysInMonth; d++) {
            const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const sel = selectedDates.has(ds) ? ' selected' : '';
            const tdy = ds === today ? ' today' : '';
            html += `<div class="day-cell${sel}${tdy}" data-date="${ds}">${d}</div>`;
        }
        grid.innerHTML = html;
    }
    function toggleDate(dateStr) {
        if (selectedDates.has(dateStr)) selectedDates.delete(dateStr);
        else selectedDates.add(dateStr);
        renderCalendar();
    }

    // ── 导出 ──
    function exportCSV(rows, filename) {
        const BOM = '\uFEFF';
        const csv = BOM + rows.map(r => r.map(c => '"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename + '.csv';
        a.click(); URL.revokeObjectURL(url);
        toast('导出成功','success');
    }
    function doExport(type) {
        const header = ['来访者','日期','次数','单价','金额','结算方式','缴费状态','备注'];
        let rows = [header];
        let filename = '心理咨询记录';
        const addRow = (r, c) => {
            const amt = calcAmount(r);
            const mode = c?.billingMode==='monthly'?'月结':'次结';
            let status = '';
            if(c?.billingMode==='monthly'){
                const m = r.date.slice(0,7);
                const due = getMonthlyDue(r.clientId, m);
                const paid = getMonthlyPayment(r.clientId, m);
                const bal = due - paid;
                status = bal===0?'已结清':(bal>0?`欠${formatMoney(bal)}`:`多缴${formatMoney(-bal)}`);
            } else {
                status = r.paid?'已缴':'未缴';
            }
            rows.push([c?.name||'未知', r.date, r.sessions, r.feePerSession, amt, mode, status, '']);
        };
        if (type === 'all') {
            const activeIds = new Set(data.clients.filter(c => c.status !== 'paused').map(c => c.id));
            filename = '全部记录';
            data.records.filter(r => activeIds.has(r.clientId)).forEach(r => addRow(r, getClient(r.clientId)));
        } else if (type === 'client') {
            const cid = $('recordClient').value;
            if (!cid) { toast('请先选择来访者','warning'); return; }
            const c = getClient(cid);
            filename = (c?.name||'来访者')+'_记录';
            getRecordsByClient(cid).forEach(r => addRow(r, c));
        } else if (type === 'month') {
            const ym = prompt('请输入年月（如 2025-04）：', new Date().toISOString().slice(0,7));
            if (!ym || !/^\d{4}-\d{2}$/.test(ym)) { toast('格式无效','warning'); return; }
            filename = ym+'_记录';
            data.records.filter(r=>r.date.startsWith(ym)).forEach(r=>addRow(r,getClient(r.clientId)));
        } else if (type === 'year') {
            const y = prompt('请输入年份（如 2025）：', String(new Date().getFullYear()));
            if (!y || !/^\d{4}$/.test(y)) { toast('格式无效','warning'); return; }
            filename = y+'_记录';
            data.records.filter(r=>r.date.startsWith(y)).forEach(r=>addRow(r,getClient(r.clientId)));
        }
        if (rows.length <= 1) { toast('没有可导出的记录','warning'); return; }
        exportCSV(rows, filename);
    }

    // ── v1.0.14: Tab 切换状态机 ──
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('#mainTabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.dataset.tab === tab));
        // 月份选择器仅在「统计」tab 显示
        $('monthPicker').style.display = (tab === 'stats') ? 'flex' : 'none';
        // 切到明细时重置"展开全部"按钮文案
        if (tab === 'detail') {
            const subs = document.querySelectorAll('.sub-records,.month-records');
            const anyClosed = Array.from(subs).some(el => !el.classList.contains('open'));
            $('expandAllBtn').textContent = anyClosed ? '展开全部' : '折叠全部';
        }
    }

    // ── 事件绑定 ──
    $('clientSearch').addEventListener('input', ()=> renderClients($('clientSearch').value));
    $('clientConfirmBtn').addEventListener('click', confirmClientAction);
    $('clientCancelBtn').addEventListener('click', cancelEditClient);
    $('clientList').addEventListener('click', e=>{
        const btn = e.target.closest('button');
        if(!btn) return;
        const id = btn.dataset.id;
        if(btn.classList.contains('quick-add')) { quickAddFor(id); return; }
        if(btn.classList.contains('edit-client')) startEditClient(id);
        else if(btn.classList.contains('del-client')) deleteClient(id);
    });

    function quickAddFor(id) {
        const c = getClient(id); if(!c) return;
        typedFee = '';
        $('recordClient').value = id;
        onClientSelect();
        if (!$('recordDate').value) $('recordDate').value = new Date().toISOString().slice(0,10);
        // 滚动到录入表单
        const form = $('recordForm');
        if (form && form.scrollIntoView) form.scrollIntoView({ behavior: 'smooth', block: 'start' });
        setTimeout(() => $('recordDate').focus(), 60);
    }

    $('recordClient').addEventListener('change', ()=>{ typedFee=''; onClientSelect(); });
    $('recordFee').addEventListener('input', ()=>{ typedFee = $('recordFee').value; });
    $('recordForm').addEventListener('submit', e=>{ e.preventDefault(); addRecord(); });

    $('editSave').addEventListener('click', saveEditRecord);
    $('editCancel').addEventListener('click', closeEditModal);
    $('editModal').addEventListener('click', e=>{ if(e.target===$('editModal')) closeEditModal(); });
    $('settleSave').addEventListener('click', saveSettle);
    $('settleCancel').addEventListener('click', closeSettleModal);
    $('settleModal').addEventListener('click', e=>{ if(e.target===$('settleModal')) closeSettleModal(); });

    $('groupList').addEventListener('click', e=>{
        const settleBtn = e.target.closest('.settle-btn');
        if (settleBtn) { e.stopPropagation(); settleMonth(settleBtn.dataset.client, settleBtn.dataset.month); return; }
        if(e.target.classList.contains('toggle-paid-btn')) { togglePaid(e.target.dataset.id); return; }
        if(e.target.classList.contains('del-rec-btn')) { deleteRecord(e.target.dataset.id); return; }
        if(e.target.classList.contains('edit-rec-btn') || e.target.closest('.edit-rec-btn')) {
            const btn = e.target.classList.contains('edit-rec-btn') ? e.target : e.target.closest('.edit-rec-btn');
            editRecord(btn.dataset.id); return;
        }
        const mtoggle = e.target.closest('.month-toggle');
        if(mtoggle) {
            const block = mtoggle.closest('.month-block');
            const sub = block?.querySelector('.month-records');
            const arrow = mtoggle.querySelector('.arrow');
            if(sub) { const is=sub.classList.contains('open'); sub.classList.toggle('open',!is); if(arrow) arrow.classList.toggle('open',!is); }
            return;
        }
        const toggle = e.target.closest('.group-toggle');
        if(toggle) {
            const card = toggle.closest('.group-card');
            const sub = card?.querySelector('.sub-records');
            const arrow = toggle.querySelector('.arrow');
            if(sub) { const is=sub.classList.contains('open'); sub.classList.toggle('open',!is); if(arrow) arrow.classList.toggle('open',!is); }
        }
    });

    $('viewTabs').addEventListener('click', e=>{
        const btn = e.target.closest('button');
        if(!btn || btn.classList.contains('active')) return;
        viewMode = btn.dataset.view; renderAll();
        setTimeout(()=>{ document.querySelectorAll('.sub-records,.month-records').forEach(el=>el.classList.add('open')); },30);
    });

    $('expandAllBtn').addEventListener('click', ()=>{
        const subs = document.querySelectorAll('.sub-records,.month-records');
        const anyClosed = Array.from(subs).some(el=>!el.classList.contains('open'));
        subs.forEach(el=>el.classList.toggle('open', anyClosed));
        $('expandAllBtn').textContent = anyClosed ? '折叠全部' : '展开全部';
    });

    $('exportBtn').addEventListener('click', e=>{ e.stopPropagation(); $('exportMenu').classList.toggle('show'); });
    $('exportMenu').addEventListener('click', e=>{
        const btn = e.target.closest('button');
        if(!btn) return;
        $('exportMenu').classList.remove('show');
        doExport(btn.dataset.export);
    });
    document.addEventListener('click', ()=> $('exportMenu').classList.remove('show'));

    // 欠款排行 → 切到明细 tab
    $('debtList').addEventListener('click', e=>{
        const btn = e.target.closest('.switch-to-detail');
        if (btn) { switchTab('detail'); }
    });

    // Tab 切换
    $('mainTabs').addEventListener('click', e=>{
        const btn = e.target.closest('button');
        if(!btn) return;
        switchTab(btn.dataset.tab);
    });

    $('statsMonth').addEventListener('change', updateStats);

    $('batchBtn').addEventListener('click', ()=>{
        const vis = $('batchPanel').classList.contains('show');
        $('batchPanel').classList.toggle('show', !vis);
        $('pastePanel').classList.remove('show');
        if(!vis) { calendarDate = new Date(); selectedDates.clear(); renderCalendar(); }
    });
    $('batchCancelBtn').addEventListener('click', ()=>{ $('batchPanel').classList.remove('show'); selectedDates.clear(); });
    $('calPrev').addEventListener('click', ()=>{ calendarDate.setMonth(calendarDate.getMonth()-1); renderCalendar(); });
    $('calNext').addEventListener('click', ()=>{ calendarDate.setMonth(calendarDate.getMonth()+1); renderCalendar(); });
    $('calClear').addEventListener('click', ()=>{ selectedDates.clear(); renderCalendar(); });
    $('calGrid1').addEventListener('click', e=>{ const cell=e.target.closest('.day-cell'); if(cell&&cell.dataset.date) toggleDate(cell.dataset.date); });
    $('calGrid2').addEventListener('click', e=>{ const cell=e.target.closest('.day-cell'); if(cell&&cell.dataset.date) toggleDate(cell.dataset.date); });
    $('batchConfirm').addEventListener('click', ()=>{
        const cid = $('recordClient').value;
        if(!cid) { toast('请先选择来访者','warning'); return; }
        const c = getClient(cid); if(!c) return;
        if(selectedDates.size===0) { toast('请在日历中选择日期','warning'); return; }
        const sessions = parseInt($('recordSessions').value)||1;
        const dates = Array.from(selectedDates).sort();
        dates.forEach(d=>{
            data.records.push({ id:genId('r'), clientId:cid, date:d, sessions, feePerSession:getRecordFee(c), paid:false });
        });
        data.records.sort((a,b)=>a.date>b.date?-1:1);
        saveData(); refreshDetail();
        toast(`已添加 ${dates.length} 条记录`,'success');
        $('batchPanel').classList.remove('show');
        selectedDates.clear();
    });

    $('pasteBtn').addEventListener('click', ()=>{
        const vis = $('pastePanel').classList.contains('show');
        $('pastePanel').classList.toggle('show', !vis);
        $('batchPanel').classList.remove('show');
    });
    $('pasteCancel').addEventListener('click', ()=>{ $('pastePanel').classList.remove('show'); });
    $('pasteInput').addEventListener('input', ()=>{
        const text = $('pasteInput').value.trim();
        if(!text) { $('matchResults').innerHTML=''; return; }
        const lines = text.split('\n').map(l=>l.trim()).filter(l=>l);
        const date = $('recordDate').value || new Date().toISOString().slice(0,10);
        const seen = new Set();
        const results = [];
        for(const line of lines) {
            const parts = line.split(/[\t,，\s]+/);
            let name = '';
            for(const p of parts) {
                const clean = p.replace(/[^a-zA-Z\u4e00-\u9fff·]/g,'');
                if(clean.length>=2 && /[\u4e00-\u9fff]/.test(clean)) { name=clean; break; }
            }
            if(!name) { const clean=line.replace(/[^a-zA-Z\u4e00-\u9fff·]/g,''); if(clean.length>=2) name=clean; else continue; }
            if(seen.has(name)) continue; seen.add(name);
            const match = data.clients.find(c=>c.name.toLowerCase()===name.toLowerCase()) || data.clients.find(c=>c.name.includes(name)||name.includes(c.name));
            results.push({raw:name, matched:match});
        }
        $('matchResults').innerHTML = results.map((p,i)=>{
            const opts = data.clients.map(c=>`<option value="${c.id}" ${p.matched?.id===c.id?'selected':''}>${escHtml(c.name)}</option>`).join('');
            const color = p.matched?'var(--green)':'var(--red)';
            return `<div class="match-row"><span style="color:${color};font-weight:500;">${escHtml(p.raw)}</span> → <select class="match-select" data-index="${i}"><option value="">跳过</option>${opts}</select></div>`;
        }).join('');
    });
    $('pasteConfirm').addEventListener('click', ()=>{
        const selects = document.querySelectorAll('.match-select');
        const date = $('recordDate').value || new Date().toISOString().slice(0,10);
        const sessions = parseInt($('recordSessions').value)||1;
        let imported = 0;
        selects.forEach(sel=>{
            const cid=sel.value; if(!cid) return;
            const c=getClient(cid); if(!c) return;
            data.records.push({ id:genId('r'), clientId:cid, date, sessions, feePerSession:getRecordFee(c), paid:false });
            imported++;
        });
        if(imported===0) { toast('未选择任何来访者','warning'); return; }
        data.records.sort((a,b)=>a.date>b.date?-1:1);
        saveData(); refreshDetail();
        toast(`导入 ${imported} 条`,'success');
        $('pastePanel').classList.remove('show'); $('pasteInput').value=''; $('matchResults').innerHTML='';
    });

    // 初始化
    loadData();
    $('recordDate').value = new Date().toISOString().slice(0,10);
    renderAll();
    switchTab('record');
    setTimeout(()=>{
        document.querySelectorAll('.sub-records,.month-records').forEach(el=>el.classList.add('open'));
        $('expandAllBtn').textContent = '折叠全部';
    },80);
})();
</script>
</body>
</html>
