<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>心理咨询记账系统 · 状态统计</title>
    <!-- 心镜桥接层：把记账的 localStorage 读写翻译成对心镜 Store(IndexedDB) 的操作，实现单一真相源 -->
    <script src="js/billing-sync.js"></script>
    <style>
        /* ============================================================
           心镜 XinJing · 记账 · 视觉重构（编辑式奢华 / Editorial Luxury）
           仅替换视觉层，标记与脚本逻辑（ID / 函数）完全保留。
           令牌与 css/style.css 同源：暖棕陶土 --accent #9E5A3C、纸面 --paper 等。
           ============================================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --paper: #FBF8F3; --paper-2: #FFFDF9; --sidebar: #F4EDE3;
            --ink: #2A2420; --ink-2: #6F655C; --ink-3: #9A8F82;
            --hair: #ECE3D8; --hair-strong: #DCCFBE;
            --accent: #9E5A3C; --accent-2: #874A2E; --accent-soft: #F1E4DA; --accent-line: #C99A82;
            --green: #6E7E62; --green-soft: #ECEFE6;
            --red: #B06A62; --red-soft: #F5E8E6;
            --blue: #7C93A0; --blue-soft: #E9EFF2;
            --r-card: 16px; --r-ctl: 12px; --r-btn: 999px; --r-sm: 9px;
            --shadow: 0 1px 2px rgba(42,36,32,.04), 0 12px 30px rgba(42,36,32,.06);
            --ease: cubic-bezier(.22,1,.36,1);
            --sans: "Noto Sans SC","PingFang SC","Microsoft YaHei",system-ui,-apple-system,sans-serif;
            --serif: "Noto Serif SC","Songti SC","STSong",serif;
            --mono: "JetBrains Mono","SF Mono",ui-monospace,"Cascadia Code",Menlo,monospace;
        }
        body {
            font-family: var(--sans); color: var(--ink);
            background:
                radial-gradient(1200px 480px at 12% -8%, var(--accent-soft), transparent 60%),
                var(--paper);
            min-height: 100vh; padding: 22px 18px 64px;
        }
        .app {
            max-width: 1040px; margin: 0 auto; background: var(--paper-2);
            border-radius: 22px; padding: 26px 30px 34px;
            box-shadow: var(--shadow); border: 1px solid var(--hair);
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px; margin-bottom: 22px;
            padding-bottom: 16px; border-bottom: 1px solid var(--hair);
        }
        .header h1 { font-size: 21px; font-weight: 700; color: var(--ink); font-family: var(--serif); letter-spacing: .3px; }
        .header h1 small { font-size: 12px; color: var(--ink-3); margin-left: 6px; font-family: var(--sans); font-weight: 500; }

        /* 统计面板 */
        .stats-panel {
            display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
            background: var(--accent-soft); padding: 12px 18px;
            border-radius: var(--r-card); border: 1px solid var(--accent-line);
        }
        .stats-panel select {
            padding: 6px 12px; border: 1px solid var(--accent-line); border-radius: var(--r-ctl);
            background: var(--paper-2); font-size: 13px; font-weight: 500; color: var(--accent-2);
            outline: none; font-family: var(--sans); cursor: pointer;
        }
        .stats-panel select:focus { border-color: var(--accent); }
        .stats-grid { display: flex; gap: 26px; flex-wrap: wrap; }
        .stat-item { display: flex; flex-direction: column; align-items: flex-start; }
        .stat-label { color: var(--accent-2); font-weight: 600; font-size: 11px; letter-spacing: .4px; }
        .stat-value { font-weight: 700; font-size: 18px; color: var(--ink); font-variant-numeric: tabular-nums; }

        .stack { display: flex; flex-direction: column; gap: 18px; margin-bottom: 18px; }
        .card {
            background: var(--paper-2); border-radius: var(--r-card); padding: 18px 20px 20px;
            box-shadow: var(--shadow); border: 1px solid var(--hair);
        }
        .card-title {
            font-size: 15px; font-weight: 700; color: var(--ink); margin-bottom: 12px;
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-family: var(--sans);
        }
        .card-title .badge { background: var(--accent-soft); color: var(--accent-2); font-size: 11px; padding: 0 10px; border-radius: var(--r-btn); line-height: 22px; font-weight: 600; }

        .client-top-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
        .client-search { flex: 1; min-width: 140px; }
        .client-search input {
            width: 100%; padding: 9px 13px; border: 1px solid var(--hair-strong); border-radius: var(--r-ctl);
            font-size: 14px; background: var(--paper); color: var(--ink); font-family: var(--sans);
        }
        .client-search input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
        .client-list { max-height: 300px; overflow-y: auto; margin-top: 10px; }
        .client-group { margin-bottom: 4px; }
        .client-group h4 {
            font-size: 11px; font-weight: 600; color: var(--ink-3); padding: 4px 8px;
            background: var(--sidebar); border-radius: var(--r-sm); margin-bottom: 2px; letter-spacing: .3px;
        }
        .client-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 11px; border-radius: var(--r-sm); cursor: pointer;
            border: 1px solid transparent; transition: background .15s var(--ease), border-color .15s var(--ease);
        }
        .client-item:hover { background: var(--accent-soft); }
        .client-item.active { border-color: var(--accent-line); background: var(--accent-soft); }
        .client-item .info { flex: 1; min-width: 0; }
        .client-item .info .name { font-weight: 600; font-size: 14px; color: var(--ink); }
        .client-item .info .meta { font-size: 10.5px; color: var(--ink-2); display: flex; gap: 6px; flex-wrap: wrap; }
        .client-item .actions { display: flex; gap: 1px; }
        .client-item .actions button {
            background: none; border: none; font-size: 13px; cursor: pointer;
            padding: 3px 7px; border-radius: var(--r-sm); color: var(--ink-3); transition: background .15s,color .15s;
        }
        .client-item .actions button:hover { background: var(--hair); color: var(--ink); }
        .client-form { margin-top: 12px; padding: 12px 14px; background: var(--sidebar); border-radius: var(--r-card); border: 1px solid var(--hair); }
        .client-form .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
        .client-form .row input, .client-form .row select {
            padding: 8px 11px; border: 1px solid var(--hair-strong); border-radius: var(--r-ctl);
            font-size: 13px; background: var(--paper-2); color: var(--ink); font-family: var(--sans);
        }
        .client-form .row input:focus, .client-form .row select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

        .btn {
            padding: 8px 18px; border: none; border-radius: var(--r-btn); font-size: 13px; font-weight: 600;
            cursor: pointer; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
            transition: background .18s var(--ease), transform .12s var(--ease), box-shadow .18s var(--ease);
            font-family: var(--sans);
        }
        .btn:active { transform: translateY(1px); }
        .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 6px 16px rgba(158,90,60,.22); }
        .btn-primary:hover { background: var(--accent-2); }
        .btn-secondary { background: var(--sidebar); color: var(--ink-2); }
        .btn-secondary:hover { background: var(--hair); }
        .btn-success { background: var(--green); color: #fff; }
        .btn-success:hover { filter: brightness(.96); }
        .btn-outline { background: var(--paper-2); border: 1px solid var(--accent-line); color: var(--accent-2); }
        .btn-outline:hover { background: var(--accent-soft); }
        .btn-sm { padding: 6px 14px; font-size: 12px; border-radius: var(--r-btn); }

        .record-form { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px 16px; }
        @media (max-width: 640px) { .record-form { grid-template-columns: 1fr 1fr; } }
        .record-form .group { display: flex; flex-direction: column; gap: 4px; }
        .record-form .group.full { grid-column: 1 / -1; }
        .record-form .group label { font-size: 12px; font-weight: 600; color: var(--ink-2); }
        .record-form .group input, .record-form .group select {
            padding: 9px 11px; border: 1px solid var(--hair-strong); border-radius: var(--r-ctl);
            font-size: 13px; background: var(--paper); color: var(--ink); font-family: var(--sans);
        }
        .record-form .group input:focus, .record-form .group select:focus {
            outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); background: var(--paper-2);
        }
        .record-form .form-actions {
            grid-column: 1 / -1; display: flex; gap: 10px; justify-content: flex-end;
            padding-top: 8px; border-top: 1px solid var(--hair); flex-wrap: wrap;
        }

        .batch-panel {
            display: none; background: var(--sidebar); border: 1px dashed var(--accent-line);
            border-radius: var(--r-card); padding: 16px; margin-top: 10px; grid-column: 1 / -1;
        }
        .batch-panel.show { display: block; }
        .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 8px; }
        .cal-nav button { background: var(--paper-2); border: 1px solid var(--hair-strong); border-radius: var(--r-sm); padding: 6px 12px; cursor: pointer; font-size: 14px; color: var(--ink); transition: background .15s; }
        .cal-nav button:hover { background: var(--accent-soft); }
        .cal-nav .month-label { font-weight: 600; font-size: 14px; color: var(--ink); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; font-size: 12px; }
        .cal-grid .day-header { color: var(--ink-3); font-weight: 600; padding: 4px 0; font-size: 11px; }
        .cal-grid .day-cell {
            padding: 8px 2px; border-radius: var(--r-sm); cursor: pointer; transition: background .12s, color .12s;
            border: 1px solid transparent; user-select: none; color: var(--ink);
        }
        .cal-grid .day-cell:hover { background: var(--accent-soft); }
        .cal-grid .day-cell.empty { cursor: default; }
        .cal-grid .day-cell.selected { background: var(--accent); color: #fff; font-weight: 600; border-color: var(--accent-2); }
        .cal-grid .day-cell.today { border-color: var(--accent-line); }
        .cal-info { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
        .cal-info .count { font-weight: 700; color: var(--accent-2); }
        .cal-months { display: flex; gap: 22px; flex-wrap: wrap; }

        .import-panel {
            display: none; background: var(--paper-2); border: 1px dashed var(--accent-line);
            border-radius: var(--r-card); padding: 16px; margin-top: 10px; grid-column: 1 / -1;
        }
        .import-panel.show { display: block; }
        .import-panel h4 { font-size: 13px; color: var(--accent-2); margin-bottom: 8px; font-weight: 700; }
        .import-panel textarea {
            width: 100%; min-height: 110px; padding: 10px 12px; border: 1px solid var(--hair-strong);
            border-radius: var(--r-ctl); font-size: 12px; font-family: var(--mono);
            resize: vertical; background: var(--paper); color: var(--ink);
        }
        .import-panel textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
        .import-panel .hint { font-size: 11px; color: var(--ink-2); margin-top: 6px; }
        .import-panel .match-results { margin-top: 8px; max-height: 180px; overflow-y: auto; }
        .import-panel .match-row {
            display: flex; align-items: center; gap: 6px; padding: 4px 0;
            border-bottom: 1px solid var(--hair); font-size: 12px;
        }
        .import-panel .actions { display: flex; gap: 6px; margin-top: 10px; }
        .match-select { padding: 4px 8px; border: 1px solid var(--hair-strong); border-radius: var(--r-sm); font-size: 12px; font-family: var(--sans); background: var(--paper-2); color: var(--ink); }

        .detail-section {
            background: var(--paper-2); border-radius: var(--r-card); border: 1px solid var(--hair);
            overflow: hidden; margin-top: 18px; box-shadow: var(--shadow);
        }
        .detail-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 20px; flex-wrap: wrap; gap: 8px;
            background: var(--sidebar); border-bottom: 1px solid var(--hair);
        }
        .detail-header h2 { font-size: 16px; font-weight: 700; color: var(--ink); font-family: var(--serif); }
        .view-tabs { display: flex; gap: 4px; background: var(--paper); border-radius: var(--r-btn); padding: 3px; border: 1px solid var(--hair); }
        .view-tabs button {
            background: transparent; border: none; padding: 6px 16px; border-radius: var(--r-btn);
            font-size: 12px; cursor: pointer; color: var(--ink-2); white-space: nowrap; font-family: var(--sans); font-weight: 500; transition: background .15s,color .15s;
        }
        .view-tabs button.active { background: var(--accent); color: #fff; font-weight: 600; box-shadow: 0 4px 12px rgba(158,90,60,.2); }
        .export-dropdown { position: relative; display: inline-block; }
        .export-menu {
            display: none; position: absolute; right: 0; top: 100%; background: var(--paper-2);
            border-radius: var(--r-card); box-shadow: 0 16px 40px rgba(42,36,32,.16); z-index: 99;
            min-width: 168px; padding: 6px 0; border: 1px solid var(--hair-strong);
        }
        .export-menu.show { display: block; }
        .export-menu button {
            display: block; width: 100%; text-align: left; padding: 9px 16px;
            background: none; border: none; font-size: 13px; cursor: pointer; color: var(--ink); font-family: var(--sans); transition: background .12s;
        }
        .export-menu button:hover { background: var(--accent-soft); }

        .group-card { border-bottom: 1px solid var(--hair); }
        .group-toggle {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 18px; cursor: pointer; user-select: none; gap: 10px; transition: background .15s;
        }
        .group-toggle:hover { background: var(--sidebar); }
        .group-toggle .arrow { font-size: 12px; transition: transform .2s var(--ease); color: var(--ink-3); min-width: 16px; text-align: center; }
        .group-toggle .arrow.open { transform: rotate(90deg); }
        .group-toggle .gname { font-weight: 700; font-size: 14px; color: var(--ink); }
        .group-toggle .gmeta { font-size: 12px; color: var(--ink-2); display: flex; gap: 10px; flex-wrap: wrap; }
        .sub-records { overflow: hidden; max-height: 0; opacity: 0; transition: all .25s var(--ease); }
        .sub-records.open { max-height: 4000px; opacity: 1; }
        .month-block { padding: 6px 18px; border-bottom: 1px solid var(--hair); }
        .month-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; padding: 6px 0; font-size: 13px; font-weight: 500; color: var(--ink-2); flex-wrap: wrap; }
        .month-records { overflow: hidden; max-height: 0; opacity: 0; transition: all .25s var(--ease); }
        .month-records.open { max-height: 3000px; opacity: 1; }
        .sub-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .sub-table th { padding: 9px 14px 8px 18px; text-align: left; font-weight: 700; font-size: 11px; color: var(--ink-2); letter-spacing: .3px; border-bottom: 1px solid var(--hair-strong); background: var(--sidebar); }
        .sub-table td { padding: 9px 14px 9px 18px; border-bottom: 1px solid var(--hair); color: var(--ink); font-variant-numeric: tabular-nums; }
        .sub-table tr:hover td { background: var(--paper); }

        .status-tag { display: inline-block; padding: 1px 11px; border-radius: var(--r-btn); font-size: 11px; font-weight: 600; line-height: 22px; }
        .status-tag.paid { background: var(--green-soft); color: var(--green); }
        .status-tag.unpaid { background: var(--red-soft); color: var(--red); }
        .balance { font-weight: 700; padding: 1px 11px; border-radius: var(--r-btn); font-size: 12px; }
        .balance.clear { background: var(--green-soft); color: var(--green); }
        .balance.owe { background: var(--red-soft); color: var(--red); }
        .balance.over { background: var(--blue-soft); color: var(--blue); }
        .settle-btn { background: var(--accent-soft); border: 1px solid var(--accent-line); color: var(--accent-2); padding: 4px 12px; border-radius: var(--r-btn); font-size: 11px; cursor: pointer; margin-left: 4px; font-weight: 600; transition: background .15s; }
        .settle-btn:hover { background: var(--accent-line); color: #fff; }

        .empty-detail { text-align: center; padding: 44px 20px 40px; color: var(--ink-3); font-size: 14px; }
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--ink); color: #fff; padding: 11px 24px; border-radius: var(--r-btn);
            font-weight: 500; font-size: 13px; z-index: 9999; opacity: 0;
            transition: all .3s var(--ease); pointer-events: none; box-shadow: 0 12px 30px rgba(42,36,32,.22);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { background: var(--green); }
        .toast.warning { background: var(--accent-2); }

        .client-list::-webkit-scrollbar { width: 6px; }
        .client-list::-webkit-scrollbar-track { background: var(--sidebar); border-radius: 6px; }
        .client-list::-webkit-scrollbar-thumb { background: var(--hair-strong); border-radius: 6px; }
        .total-sessions-badge {
            display: inline-block; background: var(--accent-soft); color: var(--accent-2); padding: 2px 10px;
            border-radius: var(--r-btn); font-size: 12px; font-weight: 600; margin-left: 4px;
        }
        .client-status {
            display: inline-block; padding: 1px 9px; border-radius: var(--r-btn);
            font-size: 10px; font-weight: 600; margin-left: 4px; vertical-align: middle;
        }
        .client-status.active { background: var(--green-soft); color: var(--green); border: 1px solid #cdddd2; }
        .client-status.paused { background: var(--sidebar); color: var(--ink-2); border: 1px solid var(--hair-strong); }
        .client-status.ended { background: var(--red-soft); color: var(--red); border: 1px solid #e7cfc9; }
        .action-btn {
            background: none; border: none; cursor: pointer; font-size: 12px; margin-left: 4px;
            color: var(--ink-2); border-radius: var(--r-sm); padding: 2px 6px; transition: background .15s,color .15s;
        }
        .action-btn:hover { color: var(--accent-2); background: var(--accent-soft); }

        /* ── P0: 两栏布局（录入常驻 / 明细滚动）── */
        .layout { display: grid; grid-template-columns: minmax(330px, 400px) 1fr; gap: 18px; align-items: start; margin-top: 4px; }
        .col-input { position: sticky; top: 18px; align-self: start; display: flex; flex-direction: column; gap: 18px; min-width: 0; }
        .col-detail { display: flex; flex-direction: column; gap: 18px; min-width: 0; }
        .detail-section { margin-top: 0; }
        .col-input .record-form { grid-template-columns: 1fr 1fr; }
        @media (max-width: 860px) { .layout { grid-template-columns: 1fr; } .col-input { position: static; } }
        @media (max-width: 480px) { .col-input .record-form { grid-template-columns: 1fr; } }

        /* ── P1: 内联弹层（修改记录 / 月结收款）── */
        .modal-overlay { position: fixed; inset: 0; background: rgba(42,36,32,.42); display: none; align-items: center; justify-content: center; z-index: 5000; padding: 16px; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--paper-2); border: 1px solid var(--hair-strong); border-radius: var(--r-card); box-shadow: var(--shadow); padding: 20px 22px; width: min(380px, 94vw); animation: modalIn .2s var(--ease); }
        @keyframes modalIn { from { opacity: 0; transform: translateY(8px) scale(.98); } to { opacity: 1; transform: none; } }
        .modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; font-family: var(--serif); color: var(--ink); }
        .modal .m-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
        .modal .m-row label { font-size: 12px; font-weight: 600; color: var(--ink-2); width: 60px; flex: none; }
        .modal .m-row input { flex: 1; min-width: 0; padding: 8px 11px; border: 1px solid var(--hair-strong); border-radius: var(--r-ctl); font-size: 13px; background: var(--paper); color: var(--ink); font-family: var(--sans); }
        .modal .m-row input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
        .modal .m-info { font-size: 12px; color: var(--ink-2); margin-bottom: 12px; line-height: 1.7; }
        .modal .m-info b { color: var(--accent-2); font-weight: 700; }
        .modal .m-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 6px; }
        .quick-add { background: var(--accent-soft); border: 1px solid var(--accent-line); color: var(--accent-2); font-size: 12px; font-weight: 700; border-radius: var(--r-sm); padding: 3px 9px; cursor: pointer; transition: background .15s,color .15s; }
        .quick-add:hover { background: var(--accent); color: #fff; }

        /* 进入时的轻微层次感 */
        .card, .detail-section { transition: box-shadow .2s var(--ease); }

        /* 暗色模式：与主程序 :root.dark 同令牌、同调色板，billing 为 iframe 独立文档，
           故在此自包含一套暗色变量；dark 类由下方脚本依据 xj_theme 应用到本文档根 */
        :root.dark {
            --paper: #19150F; --paper-2: #211B14; --sidebar: #1F1810;
            --ink: #EDE4D8; --ink-2: #B6A89A; --ink-3: #8A7E70;
            --hair: #322A20; --hair-strong: #473B2D;
            --accent: #C0906F; --accent-2: #D2A484; --accent-soft: #3A2C20; --accent-line: #6E4A33;
            --green: #94A585; --green-soft: #26301F;
            --red: #CF8B82; --red-soft: #2E231F;
            --blue: #9AAEBB; --blue-soft: #1C242A;
            --shadow: 0 1px 2px rgba(0,0,0,.4), 0 12px 30px rgba(0,0,0,.45);
        }
        :root.dark body {
            background:
                radial-gradient(1200px 480px at 12% -8%, var(--accent-soft), transparent 60%),
                var(--paper);
        }
        :root.dark .sub-table tr:hover td { background: var(--paper-2); }
        :root.dark .client-status.active { border-color: var(--green-soft); }
        :root.dark .client-status.ended { border-color: var(--red-soft); }
        :root.dark .modal { box-shadow: 0 16px 40px rgba(0,0,0,.5); }
        :root.dark .modal .m-row input { background: var(--paper); }
    </style>
    <script>
      /* 心镜主题同步：billing 以 iframe 形式承载，是独立 document，
         不会继承外壳的 dark 类，需自行依据共享的 localStorage('xj_theme') 应用 */
      (function () {
        try {
          var mq = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');
          function sync() {
            var t = localStorage.getItem('xj_theme');
            var dark = t === 'dark' || (t === null && mq && mq.matches);
            document.documentElement.classList.toggle('dark', !!dark);
          }
          sync();
          window.addEventListener('storage', function (e) { if (e.key === 'xj_theme') sync(); });
          if (mq && mq.addEventListener) mq.addEventListener('change', sync);
        } catch (err) {}
      })();
    </script>
</head>
<body>
<div class="app" id="app">
    <header class="header">
        <h1>心理档案记账 <small>状态统计</small></h1>
    </header>

    <div class="layout">
        <div class="col-input">
            <div class="card">
                <div class="card-title">来访者档案 <span class="badge" id="clientCount">0 人</span></div>
                <div class="client-top-row">
                    <div class="client-search">
                        <input type="text" id="clientSearch" placeholder="搜索姓名..." />
                    </div>
                </div>
                <div class="client-list" id="clientList"></div>
                <div class="client-form" id="clientForm">
                    <div class="row">
                        <input type="text" id="clientNameInput" placeholder="姓名" style="flex:1;min-width:80px;" />
                        <input type="number" id="clientFeeInput" placeholder="单价" min="0" step="0.01" style="width:80px;" />
                        <select id="clientModeInput" style="width:72px;">
                            <option value="per-session">次结</option>
                            <option value="monthly">月结</option>
                        </select>
                        <input type="number" id="clientManualSessions" placeholder="手动次数" min="0" value="0" style="width:90px;" />

                            <option value="paused">暂停</option>

                    </div>
                    <div class="row">

                        <button class="btn btn-secondary btn-sm" id="clientCancelBtn" style="display:none;">取消</button>

            </div>

            <div class="card">
                <div class="card-title">咨询记录</div>
                <form id="recordForm" class="record-form">
                    <div class="group full">
                        <label>选择来访者 <span id="totalSessionsLabel" class="total-sessions-badge" style="display:none;">总次数：0</span></label>
                        <select id="recordClient" required><option value="">— 请先添加档案 —</option></select>
                    </div>
                    <div class="group"><label>日期</label><input type="date" id="recordDate" required /></div>
                    <div class="group"><label>次数</label><input type="number" id="recordSessions" min="1" value="1" /></div>
                    <div class="group"><label>单价（留空用默认）</label><input type="number" id="recordFee" min="0" step="0.01" /></div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">添加记录</button>
                        <button type="button" class="btn btn-outline btn-sm" id="batchBtn">批量选日期</button>
                        <button type="button" class="btn btn-success btn-sm" id="pasteBtn">粘贴参会</button>
                    </div>
                    <div class="batch-panel" id="batchPanel">
                        <div class="cal-nav">
                            <button id="calPrev">◀</button>
                            <span class="month-label" id="calLabel1"></span>
                            <span class="month-label" id="calLabel2" style="margin-left:16px;"></span>
                            <button id="calNext">▶</button>
                        </div>
                        <div class="cal-months">
                            <div><div class="cal-grid" id="calGrid1"></div></div>
                            <div><div class="cal-grid" id="calGrid2"></div></div>
                        </div>
                        <div class="cal-info">
                            <span>已选 <span class="count" id="calCount">0</span> 个日期</span>
                            <button class="btn btn-sm btn-secondary" id="calClear">清空</button>
                            <button class="btn btn-sm btn-primary" id="batchConfirm">批量添加</button>
                            <button class="btn btn-sm btn-secondary" id="batchCancelBtn">取消</button>
                        </div>
                    </div>
                    <div class="import-panel" id="pastePanel">
                        <h4>粘贴腾讯会议参会名单</h4>
                        <textarea id="pasteInput" placeholder="粘贴参会成员列表..."></textarea>
                        <div class="hint">自动模糊匹配来访者，绿色=成功，红色=需手动选择</div>
                        <div class="match-results" id="matchResults"></div>
                        <div class="actions">
                            <button type="button" class="btn btn-primary btn-sm" id="pasteConfirm">确认导入</button>
                            <button type="button" class="btn btn-secondary btn-sm" id="pasteCancel">取消</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="col-detail">
            <div class="stats-panel" id="statsPanel">
                <select id="statsMonth"></select>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-label">总次数</span>
                        <span class="stat-value" id="statTotalHours">0次</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">应收</span>
                        <span class="stat-value" id="statIncome">¥0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">已收</span>
                        <span class="stat-value" id="statReceived">¥0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">区间次数</span>
                        <span class="stat-value" id="statMonthHours">0次</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">均价</span>
                        <span class="stat-value" id="statAvgPrice">¥0</span>
                    </div>
                </div>
            </div>

            <div class="detail-section">
                <div class="detail-header">
                    <h2>记账明细 <span class="badge" id="detailCount">0 条</span></h2>
                    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                        <div class="view-tabs" id="viewTabs">
                            <button data-view="client" class="active">按来访者</button>
                            <button data-view="month">按月</button>
                            <button data-view="unpaid">未缴费</button>
                        </div>
                        <button class="btn btn-secondary btn-sm" id="expandAllBtn">展开全部</button>
                        <div class="export-dropdown">
                            <button class="btn btn-outline btn-sm" id="exportBtn">导出</button>
                            <div class="export-menu" id="exportMenu">
                                <button data-export="all">导出全部记录</button>
                                <button data-export="client">导出当前来访者</button>
                                <button data-export="month">按月导出</button>
                                <button data-export="year">按年导出</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="groupList"></div>
                <div class="empty-detail" id="emptyDetail"><p>暂无记录</p></div>

</div>
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <h3>修改记录</h3>
        <div class="m-row"><label>日期</label><input type="date" id="editDate" /></div>
        <div class="m-row"><label>次数</label><input type="number" id="editSessions" min="1" value="1" /></div>
        <div class="m-row"><label>单价</label><input type="number" id="editFee" min="0" step="0.01" /></div>

<div class="modal-overlay" id="settleModal">
    <div class="modal">
        <h3>月结收款</h3>
        <div class="m-info">应缴 <b id="settleDue">¥0</b> · 已付 <b id="settlePaid">¥0</b></div>
        <div class="m-row"><label>本次支付</label><input type="number" id="settleAmount" min="0" step="0.01" placeholder="累加金额" /></div>
        <div class="m-actions">
            <button class="btn btn-secondary btn-sm" id="settleCancel">取消</button>
            <button class="btn btn-primary btn-sm" id="settleSave">记录</button>
        </div>
    </div>
</div>
<div class="toast" id="toast"></div>

<script>
(function() {
    'use strict';
    const STORAGE_KEY = 'psyc_billing_v8';
    let data = { clients: [], records: [], monthlyPayments: [] };
    let viewMode = 'client';
    let editingClientId = null;
    let calendarDate = new Date();
    let selectedDates = new Set();
    let typedFee = '';          // P1: 记录表单中用户手动输入的单价，连续录入时保留

    function loadData() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                const parsed = JSON.parse(raw);
                data.clients = (parsed.clients || []).map(c => ({
                    ...c,
                    billingMode: c.billingMode || 'per-session',
                    manualSessions: c.manualSessions || 0,
                    status: c.status || 'active'
                }));
                data.records = parsed.records || [];
                data.monthlyPayments = parsed.monthlyPayments || [];
                data.clients.forEach(c => { if (!c.id) c.id = genId('c'); });
                data.records.forEach(r => { if (!r.id) r.id = genId('r'); });
                data.monthlyPayments.forEach(p => { if (!p.id) p.id = genId('mp'); });
            } else {
                data.clients = [
                    { id: 'c1', name: '张明', feePerSession: 300, billingMode: 'per-session', manualSessions: 0, status: 'active' },
                    { id: 'c2', name: '李静', feePerSession: 250, billingMode: 'monthly', manualSessions: 0, status: 'active' }
                ];
                data.records = [
                    { id:'r1', clientId:'c1', date:'2025-04-10', sessions:1, feePerSession:300, paid:false },
                    { id:'r2', clientId:'c2', date:'2025-04-12', sessions:2, feePerSession:250, paid:false },
                ];
                data.monthlyPayments = [];
                saveData();
            }
        } catch(e) { data = { clients:[], records:[], monthlyPayments:[] }; }
        data.records.sort((a,b) => a.date > b.date ? -1 : 1);
    }

    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
    function genId(p) { return p+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7); }
    function formatDate(s) { if(!s) return '—'; const d=new Date(s+'T00:00:00'); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
    function formatMonth(s) { if(!s) return ''; const d=new Date(s+'T00:00:00'); return `${d.getFullYear()}年${String(d.getMonth()+1).padStart(2,'0')}月`; }
    function formatMoney(n) { return '¥'+Number(n).toFixed(2); }
    function getClient(id) { return data.clients.find(c=>c.id===id); }
    function getRecordsByClient(cid) { return data.records.filter(r=>r.clientId===cid); }
    function calcAmount(r) { return r.sessions * r.feePerSession; }
    function getMonthlyDue(clientId, month) {
        return data.records.filter(r => r.clientId===clientId && r.date.startsWith(month))
            .reduce((sum, r) => sum + calcAmount(r), 0);
    }
    function getMonthlyPayment(clientId, month) {
        const p = data.monthlyPayments.find(mp => mp.clientId===clientId && mp.month===month);
        return p ? p.amount : 0;
    }
    function calcClientStats(cid) {
        const recs = getRecordsByClient(cid);
        const c = getClient(cid);
        let totalAmount = 0, totalSessions = 0, unpaidAmount = 0;
        if (c?.billingMode === 'monthly') {
            recs.forEach(r => { totalAmount += calcAmount(r); totalSessions += r.sessions; });
            const months = new Set(recs.map(r => r.date.slice(0,7)));
            let totalPaid = 0;
            months.forEach(m => { totalPaid += getMonthlyPayment(cid, m); });
            unpaidAmount = totalAmount - totalPaid;
        } else {
            recs.forEach(r => {
                totalAmount += calcAmount(r);
                totalSessions += r.sessions;
                if (!r.paid) unpaidAmount += calcAmount(r);
            });
        }
        return { totalSessions, totalAmount, unpaidAmount, recordCount: recs.length };
    }
    function getTotalSessions(cid) {
        const c = getClient(cid);
        if (!c) return 0;
        const systemSessions = data.records.filter(r=>r.clientId===cid).reduce((s,r)=>s+r.sessions,0);
        return systemSessions + (c.manualSessions || 0);
    }

    function populateMonthOptions() {
        const monthsSet = new Set(data.records.map(r => r.date.slice(0,7)));
        const months = Array.from(monthsSet).sort((a,b) => b.localeCompare(a));
        const currentMonth = new Date().toISOString().slice(0,7);
        if (!months.includes(currentMonth)) months.unshift(currentMonth);
        let html = '<option value="all">全部时间</option>';
        months.forEach(m => {
            html += `<option value="${m}">${formatMonth(m+'-01')}</option>`;
        });
        $('statsMonth').innerHTML = html;
        $('statsMonth').value = 'all';
    }

    function updateStats() {
        const month = $('statsMonth').value;
        const totalSysSessions = data.records.reduce((s,r) => s + r.sessions, 0);
        const totalManual = data.clients.reduce((s,c) => s + (c.manualSessions||0), 0);
        const totalSessions = totalSysSessions + totalManual;

        // 已收：次结=已缴记录金额；月结=已记录的月结付款
        let received = 0;
        data.records.forEach(r => {
            const c = getClient(r.clientId);
            if (c && c.billingMode !== 'monthly' && r.paid) received += calcAmount(r);
        });
        data.monthlyPayments.forEach(p => { received += p.amount; });

        let income = 0, monthSessions = 0;
        if (month === 'all') {
            income = data.records.reduce((s,r) => s + calcAmount(r), 0);
            monthSessions = totalSessions;
        } else {
            const mRecords = data.records.filter(r => r.date.startsWith(month));
            income = mRecords.reduce((s,r) => s + calcAmount(r), 0);
            monthSessions = mRecords.reduce((s,r) => s + r.sessions, 0);
        }
        const avgPrice = monthSessions > 0 ? (income / monthSessions) : 0;

        $('statTotalHours').textContent = totalSessions + '次';
        $('statIncome').textContent = formatMoney(income);
        $('statReceived').textContent = formatMoney(received);
        $('statMonthHours').textContent = monthSessions + '次';
        $('statAvgPrice').textContent = formatMoney(avgPrice);
    }

    const $ = id => document.getElementById(id);
    const toastEl = $('toast');
    let toastTimer;
    function toast(msg, type) {
        if(toastTimer) clearTimeout(toastTimer);
        toastEl.textContent = msg; toastEl.className = 'toast '+(type||'');
        void toastEl.offsetWidth; toastEl.classList.add('show');
        toastTimer = setTimeout(()=>{toastEl.classList.remove('show');},2200);
    }
    function escHtml(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

    // ── 来访者 ──
    function renderClients(searchTerm = '') {
        const term = searchTerm.trim().toLowerCase();
        let filtered = data.clients;
        if (term) filtered = data.clients.filter(c => c.name.toLowerCase().includes(term));
        const groups = {};
        filtered.forEach(c => {
            const first = c.name.charAt(0).toUpperCase();
            const key = /[A-Za-z]/.test(first) ? first : '#';
            if (!groups[key]) groups[key] = [];
            groups[key].push(c);
        });
        let html = '';
        const sortedKeys = Object.keys(groups).sort((a,b) => a === '#' ? 1 : b === '#' ? -1 : a.localeCompare(b));
        for (const key of sortedKeys) {
            html += `<div class="client-group"><h4>${key}</h4>`;
            groups[key].forEach(c => {
                const stats = calcClientStats(c.id);
                const modeText = c.billingMode === 'monthly' ? '月结' : '次结';
                const statusClass = c.status === 'active' ? 'active' : 'paused';
                const statusText = c.status === 'active' ? '进行' : '暂停';
                html += `<div class="client-item ${editingClientId===c.id?'active':''}" data-id="${c.id}">
                    <div class="info">
                        <div class="name">${escHtml(c.name)} <span style="font-size:10px;color:#0ea5e9;">${modeText}</span> <span class="client-status ${statusClass}">${statusText}</span></div>
                        <div class="meta">
                            <span>${formatMoney(c.feePerSession)}</span>
                            <span>${stats.totalSessions}次</span>
                            <span>${formatMoney(stats.totalAmount)}</span>
                            ${stats.unpaidAmount>0?`<span style="color:#dc2626;">${formatMoney(stats.unpaidAmount)}</span>`:''}
                        </div>
                    </div>
                    <div class="actions">
                        <button class="quick-add" data-id="${c.id}" title="记一次咨询">＋记</button>
                        <button class="edit-client" data-id="${c.id}">✎</button>
                        <button class="del-client" data-id="${c.id}" title="删除">✕</button>
                    </div>
                </div>`;
            });
            html += `</div>`;
        }
        if (!html) html = '<div style="padding:16px;text-align:center;color:#94a3b8;">暂无匹配来访者</div>';
        $('clientList').innerHTML = html;
        $('clientCount').textContent = filtered.length + ' 人';
    }

    function startEditClient(id) {
        const c = getClient(id); if(!c) return;
        editingClientId = id;
        $('clientNameInput').value = c.name;
        $('clientFeeInput').value = c.feePerSession;
        $('clientModeInput').value = c.billingMode;
        $('clientManualSessions').value = c.manualSessions || 0;
        $('clientStatusInput').value = c.status || 'active';
        $('clientConfirmBtn').textContent = '确认修改';
        $('clientCancelBtn').style.display = 'inline-block';
        renderClients($('clientSearch').value);
    }

    function cancelEditClient() {
        editingClientId = null;
        $('clientNameInput').value = '';
        $('clientFeeInput').value = '';
        $('clientModeInput').value = 'per-session';
        $('clientManualSessions').value = '0';
        $('clientStatusInput').value = 'active';
        $('clientConfirmBtn').textContent = '添加来访者';
        $('clientCancelBtn').style.display = 'none';
        renderClients($('clientSearch').value);
    }

    function confirmClientAction() {
        const name = $('clientNameInput').value.trim();
        const fee = parseFloat($('clientFeeInput').value);
        const mode = $('clientModeInput').value;
        const manual = parseInt($('clientManualSessions').value) || 0;
        const status = $('clientStatusInput').value;
        if (!name) { toast('请输入姓名','warning'); return; }
        if (isNaN(fee) || fee <= 0) { toast('请输入有效价格','warning'); return; }
        if (editingClientId) {
            const c = getClient(editingClientId);
            if (c) {
                const exist = data.clients.find(cl => cl.name === name && cl.id !== editingClientId);
                if (exist) { toast('已存在同名来访者','warning'); return; }
                c.name = name; c.feePerSession = fee; c.billingMode = mode; c.manualSessions = manual; c.status = status;
                toast('已更新','success');
            }
        } else {
            if (data.clients.find(c => c.name === name)) { toast('来访者已存在','warning'); return; }
            data.clients.push({ id: genId('c'), name, feePerSession: fee, billingMode: mode, manualSessions: manual, status });
            toast(`已添加「${name}」`,'success');
        }
        saveData();
        cancelEditClient();
        renderAll();
    }

    function deleteClient(id) {
        const c = getClient(id); if(!c) return;
        if(!confirm(`确定删除「${c.name}」及其所有记录？`)) return;
        data.clients = data.clients.filter(x=>x.id!==id);
        data.records = data.records.filter(r=>r.clientId!==id);
        data.monthlyPayments = data.monthlyPayments.filter(mp=>mp.clientId!==id);
        if(editingClientId===id) cancelEditClient();
        saveData(); refreshDetail(); toast('已删除','info');
    }

    // ── 记录表单 ──
    function renderClientSelect() {
        const cur = $('recordClient').value;
        $('recordClient').innerHTML = `<option value="">— 选择来访者 —</option>` +
            data.clients.map(c => `<option value="${c.id}">${escHtml(c.name)}（${formatMoney(c.feePerSession)}｜${c.billingMode==='monthly'?'月结':'次结'}）${c.status==='paused'?' [暂停]':''}</option>`).join('');
        if(cur && getClient(cur)) $('recordClient').value = cur;
        onClientSelect();
    }

    function onClientSelect() {
        const c = getClient($('recordClient').value);
        const feeVal = typedFee !== '' ? typedFee : (c ? c.feePerSession : '');
        $('recordFee').value = feeVal;
        if (c) {
            const total = getTotalSessions(c.id);
            $('totalSessionsLabel').style.display = 'inline-block';
            $('totalSessionsLabel').textContent = `总次数：${total}（系统${total-(c.manualSessions||0)}+手动${c.manualSessions||0}）`;
        } else {
            $('totalSessionsLabel').style.display = 'none';
        }
    }

    function addRecord() {
        const cid = $('recordClient').value;
        const date = $('recordDate').value;
        const sessions = parseInt($('recordSessions').value)||1;
        if(!cid) { toast('请选择来访者','warning'); return; }
        if(!date) { toast('请选择日期','warning'); return; }
        const c = getClient(cid); if(!c) return;
        const fee = getRecordFee(c);
        data.records.push({ id:genId('r'), clientId:cid, date, sessions, feePerSession:fee, paid:false });
        data.records.sort((a,b)=>a.date>b.date?-1:1);
        saveData(); refreshDetail();
        toast('记录已添加','success');
    }

    function getRecordFee(c) {
        const f = parseFloat($('recordFee').value);
        return (isNaN(f) || f <= 0) ? c.feePerSession : f;
    }

    // P0: 录入后只刷新明细/统计，并保留当前滚动位置，避免整页重绘跳走
    function refreshDetail() {
        const sy = window.scrollY;
        const cs = $('clientList').scrollTop;
        renderGroups();
        renderClients($('clientSearch').value);
        renderClientSelect();
        updateStats();
        window.scrollTo(0, sy);
        $('clientList').scrollTop = cs;
    }

    function togglePaid(id) {
        const r = data.records.find(x=>x.id===id); if(!r) return;
        r.paid = !r.paid;
        saveData();
        const row = document.querySelector(`tr[data-id="${id}"]`);
        if (!row) { renderAll(); return; }
        const statusTd = row.querySelector('td:first-child');
        if (statusTd) { statusTd.className = r.paid ? 'paid' : 'unpaid'; }
        const tag = row.querySelector('.status-tag');
        if (tag) {
            tag.className = 'status-tag ' + (r.paid ? 'paid' : 'unpaid');
            tag.textContent = r.paid ? '已缴' : '未缴';
        }
        const btn = row.querySelector('.toggle-paid-btn');
        if (btn) btn.textContent = r.paid ? '标记未缴' : '标记已缴';

    let editingRecordId = null;
    function editRecord(id) {
        const r = data.records.find(x => x.id === id);
        if (!r) return toast('记录不存在','warning');
        editingRecordId = id;
        $('editDate').value = r.date;
        $('editSessions').value = r.sessions;
        $('editFee').value = r.feePerSession;
        $('editModal').classList.add('show');
        setTimeout(() => $('editDate').focus(), 30);
    }
    function saveEditRecord() {
        const r = data.records.find(x => x.id === editingRecordId);
        if (!r) { closeEditModal(); return; }
        const nd = $('editDate').value;
        if (!/^\d{4}-\d{2}-\d{2}$/.test(nd)) { toast('日期格式无效','warning'); return; }
        const ns = parseInt($('editSessions').value, 10);
        if (isNaN(ns) || ns < 1) { toast('次数至少为1','warning'); return; }
        const nf = parseFloat($('editFee').value);
        if (isNaN(nf) || nf <= 0) { toast('请输入有效单价','warning'); return; }
        r.date = nd; r.sessions = ns; r.feePerSession = nf;
        data.records.sort((a,b) => a.date > b.date ? -1 : 1);
        saveData(); closeEditModal(); refreshDetail();
        toast('记录已更新','success');
    }

        $('detailCount').textContent = totalRecs + ' 条';

        data.records = data.records.filter(r=>r.id!==id);

    // ★ 月结收款（P1: 内联弹层，替代原生 prompt）
    let settleCtx = null;
    function settleMonth(clientId, month) {
        const c = getClient(clientId); if(!c) return;
        const due = getMonthlyDue(clientId, month);
        const paid = getMonthlyPayment(clientId, month);
        settleCtx = { clientId, month };
        $('settleDue').textContent = formatMoney(due);
        $('settlePaid').textContent = formatMoney(paid);
        $('settleAmount').value = '';
        $('settleModal').classList.add('show');
        setTimeout(() => $('settleAmount').focus(), 30);
    }
    function saveSettle() {
        if (!settleCtx) { closeSettleModal(); return; }
        const amount = parseFloat($('settleAmount').value);
        if (isNaN(amount) || amount < 0) { toast('请输入有效金额','warning'); return; }
        let payment = data.monthlyPayments.find(mp => mp.clientId === settleCtx.clientId && mp.month === settleCtx.month);
        if (payment) payment.amount += amount;
        else data.monthlyPayments.push({ id: genId('mp'), clientId: settleCtx.clientId, month: settleCtx.month, amount });
        saveData(); closeSettleModal(); refreshDetail();
        toast(`已记录付款 ${formatMoney(amount)}`,'success');
    }
    function closeSettleModal() { $('settleModal').classList.remove('show'); settleCtx = null; }

    // ── 明细渲染（增加修改按钮）──
    function renderGroups() {
        const activeClients = data.clients.filter(c => c.status !== 'paused');
        const activeIds = new Set(activeClients.map(c => c.id));
        if(activeClients.length===0 || data.records.filter(r => activeIds.has(r.clientId)).length===0) {
            $('groupList').innerHTML=''; $('emptyDetail').style.display='block';
            $('detailCount').textContent='0 条'; updateStats(); return;

        if(viewMode==='client') {
            activeClients.forEach(c=>{
                const recs = getRecordsByClient(c.id);
                if(recs.length===0) return;
                const stats = calcClientStats(c.id);
                totalRecs += recs.length;
                const monthMap = {};
                recs.forEach(r=>{ const mk = r.date.slice(0,7); if(!monthMap[mk]) monthMap[mk]=[]; monthMap[mk].push(r); });
                const sortedMonths = Object.keys(monthMap).sort((a,b)=>b.localeCompare(a));
                let monthBlocks = '';
                sortedMonths.forEach(m=>{
                    const mrecs = monthMap[m]; const mAmt = mrecs.reduce((s,r)=>s+calcAmount(r),0);
                    let rows = '';
                    if(c.billingMode === 'monthly') {
                        rows = mrecs.map(r => {
                            return `<tr data-id="${r.id}"><td>${formatDate(r.date)}</td><td>${r.sessions}次</td><td>${formatMoney(calcAmount(r))}</td>
                            <td>
                                <button class="action-btn edit-rec-btn" data-id="${r.id}">修改</button>
                                <button class="action-btn del-rec-btn" data-id="${r.id}">删除</button>
                            </td></tr>`;
                        }).join('');
                    } else {
                        rows = mrecs.map(r => {
                            const amt=calcAmount(r), paid=r.paid;
                            return `<tr data-id="${r.id}"><td class="${paid?'paid':'unpaid'}">${formatDate(r.date)}</td><td>${r.sessions}次</td><td>${formatMoney(amt)}</td>
                            <td><span class="status-tag ${paid?'paid':'unpaid'}">${paid?'已缴':'未缴'}</span></td>
                            <td>
                                <button class="toggle-paid-btn" data-id="${r.id}">${paid?'标记未缴':'标记已缴'}</button>
                                <button class="action-btn edit-rec-btn" data-id="${r.id}">修改</button>
                                <button class="action-btn del-rec-btn" data-id="${r.id}">删除</button>
                            </td></tr>`;
                        }).join('');
                    }
                    let settlementHtml = '';
                    if(c.billingMode === 'monthly') {
                        const paid = getMonthlyPayment(c.id, m);
                        const balance = mAmt - paid;
                        let balanceClass='', balanceText='';
                        if(balance===0) { balanceClass='clear'; balanceText='已结清'; }
                        else if(balance>0) { balanceClass='owe'; balanceText=`欠 ${formatMoney(balance)}`; }
                        else { balanceClass='over'; balanceText=`多缴 ${formatMoney(-balance)}`; }
                        settlementHtml = `<span style="margin-left:6px;font-size:12px;">已付 ${formatMoney(paid)}</span> <span class="balance ${balanceClass}">${balanceText}</span> <button class="settle-btn" data-client="${c.id}" data-month="${m}">月结</button>`;
                    }
                    monthBlocks += `<div class="month-block">
                        <div class="month-toggle"><span class="arrow">▶</span> ${formatMonth(m+'-01')} · ${mrecs.length}次 · 合计 ${formatMoney(mAmt)} ${settlementHtml}</div>
                        <div class="month-records"><table class="sub-table">
                        <thead><tr>${c.billingMode==='monthly'?'<th>日期</th><th>次数</th><th>金额</th><th>操作</th>':'<th>日期</th><th>次数</th><th>金额</th><th>状态</th><th>操作</th>'}</tr></thead>
                        <tbody>${rows}</tbody></table></div>
                    </div>`;
                });

            });
        } else if(viewMode==='month') {
            const monthMap = {};
            data.records.filter(r => activeIds.has(r.clientId)).forEach(r=>{ const mk=r.date.slice(0,7); if(!monthMap[mk]) monthMap[mk]=[]; monthMap[mk].push(r); });
            Object.keys(monthMap).sort((a,b)=>b.localeCompare(a)).forEach(m=>{
                const recs=monthMap[m]; totalRecs+=recs.length; const mAmt=recs.reduce((s,r)=>s+calcAmount(r),0);
                let rows=recs.map(r=>{
                    const c=getClient(r.clientId); const amt=calcAmount(r);
                    const cn=escHtml(c?.name||'未知');
                    if(c?.billingMode==='monthly') return `<tr data-id="${r.id}"><td>${formatDate(r.date)}</td><td>${cn}</td><td>${r.sessions}次</td><td>${formatMoney(amt)}</td><td><button class="action-btn edit-rec-btn" data-id="${r.id}">修改</button> <button class="action-btn del-rec-btn" data-id="${r.id}">删除</button></td></tr>`;
                    return `<tr data-id="${r.id}"><td class="${r.paid?'paid':'unpaid'}">${formatDate(r.date)}</td><td>${cn}</td><td>${r.sessions}次</td><td>${formatMoney(amt)}</td><td><span class="status-tag ${r.paid?'paid':'unpaid'}">${r.paid?'已缴':'未缴'}</span></td><td><button class="toggle-paid-btn" data-id="${r.id}">${r.paid?'标记未缴':'标记已缴'}</button> <button class="action-btn edit-rec-btn" data-id="${r.id}">修改</button> <button class="action-btn del-rec-btn" data-id="${r.id}">删除</button></td></tr>`;
                }).join('');
                html+=`<div class="group-card"><div class="group-toggle"><span class="arrow open">▶</span><span class="gname">${formatMonth(m+'-01')}</span><span class="gmeta">${recs.length}条 · 合计 ${formatMoney(mAmt)}</span></div><div class="sub-records open"><table class="sub-table"><thead><tr><th>日期</th><th>来访者</th><th>次数</th><th>金额</th><th>状态</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
            });
        } else if(viewMode==='unpaid') {
            const unpaidRecs = data.records.filter(r=>{ const c=getClient(r.clientId); return activeIds.has(r.clientId) && c && c.billingMode==='per-session' && !r.paid; });
            const monthlyClients = {};
            activeClients.filter(c=>c.billingMode==='monthly').forEach(c=>{
                const recs=getRecordsByClient(c.id);
                const months=new Set(recs.map(r=>r.date.slice(0,7)));
                months.forEach(m=>{
                    const due=getMonthlyDue(c.id,m), paid=getMonthlyPayment(c.id,m);
                    if(due-paid>0) { if(!monthlyClients[c.id]) monthlyClients[c.id]=[]; monthlyClients[c.id].push({month:m,due,paid,balance:due-paid}); }
                });
            });
            let tempHtml='';
            if(unpaidRecs.length>0) {
                const map={}; unpaidRecs.forEach(r=>{ const cid=r.clientId; if(!map[cid]) map[cid]=[]; map[cid].push(r); });
                for(const [cid, recs] of Object.entries(map)){
                    const c=getClient(cid); if(!c) continue;
                    totalRecs+=recs.length; const a=recs.reduce((s,r)=>s+calcAmount(r),0);
                    tempHtml+=`<div class="group-card"><div class="group-toggle"><span class="arrow open">▶</span><span class="gname">${escHtml(c.name)} (次结)</span><span class="gmeta">${recs.length}条未缴 · 欠费 ${formatMoney(a)}</span></div><div class="sub-records open"><table class="sub-table"><thead><tr><th>日期</th><th>次数</th><th>金额</th><th>状态</th><th>操作</th></tr></thead><tbody>${recs.map(r=>`<tr data-id="${r.id}"><td>${formatDate(r.date)}</td><td>${r.sessions}次</td><td>${formatMoney(calcAmount(r))}</td><td><span class="status-tag unpaid">未缴</span></td><td><button class="toggle-paid-btn" data-id="${r.id}">标记已缴</button> <button class="action-btn edit-rec-btn" data-id="${r.id}">修改</button> <button class="action-btn del-rec-btn" data-id="${r.id}">删除</button></td></tr>`).join('')}</tbody></table></div></div>`;
                }
            }
            for(const [cid, items] of Object.entries(monthlyClients)){
                const c=getClient(cid); if(!c) continue;
                items.forEach(item=>{ totalRecs++;
                    tempHtml+=`<div class="group-card"><div class="group-toggle"><span class="arrow open">▶</span><span class="gname">${escHtml(c.name)} (月结) · ${formatMonth(item.month+'-01')}</span><span class="gmeta">应缴 ${formatMoney(item.due)} · 已付 ${formatMoney(item.paid)} · 欠 ${formatMoney(item.balance)}</span></div><div class="sub-records open"><div style="padding:8px 18px;"><button class="settle-btn" data-client="${cid}" data-month="${item.month}">月结</button></div></div></div>`;
                });
            }
            html=tempHtml;
        }
        $('groupList').innerHTML = html;
        $('detailCount').textContent = totalRecs + ' 条';
        updateStats();
    }

    // ── 日历多选 ──
    function renderCalendar() {
        const y = calendarDate.getFullYear();
        const m = calendarDate.getMonth();
        const m1 = m, y1 = y;
        const m2 = m + 1, y2 = m2 > 11 ? y + 1 : y;
        renderCalGrid('calGrid1', y1, m1);
        renderCalGrid('calGrid2', y2, m2 % 12);
        $('calLabel1').textContent = `${y1}年${m1+1}月`;
        $('calLabel2').textContent = `${y2}年${(m2%12)+1}月`;
        $('calCount').textContent = selectedDates.size;
    }

    function renderCalGrid(gridId, year, month) {
        const grid = $(gridId);
        const daysInMonth = new Date(year, month+1, 0).getDate();
        const firstDow = new Date(year, month, 1).getDay();
        const today = new Date().toISOString().slice(0,10);
        let html = '<div class="day-header">日</div><div class="day-header">一</div><div class="day-header">二</div><div class="day-header">三</div><div class="day-header">四</div><div class="day-header">五</div><div class="day-header">六</div>';
        for (let i = 0; i < firstDow; i++) html += '<div class="day-cell empty"></div>';
        for (let d = 1; d <= daysInMonth; d++) {
            const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const sel = selectedDates.has(ds) ? ' selected' : '';
            const tdy = ds === today ? ' today' : '';
            html += `<div class="day-cell${sel}${tdy}" data-date="${ds}">${d}</div>`;
        }
        grid.innerHTML = html;
    }

    function toggleDate(dateStr) {
        if (selectedDates.has(dateStr)) selectedDates.delete(dateStr);
        else selectedDates.add(dateStr);
        renderCalendar();
    }

    // ── 导出 ──
    function exportCSV(rows, filename) {
        const BOM = '\uFEFF';
        const csv = BOM + rows.map(r => r.map(c => '"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename + '.csv';
        a.click(); URL.revokeObjectURL(url);
        toast('导出成功','success');
    }

    function doExport(type) {
        const header = ['来访者','日期','次数','单价','金额','结算方式','缴费状态','备注'];
        let rows = [header];
        let filename = '心理咨询记录';
        const addRow = (r, c) => {
            const amt = calcAmount(r);
            const mode = c?.billingMode==='monthly'?'月结':'次结';
            let status = '';
            if(c?.billingMode==='monthly'){
                const m = r.date.slice(0,7);
                const due = getMonthlyDue(r.clientId, m);
                const paid = getMonthlyPayment(r.clientId, m);
                const bal = due - paid;
                status = bal===0?'已结清':(bal>0?`欠${formatMoney(bal)}`:`多缴${formatMoney(-bal)}`);
            } else {
                status = r.paid?'已缴':'未缴';
            }
            rows.push([c?.name||'未知', r.date, r.sessions, r.feePerSession, amt, mode, status, '']);
        };

        if (type === 'all') {
            const activeIds = new Set(data.clients.filter(c => c.status !== 'paused').map(c => c.id));
            filename = '全部记录';
            data.records.filter(r => activeIds.has(r.clientId)).forEach(r => addRow(r, getClient(r.clientId)));
        } else if (type === 'client') {
            const cid = $('recordClient').value;
            if (!cid) { toast('请先选择来访者','warning'); return; }
            const c = getClient(cid);
            filename = (c?.name||'来访者')+'_记录';
            getRecordsByClient(cid).forEach(r => addRow(r, c));
        } else if (type === 'month') {
            const ym = prompt('请输入年月（如 2025-04）：', new Date().toISOString().slice(0,7));
            if (!ym || !/^\d{4}-\d{2}$/.test(ym)) { toast('格式无效','warning'); return; }
            filename = ym+'_记录';
            data.records.filter(r=>r.date.startsWith(ym)).forEach(r=>addRow(r,getClient(r.clientId)));
        } else if (type === 'year') {
            const y = prompt('请输入年份（如 2025）：', String(new Date().getFullYear()));
            if (!y || !/^\d{4}$/.test(y)) { toast('格式无效','warning'); return; }
            filename = y+'_记录';
            data.records.filter(r=>r.date.startsWith(y)).forEach(r=>addRow(r,getClient(r.clientId)));
        }
        if (rows.length <= 1) { toast('没有可导出的记录','warning'); return; }
        exportCSV(rows, filename);
    }

        const cid = $('recordClient').value;
        if(!cid) { toast('请先选择来访者','warning'); return; }
        const c = getClient(cid); if(!c) return;
        if(selectedDates.size===0) { toast('请在日历中选择日期','warning'); return; }
        const sessions = parseInt($('recordSessions').value)||1;
        const dates = Array.from(selectedDates).sort();
        dates.forEach(d=>{
            data.records.push({ id:genId('r'), clientId:cid, date:d, sessions, feePerSession:getRecordFee(c), paid:false });
        });
        data.records.sort((a,b)=>a.date>b.date?-1:1);
        saveData(); refreshDetail();
        toast(`已添加 ${dates.length} 条记录`,'success');
        $('batchPanel').classList.remove('show');
        selectedDates.clear();
    });

    $('pasteBtn').addEventListener('click', ()=>{
        const vis = $('pastePanel').classList.contains('show');
        $('pastePanel').classList.toggle('show', !vis);
        $('batchPanel').classList.remove('show');
    });
    $('pasteCancel').addEventListener('click', ()=>{ $('pastePanel').classList.remove('show'); });
    $('pasteInput').addEventListener('input', ()=>{
        const text = $('pasteInput').value.trim();
        if(!text) { $('matchResults').innerHTML=''; return; }
        const lines = text.split('\n').map(l=>l.trim()).filter(l=>l);
        const date = $('recordDate').value || new Date().toISOString().slice(0,10);
        const seen = new Set();
        const results = [];
        for(const line of lines) {
            const parts = line.split(/[\t,，\s]+/);
            let name = '';
            for(const p of parts) {
                const clean = p.replace(/[^a-zA-Z\u4e00-\u9fff·]/g,'');
                if(clean.length>=2 && /[\u4e00-\u9fff]/.test(clean)) { name=clean; break; }
            }
            if(!name) { const clean=line.replace(/[^a-zA-Z\u4e00-\u9fff·]/g,''); if(clean.length>=2) name=clean; else continue; }
            if(seen.has(name)) continue; seen.add(name);
            const match = data.clients.find(c=>c.name.toLowerCase()===name.toLowerCase()) || data.clients.find(c=>c.name.includes(name)||name.includes(c.name));
            results.push({raw:name, matched:match});
        }
        $('matchResults').innerHTML = results.map((p,i)=>{
            const opts = data.clients.map(c=>`<option value="${c.id}" ${p.matched?.id===c.id?'selected':''}>${escHtml(c.name)}</option>`).join('');
            const color = p.matched?'#059669':'#dc2626';
            return `<div class="match-row"><span style="color:${color};font-weight:500;">${escHtml(p.raw)}</span> → <select class="match-select" data-index="${i}"><option value="">跳过</option>${opts}</select></div>`;
        }).join('');
    });
    $('pasteConfirm').addEventListener('click', ()=>{
        const selects = document.querySelectorAll('.match-select');
        const date = $('recordDate').value || new Date().toISOString().slice(0,10);
        const sessions = parseInt($('recordSessions').value)||1;
        let imported = 0;
        selects.forEach(sel=>{
            const cid=sel.value; if(!cid) return;
            const c=getClient(cid); if(!c) return;
            data.records.push({ id:genId('r'), clientId:cid, date, sessions, feePerSession:getRecordFee(c), paid:false });
            imported++;
        });
        if(imported===0) { toast('未选择任何来访者','warning'); return; }
        data.records.sort((a,b)=>a.date>b.date?-1:1);
        saveData(); refreshDetail();
        toast(`导入 ${imported} 条`,'success');
        $('pastePanel').classList.remove('show'); $('pasteInput').value=''; $('matchResults').innerHTML='';
    });

    $('statsMonth').addEventListener('change', updateStats);

    // 初始化
    loadData();
    $('recordDate').value = new Date().toISOString().slice(0,10);
    renderAll();
    setTimeout(()=>{
        document.querySelectorAll('.sub-records,.month-records').forEach(el=>el.classList.add('open'));
        $('expandAllBtn').textContent = '折叠全部';
    },80);
})();
</script>
</body>
</html>
