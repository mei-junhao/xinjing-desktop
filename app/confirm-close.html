<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>退出心镜</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--xj-canvas, #eef3f1);
    color: var(--xj-text, #17221f);
    overflow: hidden;
    user-select: none;
  }
  body { display: flex; align-items: center; justify-content: center; }
  .card {
    position: relative;
    width: min(360px, calc(100vw - 40px));
    background: var(--xj-surface, #fff);
    border: 1px solid var(--xj-border, #cbd6d2);
    border-radius: 8px;
    box-shadow: var(--xj-shadow, 0 16px 48px rgba(22, 38, 33, .16));
    padding: 28px 28px 24px;
  }
  .close-x {
    position: absolute; top: 14px; right: 14px;
    width: 36px; height: 36px;
    border: none; background: transparent;
    color: var(--xj-text-3, #75837e);
    cursor: pointer; border-radius: 6px;
    transition: background .15s, color .15s;
  }
  .close-x::before,.close-x::after{content:"";position:absolute;left:10px;top:17px;width:16px;height:1.5px;border-radius:2px;background:currentColor}
  .close-x::before{transform:rotate(45deg)}.close-x::after{transform:rotate(-45deg)}
  .close-x:hover { background: var(--xj-surface-muted, #f5f8f7); color: var(--xj-accent, #147d70); }
  h2 { font-size: 20px; line-height: 1.3; color: var(--xj-text, #17221f); font-weight: 680; margin-bottom: 10px; letter-spacing:0; }
  p.lead { font-size: 15px; color: var(--xj-text-2, #52615c); line-height: 1.7; margin-bottom: 16px; }
  p.lead b { color: var(--xj-text, #17221f); font-weight: 650; }
  .backup-note {
    font-size: 12px; color: var(--xj-text-2, #52615c); line-height: 1.65;
    background: var(--xj-surface-muted, #f5f8f7); border: 1px solid var(--xj-border, #cbd6d2); border-radius: 6px;
    padding: 10px 12px; margin-bottom: 20px;
  }
  .backup-note b { color: var(--xj-text, #17221f); font-weight: 600; }
  .btns { display: flex; gap: 8px; }
  button.act {
    flex: 1; min-height: 40px; padding: 0 10px; border: 1px solid var(--xj-border, #cbd6d2); border-radius: 6px;
    font-size: 14px; cursor: pointer; font-weight: 500;
    transition: transform .08s, filter .15s;
  }
  button.act:active { transform: scale(0.97); }
  .cancel,.stay { background: var(--xj-surface, #fff); color: var(--xj-text-2, #52615c); }
  .cancel:hover,.stay:hover { border-color: var(--xj-accent, #147d70); color: var(--xj-accent, #147d70); background: var(--xj-accent-soft, #dcefeb); }
  .quit { border-color: var(--xj-accent, #147d70) !important; background: var(--xj-accent, #147d70); color: #fff; }
  .quit:hover { background: var(--xj-accent-hover, #0f685d); }
</style>
<link rel="stylesheet" href="css/workbench.css">
<link rel="stylesheet" href="css/xj-ui-system.css">
</head>
<body class="xj-utility-page">
  <div class="card">
    <button class="close-x" id="x" type="button" title="取消退出（保持打开）" aria-label="取消退出（保持打开）"></button>
    <h2>要退出心镜吗？</h2>
    <p class="lead">你可以选择<b>后台常驻</b>（最小化到右下角托盘，随时点开），或<b>完全退出</b>关闭所有进程。</p>
    <div class="backup-note">完全退出后，你的数据将自动备份至：<br><b>文档\心镜备份\XinJing-时间</b>（及你在设置中自定义的其他位置）。</div>
    <div class="btns">
      <button class="act cancel" id="cancel">取消退出</button>
      <button class="act stay" id="stay">后台常驻</button>
      <button class="act quit" id="quit">完全退出</button>
    </div>
  </div>
  <script>
    (function () {
      function go(action) {
        var api = window.__XJ_CLOSE__;
        if (api && typeof api.decide === 'function') api.decide(action);
      }
      var x = document.getElementById('x');
      var c = document.getElementById('cancel');
      var s = document.getElementById('stay');
      var q = document.getElementById('quit');
      if (x) x.onclick = function () { go('cancel'); };
      if (c) c.onclick = function () { go('cancel'); };
      if (s) s.onclick = function () { go('stay'); };
      if (q) q.onclick = function () { go('quit'); };
    })();
  </script>
</body>
</html>
