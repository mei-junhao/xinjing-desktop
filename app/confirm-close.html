<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>退出心镜</title>
<link rel="stylesheet" href="css/tokens.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    font-family: var(--sans, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif);
    background: var(--bg, #f7f6f2);
    color: var(--ink, #202521);
    user-select: none;
  }
  body { display: flex; align-items: center; justify-content: center; padding: 18px; overflow: auto; }
  .card {
    position: relative;
    width: min(420px, 100%);
    background: var(--paper-2, #fff);
    border: 1px solid var(--hair, #d9d7d1);
    border-radius: 10px;
    box-shadow: var(--shadow-lg, 0 18px 42px rgba(30, 35, 31, .14));
    padding: 30px;
  }
  .close-x {
    position: absolute; top: 14px; right: 14px;
    width: 36px; height: 36px;
    border: none; background: transparent;
    color: var(--ink-3, #7c827c);
    cursor: pointer; border-radius: 7px;
    transition: background .15s, color .15s;
  }
  .close-x::before,.close-x::after{content:"";position:absolute;left:10px;top:17px;width:16px;height:1.5px;border-radius:2px;background:currentColor}
  .close-x::before{transform:rotate(45deg)}.close-x::after{transform:rotate(-45deg)}
  .close-x:hover { background: var(--accent-soft, #e2ede9); color: var(--accent, #147d70); }
  h2 { font-family: var(--serif, "Songti SC", serif); font-size: 22px; line-height: 1.3; color: var(--ink, #202521); font-weight: 600; margin-bottom: 10px; letter-spacing:0; }
  p.lead { font-size: 15px; color: var(--ink-2, #59615b); line-height: 1.7; margin-bottom: 16px; }
  p.lead b { color: var(--ink, #202521); font-weight: 650; }
  .backup-note {
    font-size: 12px; color: var(--ink-2, #59615b); line-height: 1.65;
    background: var(--bg-soft, #f1f1ed); border: 1px solid var(--hair, #d9d7d1); border-radius: 7px;
    padding: 10px 12px; margin-bottom: 20px;
  }
  .backup-note b { color: var(--ink, #202521); font-weight: 600; }
  .btns { display: flex; gap: 8px; }
  button.act {
    flex: 1; min-height: 42px; padding: 0 10px; border: 1px solid var(--hair-strong, #c8c6bf); border-radius: 7px;
    font: 500 14px var(--sans, sans-serif); cursor: pointer;
    transition: transform .08s, filter .15s;
  }
  button.act:active { transform: scale(0.97); }
  .cancel,.stay { background: var(--paper-2, #fff); color: var(--ink-2, #59615b); }
  .cancel:hover,.stay:hover { border-color: var(--accent, #147d70); color: var(--accent, #147d70); background: var(--accent-soft, #e2ede9); }
  .quit { border-color: var(--accent, #147d70) !important; background: var(--accent, #147d70); color: #fff; }
  .quit:hover { background: var(--accent-hover, #0f685d); }
  @media (max-width: 420px) {
    body { align-items: flex-start; }
    .card { padding: 26px 20px 20px; }
    .btns { flex-wrap: wrap; }
    button.act { min-width: calc(50% - 4px); }
    button.quit { flex-basis: 100%; }
  }
</style>
<link rel="stylesheet" href="css/workbench.css">
<link rel="stylesheet" href="css/xj-ui-system.css">
</head>
<body class="xj-utility-page">
  <div class="card">
    <button class="close-x" id="x" type="button" title="取消退出（保持打开）" aria-label="取消退出（保持打开）"></button>
    <h2>要退出心镜吗？</h2>
    <p class="lead">你可以选择<b>后台常驻</b>（最小化到右下角托盘，随时点开），或<b>完全退出</b>关闭所有进程。</p>
    <div class="backup-note">完全退出后，你的数据将自动备份至：<br><b>文档\心镜备份\XinJing-时间</b>（及你在设置中自定义的其他位置）。</div>
    <div class="btns">
      <button class="act cancel" id="cancel">取消退出</button>
      <button class="act stay" id="stay">后台常驻</button>
      <button class="act quit" id="quit">完全退出</button>
    </div>
  </div>
  <script>
    (function () {
      function go(action) {
        var api = window.__XJ_CLOSE__;
        if (api && typeof api.decide === 'function') api.decide(action);
      }
      var x = document.getElementById('x');
      var c = document.getElementById('cancel');
      var s = document.getElementById('stay');
      var q = document.getElementById('quit');
      if (x) x.onclick = function () { go('cancel'); };
      if (c) c.onclick = function () { go('cancel'); };
      if (s) s.onclick = function () { go('stay'); };
      if (q) q.onclick = function () { go('quit'); };
    })();
  </script>
</body>
</html>
