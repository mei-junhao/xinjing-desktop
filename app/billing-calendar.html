<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心镜 · 账单月历</title>
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/components.css">
<style>
.bc-page{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.bc-top{display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--paper-2,#fff);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.bc-top .back{font-size:13px;cursor:pointer;border:none;background:none;color:var(--ink-2);padding:4px 8px;border-radius:6px;font-family:var(--sans)}
.bc-top h2{font-family:var(--serif);font-size:18px;margin:0}
.bc-top .sp{flex:1}
.bc-top .month-nav{display:flex;align-items:center;gap:8px}
.bc-top .month-nav button{border:1px solid var(--border);background:var(--paper-2,#fff);border-radius:7px;padding:4px 10px;cursor:pointer;font:13px var(--sans);color:var(--ink-2)}
.bc-top .month-nav .current{font-family:var(--serif);font-size:16px;font-weight:600;min-width:100px;text-align:center}
.bc-body{flex:1;overflow-y:auto;padding:20px;max-width:1000px;margin:0 auto;width:100%}
.bc-overview{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.bc-ov-card{background:var(--paper-2,#fff);border:1px solid var(--border);border-radius:var(--r-card,14px);padding:14px 16px;text-align:center}
.bc-ov-card .lbl{font-size:11px;color:var(--ink-3);font-weight:600}
.bc-ov-card .val{font-family:var(--serif);font-size:26px;font-weight:700;margin-top:4px}
.bc-ov-card .val.green{color:var(--success)}
.bc-ov-card .val.red{color:var(--danger)}
.bc-ov-card .val.accent{color:var(--accent)}
.bc-calendar{border:1px solid var(--border);border-radius:var(--r-card,14px);overflow:hidden;background:var(--paper-2,#fff)}
.bc-cal-head{display:grid;grid-template-columns:repeat(7,1fr);background:var(--bg);border-bottom:1px solid var(--border)}
.bc-cal-head div{text-align:center;padding:10px 0;font-size:11px;font-weight:600;color:var(--ink-3)}
.bc-cal-body{display:grid;grid-template-columns:repeat(7,1fr)}
.bc-day{min-height:80px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:6px;cursor:pointer;transition:background .15s;position:relative}
.bc-day:nth-child(7n){border-right:none}
.bc-day:hover{background:var(--bg)}
.bc-day.other{background:var(--bg-sunken);color:var(--ink-3)}
.bc-day.today{background:var(--accent-soft)}
.bc-day .day-num{font-size:12px;font-weight:600;color:var(--ink-2)}
.bc-day.today .day-num{color:var(--accent)}
.bc-day .day-events{display:flex;flex-direction:column;gap:2px;margin-top:2px}
.bc-day .day-event{font-size:9px;padding:1px 4px;border-radius:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bc-day .day-event.in{background:rgba(111,174,143,.12);color:var(--success)}
.bc-day .day-event.out{background:rgba(217,140,140,.12);color:var(--danger)}
.bc-day .day-event.pending{background:rgba(214,168,92,.12);color:var(--orange)}
.bc-day .day-more{font-size:9px;color:var(--ink-3);text-align:center;margin-top:1px}
</style>
</head>
<body>
<div class="layout"><div id="sidebar-mount"></div><main class="main">
<div class="bc-page">
<div class="bc-top">
  <button class="back" onclick="location.href='billing-shell.html'">← 返回账单</button>
  <h2>账单月历</h2>
  <span class="sp"></span>
  <div class="month-nav">
    <button onclick="prevMonth()">‹</button>
    <span class="current" id="month-label">2026年7月</span>
    <button onclick="nextMonth()">›</button>
  </div>
  <button onclick="todayMonth()" style="border:1px solid var(--border);background:var(--paper-2,#fff);border-radius:8px;padding:6px 14px;font:12px var(--sans);cursor:pointer;color:var(--ink-2)">今天</button>
</div>
<div class="bc-body" id="bc-body"></div>
</div>
</main></div>

<script src="js/store.js"></script>
<script src="js/app.js"></script>
<script src="js/billing-calendar.js"></script>
</body>
</html>
