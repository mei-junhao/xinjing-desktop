<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心镜 · 报告中心</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <div id="sidebar-mount"></div>
    <main class="main">
      <header class="main-header">
        <div id="page-header"></div>
      </header>
      <div class="content">
        <p class="page-desc">
          总览矩阵：行=节次，列=各类产出。筛选联动；勾选节次可一键打包导出。
        </p>

        <!-- 筛选器（双层卡） -->
        <div class="filter-card">
          <div class="filter-card-head">
            <span class="filter-card-icon">筛</span>
            <span class="filter-card-label">筛选条件</span>
          </div>

          <div class="filter-row">
            <span class="flabel">来访者</span>
            <select id="filter-client-select" class="v3-select" onchange="setFilter('client',this.value)">
              <option value="all">全部来访者</option>
            </select>
            <span class="filter-count" id="client-count-hint"></span>
          </div>

          <div class="filter-row filter-row-pills">
            <span class="flabel">报告</span>
            <span class="pill active" data-rtype="all" onclick="setFilter('rtype','all')">全部</span>
            <span class="pill" data-rtype="transcript" onclick="setFilter('rtype','transcript')">逐字稿</span>
            <span class="pill" data-rtype="soap" onclick="setFilter('rtype','soap')">SOAP</span>
            <span class="pill" data-rtype="dap" onclick="setFilter('rtype','dap')">DAP</span>
            <span class="pill" data-rtype="reflection" onclick="setFilter('rtype','reflection')">反思记录</span>
          </div>

          <div class="filter-row filter-row-pills">
            <span class="flabel">督导</span>
            <span class="pill active" data-stype="all" onclick="setFilter('stype','all')">全部</span>
            <span class="pill" data-stype="individual" onclick="setFilter('stype','individual')">个体督导</span>
            <span class="pill" data-stype="group" onclick="setFilter('stype','group')">团体督导</span>
          </div>

          <div class="filter-row">
            <span class="flabel">督导师</span>
            <select id="filter-sup-select" class="v3-select" onchange="setFilter('sup',this.value)">
              <option value="all">全部督导师</option>
            </select>
          </div>
        </div>

        <!-- 表格 -->
        <div class="table-wrap filter-card">
          <table class="data-table">
            <thead>
              <tr>
                <th style="width:40px"><span class="checkbox" id="check-all" onclick="toggleCheckAll()"></span></th>
                <th>节次</th>
                <th>逐字稿</th>
                <th>临床专业报告</th>
                <th>反思记录</th>
                <th>个体督导</th>
                <th>团体督导</th>
              </tr>
            </thead>
            <tbody id="report-tbody"></tbody>
          </table>
        </div>

        <div class="table-actions">
          <span id="selected-hint">勾选节次后可一键导出</span>
          <button class="btn btn-primary" onclick="exportSelected()">打包导出</button>
        </div>
      </div>
    </main>
  </div>

  <!-- 确认对话框 -->
  <div class="modal-overlay" id="confirm-modal">
    <div class="modal" style="max-width:380px">
      <div class="modal-header"><h2>确认</h2></div>
      <div class="modal-body"><p id="confirm-message" style="font-family:var(--sans);font-size:14px;"></p></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="App.closeModal('confirm-modal')">取消</button>
        <button class="btn btn-primary" id="confirm-ok">确定</button>
      </div>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
  <script src="js/export.js"></script>
  <script src="js/reports.js"></script>
</body>
</html>
