<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心镜 · 督导</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <div id="sidebar-mount"></div>
    <main class="main">
      <header class="main-header">
        <div id="page-header"></div>
      </header>
      <div class="content">
        <div class="sup-tabs">
          <button class="sup-tab active" id="tab-manual" onclick="switchSupTab('manual')">手工记录</button>
          <button class="sup-tab" id="tab-ai" onclick="switchSupTab('ai')">AI 督导</button>
        </div>

        <!-- 手工记录面板 -->
        <div id="panel-manual">
          <div class="toolbar">
            <div class="filter-group" id="sup-type-filter">
              <span class="flabel">类型</span>
              <span class="pill active" data-type="all" onclick="setSupType('all')">全部</span>
              <span class="pill" data-type="individual" onclick="setSupType('individual')">个体督导</span>
              <span class="pill" data-type="group" onclick="setSupType('group')">团体督导</span>
            </div>
          </div>
          <div id="sup-list"></div>
        </div>

        <!-- AI 督导面板（复刻 winnicott-chat ai-supervisor：版本切换 + 整体印象 + 多轮督导对话） -->
        <div id="panel-ai" class="hidden">
          <div class="ai-sup-relative">
            <div class="ai-sup" id="ai-sup">
              <div class="ai-sup-bar">
                <div class="spv-switch">
                  <button class="spv-mode active" id="spvNvwa" onclick="switchSpvMode('nvwa')">女娲版</button>
                  <button class="spv-mode" id="spvCangjie" onclick="switchSpvMode('cangjie')">仓颉版</button>
                </div>
                <div class="spv-mode-hint" id="spvHint">女娲版教你「怎么做督导」，仓颉版告诉你「我是怎么督导的」</div>
              </div>

              <div class="ai-disclaimer">
                本 AI 督导基于温尼科特框架的方法论，<b>不能替代真人督导</b>，仅供临床参考；涉及自伤/伤人、儿童保护等危机情境，请直接联系真人督导师。
                <label class="ack"><input type="checkbox" id="aiAck"> 我已阅读并理解上述说明</label>
              </div>

              <div class="ai-material">
                <div class="ai-material-head">
                  <span>临床材料（逐字稿 / 案例报告 / 反移情困惑）</span>
                  <span class="ai-material-tools">
                    <button class="btn btn-ghost btn-sm" onclick="document.getElementById('aiFile').click()">上传 .txt/.md</button>
                    <input type="file" id="aiFile" accept=".txt,.md" style="display:none" onchange="aiHandleFile(this)">
                    <select id="aiSessionSel" class="form-control" onchange="aiLoadSession(this.value)">
                      <option value="">载入会谈…</option>
                    </select>
                  </span>
                </div>
                <textarea id="aiMaterial" class="form-control" style="min-height:170px" placeholder="粘贴逐字稿、案例报告，或描述你的反移情困惑……"></textarea>
                <div class="ai-len-tip" id="aiLenTip"></div>
              </div>

              <div class="ai-actions">
                <button class="btn btn-primary" id="aiGenBtn" onclick="generateImpression()">生成整体印象</button>
              </div>

              <div id="aiImpression" class="ai-impression hidden">
                <div class="imp-header">
                  <h3>整体印象</h3>
                  <button class="toggle-btn" onclick="toggleImpression()">收起 ▲</button>
                </div>
                <div class="imp-body" id="aiImpressionBody"></div>
              </div>

              <div id="aiChat" class="ai-chat hidden">
                <div class="chat-msgs" id="aiChatMsgs"></div>
                <div class="chat-input-row">
                  <textarea id="aiChatInput" class="form-control" rows="1" placeholder="就整体印象中的内容继续讨论……" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();aiSendChat()}"></textarea>
                  <button class="btn btn-primary" id="aiChatSend" onclick="aiSendChat()">发送</button>
                </div>
              </div>

              <div class="ai-save-row hidden" id="aiSaveRow">
                <button class="btn btn-ghost" onclick="aiSaveSupervision()">保存为督导记录</button>
              </div>
            </div>

            <div id="ai-sup-lock" class="ai-lock hidden">
              <div class="lock-inner">
                <div class="lock-emoji">🔒</div>
                <div class="lock-title">AI 督导为付费功能</div>
                <div class="lock-sub">激活后即可使用女娲版 / 仓颉版 AI 督导，输出整体印象并展开多轮督导对话。</div>
                <button class="btn btn-primary btn-sm" onclick="openActivation()">去激活</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 新增/编辑督导模态框 -->
  <div class="modal-overlay" id="sup-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="sup-modal-title">新增督导记录</h2>
        <button class="close" onclick="App.closeModal('sup-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="sv-id">
        <div class="form-row two">
          <div>
            <label class="form-label">类型</label>
            <select class="form-control" id="sv-type">
              <option value="individual">个体督导</option>
              <option value="group">团体督导</option>
            </select>
          </div>
          <div>
            <label class="form-label">督导师</label>
            <input class="form-control" id="sv-supervisor" placeholder="督导师姓名">
          </div>
        </div>
        <div class="form-row">
          <label class="form-label">日期</label>
          <input class="form-control" id="sv-date" type="date">
        </div>
        <div class="form-row">
          <label class="form-label">关联会话（可多选）</label>
          <div id="sv-sessions" style="max-height:160px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius-sm);padding:var(--gap-sm)"></div>
        </div>
        <div class="form-row">
          <label class="form-label">督导内容</label>
          <textarea class="form-control" id="sv-content" style="min-height:120px" placeholder="督导要点、讨论过程..."></textarea>
        </div>
        <div class="form-row">
          <label class="form-label">督导结论</label>
          <textarea class="form-control" id="sv-conclusion" placeholder="督导给出的结论与建议"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="App.closeModal('sup-modal')">取消</button>
        <button class="btn btn-primary" onclick="saveSupervision()">保存</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="confirm-modal">
    <div class="modal" style="max-width:380px">
      <div class="modal-header"><h2>确认</h2></div>
      <div class="modal-body"><p id="confirm-message" style="font-family:var(--sans);font-size:14px;"></p></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="App.closeModal('confirm-modal')">取消</button>
        <button class="btn btn-primary" id="confirm-ok">确定</button>
      </div>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
  <script src="js/prompts.builtin.js"></script>
  <script src="js/supervisors.js"></script>
  <script src="js/supervision-core.js"></script>
  <script src="js/supervision.js"></script>
</body>
</html>
