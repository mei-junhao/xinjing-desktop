<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心镜 · AI 督导</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    /* 页面专有布局（仅用令牌名，不粘贴 :root、不硬编码 hex） */
    .main { position: relative; }
    .ws { grid-template-columns: 1fr 6px var(--dock-w); }
    .tpl-row { flex-shrink: 0; }
    .doc-note { flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="layout"><div id="sidebar-mount"></div><main class="main">
    <div class="back-row" style="padding:18px 40px 0">
      <button class="btn-back" onclick="location.href='index.html'" title="返回上一层" aria-label="返回上一层">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M15 5l-7 7 7 7"/></svg>
        <span class="btn-back-label">返回</span>
      </button>
    </div>
    <header class="topbar">
      <div class="brand">心镜 <small>AI 督导</small></div>
      <div class="orient" id="orient">
        <button data-o="winnicott" class="active">温尼科特</button>
        <button data-o="psychoanalysis">精神分析</button>
        <button data-o="cbt">CBT</button>
        <button data-o="rogers">人本-罗杰斯</button>
        <button data-o="yalom">存在-亚隆</button>
        <button data-o="generic">通用整合</button>
      </div>
    </header>

    <div class="tpl-row">
      <span class="lbl">督导模板</span>
      <span class="chip active" data-tpl="default">默认框架</span>
      <span class="chip" data-tpl="brief">短程聚焦</span>
      <span class="chip" data-tpl="longterm">长程成长视角</span>
      <span class="chip locked" data-tpl="custom">我的自定义</span>
    </div>

    <div class="ws" id="ws">
      <div class="editor-wrap" id="editorWrap">
        <div class="editor" id="editor" contenteditable="true" data-ph="在此像编辑 Word 一样书写个案督导材料……选中文字出现格式工具栏；右侧 AI 坞可一键生成印象并直接插入。"></div>
        <div class="floating-tb" id="floatTb">
          <button data-cmd="bold"><b>B</b></button><button data-cmd="italic"><i>I</i></button>
          <button data-cmd="formatBlock" data-val="H3">H</button>
          <button data-cmd="insertUnorderedList">•</button>
          <button data-cmd="formatBlock" data-val="BLOCKQUOTE">❝</button>
        </div>
      </div>

      <div class="resizer" id="resizer"></div>

      <div class="aidock" id="aidock">
        <h3>⚙ AI 督导坞</h3>
        <div class="hint" id="dockHint"></div>
        <div class="ai-actions">
          <button class="primary" id="btnImpression"><span class="ic">✨</span> 生成整体印象（插入文档）</button>
          <button id="btnDeepen"><span class="ic">🔍</span> 就选区深化讨论</button>
          <button id="btnSummarize"><span class="ic">📝</span> 总结选区</button>
          <button id="btnPolish"><span class="ic">💡</span> 润色选区</button>
          <button id="btnMaster"><span class="ic">🗣</span> 就此议题开启大师对话</button>
          <button id="btnRealSup"><span class="ic">📼</span> 整理真人督导录音稿</button>
        </div>

        <div class="realsup" id="realsup">
          <div class="hint">粘贴真人督导录音转写稿，AI 将其结构化为督导记录字段并插入文档。</div>
          <textarea id="rsText" placeholder="粘贴转写文字稿（>=30 字）……"></textarea>
          <button class="primary" id="rsRun">结构化整理并插入</button>
        </div>
      </div>
    </div>

    <div class="doc-note">无日期字段 · 取向自选 · 内置模板 · 会员可自定义 · realsup 融入坞内 · 一键桥接大师对话 · 右侧坞可拖拽调宽</div>
    <button class="dock-toggle" id="dockToggle">收起 AI 坞</button>
  </main></div>

  <!-- 手工记录模态（保留日期字段） -->
  <div class="modal-overlay" id="sup-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="sup-modal-title">新增督导记录</h2>
        <button class="close" onclick="App.closeModal('sup-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="sv-id">
        <div class="form-row two">
          <div>
            <label class="form-label">类型</label>
            <select class="form-control" id="sv-type">
              <option value="individual">个体督导</option>
              <option value="group">团体督导</option>
            </select>
          </div>
          <div>
            <label class="form-label">督导师</label>
            <input class="form-control" id="sv-supervisor" placeholder="督导师姓名">
          </div>
        </div>
        <div class="form-row">
          <label class="form-label">日期</label>
          <input class="form-control" id="sv-date" type="date">
        </div>
        <div class="form-row">
          <label class="form-label">关联会话（可多选）</label>
          <div id="sv-sessions" style="max-height:160px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius-sm);padding:var(--gap-sm)"></div>
        </div>
        <div class="form-row">
          <label class="form-label">督导内容</label>
          <textarea class="form-control" id="sv-content" style="min-height:120px" placeholder="督导要点、讨论过程..."></textarea>
        </div>
        <div class="form-row">
          <label class="form-label">督导结论</label>
          <textarea class="form-control" id="sv-conclusion" placeholder="督导给出的结论与建议"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="App.closeModal('sup-modal')">取消</button>
        <button class="btn btn-primary" onclick="saveSupervision()">保存</button>
      </div>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
  <script src="js/prompts.builtin.js"></script>
  <script src="js/supervisors.js"></script>
  <script src="js/supervision-core.js"></script>
  <script src="vendor/mammoth.browser.min.js"></script>
  <script src="js/supervision.js"></script>
</body>
</html>
