<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心镜 · 我的资料库</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/components.css">
<style>
/* ============================================================
   我的资料库（v3.5.0-UI 复刻）— 暖色治愈系独立皮肤
   不依赖应用通用 CSS 变量，全部使用 --kb-* 自持，避免冲突
   ============================================================ */
:root, body.xj-no-sidebar {
  --kb-bg:#FAF7F2; --kb-paper:#FFFFFF; --kb-paper-2:#FBF9F5;
  --kb-ink:#2E2A26; --kb-ink-2:#5C544C; --kb-ink-3:#9A9089;
  --kb-accent:#2F8F83; --kb-accent-soft:#E3F1EE; --kb-accent-2:#277E73;
  --kb-warm:#E08D5B; --kb-warm-soft:#FBEDE3;
  --kb-border:#ECE5D9; --kb-border-2:#F3EEE6;
  --kb-serif:"Noto Serif SC","Songti SC","STSong",serif;
  --kb-sans:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  --kb-mono:"SF Mono",Menlo,Consolas,monospace;
}
body.xj-no-sidebar { background:var(--kb-bg); }
body.xj-no-sidebar .main { margin-left:0; max-width:none; padding:0; height:100%; }
body.xj-no-sidebar .content { max-width:none; width:100%; flex:1; min-height:0; display:flex; flex-direction:column; padding:0; }
.kb-page { background:var(--kb-bg); color:var(--kb-ink); font-family:var(--kb-sans); display:flex; flex-direction:column; height:100%; min-height:0; }

/* ---- 自绘标题栏（含模式切换 + 操作）---- */
.kb-head { display:flex; align-items:center; gap:14px; flex-wrap:wrap; padding:18px 28px 14px; border-bottom:1px solid var(--kb-border); background:var(--kb-paper); flex:0 0 auto; }
.kb-home { font:600 13px var(--kb-sans); color:var(--kb-ink-3); text-decoration:none; padding:6px 12px; border-radius:9px; transition:.15s; white-space:nowrap; }
.kb-home:hover { background:var(--kb-accent-soft); color:var(--kb-accent); }
.kb-htitle { font:700 19px var(--kb-serif); color:var(--kb-ink); white-space:nowrap; }
.kb-modes { display:inline-flex; flex-wrap:wrap; gap:4px; background:var(--kb-bg); padding:4px; border-radius:12px; }
.kb-mode { border:none; background:transparent; color:var(--kb-ink-2); font:600 12.5px var(--kb-sans); padding:7px 13px; border-radius:9px; cursor:pointer; display:flex; align-items:center; gap:6px; transition:.15s; white-space:nowrap; }
.kb-mode:hover { color:var(--kb-accent); }
.kb-mode.active { background:var(--kb-paper); color:var(--kb-accent); box-shadow:0 1px 4px rgba(47,143,131,.18); }
.kb-mode .mi { width:15px; height:15px; flex-shrink:0; }
.kb-head .spacer { flex:1; }
.kb-folder { font:12px var(--kb-sans); color:var(--kb-ink-3); max-width:240px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.kb-btn { border:1px solid var(--kb-border); background:var(--kb-paper); color:var(--kb-ink-2); border-radius:9px; padding:8px 14px; font:600 12.5px var(--kb-sans); cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:.15s; }
.kb-btn:hover { border-color:var(--kb-accent); color:var(--kb-accent); }
.kb-btn.primary { background:var(--kb-accent); color:#fff; border-color:var(--kb-accent); }
.kb-btn.primary:hover { background:var(--kb-accent-2); color:#fff; }

/* ---- 空/加载状态 ---- */
.kb-state { padding:80px 24px; text-align:center; color:var(--kb-ink-3); font:14px/1.8 var(--kb-sans); max-width:560px; margin:40px auto; }
.kb-state .big { font:600 19px var(--kb-serif); color:var(--kb-ink); margin-bottom:10px; }
.kb-state .kb-btn { margin-top:18px; }
.kb-spinner { width:26px; height:26px; border:3px solid var(--kb-border); border-top-color:var(--kb-accent); border-radius:50%; animation:kbspin .7s linear infinite; margin:0 auto 16px; }
@keyframes kbspin { to { transform:rotate(360deg); } }
.kb-view { flex:1 1 auto; min-height:0; overflow-y:auto; padding:24px 28px 40px; }
.kb-warn { margin:12px 28px 0; padding:11px 16px; border-radius:12px; background:var(--kb-warm-soft); border:1px solid #F0C9A8; color:#9A5A2E; font:12.5px/1.6 var(--kb-sans); }
.kb-warn b { color:#7A4420; }

/* ============================================================
   视图：概览 / 瀑布画廊（入口4）
   ============================================================ */
.kb-gallery-hero { background:linear-gradient(135deg,#E3F1EE 0%,#FAF7F2 60%); border:1px solid var(--kb-border); border-radius:20px; padding:34px 36px; margin-bottom:24px; }
.kb-gallery-hero h1 { font:700 30px var(--kb-serif); color:var(--kb-ink); margin:0 0 8px; }
.kb-gallery-hero .sub { font:13.5px var(--kb-sans); color:var(--kb-ink-3); margin-bottom:18px; }
.kb-gallery-stat { display:inline-flex; align-items:baseline; gap:8px; background:var(--kb-paper); border:1px solid var(--kb-border); border-radius:14px; padding:12px 20px; margin-bottom:18px; }
.kb-gallery-stat .n { font:800 26px var(--kb-serif); color:var(--kb-accent); line-height:1; }
.kb-gallery-stat .l { font:13px var(--kb-sans); color:var(--kb-ink-2); }
.kb-gsearch { display:flex; gap:10px; max-width:520px; }
.kb-gsearch input { flex:1; border:1px solid var(--kb-border); border-radius:12px; padding:13px 16px; font:14px var(--kb-sans); outline:none; background:var(--kb-paper); }
.kb-gsearch input:focus { border-color:var(--kb-accent); box-shadow:0 0 0 3px var(--kb-accent-soft); }
.kb-masonry { columns:3 280px; column-gap:18px; }
.kb-gcard { break-inside:avoid; background:var(--kb-paper); border:1px solid var(--kb-border); border-radius:16px; padding:18px; margin:0 0 18px; cursor:pointer; transition:.16s; display:block; overflow:hidden; }
.kb-gcard:hover { border-color:var(--kb-accent); box-shadow:0 8px 26px rgba(47,143,131,.12); transform:translateY(-2px); }
.kb-gcard .gtop { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.kb-gcard .gt { font:11px var(--kb-sans); color:var(--kb-accent); background:var(--kb-accent-soft); padding:3px 10px; border-radius:999px; }
.kb-gcard .badge { margin-left:auto; font:11px var(--kb-sans); color:var(--kb-accent-2); display:inline-flex; align-items:center; gap:4px; }
.kb-gcard .badge .dot { width:7px; height:7px; border-radius:50%; background:var(--kb-accent); display:inline-block; }
.kb-gcard .ttl { font:700 15.5px var(--kb-serif); color:var(--kb-ink); margin-bottom:8px; line-height:1.45; }
.kb-gcard .sum { font:12.5px/1.7 var(--kb-sans); color:var(--kb-ink-3); margin-bottom:12px; word-break:break-word; overflow-wrap:anywhere; }
.kb-gcard .fmeta { display:flex; align-items:center; gap:10px; font:11px var(--kb-sans); color:var(--kb-ink-3); }
.kb-gcard .ftype { text-transform:uppercase; font-weight:700; color:var(--kb-warm); border:1px solid var(--kb-warm-soft); background:var(--kb-warm-soft); padding:1px 7px; border-radius:6px; }

/* ============================================================
   视图 02 — 卡片（分类筛选 + 搜索 + 注入徽章）
   ============================================================ */
.kb-filter { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
.kb-chip { border:1px solid var(--kb-border); background:var(--kb-paper); color:var(--kb-ink-2); border-radius:999px; padding:6px 14px; font:12.5px var(--kb-sans); cursor:pointer; transition:.15s; }
.kb-chip:hover { border-color:var(--kb-accent); color:var(--kb-accent); }
.kb-chip.active { background:var(--kb-accent); color:#fff; border-color:var(--kb-accent); }
.kb-toolrow { display:flex; gap:12px; margin-bottom:20px; align-items:center; }
.kb-toolrow input { flex:1; border:1px solid var(--kb-border); border-radius:11px; padding:11px 15px; font:13.5px var(--kb-sans); outline:none; background:var(--kb-paper); }
.kb-toolrow input:focus { border-color:var(--kb-accent); }
.kb-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:16px; }
.kb-card { border:1px solid var(--kb-border); border-radius:16px; padding:18px; background:var(--kb-paper); cursor:pointer; transition:.16s; display:flex; flex-direction:column; min-height:155px; overflow:hidden; }
.kb-card:hover { border-color:var(--kb-accent); box-shadow:0 8px 22px rgba(47,143,131,.1); transform:translateY(-2px); }
.kb-card .cat { align-self:flex-start; font:11px var(--kb-sans); padding:3px 10px; border-radius:999px; margin-bottom:10px; }
.kb-card .t { font:700 15px var(--kb-serif); color:var(--kb-ink); margin-bottom:8px; line-height:1.45; }
.kb-card .s { font:12.5px/1.7 var(--kb-sans); color:var(--kb-ink-3); flex:1; overflow:hidden; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; word-break:break-word; overflow-wrap:anywhere; }
.kb-card .f { font:11px var(--kb-sans); color:var(--kb-ink-3); margin-top:12px; display:flex; justify-content:space-between; align-items:center; }
.kb-card .f .injected { color:var(--kb-accent-2); display:inline-flex; align-items:center; gap:4px; }
.kb-card .f .injected .dot { width:6px; height:6px; border-radius:50%; background:var(--kb-accent); }

/* ============================================================
   视图 01 — 三栏（分类树 / 文件列表 / 阅读器 + 注入 badge）
   ============================================================ */
.kb-3col { display:grid; grid-template-columns:190px 250px 1fr; gap:0; border:1px solid var(--kb-border); border-radius:16px; overflow:hidden; height:100%; min-height:420px; background:var(--kb-paper); }
.kb-3col .col { overflow-y:auto; padding:16px; }
.kb-3col .c-tree { border-right:1px solid var(--kb-border); background:var(--kb-paper-2); }
.kb-3col .c-list { border-right:1px solid var(--kb-border); }
.kb-catnode { font:13px var(--kb-sans); color:var(--kb-ink-2); padding:8px 10px; border-radius:9px; cursor:pointer; display:flex; align-items:center; gap:8px; margin-bottom:4px; transition:.12s; }
.kb-catnode:hover { background:var(--kb-accent-soft); }
.kb-catnode.active { background:var(--kb-accent-soft); color:var(--kb-accent); font-weight:600; }
.kb-catnode .cdot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.kb-catnode .cnt { margin-left:auto; font:11px var(--kb-sans); color:var(--kb-ink-3); }
.kb-li { padding:11px 12px; border-radius:11px; cursor:pointer; margin-bottom:7px; border:1px solid transparent; transition:.12s; }
.kb-li:hover { background:var(--kb-paper-2); }
.kb-li.active { background:var(--kb-accent-soft); border-color:var(--kb-accent); }
.kb-li .t { font:600 13.5px var(--kb-sans); color:var(--kb-ink); margin-bottom:4px; line-height:1.4; display:flex; align-items:center; gap:7px; }
.kb-li .t .bar { width:4px; height:14px; border-radius:2px; flex-shrink:0; }
.kb-li .m { font:11px var(--kb-sans); color:var(--kb-ink-3); }
.kb-detail h2 { font:700 21px var(--kb-serif); color:var(--kb-ink); margin:0 0 8px; }
.kb-inject-badge { display:inline-flex; align-items:center; gap:6px; font:12px var(--kb-sans); color:var(--kb-accent-2); background:var(--kb-accent-soft); padding:5px 12px; border-radius:999px; margin-bottom:14px; }
.kb-inject-badge .dot { width:7px; height:7px; border-radius:50%; background:var(--kb-accent); }
.kb-detail .meta { font:12px var(--kb-sans); color:var(--kb-ink-3); margin-bottom:16px; display:flex; gap:14px; flex-wrap:wrap; }
.kb-detail .footer { margin-top:24px; padding-top:16px; border-top:1px dashed var(--kb-border); font:12px var(--kb-sans); color:var(--kb-ink-3); line-height:1.7; }
.kb-md { font:14.5px/1.9 var(--kb-sans); color:var(--kb-ink); word-wrap:break-word; }
.kb-md h1,.kb-md h2,.kb-md h3,.kb-md h4 { font-family:var(--kb-serif); color:var(--kb-ink); margin:1.2em 0 .5em; line-height:1.4; }
.kb-md h1{font-size:23px}.kb-md h2{font-size:19px}.kb-md h3{font-size:16px}.kb-md h4{font-size:14.5px}
.kb-md p{margin:.6em 0}.kb-md ul,.kb-md ol{margin:.6em 0;padding-left:1.6em}
.kb-md code{background:var(--kb-paper-2);padding:1px 5px;border-radius:4px;font-family:var(--kb-mono);font-size:.9em}
.kb-md pre{background:var(--kb-paper-2);padding:12px 14px;border-radius:10px;overflow-x:auto;margin:.8em 0}
.kb-md pre code{background:none;padding:0}
.kb-md blockquote{border-left:3px solid var(--kb-accent);padding-left:14px;color:var(--kb-ink-2);margin:.8em 0}
.kb-md a{color:var(--kb-accent)}
.kb-md mark{background:#FFE08A;color:#6B4A00;padding:0 2px;border-radius:3px}

/* ============================================================
   视图 03 — 属性表（Notion 风 + 彩色分类 + 相对时间 + 已注入 + 格式）
   ============================================================ */
.kb-notionbar { display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
.kb-notionbar input { flex:1; min-width:200px; border:1px solid var(--kb-border); border-radius:10px; padding:9px 13px; font:13px var(--kb-sans); outline:none; background:var(--kb-paper); }
.kb-notionbar input:focus { border-color:var(--kb-accent); }
.kb-ntable-wrap { border:1px solid var(--kb-border); border-radius:14px; overflow:hidden; background:var(--kb-paper); }
.kb-ntable { width:100%; border-collapse:collapse; font:13px var(--kb-sans); }
.kb-ntable th { text-align:left; padding:12px 14px; border-bottom:1px solid var(--kb-border); color:var(--kb-ink-2); font-weight:600; background:var(--kb-paper-2); cursor:pointer; white-space:nowrap; position:sticky; top:0; }
.kb-ntable th:hover { color:var(--kb-accent); }
.kb-ntable td { padding:11px 14px; border-bottom:1px solid var(--kb-border-2); color:var(--kb-ink-2); vertical-align:middle; }
.kb-ntable tbody tr { cursor:pointer; transition:.1s; }
.kb-ntable tbody tr:hover { background:var(--kb-paper-2); }
.kb-ntable .tt { font-weight:600; color:var(--kb-ink); }
.kb-ntable .rel { color:var(--kb-ink-3); font-size:12px; }
.kb-pill { font:11px var(--kb-sans); padding:3px 11px; border-radius:999px; display:inline-block; }
.kb-inj { color:var(--kb-accent-2); font-weight:700; }
.kb-inj.no { color:var(--kb-ink-3); }
.kb-fmt { font:11px var(--kb-sans); font-weight:700; text-transform:uppercase; padding:2px 8px; border-radius:6px; }
.kb-ntable-sum { padding:12px 16px; font:12.5px var(--kb-sans); color:var(--kb-ink-3); background:var(--kb-paper-2); }

/* ============================================================
   视图 10 — 统计（KPI + 分类条形 + 格式环形图 + 关键词 + 6 处注入）
   ============================================================ */
.kb-kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:16px; margin-bottom:26px; }
.kb-kpi { border:1px solid var(--kb-border); border-radius:16px; padding:20px 22px; background:var(--kb-paper); }
.kb-kpi .n { font:800 30px var(--kb-serif); color:var(--kb-accent); line-height:1.1; }
.kb-kpi .l { font:12.5px var(--kb-sans); color:var(--kb-ink-3); margin-top:8px; }
.kb-stat-grid { display:grid; grid-template-columns:1.4fr 1fr; gap:20px; margin-bottom:20px; }
.kb-cardbox { border:1px solid var(--kb-border); border-radius:16px; padding:22px; background:var(--kb-paper); }
.kb-cardbox h3 { font:700 15px var(--kb-serif); color:var(--kb-ink); margin:0 0 18px; }
.kb-bar { display:flex; align-items:center; gap:12px; margin-bottom:11px; }
.kb-bar .lb { font:12.5px var(--kb-sans); color:var(--kb-ink-2); width:108px; text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex-shrink:0; display:flex; align-items:center; gap:6px; justify-content:flex-end; }
.kb-bar .lb .cdot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.kb-bar .track { flex:1; height:22px; background:var(--kb-bg); border-radius:7px; overflow:hidden; }
.kb-bar .fill { height:100%; border-radius:7px; transition:width .4s; }
.kb-bar .vv { font:12px var(--kb-sans); color:var(--kb-ink-3); width:40px; flex-shrink:0; }
.kb-donut-wrap { display:flex; align-items:center; gap:18px; }
.kb-donut { flex-shrink:0; }
.kb-donut-legend { font:12.5px var(--kb-sans); color:var(--kb-ink-2); }
.kb-donut-legend .row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.kb-donut-legend .cdot { width:10px; height:10px; border-radius:3px; }
.kb-donut-legend .vv { margin-left:auto; color:var(--kb-ink-3); }
.kb-kw { display:flex; flex-wrap:wrap; gap:8px; }
.kb-kw span { font:12.5px var(--kb-sans); background:var(--kb-accent-soft); color:var(--kb-accent-2); padding:5px 12px; border-radius:999px; }
.kb-cover-list { list-style:none; padding:0; margin:0; }
.kb-cover-list li { display:flex; align-items:flex-start; gap:10px; padding:10px 0; border-bottom:1px dashed var(--kb-border-2); font:13px/1.6 var(--kb-sans); color:var(--kb-ink-2); }
.kb-cover-list li:last-child { border-bottom:none; }
.kb-cover-list .num { width:22px; height:22px; border-radius:50%; background:var(--kb-accent-soft); color:var(--kb-accent-2); font:700 12px var(--kb-sans); display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; }

/* ============================================================
   视图 07 — 搜索（Hero + 提示 chip + 位置高亮）
   ============================================================ */
.kb-search-hero { text-align:center; padding:30px 0 26px; }
.kb-search-hero h2 { font:700 24px var(--kb-serif); color:var(--kb-ink); margin:0 0 8px; }
.kb-search-hero p { font:13px var(--kb-sans); color:var(--kb-ink-3); margin-bottom:18px; }
.kb-search-hero .sbar { display:flex; max-width:560px; margin:0 auto 14px; }
.kb-search-hero .sbar input { flex:1; border:1px solid var(--kb-border); border-radius:12px; padding:14px 18px; font:15px var(--kb-sans); outline:none; background:var(--kb-paper); }
.kb-search-hero .sbar input:focus { border-color:var(--kb-accent); box-shadow:0 0 0 3px var(--kb-accent-soft); }
.kb-chips { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
.kb-chips .c { font:12px var(--kb-sans); color:var(--kb-ink-3); background:var(--kb-paper); border:1px solid var(--kb-border); border-radius:999px; padding:5px 12px; cursor:pointer; transition:.12s; }
.kb-chips .c:hover { color:var(--kb-accent); border-color:var(--kb-accent); }
.kb-search-stat { font:12.5px var(--kb-sans); color:var(--kb-ink-3); margin:6px 0 16px; }
.kb-hit { padding:14px 16px; border:1px solid var(--kb-border); border-radius:12px; margin-bottom:10px; cursor:pointer; background:var(--kb-paper); transition:.12s; }
.kb-hit:hover { border-color:var(--kb-accent); background:var(--kb-paper-2); }
.kb-hit .h { display:flex; justify-content:space-between; font:12px var(--kb-sans); color:var(--kb-ink-3); margin-bottom:6px; }
.kb-hit .h .fn { font-weight:600; color:var(--kb-accent-2); }
.kb-hit .sn { font:13.5px/1.7 var(--kb-sans); color:var(--kb-ink); }
.kb-hit .sn mark { background:#FFE08A; color:#6B4A00; padding:0 2px; border-radius:3px; }

/* ============================================================
   视图 06 — 沉浸阅读（TOC + 进度条）
   ============================================================ */
.kb-read { display:flex; flex-direction:column; height:100%; min-height:420px; }
.kb-read .toc { overflow-y:auto; border-right:1px solid var(--kb-border); padding-right:16px; }
.kb-read .toc .toc-file { font:600 13px var(--kb-sans); color:var(--kb-ink-3); margin-bottom:10px; }
.kb-read .toc a { display:block; font:12.5px/1.5 var(--kb-sans); color:var(--kb-ink-2); padding:4px 8px; border-radius:6px; cursor:pointer; text-decoration:none; margin-bottom:2px; }
.kb-read .toc a:hover { background:var(--kb-accent-soft); color:var(--kb-accent); }
.kb-read .toc a.h2 { padding-left:18px; } .kb-read .toc a.h3 { padding-left:30px; font-size:12px; } .kb-read .toc a.h4 { padding-left:40px; font-size:11.5px; }
.kb-read .toc a.active { background:var(--kb-accent-soft); color:var(--kb-accent); font-weight:600; }
.kb-read .reader { overflow-y:auto; max-width:none; padding:0 28px 80px; }
.kb-progress { position:fixed; top:0; left:0; height:3px; background:var(--kb-accent); z-index:50; transition:width .1s; }
.kb-read .picker { margin-bottom:18px; }
.kb-read select { border:1px solid var(--kb-border); border-radius:9px; padding:8px 12px; font:13px var(--kb-sans); background:var(--kb-paper); width:100%; outline:none; }

/* ============================================================
   视图 05 — 知识图谱（文档 + 概念节点，点击弹面板）
   ============================================================ */
.kb-graph { border:1px solid var(--kb-border); border-radius:16px; background:var(--kb-paper); height:100%; min-height:420px; overflow:hidden; position:relative; }
.kb-graph svg { width:100%; height:100%; display:block; }
.kb-graph .legend { position:absolute; top:12px; left:12px; font:11px var(--kb-sans); color:var(--kb-ink-3); background:var(--kb-paper); border:1px solid var(--kb-border); border-radius:8px; padding:8px 12px; z-index:5; }
.kb-graph .legend .nd { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:5px; vertical-align:middle; }
.kb-gpop { position:absolute; z-index:10; background:var(--kb-paper); border:1px solid var(--kb-border); border-radius:12px; padding:14px 16px; box-shadow:0 10px 30px rgba(0,0,0,.12); max-width:280px; }
.kb-gpop .pt { font:600 13.5px var(--kb-serif); color:var(--kb-ink); margin-bottom:6px; }
.kb-gpop .pd { font:12px/1.6 var(--kb-sans); color:var(--kb-ink-3); margin-bottom:10px; }
.kb-gpop .plist { list-style:none; margin:0 0 10px; padding:0; }
.kb-gpop .plist li { font:12px var(--kb-sans); color:var(--kb-ink-2); padding:3px 0; cursor:pointer; }
.kb-gpop .plist li:hover { color:var(--kb-accent); }

/* ============================================================
   视图 09 — 资料对话（参考资料侧栏 + 引用开关）
   ============================================================ */
.kb-chat-wrap { display:grid; grid-template-columns:260px 1fr; gap:0; height:100%; min-height:420px; border:1px solid var(--kb-border); border-radius:16px; overflow:hidden; background:var(--kb-paper); }
.kb-refs { border-right:1px solid var(--kb-border); overflow-y:auto; padding:16px; background:var(--kb-paper-2); }
.kb-refs h4 { font:600 13px var(--kb-sans); color:var(--kb-ink-3); margin:0 0 12px; }
.kb-ref { display:flex; align-items:flex-start; gap:9px; padding:9px 10px; border-radius:10px; cursor:pointer; margin-bottom:5px; transition:.12s; }
.kb-ref:hover { background:var(--kb-paper); }
.kb-ref .ck { width:16px; height:16px; border:1.5px solid var(--kb-border); border-radius:5px; flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; font-size:11px; color:#fff; }
.kb-ref.on .ck { background:var(--kb-accent); border-color:var(--kb-accent); }
.kb-ref .rn { font:12.5px var(--kb-sans); color:var(--kb-ink-2); line-height:1.4; }
.kb-refs .rall { font:12px var(--kb-sans); color:var(--kb-accent); cursor:pointer; margin-bottom:12px; display:inline-block; }
.kb-chat { display:flex; flex-direction:column; height:100%; }
.kb-chat .stream { flex:1; overflow-y:auto; padding:22px; display:flex; flex-direction:column; gap:14px; }
.kb-msg { font:14px/1.75 var(--kb-sans); padding:12px 16px; border-radius:14px; max-width:82%; }
.kb-msg.ai { background:var(--kb-accent-soft); align-self:flex-start; border-bottom-left-radius:4px; color:var(--kb-ink); }
.kb-msg.me { background:var(--kb-accent); color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
.kb-msg .cites { margin-top:10px; padding-top:8px; border-top:1px dashed var(--kb-border); font:11.5px var(--kb-sans); color:var(--kb-ink-3); }
.kb-msg .cites b { color:var(--kb-accent-2); }
.kb-chat .cbar { display:flex; gap:10px; padding:14px 16px; border-top:1px solid var(--kb-border); }
.kb-chat .cbar input { flex:1; border:1px solid var(--kb-border); border-radius:11px; padding:11px 15px; font:14px var(--kb-sans); outline:none; background:var(--kb-paper); }
.kb-chat .cbar input:focus { border-color:var(--kb-accent); }
.kb-chat .cbar button { background:var(--kb-accent); color:#fff; border:none; border-radius:11px; padding:11px 20px; font:600 13px var(--kb-sans); cursor:pointer; }
.kb-lock { padding:50px 24px; text-align:center; color:var(--kb-ink-3); font:14px/1.8 var(--kb-sans); }
.kb-lock .kb-btn { margin-top:16px; }
</style>
