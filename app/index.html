<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心镜 · 首页</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="layout">
    <div id="sidebar-mount"></div>
    <main class="main">
      <header class="main-header">
        <div id="page-header"></div>
      </header>
      <div class="content">
        <!-- 统计卡片 -->
        <div class="cards" id="stat-grid">
          <div class="card">
            <b id="stat-receivable">¥0</b>
            <span>本月应收</span>
          </div>
          <div class="card">
            <b id="stat-received">¥0</b>
            <span>本月已收</span>
          </div>
          <div class="card owe">
            <b id="stat-pending-clients">0</b>
            <span>待收来访者</span>
          </div>
          <div class="card">
            <b id="stat-active-clients">0</b>
            <span>活跃来访者</span>
          </div>
        </div>

        <!-- 快捷操作 -->
        <div class="card" style="margin-bottom:var(--gap-lg)">
          <div class="section-title">快捷操作</div>
          <div class="actions">
            <button class="btn btn-primary" id="qa-supervise">AI 督导</button>
            <button class="btn btn-primary" id="qa-masters">大师对话</button>
            <button class="btn btn-primary" id="qa-update">检查更新</button>
          </div>
        </div>

        <!-- 两栏：最近会谈 / 最近报告 -->
        <div class="two-column">
          <div>
            <div class="section-title">最近会谈 <span class="count" id="recent-sessions-count"></span></div>
            <div id="recent-sessions"></div>
          </div>
          <div>
            <div class="section-title">最近报告 <span class="count" id="recent-reports-count"></span></div>
            <div id="recent-reports"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 新建来访者模态框 -->
  <div class="modal-overlay" id="client-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>新建来访者</h2>
        <button class="close" onclick="App.closeModal('client-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label class="form-label">姓名 / 化名 <span style="color:var(--red)">*</span></label>
          <input class="form-control" id="c-name" placeholder="如：小A / 阿拉伯">
        </div>
        <div class="form-row two">
          <div>
            <label class="form-label">性别</label>
            <select class="form-control" id="c-gender">
              <option value="unknown">未填</option>
              <option value="female">女</option>
              <option value="male">男</option>
              <option value="other">其他</option>
            </select>
          </div>
          <div>
            <label class="form-label">出生日期</label>
            <input class="form-control" id="c-birth" type="date">
          </div>
        </div>
        <div class="form-row two">
          <div>
            <label class="form-label">联系电话</label>
            <input class="form-control" id="c-phone" placeholder="选填">
          </div>
          <div>
            <label class="form-label">首访日期</label>
            <input class="form-control" id="c-firstvisit" type="date">
          </div>
        </div>
        <div class="form-row">
          <label class="form-label">标签（逗号分隔）</label>
          <input class="form-control" id="c-tags" placeholder="如：成人个体, 焦虑">
        </div>
        <div class="form-row">
          <label class="form-label">备注</label>
          <textarea class="form-control" id="c-notes" placeholder="背景信息摘要、转介来源等"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="App.closeModal('client-modal')">取消</button>
        <button class="btn btn-primary" onclick="saveNewClient()">保存</button>
      </div>
    </div>
  </div>

  <!-- 确认对话框 -->
  <div class="modal-overlay" id="confirm-modal">
    <div class="modal" style="max-width:380px">
      <div class="modal-header">
        <h2>确认</h2>
      </div>
      <div class="modal-body">
        <p id="confirm-message" style="font-family:var(--sans);font-size:14px;"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="App.closeModal('confirm-modal')">取消</button>
        <button class="btn btn-primary" id="confirm-ok">确定</button>
      </div>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
