<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心镜 · 真人督导 AI 分析</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/agent.css">
<style>
.xj-tier-badge{display:inline-flex;align-items:center;gap:4px;font:600 11px var(--sans);padding:2px 8px;border-radius:999px}
.xj-tier-badge.pro{background:rgba(214,168,92,.15);color:var(--orange);border:1px solid rgba(214,168,92,.25)}
.xj-premium-btn{position:relative}
.xj-premium-btn::after{content:'🔒';font-size:9px;position:absolute;top:2px;right:4px;opacity:.6}
.xj-locked-area{position:relative}
.xj-locked-area>.xj-lock-overlay{position:absolute;inset:0;z-index:10;background:rgba(246,248,252,.78);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;border-radius:var(--r-card);font:500 13px var(--sans);color:var(--ink-3);pointer-events:auto}
.xj-locked-area>.xj-lock-overlay::before{content:"🔒";margin-right:6px;font-size:14px;opacity:.7}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
.preview-bar{display:flex;align-items:center;gap:8px;padding:8px 20px;background:linear-gradient(90deg,var(--accent-soft),rgba(214,168,92,.08));border-bottom:1px solid var(--border);font-size:12px;color:var(--ink-2);flex-shrink:0}
.preview-bar .sp{flex:1}
.rs-top{display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--paper-2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.rs-top .back{font:13px var(--sans);cursor:pointer;border:none;background:none;color:var(--ink-2);padding:4px 8px;border-radius:6px}
.rs-top h2{font-family:var(--serif);font-size:18px;margin:0}
.rs-top h2 .sub{font:400 11px var(--sans);color:var(--ink-3);margin-left:6px}
.rs-top .sp{flex:1}
.rs-top select{border:1px solid var(--border);border-radius:8px;padding:5px 10px;font:12px var(--sans);background:var(--paper-2);color:var(--text)}
.rs-body{flex:1;display:grid;grid-template-columns:280px 1fr 340px;min-height:0;overflow:hidden}
.rs-left{background:var(--paper-2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.rs-left .lh-head{padding:14px 16px;border-bottom:1px solid var(--border);font:600 14px var(--serif);flex-shrink:0}
.rs-left .lh-list{flex:1;overflow-y:auto;padding:8px}
.rs-left .lh-item{padding:10px 12px;border-radius:8px;cursor:pointer;font:12.5px/1.5 var(--sans);margin-bottom:4px;transition:all .15s}
.rs-left .lh-item:hover{background:var(--hover-tint)}
.rs-left .lh-item.active{background:var(--accent-soft);border:1px solid var(--accent)}
.rs-left .lh-item .s-name{font-weight:600;color:var(--accent)}
.rs-left .lh-item .s-date{font:11px var(--sans);color:var(--ink-3)}
.rs-left .lh-item .s-preview{font:11px var(--sans);color:var(--ink-2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rs-mid{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.rs-mid .m-head{padding:14px 16px;border-bottom:1px solid var(--border);background:var(--paper-2);flex-shrink:0;display:flex;align-items:center;gap:8px}
.rs-mid .m-head .title{font:600 14px var(--serif)}
.rs-mid .m-head .badge{font:10px var(--sans);padding:2px 8px;border-radius:5px;background:var(--accent-soft);color:var(--accent)}
.rs-mid .m-head .sp{flex:1}
.qa-list{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.qa-pair{background:var(--paper-2);border:1px solid var(--border);border-radius:var(--r-card);overflow:hidden;transition:var(--transition)}
.qa-pair:hover{border-color:var(--accent-line)}
.qa-pair .qa-q{padding:12px 14px;background:var(--accent-soft);border-bottom:1px solid var(--border)}
.qa-pair .qa-q .label{font:600 10px var(--sans);color:var(--accent);letter-spacing:.05em;margin-bottom:3px}
.qa-pair .qa-q .text{font:13px/1.7 var(--sans);color:var(--ink)}
.qa-pair .qa-a{padding:12px 14px;border-bottom:1px solid var(--border)}
.qa-pair .qa-a .label{font:600 10px var(--sans);color:var(--green);letter-spacing:.05em;margin-bottom:3px}
.qa-pair .qa-a .text{font:13px/1.7 var(--sans);color:var(--ink)}
.qa-pair .qa-a .text .hl{color:var(--accent);font-weight:600}
.qa-pair .qa-source{padding:10px 14px;background:var(--bg-soft);font:11px/1.6 var(--sans);color:var(--ink-2)}
.qa-pair .qa-source .src-label{font-weight:600;color:var(--purple);margin-right:4px}
.qa-pair .qa-tags{display:flex;gap:5px;flex-wrap:wrap;padding:8px 14px}
.qa-pair .qa-tags .tag{font:10px var(--sans);padding:2px 7px;border-radius:4px;background:var(--bg-sunken);color:var(--ink-3)}
.qa-pair .qa-tags .tag.knowledge{background:rgba(139,147,199,.12);color:var(--accent)}
.qa-pair .qa-tags .tag.technique{background:rgba(111,174,143,.12);color:var(--green)}
.rs-right{background:var(--paper-2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.rs-right .rr-head{padding:14px 16px;border-bottom:1px solid var(--border);font:600 14px var(--serif);flex-shrink:0}
.rs-right .rr-body{flex:1;overflow-y:auto;padding:16px}
.insight-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.insight-card .i-head{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.insight-card .i-head .i-icon{font-size:16px}
.insight-card .i-head .i-title{font:600 12px var(--sans);color:var(--ink)}
.insight-card .i-list{list-style:none;padding:0;margin:0}
.insight-card .i-list li{font:12px/1.7 var(--sans);color:var(--ink-2);padding:4px 0;border-bottom:1px dashed var(--border)}
.insight-card .i-list li:last-child{border:none}
.rs-right .rr-action{padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0}
.rs-right .rr-action button{width:100%;border:none;background:var(--accent);color:#fff;border-radius:8px;padding:10px;font:13px var(--sans);cursor:pointer;margin-bottom:8px}
.rs-right .rr-action button:disabled{opacity:.5;cursor:not-allowed}
.rs-right .rr-action button.ghost{background:var(--paper-2);border:1px solid var(--border);color:var(--ink-2)}
</style>
</head>
<body>

<div class="preview-bar" id="preview-bar" style="display:none">
  <span>🔒</span>
  <span>会员预览模式 · 这是 <span class="xj-tier-badge pro">会员</span> <b>真人督导 AI 分析</b> 会员增值功能，升级 <span id="pv-badge" class="xj-tier-badge pro" style="display:inline">会员</span> 后启用问答分析+知识来源追溯</span>
  <span class="sp"></span>
  <span style="font:11px var(--sans);color:var(--ink-3)">基础版 → <a href="real-supervision.html" style="color:var(--accent)">返回</a></span>
</div>

<div class="rs-top">
  <button class="back" onclick="location.href='real-supervision.html'">← 返回基础版</button>
  <h2>真人督导 AI 分析 <span class="sub">· 会员版E · 问题↔回答↔知识来源</span></h2>
  <span class="sp"></span>
  <select id="sel-client" onchange="loadRecords()"><option value="">选择来访者…</option></select>
  <span id="tier-badge" class="xj-tier-badge pro" style="display:none">会员</span>
</div>

<div class="rs-body">

  <div class="rs-left">
    <div class="lh-head">📋 督导记录</div>
    <div class="lh-list" id="history-list">
      <div style="font:12px var(--sans);color:var(--ink-3);text-align:center;padding:24px">选择来访者后加载</div>
    </div>
  </div>

  <div class="rs-mid">
    <div class="m-head">
      <span class="title">🔍 问答 AI 分析流</span>
      <span class="badge" id="qa-count">0 组</span>
      <span class="sp"></span>
      <button id="btn-reanalyze" class="xj-premium-btn" style="border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:7px;padding:4px 12px;font:11px var(--sans)" disabled onclick="analyzeCurrent()">重新分析</button>
    </div>
    <div class="qa-list" id="qa-body">
      <div style="font:13px var(--sans);color:var(--ink-3);text-align:center;padding:40px 20px">选择左侧督导记录<br>AI 将分析问答流并追溯知识来源</div>
    </div>
  </div>

  <div class="rs-right">
    <div class="rr-head">🤖 AI 结构化分析</div>
    <div class="rr-body" id="insight-body">
      <div class="xj-locked-area" id="insight-locked" style="min-height:300px">
        <div class="xj-lock-overlay">🔒 AI 深度分析</div>
        <div class="insight-card"><div class="i-head"><span class="i-icon">🎯</span><span class="i-title">核心议题</span></div><ul class="i-list"><li>等待分析…</li></ul></div>
        <div class="insight-card"><div class="i-head"><span class="i-icon">🛠</span><span class="i-title">督导技术</span></div><ul class="i-list"><li>等待分析…</li></ul></div>
        <div class="insight-card"><div class="i-head"><span class="i-icon">📚</span><span class="i-title">理论锚点</span></div><ul class="i-list"><li>等待分析…</li></ul></div>
      </div>
    </div>
    <div class="rr-action">
      <button id="btn-reanalyze2" class="xj-premium-btn" disabled onclick="analyzeCurrent()">🔄 重新分析</button>
      <button class="ghost" id="btn-export" disabled onclick="exportReport()">📋 导出分析报告</button>
    </div>
  </div>

</div>

<script src="js/store.js"></script><script src="js/entitlements.js"></script><script src="js/ai.js"></script><script src="js/agent-tools.js"></script><script src="js/agent-core.js"></script><script src="js/page-hints.js"></script><script src="js/icon-system.js"></script><script src="js/xinjing-chat.js"></script><script src="js/app.js"></script>
<script>
App.initPage({ title: '真人督导 · AI分析', onReady: function () {
  'use strict';
  var isMember = typeof App !== 'undefined' && App.featureGate && App.featureGate('real-sup-ai');
  var previewBar = document.getElementById('preview-bar');
  if (isMember) {
    previewBar.style.display = 'none';
    document.getElementById('tier-badge').style.display = 'inline-flex';
    document.querySelectorAll('.xj-premium-btn').forEach(function (b) { b.disabled = false; });
    document.getElementById('btn-export').disabled = false;
    var locked = document.getElementById('insight-locked');
    if (locked) { locked.classList.remove('xj-locked-area'); locked.querySelector('.xj-lock-overlay').style.display = 'none'; }
  } else {
    previewBar.style.display = 'flex';
  }

  // 来访者列表
  var sel = document.getElementById('sel-client');
  Store.getClients().forEach(function (c) {
    var opt = document.createElement('option');
    opt.value = c.id; opt.textContent = c.name;
    sel.appendChild(opt);
  });

  window.loadRecords = function () {
    var clientId = sel.value;
    var list = document.getElementById('history-list');
    if (!clientId) { list.innerHTML = '<div style="font:12px var(--sans);color:var(--ink-3);text-align:center;padding:24px">选择来访者</div>'; return; }
    var records = Store.getSupervisionsByClient ? Store.getSupervisionsByClient(clientId) : [];
    if (!records.length) {
      list.innerHTML = '<div style="font:12px var(--sans);color:var(--ink-3);text-align:center;padding:24px">暂无督导记录</div>';
      return;
    }
    list.innerHTML = records.map(function (r, i) {
      return '<div class="lh-item' + (i === 0 ? ' active' : '') + '" onclick="selectRecord(\'' + r.id + '\')" data-id="' + r.id + '">' +
        '<div class="s-name">' + App.escapeHtml(r.supervisorName || '督导') + '</div>' +
        '<div class="s-date">' + App.formatDate(r.date) + '</div>' +
        '<div class="s-preview">' + App.escapeHtml((r.content || '').slice(0, 60)) + '</div></div>';
    }).join('');
    if (records.length > 0) selectRecord(records[0].id);
  };

  window.selectRecord = function (id) {
    document.querySelectorAll('.lh-item').forEach(function (el) { el.classList.toggle('active', el.dataset.id === id); });
    if (isMember) analyzeRecord(id);
  };

  function analyzeRecord(id) {
    var record = Store.getSupervision ? Store.getSupervision(id) : null;
    if (!record) return;
    var qaBody = document.getElementById('qa-body');
    qaBody.innerHTML = '<div style="font:13px var(--sans);color:var(--ink-3);text-align:center;padding:20px">AI 分析中…</div>';
    var content = record.content || '';
    var sys = '你是心理咨询督导分析专家。请分析以下督导记录中的问答，提取：1)咨询师提问 2)督导回答 3)知识来源/理论锚点 4)督导技术。输出 JSON：{"pairs":[{"question":"…","answer":"…","tags":["标签"],"knowledgeSource":"理论来源"},…],"insights":{"coreIssues":["议题"],"techniques":["技术"],"theories":["理论锚点"],"suggestions":["建议"]}}。只输出 JSON。';
    AI.send([{ role: 'system', content: sys }, { role: 'user', content: content }], function (res) {
      if (res && res.content && !res.error) {
        try {
          var json = JSON.parse(res.content.replace(/^```json\s*/i, '').replace(/```\s*$/i, ''));
          var pairs = json.pairs || [];
          var insights = json.insights || {};
          // 问答流
          var html = '';
          pairs.forEach(function (p) {
            html += '<div class="qa-pair"><div class="qa-q"><div class="label">❓ 咨询师提问</div><div class="text">' + App.escapeHtml(p.question) + '</div></div>';
            html += '<div class="qa-a"><div class="label">督导回答</div><div class="text">' + App.escapeHtml(p.answer) + '</div></div>';
            html += '<div class="qa-tags">' + (p.tags || []).map(function (t) { return '<span class="tag knowledge">' + App.escapeHtml(t) + '</span>'; }).join('') + '</div>';
            html += '<div class="qa-source"><span class="src-label">📚 知识来源</span>' + App.escapeHtml(p.knowledgeSource || '') + '</div></div>';
          });
          qaBody.innerHTML = html;
          document.getElementById('qa-count').textContent = pairs.length + ' 组';
          // 结构化分析
          var ins = document.getElementById('insight-body');
          ins.innerHTML = '<div class="insight-card"><div class="i-head"><span class="i-icon">🎯</span><span class="i-title">核心议题</span></div><ul class="i-list">' + (insights.coreIssues || []).map(function (s) { return '<li>' + App.escapeHtml(s) + '</li>'; }).join('') + '</ul></div>' +
            '<div class="insight-card"><div class="i-head"><span class="i-icon">🛠</span><span class="i-title">督导技术</span></div><ul class="i-list">' + (insights.techniques || []).map(function (s) { return '<li>' + App.escapeHtml(s) + '</li>'; }).join('') + '</ul></div>' +
            '<div class="insight-card"><div class="i-head"><span class="i-icon">📚</span><span class="i-title">理论锚点</span></div><ul class="i-list">' + (insights.theories || []).map(function (s) { return '<li>' + App.escapeHtml(s) + '</li>'; }).join('') + '</ul></div>' +
            '<div class="insight-card"><div class="i-head"><span class="i-icon">⚠</span><span class="i-title">督导建议</span></div><ul class="i-list">' + (insights.suggestions || []).map(function (s) { return '<li>' + App.escapeHtml(s) + '</li>'; }).join('') + '</ul></div>';
        } catch (e) {
          qaBody.innerHTML = '<div style="font:13px var(--sans);color:var(--danger);text-align:center;padding:20px">AI 返回格式异常，请重试</div>';
        }
      } else {
        qaBody.innerHTML = '<div style="font:13px var(--sans);color:var(--danger);text-align:center;padding:20px">AI 分析失败</div>';
      }
    });
  }

  window.analyzeCurrent = function () {
    var active = document.querySelector('.lh-item.active');
    if (active && active.dataset.id) analyzeRecord(active.dataset.id);
  };

  window.exportReport = function () {
    var text = document.getElementById('qa-body').innerText + '\n\n' + document.getElementById('insight-body').innerText;
    App.exportWordDoc('督导分析报告_' + App.todayStr() + '.doc', '<pre>' + App.escapeHtml(text) + '</pre>');
  };
}});
</script>
</body>
</html>
