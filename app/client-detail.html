<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心镜 · 来访者详情</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <div id="sidebar-mount"></div>
    <main class="main">
      <header class="main-header">
        <div id="page-header"></div>
      </header>
      <div class="content">
        <!-- 基本信息卡片 -->
        <div class="list-card" style="padding:var(--gap-lg);margin-bottom:var(--gap-lg);cursor:default">
          <div style="display:flex;align-items:center;gap:var(--gap);margin-bottom:var(--gap)">
            <div class="avatar" style="width:56px;height:56px;font-size:24px" id="detail-avatar"></div>
            <div style="flex:1">
              <div style="font-size:20px;font-weight:600" id="detail-name"></div>
              <div style="font-size:13px;color:var(--muted);font-family:var(--sans)" id="detail-sub"></div>
            </div>
            <button class="btn btn-ghost btn-sm" onclick="openEditFromDetail()">编辑</button>
          </div>
          <div id="detail-tags" style="margin-bottom:var(--gap-sm)"></div>
          <div id="detail-notes" style="font-size:14px;color:var(--text);font-family:var(--sans);line-height:1.7"></div>
        </div>

        <!-- 会话记录 -->
        <div class="section-title">会话记录 <span class="count" id="session-count"></span></div>
        <div id="session-list" style="margin-bottom:var(--gap-lg)"></div>
        <button class="btn btn-primary" style="margin-bottom:var(--gap-lg)" onclick="newSession()">+ 新增会话</button>

        <!-- 督导记录 -->
        <div class="section-title">督导记录 <span class="count" id="sup-count"></span></div>
        <div id="supervision-list"></div>
      </div>
    </main>
  </div>

  <!-- 编辑模态框（复用 clients 的结构） -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>编辑来访者</h2>
        <button class="close" onclick="App.closeModal('edit-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="e-id">
        <div class="form-row">
          <label class="form-label">姓名 / 化名</label>
          <input class="form-control" id="e-name">
        </div>
        <div class="form-row two">
          <div>
            <label class="form-label">性别</label>
            <select class="form-control" id="e-gender">
              <option value="unknown">未填</option>
              <option value="female">女</option>
              <option value="male">男</option>
              <option value="other">其他</option>
            </select>
          </div>
          <div>
            <label class="form-label">出生日期</label>
            <input class="form-control" id="e-birth" type="date">
          </div>
        </div>
        <div class="form-row two">
          <div>
            <label class="form-label">联系电话</label>
            <input class="form-control" id="e-phone">
          </div>
          <div>
            <label class="form-label">首访日期</label>
            <input class="form-control" id="e-firstvisit" type="date">
          </div>
        </div>
        <div class="form-row">
          <label class="form-label">状态</label>
          <select class="form-control" id="e-status">
            <option value="active">咨询中</option>
            <option value="paused">暂停</option>
            <option value="ended">已结束</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-label">标签（逗号分隔）</label>
          <input class="form-control" id="e-tags">
        </div>
        <div class="form-row">
          <label class="form-label">备注</label>
          <textarea class="form-control" id="e-notes"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger" onclick="deleteFromDetail()">删除</button>
        <button class="btn btn-ghost" onclick="App.closeModal('edit-modal')">取消</button>
        <button class="btn btn-primary" onclick="saveEditFromDetail()">保存</button>
      </div>
    </div>
  </div>

  <!-- 确认对话框 -->
  <div class="modal-overlay" id="confirm-modal">
    <div class="modal" style="max-width:380px">
      <div class="modal-header"><h2>确认</h2></div>
      <div class="modal-body"><p id="confirm-message" style="font-family:var(--sans);font-size:14px;"></p></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="App.closeModal('confirm-modal')">取消</button>
        <button class="btn btn-primary" id="confirm-ok">确定</button>
      </div>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
  <script src="js/client-detail.js"></script>
</body>
</html>
