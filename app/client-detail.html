<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心镜 · 来访者详情</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="layout">
    <div id="sidebar-mount"></div>
    <main class="main">
      <header class="main-header">
        <div id="page-header"></div>
      </header>
      <div class="content">
        <!-- 基本信息 -->
        <div class="client-head">
          <h2 id="detail-name"></h2>
          <span class="badge" id="detail-badge"></span>
          <div class="tags" id="detail-tags"></div>
          <div class="stats">
            <div class="stat"><b id="st-sessions">0</b><span>节数</span></div>
            <div class="stat"><b id="st-first">—</b><span>首访</span></div>
            <div class="stat"><b id="st-last">—</b><span>末次</span></div>
            <div class="stat"><b id="st-sup">0</b><span>督导</span></div>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="openEditFromDetail()">编辑</button>
        </div>
        <div id="detail-notes" style="font-size:13.5px;color:var(--text-secondary);font-family:var(--sans);line-height:1.7;margin:-6px 0 18px"></div>

        <!-- 会话记录 -->
        <div class="section-title">会话记录 <span class="count" id="session-count"></span></div>
        <div id="session-list" style="margin-bottom:var(--gap-lg)"></div>
        <button class="btn btn-primary" style="margin-bottom:var(--gap-lg)" onclick="newSession()">+ 新增会话</button>

        <!-- 督导记录 -->
        <div class="section-title">督导记录 <span class="count" id="sup-count"></span></div>
        <div id="supervision-list" style="margin-bottom:var(--gap-lg)"></div>

        <!-- 成长轨迹（AI） -->
        <div class="section-title">成长轨迹</div>
        <div class="quick">
          <button class="primary" id="growth-btn">生成成长轨迹</button>
        </div>
        <div id="growth-trajectory"></div>
      </div>
    </main>
  </div>

  <!-- 编辑模态框（复用 clients 的结构） -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>编辑来访者</h2>
        <button class="close" onclick="App.closeModal('edit-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="e-id">
        <div class="form-row">
          <label class="form-label">姓名 / 化名</label>
          <input class="form-control" id="e-name">
        </div>
        <div class="form-row two">
          <div>
            <label class="form-label">性别</label>
            <select class="form-control" id="e-gender">
              <option value="unknown">未填</option>
              <option value="female">女</option>
              <option value="male">男</option>
              <option value="other">其他</option>
            </select>
          </div>
          <div>
            <label class="form-label">出生日期</label>
            <input class="form-control" id="e-birth" type="date">
          </div>
        </div>
        <div class="form-row two">
          <div>
            <label class="form-label">联系电话</label>
            <input class="form-control" id="e-phone">
          </div>
          <div>
            <label class="form-label">首访日期</label>
            <input class="form-control" id="e-firstvisit" type="date">
          </div>
        </div>
        <div class="form-row">
          <label class="form-label">状态</label>
          <select class="form-control" id="e-status">
            <option value="active">咨询中</option>
            <option value="paused">暂停</option>
            <option value="ended">已结束</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-label">标签（逗号分隔）</label>
          <input class="form-control" id="e-tags">
        </div>
        <div class="form-row">
          <label class="form-label">备注</label>
          <textarea class="form-control" id="e-notes"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger" onclick="deleteFromDetail()">删除</button>
        <button class="btn btn-ghost" onclick="App.closeModal('edit-modal')">取消</button>
        <button class="btn btn-primary" onclick="saveEditFromDetail()">保存</button>
      </div>
    </div>
  </div>

  <!-- 确认对话框 -->
  <div class="modal-overlay" id="confirm-modal">
    <div class="modal" style="max-width:380px">
      <div class="modal-header"><h2>确认</h2></div>
      <div class="modal-body"><p id="confirm-message" style="font-family:var(--sans);font-size:14px;"></p></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="App.closeModal('confirm-modal')">取消</button>
        <button class="btn btn-primary" id="confirm-ok">确定</button>
      </div>
    </div>
  </div>

  <!-- 新增会话：自定义节数 -->
  <div class="modal-overlay" id="session-number-modal">
    <div class="modal" style="max-width:380px">
      <div class="modal-header">
        <h2>新增会话</h2>
        <button class="close" onclick="App.closeModal('session-number-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <p style="font-size:13px;color:var(--muted);font-family:var(--sans);line-height:1.6;margin-bottom:10px">
          可自定义本次会谈为「第几节」。留空或保持默认时，自动顺延为当前最大节数 + 1（如已存在第 135 节，则默认为 136）。
        </p>
        <div class="form-row">
          <label class="form-label">第 <input class="form-control" id="new-session-number" type="number" min="1" style="width:90px;display:inline-block;margin:0 6px"> 节</label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="App.closeModal('session-number-modal')">取消</button>
        <button class="btn btn-primary" onclick="createSessionWithNumber()">创建</button>
      </div>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
  <script src="js/client-detail.js"></script>
</body>
</html>
