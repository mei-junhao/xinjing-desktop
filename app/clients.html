<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心镜 · 来访者</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <div id="sidebar-mount"></div>
    <main class="main">
      <header class="main-header">
        <div id="page-header"></div>
      </header>
      <div class="content">
        <!-- 工具栏：搜索 + 状态筛选 -->
        <div class="toolbar">
          <div class="search-box">
            <span class="search-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg></span>
            <input id="search-input" placeholder="搜索姓名、标签、备注..." oninput="renderClients()">
          </div>
          <div class="filter-group" id="status-filter">
            <span class="flabel">状态</span>
            <span class="pill active" data-status="all" onclick="setStatusFilter('all')">全部</span>
            <span class="pill" data-status="active" onclick="setStatusFilter('active')">咨询中</span>
            <span class="pill" data-status="paused" onclick="setStatusFilter('paused')">暂停</span>
            <span class="pill" data-status="ended" onclick="setStatusFilter('ended')">已结束</span>
          </div>
        </div>

        <div id="client-list"></div>
      </div>
    </main>
  </div>

  <!-- 编辑来访者模态框 -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>编辑来访者</h2>
        <button class="close" onclick="App.closeModal('edit-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="e-id">
        <div class="form-row">
          <label class="form-label">姓名 / 化名</label>
          <input class="form-control" id="e-name">
        </div>
        <div class="form-row two">
          <div>
            <label class="form-label">性别</label>
            <select class="form-control" id="e-gender">
              <option value="unknown">未填</option>
              <option value="female">女</option>
              <option value="male">男</option>
              <option value="other">其他</option>
            </select>
          </div>
          <div>
            <label class="form-label">出生日期</label>
            <input class="form-control" id="e-birth" type="date">
          </div>
        </div>
        <div class="form-row two">
          <div>
            <label class="form-label">联系电话</label>
            <input class="form-control" id="e-phone">
          </div>
          <div>
            <label class="form-label">首访日期</label>
            <input class="form-control" id="e-firstvisit" type="date">
          </div>
        </div>
        <div class="form-row">
          <label class="form-label">状态</label>
          <select class="form-control" id="e-status">
            <option value="active">咨询中</option>
            <option value="paused">暂停</option>
            <option value="ended">已结束</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-label">标签（逗号分隔）</label>
          <input class="form-control" id="e-tags">
        </div>
        <div class="form-row">
          <label class="form-label">备注</label>
          <textarea class="form-control" id="e-notes"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger" onclick="deleteCurrentClient()">删除</button>
        <button class="btn btn-ghost" onclick="App.closeModal('edit-modal')">取消</button>
        <button class="btn btn-primary" onclick="saveEditClient()">保存</button>
      </div>
    </div>
  </div>

  <!-- 确认对话框 -->
  <div class="modal-overlay" id="confirm-modal">
    <div class="modal" style="max-width:380px">
      <div class="modal-header"><h2>确认</h2></div>
      <div class="modal-body"><p id="confirm-message" style="font-family:var(--sans);font-size:14px;"></p></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="App.closeModal('confirm-modal')">取消</button>
        <button class="btn btn-primary" id="confirm-ok">确定</button>
      </div>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
  <script src="js/clients.js"></script>
</body>
</html>
