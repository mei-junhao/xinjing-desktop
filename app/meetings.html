<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心镜 · 会议同步</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .meeting-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border: 1.5px solid var(--border);
      border-radius: 10px; margin-bottom: 10px; background: var(--bg);
    }
    .meeting-row .meta { flex: 1; min-width: 0; }
    .meeting-row .subj { font-weight: 600; font-size: 14px; color: var(--text); }
    .meeting-row .time { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
    .meeting-row select {
      max-width: 180px; padding: 7px 10px; border-radius: 8px;
      border: 1.5px solid var(--border); background: var(--bg); color: var(--text);
      font-family: var(--sans); font-size: 13px;
    }
    #raw-json {
      width: 100%; min-height: 160px; font-family: 'Menlo','Consolas',monospace;
      font-size: 12px; padding: 10px 12px; border: 1.5px solid var(--border);
      border-radius: 10px; resize: vertical; background: var(--bg);
    }
    .tool-note {
      font-size: 12.5px; line-height: 1.7; color: var(--muted);
      background: var(--bg-alt); border-radius: 10px; padding: 12px 14px; margin-bottom: 14px;
    }
    .tool-note code { background: var(--bg); padding: 1px 6px; border-radius: 5px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="layout">
    <div id="sidebar-mount"></div>
    <main class="main">
      <header class="main-header">
        <div id="page-header"></div>
      </header>
      <div class="content">
        <div class="tool-note">
          自动把腾讯会议参会记录转成心镜咨询会话（写入同一份数据，记账页同步可见）。<br>
          ① 用本机命令行运行 <code>tools/fetch_meetings.py</code> 抓取 JSON（或点「选择文件」直接读 <code>latest_meetings.json</code>）；<br>
          ② 粘贴 / 选择文件 → 解析 → 为每位非本人的参会者匹配来访者 → 导入。
        </div>

        <div class="card" style="padding:16px 18px;margin-bottom:16px">
          <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:10px">
            <input type="file" id="file-input" accept=".json" style="font-family:var(--sans);font-size:13px">
            <button class="btn btn-outline btn-sm" onclick="Meetings.parseText()">解析文本</button>
            <button class="btn btn-primary btn-sm" onclick="Meetings.importSelected()">导入选中</button>
          </div>
          <textarea id="raw-json" placeholder="在此粘贴 latest_meetings.json 的内容，或点「选择文件」"></textarea>
        </div>

        <div id="meeting-list"></div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="confirm-modal">
    <div class="modal" style="max-width:380px">
      <div class="modal-header"><h2>确认</h2></div>
      <div class="modal-body"><p id="confirm-message" style="font-family:var(--sans);font-size:14px;"></p></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="App.closeModal('confirm-modal')">取消</button>
        <button class="btn btn-primary" id="confirm-ok">确定</button>
      </div>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
  <script src="js/meetings.js"></script>
  <script>
    App.initPage({
      title: '会议同步',
      subtitle: '腾讯会议参会记录 → 心镜咨询会话',
      onReady: function () { Meetings.init(); }
    });
  </script>
</body>
</html>
