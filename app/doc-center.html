<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心镜 · 文档中心</title>
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/components.css">
<style>
.dc-page{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.dc-top{display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--paper-2,#fff);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.dc-top .back{font-size:13px;cursor:pointer;border:none;background:none;color:var(--ink-2);padding:4px 8px;border-radius:6px;font-family:var(--sans)}
.dc-top h2{font-family:var(--serif);font-size:18px;margin:0}
.dc-top .sp{flex:1}
.dc-top input[type=text]{border:1px solid var(--border);border-radius:8px;padding:6px 12px;font:12px var(--sans);width:160px;outline:none;background:var(--bg)}
.dc-top input[type=text]:focus{border-color:var(--accent)}
.dc-top select{border:1px solid var(--border);border-radius:8px;padding:6px 12px;font:12px var(--sans);background:var(--bg);outline:none;max-width:180px}
.dc-top select:focus{border-color:var(--accent)}
.dc-body{flex:1;display:grid;grid-template-columns:240px 1fr;min-height:0;overflow:hidden}
.dc-left{background:var(--paper-2,#fff);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.dc-left .dl-head{padding:14px 16px;border-bottom:1px solid var(--border);font-family:var(--serif);font-size:14px;font-weight:600;flex-shrink:0}
.dc-left .dl-list{flex:1;overflow-y:auto;padding:8px}
.dc-left .dl-item{padding:8px 12px;border-radius:8px;cursor:pointer;font-size:12.5px;margin-bottom:2px;transition:all .15s;display:flex;align-items:center;gap:8px}
.dc-left .dl-item:hover{background:var(--bg)}
.dc-left .dl-item.active{background:var(--accent-soft);border:1px solid var(--accent)}
.dc-left .dl-item .dl-avatar{width:28px;height:28px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.dc-left .dl-item .dl-info{flex:1;min-width:0}
.dc-left .dl-item .dl-name{font-weight:600;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dc-left .dl-item .dl-count{font-size:10px;color:var(--ink-3)}
.dc-right{display:flex;flex-direction:column;overflow:hidden}
.dc-right .dr-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--paper-2,#fff);overflow-x:auto}
.dc-right .dr-tab{padding:10px 18px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:var(--ink-2);white-space:nowrap;transition:all .2s;font-family:var(--sans)}
.dc-right .dr-tab:hover{color:var(--ink)}
.dc-right .dr-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.dc-right .dr-content{flex:1;overflow-y:auto;padding:20px}
.dc-right .doc-card{background:var(--paper-2,#fff);border:1px solid var(--border);border-radius:var(--r-card,14px);padding:16px;margin-bottom:12px;display:flex;gap:14px;cursor:pointer;transition:all .15s}
.dc-right .doc-card:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.dc-right .doc-card .dc-icon{font-size:24px;flex-shrink:0;width:36px;text-align:center}
.dc-right .doc-card .dc-body{flex:1;min-width:0}
.dc-right .doc-card .dc-title{font-weight:600;font-size:13px;margin-bottom:4px}
.dc-right .doc-card .dc-meta{font-size:11px;color:var(--ink-3);display:flex;gap:10px;flex-wrap:wrap}
.dc-right .doc-card .dc-meta .tag{font-size:10px;padding:1px 6px;border-radius:3px;background:var(--bg-sunken)}
.dc-right .doc-card .dc-preview{font-size:12px;color:var(--ink-2);margin-top:6px;line-height:1.6;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.dc-right .empty-state{text-align:center;padding:48px 20px;color:var(--ink-3);font-size:13px;line-height:2}
.dc-right .empty-state .big{font-size:42px;display:block;margin-bottom:12px}
/* 成长轨迹 */
.trajectory{background:var(--paper-2,#fff);border:1px solid var(--border);border-radius:var(--r-card,14px);padding:20px;margin-top:16px}
.trajectory .tj-head{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.trajectory .tj-head .tj-title{font-family:var(--serif);font-size:16px;font-weight:600}
.trajectory .tj-head .tj-badge{font-size:10px;padding:2px 8px;border-radius:999px;background:var(--accent-soft);color:var(--accent);margin-left:auto}
.trajectory .tj-item{display:flex;gap:14px;padding:10px 0;border-left:2px solid var(--accent-soft);padding-left:16px;margin-left:8px;position:relative}
.trajectory .tj-item::before{content:"";position:absolute;left:-6px;top:14px;width:10px;height:10px;border-radius:50%;background:var(--accent);border:2px solid var(--paper-2,#fff)}
.trajectory .tj-item .tj-date{font-size:11px;color:var(--ink-3);min-width:80px}
.trajectory .tj-item .tj-text{font-size:13px;line-height:1.7;color:var(--ink)}
.trajectory .tj-item .tj-tag{font-size:10px;padding:1px 6px;border-radius:3px;background:var(--accent-soft);color:var(--accent);margin-left:8px}
.timeline-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:16px}
.timeline-summary .summary-block{border:1px solid var(--border);background:var(--paper-2,#fff);border-radius:8px;padding:14px}
.timeline-summary h3{font:600 13px var(--sans);margin:0 0 8px}
.timeline-summary .summary-item{font-size:12px;line-height:1.6;padding:6px 0;border-top:1px solid var(--border)}
.timeline-summary .summary-item:first-of-type{border-top:0}
.timeline-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.timeline-actions button{border:1px solid var(--border);background:var(--paper-2,#fff);border-radius:5px;padding:3px 7px;font:11px var(--sans);cursor:pointer;color:var(--ink-2)}
.timeline-actions button:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<div class="layout"><div id="sidebar-mount"></div><main class="main">
<div class="dc-page">
<div class="dc-top">
  <button class="back" onclick="location.href='index.html'"><i data-lucide="chevron-left"></i>返回工作台</button>
  <h2>文档中心</h2><span id="member-badge-slot"></span> <span class="sp"></span><a href="doc-growth.html" class="xj-premium-btn"><i data-lucide="chart-no-axes-combined"></i>成长轨迹</a>
  <span class="sp"></span>
  <input type="text" id="dc-search" placeholder="搜索文档…" oninput="filterDocs()">
  <select id="dc-client-select" onchange="onClientSelect(this.value)"><option value="">手动选择来访者…</option></select>
</div>

<div class="dc-body">
  <!-- 左栏：来访者列表 -->
  <div class="dc-left">
    <div class="dl-head"><i data-lucide="users-round"></i>来访者</div>
    <div class="dl-list" id="client-list"></div>
  </div>
  <!-- 右栏：文档内容 -->
  <div class="dc-right">
    <div class="dr-tabs" id="doc-tabs">
      <div class="dr-tab active" data-tab="all" onclick="switchDocTab('all')"><i data-lucide="files"></i>全部</div>
      <div class="dr-tab" data-tab="transcript" onclick="switchDocTab('transcript')"><i data-lucide="audio-lines"></i>逐字稿</div>
      <div class="dr-tab" data-tab="report" onclick="switchDocTab('report')"><i data-lucide="file-text"></i>报告</div>
      <div class="dr-tab" data-tab="supervision" onclick="switchDocTab('supervision')"><i data-lucide="brain-circuit"></i>督导</div>
      <div class="dr-tab" data-tab="trajectory" onclick="switchDocTab('trajectory')"><i data-lucide="chart-no-axes-combined"></i>成长轨迹</div>
      <div class="dr-tab" data-tab="timeline" onclick="switchDocTab('timeline')"><i data-lucide="history"></i>时间线</div>
    </div>
    <div class="dr-content" id="doc-content">
      <div class="empty-state"><span class="big"><i data-lucide="folder-open"></i></span>选择左侧来访者查看文档</div>
    </div>
  </div>
</div>
</div>
</main></div>

<script src="js/store.js"></script>
<script src="js/app.js"></script>
<script src="js/agent-tools.js"></script>
<script src="js/agent-core.js"></script>
<script src="js/xinjing-chat.js"></script>
<script src="js/ai.js"></script>
<script src="js/doc-center.js"></script>

<script>
(function(){
  if (typeof App !== 'undefined' && App.membershipBadge) {
    var el = document.getElementById('member-badge-slot');
    if (el) el.innerHTML = App.membershipBadge();
  }
})();
</script>
</body>
</html>
