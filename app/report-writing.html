<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心镜 · 撰写报告</title>
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/components.css">
<style>
.rpt-page{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.rpt-top{display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--paper-2,#fff);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.rpt-top .back{font-size:13px;cursor:pointer;border:none;background:none;color:var(--ink-2);padding:4px 8px;border-radius:6px;font-family:var(--sans)}
.rpt-top h2{font-family:var(--serif);font-size:18px;margin:0}
.rpt-top .sp{flex:1}
.rpt-top select{border:1px solid var(--border);border-radius:8px;padding:5px 10px;font:12px var(--sans);background:var(--paper,#fff)}
.rpt-top button{border:1px solid var(--border);background:var(--paper,#fff);border-radius:8px;padding:6px 14px;font:12px var(--sans);cursor:pointer;color:var(--ink-2)}
.rpt-top .btn-p{background:var(--accent);color:#fff;border:none}
/* 步骤导航 */
.steps{display:flex;gap:0;padding:0 24px;background:var(--paper-2,#fff);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.step{display:flex;align-items:center;gap:8px;padding:12px 18px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.2s;min-width:fit-content;font-family:var(--sans)}
.step:hover{color:var(--accent)}
.step.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.step.done{color:var(--green,#6FAE8F)}
.step .dot{width:24px;height:24px;border-radius:50%;border:2px solid var(--ink-3);display:flex;align-items:center;justify-content:center;font:700 11px var(--sans);flex-shrink:0}
.step.active .dot{border-color:var(--accent);background:var(--accent);color:#fff}
.step.done .dot{border-color:var(--green,#6FAE8F);background:var(--green,#6FAE8F);color:#fff}
.step .stxt{font-size:13px}
/* 单步内容区 */
.step-content{flex:1;overflow-y:auto;padding:32px 48px}
.step-inner{max-width:760px;margin:0 auto}
.step-title{font-family:var(--serif);font-size:22px;color:var(--ink);margin-bottom:6px}
.step-desc{font-size:13px;color:var(--ink-3);margin-bottom:24px}
.step-inner textarea{width:100%;min-height:280px;border:1px solid var(--border);border-radius:var(--r-card,14px);padding:18px 20px;font:15px/2 var(--sans);color:var(--ink);resize:vertical;outline:none;background:var(--paper,#fff);transition:.2s}
.step-inner textarea:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(139,147,199,.06)}
.ai-suggest{margin-top:14px;padding:14px 18px;background:var(--accent-soft);border-radius:var(--r-card,14px);font:14px/1.85 var(--sans);border-left:3px solid var(--accent);color:var(--ink-2);display:none}
.ai-suggest.show{display:block}
.ai-suggest .label{font-size:11px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.ai-suggest .accept{margin-top:8px;display:inline-block;padding:5px 16px;border-radius:7px;background:var(--accent);color:#fff;font-size:12px;cursor:pointer;border:none}
/* 底部导航 */
.step-foot{display:flex;align-items:center;gap:12px;padding:14px 48px;border-top:1px solid var(--border);flex-shrink:0}
.step-foot .sp{flex:1}
.step-foot .info{font-size:12px;color:var(--ink-3)}
.step-foot button{padding:10px 24px;border-radius:9px;font:600 14px var(--sans);cursor:pointer}
.step-foot .prev{border:1px solid var(--border);background:var(--paper,#fff);color:var(--ink-2)}
.step-foot .next{background:var(--accent);color:#fff;border:none}
.step-foot .ai-btn{border:1px solid var(--accent);background:var(--accent-soft);color:var(--accent);border-radius:9px}
/* 基于节次：下拉菜单（默认收起，不占视觉空间） */
.sess-dd{position:relative}
.sess-dd-btn{border:1px solid var(--border);background:var(--paper,#fff);border-radius:8px;padding:6px 14px;font:12px var(--sans);cursor:pointer;color:var(--ink-2)}
.sess-dd-btn.has-sel{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.sess-menu{position:absolute;top:calc(100% + 6px);left:0;z-index:50;min-width:280px;max-height:360px;overflow:auto;background:var(--paper,#fff);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 28px rgba(40,44,72,.14);padding:10px}
.sess-menu-actions{display:flex;align-items:center;gap:8px;padding-bottom:8px;margin-bottom:8px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.sess-menu-actions button{border:1px solid var(--border);background:var(--paper,#fff);border-radius:6px;padding:4px 12px;font:12px var(--sans);cursor:pointer;color:var(--ink-2)}
.sess-menu-actions button:hover{border-color:var(--accent);color:var(--accent)}
.sess-only{font-size:11px;color:var(--ink-3);display:flex;align-items:center;gap:4px;cursor:pointer;margin-left:auto}
.sess-list{display:flex;flex-direction:column;gap:2px}
.sess-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;font-size:13px;cursor:pointer;font-family:var(--sans)}
.sess-item:hover{background:var(--bg-sunken,#EDF0F7)}
.sess-item input{margin:0}
.sess-item .tag{font-size:10px;color:var(--accent);border:1px solid var(--accent);border-radius:4px;padding:0 5px;margin-left:auto}
.sess-empty{padding:14px 8px;font-size:12px;color:var(--ink-3);text-align:center}
</style>
</head>
<body>
<div class="layout"><div id="sidebar-mount"></div><main class="main">
<div class="rpt-page">
<div class="rpt-top">
  <button class="back" onclick="location.href='index.html'">← 返回</button>
  <h2>撰写报告</h2>
  <span class="sp"></span>
  <select id="rpt-client" onchange="loadClientSessions()"><option value="">选择来访者…</option></select>
  <div class="sess-dd" id="sess-dd" style="display:none">
    <button class="sess-dd-btn" onclick="toggleSessMenu()">基于节次 ▾</button>
    <div class="sess-menu" id="sess-menu" style="display:none">
      <div class="sess-menu-actions">
        <button onclick="sessSelectAll(true)">全选</button>
        <button onclick="sessSelectAll(false)">全不选</button>
        <label class="sess-only"><input type="checkbox" id="sess-only-has" onchange="renderSessMenu()"> 仅显示有逐字稿/记录</label>
      </div>
      <div id="sessions-list" class="sess-list"></div>
    </div>
  </div>
  <button id="btn-upload-transcript" onclick="document.getElementById('rpt-transcript-file').click()">上传逐字稿</button>
  <input type="file" id="rpt-transcript-file" accept=".txt,.md,.doc,.docx" style="display:none" onchange="onReportTranscriptUpload(event)">
  <button id="btn-upload-tpl" onclick="document.getElementById('tpl-file').click()">上传模板</button>
  <input type="file" id="tpl-file" accept=".txt,.md,.docx,.html" style="display:none" onchange="onTemplateUpload(event)">
  <button class="btn-p" onclick="exportWord()">导出 Word</button>
</div>

<div class="steps" id="steps-nav"></div>

<div class="step-content"><div class="step-inner" id="step-inner">
  <div class="step-title" id="step-title">选择来访者开始撰写</div>
  <div class="step-desc" id="step-desc">从上方下拉选择来访者，系统将自动载入其咨询历史。</div>
  <div id="step-body" style="font-size:14px;color:var(--ink-3);padding:40px;text-align:center">请先选择来访者。</div>
</div></div>

<div class="step-foot">
  <button class="prev" id="btn-prev" onclick="prevStep()" style="display:none">← 上一步</button>
  <button class="ai-btn" id="btn-ai-step" onclick="aiFillCurrent()" style="display:none">AI 填写本步 ✨</button>
  <span class="sp"></span>
  <span class="info" id="step-info"></span>
  <button class="next" id="btn-next" onclick="nextStep()" style="display:none">下一步 →</button>
</div>

</div>
</main></div>
<script src="js/store.js"></script>
<script src="js/app.js"></script>
<script src="js/xiaojing-panel.js"></script>
<script src="js/ai.js"></script>
<script src="vendor/mammoth.browser.min.js"></script>
<script src="js/report-writing.js"></script>
</body>
</html>
