<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心镜 · 意见建议</title>
  <link rel="stylesheet" href="css/style.css">
<style>
/* ============================================================
   全局视觉增强 — 暖色治愈系（追加层，不修改任何已有选择器）
   注入到每个页面 style 结束标签前
   ============================================================ */

/* 入场动画 */
@keyframes xjFadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes xjFadeIn{from{opacity:0}to{opacity:1}}
@keyframes xjScaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}

/* 通用交互增强 */
[data-xj-enhance] *{box-sizing:border-box}

/* 卡片悬停增强（追加到已有卡片选择器，不覆盖） */
.card:hover,.list-card:hover,.stat-card:hover,.kv-card:hover,.mod:hover,.sc-ov-card:hover,
.analysis-block:hover,.ccard:hover,.tcard:hover{
  transition:transform .25s ease,box-shadow .25s ease,border-color .25s ease;
}

/* 输入框聚焦增强 */
textarea:focus,input:focus,select:focus{
  transition:border-color .2s ease,box-shadow .2s ease;
}

/* 按钮点击反馈 */
button:active{
  transform:scale(.97);
  transition:transform .1s ease;
}

/* 滚动条美化 */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border,#ECE5D9);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-strong,#DDD4C5)}


    
﻿
    /* === xinjing enhance === */
    /* form field focus glow */
    .xj-field-glow{transition:border-color .25s ease,box-shadow .25s ease,background .2s ease}
    .xj-field-glow:focus{border-color:var(--accent,#9E5A3C);box-shadow:0 0 0 3px rgba(158,90,60,.12);background:#fff}
    /* textarea resize handle styling */
    .xj-textarea-handle{resize:vertical;min-height:100px;transition:border-color .2s ease,box-shadow .2s ease}
    .xj-textarea-handle:focus{border-color:var(--accent,#9E5A3C);box-shadow:0 0 0 3px rgba(158,90,60,.1)}
    .xj-textarea-handle::-webkit-resizer{background:transparent;border:2px solid var(--border,#ECE5D9);border-radius:0 0 8px 0;width:12px;height:12px}
    /* submit button hover lift */
    .xj-submit-btn{transition:transform .25s ease,box-shadow .25s ease,filter .2s ease,background .2s ease}
    .xj-submit-btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(158,90,60,.18);filter:brightness(1.04)}
    .xj-submit-btn:active{transform:translateY(0) scale(.97);box-shadow:none}
    /* rating/score indicator transitions */
    .xj-score-indicator{transition:color .3s ease,transform .3s ease,background .3s ease}
    .xj-score-indicator:hover{transform:scale(1.15)}
    .xj-score-indicator.xj-selected{color:var(--accent,#9E5A3C);transform:scale(1.2)}
    @keyframes xjScorePop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1.2)}}
    .xj-score-indicator.xj-pop{animation:xjScorePop .3s ease}

  </style>
</head>
<body>
  <div class="layout">
    <div id="sidebar-mount"></div>
    <main class="main">
      <header class="main-header">
        <div id="page-header"></div>
      </header>
      <div class="content">
        <div class="list-card" style="padding:var(--gap-lg);cursor:default">
          <div class="section-title">意见建议</div>
          <p style="font-family:var(--sans);font-size:14px;color:var(--muted);line-height:1.8;margin-bottom:var(--gap)">
            心镜是一个本地运行的个人工具。如果你有功能建议或发现问题，可以通过以下方式反馈：
          </p>
          <div style="font-family:var(--sans);font-size:14px;line-height:2">
            • 微信联系开发者<br>
            • 邮件：<a href="mailto:985729106@qq.com" style="color:var(--accent)">985729106@qq.com</a>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
<script src="js/xiaojing-panel.js"></script>
  <script>
    App.initPage({
      title: '意见建议',
      subtitle: '你的反馈让心镜更好',
      noSidebar: true,
    });
  </script>
</body>
</html>
