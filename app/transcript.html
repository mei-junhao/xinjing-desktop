<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心镜 · 逐字稿整理</title>
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/agent.css">
<style>
.tp-page{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.tp-top{display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--paper-2,#fff);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.tp-top .back{font-size:13px;cursor:pointer;border:none;background:none;color:var(--ink-2);padding:4px 8px;border-radius:6px;font-family:var(--sans)}
.tp-top h2{font-family:var(--serif);font-size:18px;margin:0}
.tp-top .sp{flex:1}
.tp-top select{border:1px solid var(--border);border-radius:8px;padding:5px 10px;font:12px var(--sans);background:var(--paper,#fff)}
.tp-body{flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:0;overflow:hidden}
.tp-col{display:flex;flex-direction:column;overflow:hidden}
.tp-col-left{border-right:1px solid var(--border)}
.tp-col-head{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;background:var(--paper-2,#fff)}
.tp-col-head .tch{font-family:var(--serif);font-size:14px;font-weight:600}
.tp-col-head .tch-badge{font-size:10px;padding:2px 8px;border-radius:5px;background:var(--accent-soft);color:var(--accent)}
.tp-col-head .sp{flex:1}
.tp-col-head .tch-btn{border:1px solid var(--border);background:var(--paper-2,#fff);border-radius:7px;padding:4px 10px;font:11px var(--sans);cursor:pointer;color:var(--ink-2)}
.tp-col-body{flex:1;overflow-y:auto;padding:16px}
.tp-line{display:flex;gap:8px;padding:3px 0;font-size:13px;line-height:1.8;border-radius:4px;transition:background .15s;cursor:pointer}
.tp-line:hover{background:var(--bg)}
.tp-line .ln{color:var(--ink-3);font-size:11px;min-width:28px;text-align:right;font-family:var(--mono);padding-top:2px;user-select:none}
.tp-line .speaker{font-weight:600;min-width:32px;color:var(--accent)}
.tp-line .text{flex:1;color:var(--ink)}
.tp-line .text .err{background:rgba(217,140,140,.2);border-bottom:2px wavy var(--danger);padding:1px 0;cursor:pointer;border-radius:2px}
.tp-line .text .err:hover{background:rgba(217,140,140,.35)}
.tp-line .text .err.fixed{background:rgba(111,174,143,.2);border-bottom:2px solid var(--success);text-decoration:line-through 1px var(--ink-3)}
.tp-line .text .err.fixed::after{content:" ✓";font-size:10px;color:var(--success)}
.tp-line .action{opacity:0;transition:opacity .15s;display:flex;gap:3px}
.tp-line:hover .action{opacity:1}
.tp-line .action button{border:none;background:var(--bg);border-radius:4px;padding:2px 6px;cursor:pointer;font-size:11px;color:var(--ink-2);font-family:var(--sans)}
.tp-line .action button:hover{background:var(--accent-soft);color:var(--accent)}
.tp-stats{display:flex;gap:16px;padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;font-size:11px;color:var(--ink-3);background:var(--paper-2,#fff)}
.tp-stats .stat b{font-family:var(--serif);color:var(--ink)}
.tp-stats .stat.err-count b{color:var(--danger)}
.tp-stats .stat.fixed-count b{color:var(--success)}
.input-bar{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;background:var(--paper-2,#fff)}
.input-bar textarea{flex:1;border:1px solid var(--border);border-radius:10px;padding:10px 14px;font:13px/1.7 var(--sans);outline:none;resize:none;height:52px;background:var(--bg)}
.input-bar textarea:focus{border-color:var(--accent)}
.input-bar button{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 20px;font:600 13px var(--sans);cursor:pointer;white-space:nowrap}
.input-bar button:hover{opacity:.9}
.mem-bar{display:flex;align-items:center;gap:10px;padding:8px 16px;border-top:1px solid var(--border);flex-shrink:0;font-size:11px;color:var(--ink-3);background:var(--bg-sunken);flex-wrap:wrap}
.mem-bar .mem-tag{background:var(--accent-soft);color:var(--accent);padding:2px 8px;border-radius:999px;font-size:10px}
.mem-bar .mem-btn{border:none;background:transparent;color:var(--accent);cursor:pointer;font-size:11px;font-family:var(--sans);padding:2px 6px;border-radius:4px}
.mem-bar .mem-btn:hover{background:var(--accent-soft)}
/* 会员锁 */
.member-lock{position:relative;display:inline-block}
.member-lock .lock-badge{font-size:9px;color:var(--ink-3);background:var(--bg);padding:1px 6px;border-radius:999px;margin-left:4px}
</style>
</head>
<body>
<div class="layout"><div id="sidebar-mount"></div><main class="main">
<div class="tp-page">
<div class="tp-top">
  <button class="back" onclick="location.href='index.html'">← 返回</button>
  <h2>逐字稿整理</h2><span id="member-badge-slot"></span> <span class="sp"></span><a href="transcript-guide.html" style="margin-left:auto;border:1px solid var(--border);background:var(--paper-2,#fff);border-radius:7px;padding:4px 12px;font:11px var(--sans);cursor:pointer;color:var(--ink-2);text-decoration:none;display:inline-flex;align-items:center;gap:4px" class="xj-premium-btn"><span style="font-size:13px">🤖</span> 对话引导 <span style="font-size:9px;opacity:.6">&#128274;</span></a>
  <span class="sp"></span>
  <select id="tp-client" onchange="loadClient()"><option value="">选择来访者…</option></select>
  <button class="tch-btn" onclick="loadRawText()">📂 导入文本</button>
  <button class="tch-btn" onclick="triggerTranscriptFile()">📁 上传文件</button>
  <button class="tch-btn" onclick="goToNotes()">📝 去咨询记录</button>
  <input type="file" id="tp-file" accept=".txt,.md,.markdown,.docx" style="display:none" onchange="onTranscriptFile(event)">
</div>

<div class="tp-body">
  <!-- 左栏：原文 -->
  <div class="tp-col tp-col-left">
    <div class="tp-col-head">
      <span class="tch">📄 原文</span>
      <span class="tch-badge">原始稿</span>
      <span class="sp"></span>
      <button class="tch-btn" onclick="detectErrors()">🔍 检测错误</button>
    </div>
    <div class="tp-col-body" id="original-text">
      <div style="padding:32px;text-align:center;color:var(--ink-3);font-size:13px;line-height:2">
        <div style="font-size:36px;margin-bottom:12px">📝</div>
        点击「导入文本」粘贴逐字稿<br>
        或选择来访者后载入已有记录
      </div>
    </div>
  </div>
  <!-- 右栏：修正稿 -->
  <div class="tp-col">
    <div class="tp-col-head">
      <span class="tch">✅ 修正稿</span>
      <span class="tch-badge" id="fixed-badge">0 处修正</span>
      <span class="sp"></span>
      <button class="tch-btn" onclick="saveTranscript()">💾 保存</button>
      <button class="tch-btn" onclick="exportTranscript()">导出</button>
    </div>
    <div class="tp-col-body" id="fixed-text">
      <div style="padding:32px;text-align:center;color:var(--ink-3);font-size:13px;line-height:2">
        <div style="font-size:36px;margin-bottom:12px">✏️</div>
        左侧检测到错误后，此处会显示修正建议<br>
        点击错误标记可修改
      </div>
    </div>
    <div class="tp-stats" id="tp-stats">
      <span class="stat">总行数 <b id="stat-lines">0</b></span>
      <span class="stat err-count">🟡 待修正 <b id="stat-errors">0</b></span>
      <span class="stat fixed-count">✅ 已修正 <b id="stat-fixed">0</b></span>
    </div>
  </div>
</div>

<div class="input-bar">
  <textarea id="tp-input" placeholder="粘贴逐字稿文本，或输入要修正的片段…"></textarea>
  <button onclick="processInput()">导入</button>
</div>
<div class="mem-bar" id="mem-bar">
  <span>🧠 记忆库</span>
  <span class="mem-tag" id="mem-count">0 条规则</span>
  <span class="sp"></span>
  <button class="mem-btn" onclick="showMemRules()">查看</button>
  <button class="mem-btn" onclick="clearMem()">清空</button>
</div>
</div>
</main></div>

<script src="js/store.js"></script>
<script src="js/app.js"></script>
<script src="js/xiaojing-panel.js"></script>
<script src="js/ai.js"></script>
<script src="vendor/mammoth.browser.min.js"></script>
<script src="js/transcript.js"></script>

<script>
(function(){
  if (typeof App !== 'undefined' && App.membershipBadge) {
    var el = document.getElementById('member-badge-slot');
    if (el) el.innerHTML = App.membershipBadge();
  }
})();
</script>
</body>
</html>
