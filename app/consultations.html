<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心镜 · 咨询记录</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    /* P0-3：右栏模式切换 + 内嵌 session 编辑器 */
    .dock-mode-switch { display: flex; gap: 4px; background: var(--bg-sunken); border-radius: 999px; padding: 3px; margin-bottom: 14px; width: fit-content; }
    .dock-mode-switch button { border: none; background: transparent; padding: 7px 16px; border-radius: 999px; font-size: 13px; color: var(--text-secondary); cursor: pointer; font-family: var(--font-sans); transition: .15s; }
    .dock-mode-switch button:hover { color: var(--accent); }
    .dock-mode-switch button.active { background: var(--bg-elevated); color: var(--accent); box-shadow: inset 0 0 0 1px var(--border); font-weight: 600; }
    .dock-pane { display: none; flex-direction: column; gap: 14px; flex: 1; min-height: 0; }
    .dock-pane.active { display: flex; }
    .sess-head { display: flex; gap: 8px; align-items: center; }
    .sess-head h4 { margin: 0; font-family: var(--font-serif); font-size: 15px; color: var(--text); flex: 0 0 auto; }
    .sess-date, .sess-num { padding: 5px 8px; border-radius: 8px; border: 1px solid var(--border); font-family: var(--font-sans); font-size: 12px; max-width: 130px; background: var(--bg-elevated); color: var(--text); }
    .sess-num { max-width: 70px; }
    .sess-tabs { display: flex; gap: 4px; background: var(--bg-sunken); border-radius: 999px; padding: 3px; }
    .sess-tabs button { flex: 1; border: none; background: transparent; padding: 6px 0; border-radius: 999px; font-size: 12px; cursor: pointer; color: var(--text-secondary); font-family: var(--font-sans); transition: .15s; }
    .sess-tabs button.active { background: var(--bg-elevated); color: var(--accent); box-shadow: inset 0 0 0 1px var(--border); font-weight: 600; }
    .sess-panel { display: none; flex-direction: column; gap: 8px; flex: 1; min-height: 0; }
    .sess-panel.active { display: flex; }
    .sess-ta { width: 100%; box-sizing: border-box; border: 1px solid var(--border); border-radius: 10px; padding: 8px 10px; font-family: var(--font-sans); font-size: 13px; line-height: 1.7; background: var(--bg-elevated); color: var(--text); resize: vertical; min-height: 90px; outline: none; }
    .sess-ta:focus { border-color: var(--accent); }
    #sp-transcript .sess-ta, #sp-reflection .sess-ta { flex: 1; min-height: 220px; }
    #sp-soap, #sp-dap { gap: 10px; }
    .sess-foot { display: flex; align-items: center; gap: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
    .sess-conf { font-size: 12.5px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; cursor: pointer; margin-right: auto; }
    .sess-foot button { padding: 6px 14px; font-size: 12.5px; }
  </style>
</head>
<body>
  <div class="layout">
    <div id="sidebar-mount"></div>
    <main class="main">
      <header class="topbar">
        <button class="btn-back" onclick="location.href='index.html'" title="返回" aria-label="返回" style="margin-right:8px;flex-shrink:0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M15 5l-7 7 7 7"/></svg>
        </button>
        <div class="brand">咨询记录</div>
        <div class="viewswitch">
          <button class="active" id="vw-workspace">工作区</button>
          <button id="vw-matrix">全站报告矩阵</button>
        </div>
        <button class="btn btn-ghost btn-sm" id="btnToggleRail" title="收起/展开来访者列表" style="margin-left:auto;padding:5px 10px;font-size:12px">◀ 收起</button>
      </header>

      <div class="ws" id="ws">
        <!-- 左栏 -->
        <div class="rail">
          <div class="search"><input id="search" placeholder="搜索姓名、标签、备注…"></div>
          <div class="status-pills" id="statusPills">
            <span class="pill active" data-status="all">全部</span>
            <span class="pill" data-status="active">咨询中</span>
            <span class="pill" data-status="paused">暂停</span>
            <span class="pill" data-status="ended">已结束</span>
          </div>
          <div class="clist" id="clist"></div>
        </div>

        <!-- 中栏 -->
        <div class="center" id="center"></div>

        <!-- 拖拽分隔条 -->
        <div class="resizer" id="resizer"></div>

        <!-- 右栏 AI 督导坞 -->
        <div class="aidock" id="aidock">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <h3 style="margin:0">AI 督导坞</h3>
            <button class="btn btn-ghost btn-sm" id="btnToggleDock" title="收起/展开AI坞" style="padding:4px 10px;font-size:12px">◀ 收起</button>
          </div>
          <!-- 右栏模式切换：自由笔记 / 选节快编 -->
          <div class="dock-mode-switch" id="dockModeSwitch">
            <button class="active" data-m="free">自由笔记</button>
            <button data-m="session">选节快编</button>
          </div>

          <!-- 模式 A：自由笔记（原 docEditor）+ AI 动作 -->
          <div class="dock-pane active" id="dockPane-free">
            <div class="orient-mini" id="orientMini">
              <button class="active" data-o="winnicott">温尼科特</button>
              <button data-o="psychoanalysis">精神分析</button>
              <button data-o="cbt">CBT</button>
              <button data-o="rogers">人本</button>
              <button data-o="yalom">存在</button>
              <button data-o="generic">通用</button>
            </div>
            <p class="hint">结果以紫色标记直接插入下方文档。取向与 AI 督导通用版共用。</p>
            <div class="ai-actions">
              <button class="primary" id="aiImpression"><span class="ic">✨</span> 生成整体印象（插入文档）</button>
              <button id="aiDeepen"><span class="ic">🔍</span> 就选区深化</button>
              <button id="aiPolish"><span class="ic">💡</span> 润色选区</button>
              <button id="aiMasters"><span class="ic">🗣</span> 开启大师对话</button>
            </div>
            <div class="word" id="docEditor" contenteditable="true"></div>
          </div>

          <!-- 模式 B：选中节次快速编辑器（P0-3：内嵌 session 编辑器，替代跳转 session.html） -->
          <div class="dock-pane" id="dockPane-session">
            <div id="sess-editor-empty" class="empty">从中间时间线点击一节 → 在此快速编辑</div>
            <div id="sess-editor-body" style="display:none">
              <div class="sess-head">
                <h4 id="sess-head-title">第 ? 节</h4>
                <input class="form-control sess-date" id="sess-date" type="date" aria-label="日期">
                <input class="form-control sess-num" id="sess-num" type="number" min="1" aria-label="节数">
              </div>
              <div class="sess-tabs" id="sessTabs">
                <button class="active" data-t="transcript">逐字稿</button>
                <button data-t="soap">SOAP</button>
                <button data-t="dap">DAP</button>
                <button data-t="reflection">反思</button>
              </div>
              <div class="sess-panel active" id="sp-transcript">
                <textarea class="sess-ta" id="sess-transcript" placeholder="会谈逐字稿…" data-ph="会谈逐字稿…"></textarea>
              </div>
              <div class="sess-panel" id="sp-soap">
                <textarea class="sess-ta" id="sess-soap-s" placeholder="S 主观资料"></textarea>
                <textarea class="sess-ta" id="sess-soap-o" placeholder="O 客观资料"></textarea>
                <textarea class="sess-ta" id="sess-soap-a" placeholder="A 评估"></textarea>
                <textarea class="sess-ta" id="sess-soap-p" placeholder="P 计划"></textarea>
              </div>
              <div class="sess-panel" id="sp-dap">
                <textarea class="sess-ta" id="sess-dap-d" placeholder="D 资料"></textarea>
                <textarea class="sess-ta" id="sess-dap-a" placeholder="A 评估"></textarea>
                <textarea class="sess-ta" id="sess-dap-p" placeholder="P 计划"></textarea>
              </div>
              <div class="sess-panel" id="sp-reflection">
                <textarea class="sess-ta" id="sess-reflection" placeholder="咨询师反思…" data-ph="咨询师反思…"></textarea>
              </div>
              <div class="sess-foot">
                <label class="sess-conf">
                  <input type="checkbox" id="sess-confirmed"> 已确认
                </label>
                <button class="btn btn-primary btn-sm" id="btnSessSave">保存</button>
                <button class="btn btn-ghost btn-sm" id="btnSessFullEdit">完整编辑</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 新建来访者模态框（P2-1：合并来访者导航后，咨询记录侧栏直接管理新建来访者） -->
  <div class="modal-overlay" id="client-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>新建来访者</h2>
        <button class="close" onclick="App.closeModal('client-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label class="form-label">姓名 / 化名 <span style="color:var(--red)">*</span></label>
          <input class="form-control" id="c-name" placeholder="如：小A / 阿拉伯">
        </div>
        <div class="form-row two">
          <div>
            <label class="form-label">性别</label>
            <select class="form-control" id="c-gender">
              <option value="unknown">未填</option>
              <option value="female">女</option>
              <option value="male">男</option>
              <option value="other">其他</option>
            </select>
          </div>
          <div>
            <label class="form-label">出生日期</label>
            <input class="form-control" id="c-birth" type="date">
          </div>
        </div>
        <div class="form-row two">
          <div>
            <label class="form-label">联系电话</label>
            <input class="form-control" id="c-phone" placeholder="选填">
          </div>
          <div>
            <label class="form-label">首访日期</label>
            <input class="form-control" id="c-firstvisit" type="date">
          </div>
        </div>
        <div class="form-row">
          <label class="form-label">标签（逗号分隔）</label>
          <input class="form-control" id="c-tags" placeholder="如：成人个体, 焦虑">
        </div>
        <div class="form-row">
          <label class="form-label">备注</label>
          <textarea class="form-control" id="c-notes" placeholder="背景信息摘要、转介来源等"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="App.closeModal('client-modal')">取消</button>
        <button class="btn btn-primary" onclick="saveNewClient()">保存</button>
      </div>
    </div>
  </div>

  <!-- 选区浮动工具栏 -->
  <div class="floating-tb" id="floatTb">
    <button data-cmd="bold"><b>B</b></button>
    <button data-cmd="italic"><i>I</i></button>
    <button data-cmd="formatBlock" data-val="H3">H</button>
    <button data-cmd="insertUnorderedList">•</button>
    <button data-cmd="formatBlock" data-val="BLOCKQUOTE">❝</button>
  </div>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/consultations.js"></script>
</body>
</html>
