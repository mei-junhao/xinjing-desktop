<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心镜 · 大师对话</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* 大师对话页专用样式：继承全局令牌，仅补充对话布局 */
    .masters-wrap { display: grid; grid-template-columns: 248px 1fr; gap: var(--gap-lg); height: calc(100vh - 132px); }
    .master-list { background: var(--paper-2); border: 1px solid var(--hair); border-radius: var(--r-card);
      box-shadow: var(--shadow); overflow: hidden; display: flex; flex-direction: column; }
    .master-list-head { padding: 14px 16px 10px; border-bottom: 1px solid var(--hair); }
    .master-list-head .t { font: 700 15px/1.3 var(--sans); color: var(--ink); }
    .master-list-head .s { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .mode-toggle { display: flex; gap: 6px; margin-top: 12px; }
    .mode-toggle button { flex: 1; border: 1px solid var(--hair-strong); background: var(--paper); color: var(--muted);
      border-radius: var(--r-btn); padding: 7px 0; font: 600 13px/1 var(--sans); cursor: pointer; transition: var(--transition); }
    .mode-toggle button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .master-scroll { overflow-y: auto; padding: 10px; flex: 1; }
    .master-card { display: flex; align-items: center; gap: 11px; padding: 11px 12px; border-radius: var(--r-sm);
      cursor: pointer; transition: var(--transition); border: 1px solid transparent; }
    .master-card:hover { background: var(--accent-soft); }
    .master-card.sel { background: var(--accent-soft); border-color: var(--accent-line); }
    .master-card.round-on { background: var(--accent-soft); }
    .m-avatar { width: 38px; height: 38px; border-radius: 50%; flex: 0 0 38px; display: flex; align-items: center;
      justify-content: center; font: 700 16px/1 var(--serif); color: #fff; }
    .m-meta { min-width: 0; }
    .m-name { font: 700 14px/1.2 var(--sans); color: var(--ink); }
    .m-school { font-size: 11.5px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .round-check { margin-left: auto; width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--hair-strong);
      display: none; align-items: center; justify-content: center; color: #fff; font-size: 12px; }
    .mode-round .round-check { display: flex; }
    .mode-round .master-card.round-on .round-check { background: var(--accent); border-color: var(--accent); }

    .chat-col { background: var(--paper-2); border: 1px solid var(--hair); border-radius: var(--r-card);
      box-shadow: var(--shadow); display: flex; flex-direction: column; overflow: hidden; position: relative; }
    .chat-head { padding: 13px 18px; border-bottom: 1px solid var(--hair); display: flex; align-items: center; gap: 12px; }
    .chat-head .ttl { font: 700 15px/1.3 var(--sans); color: var(--ink); }
    .chat-head .sub { font-size: 12px; color: var(--muted); }
    .chat-head .spacer { flex: 1; }
    .chat-head .icon-btn { border: 1px solid var(--hair-strong); background: var(--paper); color: var(--muted);
      border-radius: var(--r-btn); padding: 6px 12px; font: 600 12px/1 var(--sans); cursor: pointer; transition: var(--transition); }
    .chat-head .icon-btn:hover { color: var(--accent); border-color: var(--accent-line); }
    .chat-body { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 14px; }
    .msg { max-width: 82%; display: flex; gap: 10px; }
    .msg .av { width: 32px; height: 32px; border-radius: 50%; flex: 0 0 32px; display: flex; align-items: center;
      justify-content: center; font: 700 14px/1 var(--serif); color: #fff; }
    .msg .bubble { padding: 11px 14px; border-radius: 14px; font: 500 14px/1.65 var(--sans); color: var(--ink);
      background: var(--sidebar); white-space: pre-wrap; word-break: break-word; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.user .bubble { background: var(--accent); color: #fff; }
    .msg.sys { align-self: center; max-width: 92%; }
    .msg.sys .bubble { background: var(--accent-soft); color: var(--accent-2); font-size: 12.5px; text-align: center; border: 1px dashed var(--accent-line); }
    .typing { font-size: 12px; color: var(--muted); padding: 0 4px; font-style: italic; }
    .chat-input { border-top: 1px solid var(--hair); padding: 12px 16px; display: flex; gap: 10px; align-items: flex-end; }
    .chat-input textarea { flex: 1; resize: none; min-height: 44px; max-height: 140px; border: 1px solid var(--hair-strong);
      border-radius: var(--r-ctl); padding: 11px 13px; font: 500 14px/1.5 var(--sans); color: var(--ink);
      background: var(--paper); outline: none; font-family: var(--sans); }
    .chat-input textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .chat-input button { background: var(--accent); color: #fff; border: 0; border-radius: var(--r-btn);
      padding: 0 22px; height: 44px; font: 700 14px/1 var(--sans); cursor: pointer; flex: 0 0 auto; }
    .chat-input button:disabled { opacity: .5; cursor: not-allowed; }
    .empty-hint { margin: auto; text-align: center; color: var(--muted); font: 500 14px/1.7 var(--sans); max-width: 320px; }
    .empty-hint .big { font: 700 17px/1.4 var(--serif); color: var(--ink-2); margin-bottom: 8px; }

    /* 免费版锁定遮罩（与 session.html 同源） */
    .ai-lock { position: absolute; inset: 0; background: rgba(251,248,243,.94); z-index: 5;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; text-align: center; }
    .ai-lock.hidden { display: none; }
    .ai-lock .lock-emoji { font-size: 34px; }
    .ai-lock .lock-title { font-weight: 700; color: var(--accent); font-family: var(--sans); }
    .ai-lock .lock-sub { font-size: 13px; color: var(--muted); font-family: var(--sans); max-width: 300px; line-height: 1.6; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="layout">
    <div id="sidebar-mount"></div>
    <main class="main">
      <header class="main-header"><div id="page-header"></div></header>
      <div class="content">
        <div class="masters-wrap">
          <!-- 左：大师列表 -->
          <div class="master-list">
            <div class="master-list-head">
              <div class="t">与大师对话</div>
              <div class="s">选择一位大师单独请教，或切到「圆桌」邀请多位共同研讨</div>
              <div class="mode-toggle">
                <button id="mode-1v1" class="active" onclick="setMode('1v1')">一对一</button>
                <button id="mode-round" onclick="setMode('round')">圆桌</button>
              </div>
            </div>
            <div class="master-scroll" id="master-list"></div>
          </div>

          <!-- 右：对话区 -->
          <div class="chat-col">
            <div class="chat-head">
              <div>
                <div class="ttl" id="chat-title">未选择大师</div>
                <div class="sub" id="chat-sub">从左侧挑选一位开始</div>
              </div>
              <div class="spacer"></div>
              <button class="icon-btn hidden" id="btn-new" onclick="newConversation()">新对话</button>
              <button class="icon-btn hidden" id="btn-del" onclick="deleteCurrent()">删除</button>
            </div>
            <div class="chat-body" id="chat-body">
              <div class="empty-hint" id="empty-hint">
                <div class="big">与思想者对话</div>
                所有对话都保存在本机 IndexedDB，不会上传任何服务器。<br>
                对话过长时，系统会自动生成摘要，让大师「记得」更早的脉络，形成长时记忆。
              </div>
            </div>
            <div class="chat-input">
              <textarea id="msg-input" placeholder="输入你的问题，回车发送（圆桌模式下可 @大师 指定发言）" disabled
                onkeydown="if(event.key==='Enter'&&!event.shiftKey&&!event.isComposing&&event.keyCode!==229){event.preventDefault();sendMessage()}"></textarea>
              <button id="send-btn" onclick="sendMessage()" disabled>发送</button>
            </div>

            <!-- 免费版锁定遮罩 -->
            <div class="ai-lock hidden" id="ai-lock">
              <div class="lock-emoji">🔒</div>
              <div class="lock-title">AI 对话为付费功能</div>
              <div class="lock-sub">安装后 30 天内可免费试用。当前免费期已结束，请到「设置 → 关于」输入激活码解锁大师对话。</div>
              <button class="btn btn-primary btn-sm" onclick="openActivation()">去激活</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="confirm-modal">
    <div class="modal" style="max-width:380px">
      <div class="modal-header"><h2>确认</h2></div>
      <div class="modal-body"><p id="confirm-message" style="font-family:var(--sans);font-size:14px;"></p></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="App.closeModal('confirm-modal')">取消</button>
        <button class="btn btn-primary" id="confirm-ok">确定</button>
      </div>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/prompts.builtin.js"></script>
  <script src="js/masters-data.js"></script>
  <script src="js/masters-core.js"></script>
  <script src="js/masters.js"></script>
</body>
</html>
