<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大师对话</title>
  <link rel="stylesheet" href="css/masters-clinical.css">
</head>
<body>
  <div class="layout masters-clinical-page">
    <div id="sidebar-mount"></div>
    <main class="main">
      <header class="masters-topbar">
        <div class="masters-title-group">
          <button class="masters-icon-btn" type="button" onclick="location.href='index.html'" title="返回工作台" aria-label="返回工作台"><i data-lucide="arrow-left"></i></button>
          <div>
            <div class="masters-kicker">心理工作台 / 对话空间</div>
            <h1>多大师会诊</h1>
          </div>
          <span class="save-indicator" id="save-indicator"><i data-lucide="check"></i>已保存</span>
        </div>
        <div class="masters-top-actions">
          <span class="local-state"><i data-lucide="shield-check"></i>本机保存</span>
          <button class="masters-text-btn" id="btn-new" type="button" onclick="newConversation()"><i data-lucide="square-pen"></i>新对话</button>
          <button class="masters-icon-btn danger" id="btn-del" type="button" onclick="deleteCurrent()" title="删除当前对话" aria-label="删除当前对话"><i data-lucide="trash-2"></i></button>
        </div>
      </header>

      <section class="masters-context-strip" aria-label="当前对话上下文">
        <div class="context-main">
          <span class="context-label">当前议题</span>
          <strong id="context-title">未开始对话</strong>
          <span id="context-sub">选择一位大师，或进入圆桌模式开始讨论</span>
        </div>
        <div class="context-cell">
          <span class="context-label">工作模式</span>
          <strong id="context-mode">一对一</strong>
        </div>
        <div class="context-cell">
          <span class="context-label">参与视角</span>
          <strong id="context-master-count">未选择</strong>
        </div>
        <div class="context-cell context-safe"><i data-lucide="lock-keyhole"></i><span id="source-scope">仅本次输入</span></div>
      </section>

      <div class="masters-workspace">
        <aside class="masters-source-panel">
          <div class="source-head">
            <div>
              <span class="masters-eyebrow">讨论对象</span>
              <h2>大师视角</h2>
            </div>
            <button class="masters-icon-btn" type="button" onclick="newRound()" title="新建圆桌" aria-label="新建圆桌"><i data-lucide="plus"></i></button>
          </div>
          <div class="mode-switch" id="mode-toggle" role="tablist" aria-label="对话模式">
            <button class="active" type="button" data-mode="1v1" role="tab" aria-selected="true">一对一</button>
            <button type="button" data-mode="round" role="tab" aria-selected="false">圆桌</button>
          </div>
          <label class="masters-search"><i data-lucide="search"></i><input type="search" placeholder="搜索大师" aria-label="搜索大师"></label>
          <div class="master-scroll" id="master-list" aria-live="polite"></div>
          <div class="source-footer"><i data-lucide="info"></i><span>圆桌至少选择两位大师</span></div>
        </aside>

        <section class="masters-dialogue-panel" id="chat-panel" aria-label="大师对话">
          <header class="dialogue-head">
            <div class="dialogue-heading">
              <div class="dialogue-title" id="chat-title">选择一位大师</div>
              <div class="dialogue-sub" id="chat-sub">从左侧选择开始</div>
            </div>
            <div class="dialogue-controls">
              <label class="range-control" id="temp-control"><span>交心</span><input type="range" id="temp-slider" min="0" max="100" value="60" step="1" oninput="onTempChange(this.value)" aria-label="回应温度"><span>教学</span></label>
              <label class="range-control" id="detail-control"><span>简洁</span><input type="range" id="detail-slider" min="0" max="100" value="50" step="1" oninput="onDetailChange(this.value)" aria-label="回应详细度"><span>详尽</span></label>
              <button class="masters-icon-btn" type="button" onclick="exportCurrent()" title="导出当前对话" aria-label="导出当前对话"><i data-lucide="file-down"></i></button>
            </div>
          </header>
          <div class="dialogue-modebar">
            <div class="dialogue-status"><i data-lucide="circle-check"></i><span>对话内容只保存在本机</span></div>
            <div class="modebar-actions"><button type="button" class="masters-quiet-btn" id="btn-quote-last"><i data-lucide="quote"></i>引用</button><button type="button" class="masters-quiet-btn" id="btn-save-point"><i data-lucide="bookmark"></i>保存观点</button></div>
          </div>
          <div class="chat-body" id="chat-body">
            <div class="empty-state"><i data-lucide="messages-square"></i><strong>把一个临床问题带到桌面上</strong><span>先选择大师，再输入你正在思考的材料</span></div>
          </div>
          <form class="chat-input" id="chat-composer" onsubmit="event.preventDefault(); sendMessage()">
            <button class="masters-icon-btn composer-tool" id="btn-use-docs" type="button" title="切换本次是否引用我的资料" aria-label="切换本次是否引用我的资料" aria-pressed="true"><i data-lucide="paperclip"></i></button>
            <button class="masters-icon-btn composer-tool" id="btn-mention" type="button" title="在消息中插入 @" aria-label="在消息中插入 @"><i data-lucide="at-sign"></i></button>
            <textarea id="msg-input" placeholder="继续追问，输入 @大师 可指定发言" disabled rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey&&!event.isComposing&&event.keyCode!==229){event.preventDefault();sendMessage()}" aria-label="消息"></textarea>
            <button class="send-btn" id="send-btn" type="submit" disabled title="发送" aria-label="发送"><i data-lucide="arrow-up"></i></button>
          </form>
          <div class="lock-overlay hidden" id="ai-lock">
            <div class="lock-icon"><i data-lucide="lock-keyhole"></i></div>
            <strong>AI 大师对话需要激活</strong>
            <span>试用期内可使用。授权过期后，请到设置完成激活。</span>
            <button class="masters-primary-btn" type="button" onclick="openActivation()">去激活</button>
          </div>
        </section>

        <aside class="masters-inspector-panel">
          <div class="inspector-tabs" role="tablist" aria-label="对话侧栏">
            <button class="active" type="button" data-inspector-tab="summary">摘要</button>
            <button type="button" data-inspector-tab="history">历史</button>
          </div>
          <section class="inspector-view active" id="inspector-summary">
            <div class="inspector-head"><div><span class="masters-eyebrow">当前上下文</span><h2 id="matrix-title">尚未形成观点</h2></div><button class="masters-icon-btn" id="btn-pin-inspector" type="button" title="切换摘要密度" aria-label="切换摘要密度" aria-pressed="false"><i data-lucide="pin"></i></button></div>
            <div class="summary-box" id="summary-box"><span>对话摘要</span><p id="summary-text">开始对话后，这里会保留核心议题、共识和待深入的张力。</p></div>
            <div class="viewpoint-list" id="matrix-body">
              <div class="viewpoint-empty"><i data-lucide="layers-2"></i><span>大师回应会按视角汇总</span></div>
            </div>
            <div class="next-step-box"><span class="next-step-label">下一步</span><button type="button" id="btn-next-session"><i data-lucide="calendar-plus"></i>安排下一次会谈</button><button type="button" id="btn-supervision-draft"><i data-lucide="file-plus-2"></i>保存为督导草稿</button></div>
          </section>
          <section class="inspector-view" id="inspector-history">
            <div class="inspector-head"><div><span class="masters-eyebrow">本机记录</span><h2>历史对话</h2></div><button class="masters-icon-btn" id="btn-filter-history" type="button" title="筛选历史对话" aria-label="筛选历史对话" aria-pressed="false"><i data-lucide="list-filter"></i></button></div>
            <input class="history-filter" id="history-filter" type="search" placeholder="筛选历史对话" aria-label="筛选历史对话" hidden>
            <div class="hist-list" id="hist-list"></div>
          </section>
        </aside>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="confirm-modal">
    <div class="modal" style="max-width:380px">
      <div class="modal-header"><h2>确认</h2></div>
      <div class="modal-body"><p id="confirm-message"></p></div>
      <div class="modal-footer"><button class="btn btn-ghost" type="button" onclick="App.closeModal('confirm-modal')">取消</button><button class="btn btn-primary" id="confirm-ok" type="button">确定</button></div>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
  <script src="js/agent-tools.js"></script>
  <script src="js/agent-core.js"></script>
  <script src="js/xinjing-chat.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/prompts.builtin.js"></script>
  <script src="js/masters-data.js"></script>
  <script src="js/knowledge.builtins.js"></script>
  <script src="js/masters.js"></script>
</body>
</html>
