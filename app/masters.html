<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心镜 · 大师对话</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .masters-wrap { display:grid; grid-template-columns:240px 1fr 200px; height:calc(100vh - 56px); min-height:0 }
    .master-panel { background:var(--paper-2,var(--bg-elevated,#fff)); border-right:1px solid var(--border); display:flex; flex-direction:column; min-height:0 }
    .master-panel .head { padding:16px; border-bottom:1px solid var(--border) }
    .master-panel .head .t { font:700 15px var(--sans); color:var(--text) }
    .master-panel .mode-toggle { display:flex; gap:4px; background:var(--bg-sunken); border-radius:999px; padding:3px; margin-top:10px }
    .master-panel .mode-toggle button { flex:1; border:none; background:transparent; padding:7px 0; border-radius:999px; font:600 12.5px var(--sans); cursor:pointer; color:var(--text-secondary); transition:.15s }
    .master-panel .mode-toggle button.active { background:var(--paper,#fff); color:var(--accent); box-shadow:inset 0 0 0 1px var(--border); }
    .master-scroll { overflow-y:auto; flex:1; padding:8px }
    .master-card { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:var(--r-sm,10px); cursor:pointer; transition:.15s; border:1px solid transparent; margin-bottom:4px }
    .master-card:hover { background:var(--accent-soft); border-color:var(--accent-line, var(--border-strong)) }
    .master-card.active { background:var(--accent-soft); border-color:var(--accent) }
    .m-avatar { width:36px; height:36px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font:700 15px var(--serif); color:#fff }
    .m-meta { min-width:0; flex:1 }
    .m-name { font:700 13.5px var(--sans); color:var(--text) }
    .m-school { font-size:11px; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
    .m-check { width:18px; height:18px; border-radius:5px; border:1.5px solid var(--border-strong); display:none; align-items:center; justify-content:center; color:#fff; font-size:11px; flex-shrink:0 }
    .mode-round .m-check { display:flex }
    .master-card.active .m-check { background:var(--accent); border-color:var(--accent) }

    .chat-panel { background:var(--paper-2,var(--bg-elevated,#fff)); display:flex; flex-direction:column; min-height:0; position:relative }
    .chat-head { padding:13px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px }
    .chat-head .title { font:700 15px var(--sans); color:var(--text) }
    .chat-head .sub { font-size:12px; color:var(--text-muted) }
    .chat-head .spacer { flex:1 }
    .chat-head .icon-btn { border:1px solid var(--border); background:var(--paper,#fff); color:var(--text-secondary); border-radius:8px; padding:6px 12px; font:600 12px var(--sans); cursor:pointer }
    .chat-head .icon-btn:hover { color:var(--accent); border-color:var(--accent) }
    .chat-body { flex:1; overflow-y:auto; padding:16px 18px; display:flex; flex-direction:column; gap:14px }
    .chat-body .empty { margin:auto; text-align:center; color:var(--text-muted); font:500 13.5px/1.7 var(--sans) }
    .chat-body .empty .big { font:700 17px/1.4 var(--serif); color:var(--text-secondary); margin-bottom:8px }
    .chat-input { display:flex; gap:8px; padding:12px 18px; border-top:1px solid var(--border); background:var(--bg) }
    .chat-input textarea { flex:1; border:1px solid var(--border); border-radius:10px; padding:10px 12px; font:13.5px var(--sans); color:var(--text); background:var(--paper,#fff); resize:none; outline:none; min-height:44px; max-height:100px }
    .chat-input textarea:focus { border-color:var(--accent) }
    .chat-input button { background:var(--accent); color:#fff; border:0; border-radius:10px; padding:0 20px; font:700 14px var(--sans); cursor:pointer; flex-shrink:0 }
    .chat-input button:disabled { opacity:.5; cursor:not-allowed }

    .msg { display:flex; gap:10px; animation:fadeIn .25s ease }
    .msg.user { flex-direction:row-reverse }
    .msg.user .bubble { background:var(--accent); color:#fff; border-radius:14px 14px 4px 14px }
    .msg.ai .bubble { background:var(--bg-sunken); color:var(--text); border-radius:14px 14px 14px 4px; border:1px solid var(--border) }
    .msg .av { width:32px; height:32px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font:700 13px var(--serif); color:#fff }
    .msg .body { max-width:72%; min-width:0 }
    .msg .sender { font:700 11.5px var(--sans); color:var(--text-muted); margin-bottom:4px }
    .msg .bubble { padding:9px 14px; font:13.5px/1.6 var(--sans); word-break:break-word; white-space:pre-wrap }
    .msg .time { font-size:10.5px; color:var(--text-muted); margin-top:3px; text-align:right }
    .msg.user .time { text-align:left }
    .msg.typing .bubble { display:flex; gap:4px; align-items:center; padding:12px 14px }
    .msg.typing .dot { width:6px; height:6px; border-radius:50%; background:var(--text-muted); animation:blink 1.4s infinite ease-in-out both }
    .msg.typing .dot:nth-child(2) { animation-delay:.2s }
    .msg.typing .dot:nth-child(3) { animation-delay:.4s }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

    .lock-overlay { position:absolute; inset:0; background:rgba(246,248,252,.94); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; text-align:center; z-index:5 }
    .lock-overlay.hidden { display:none }
    .lock-overlay .lock-emoji { font-size:34px }
    .lock-overlay .lock-title { font-weight:700; color:var(--accent); font-family:var(--sans) }
    .lock-overlay .lock-sub { font-size:13px; color:var(--text-muted); font-family:var(--sans); max-width:300px; line-height:1.6 }
    .dark .lock-overlay { background:rgba(24,27,36,.94) }
  </style>
</head>
<body>
  <div class="layout">
    <div id="sidebar-mount"></div>
    <main class="main" style="overflow:hidden">
      <header class="topbar" style="margin:0">
        <button class="btn-back" onclick="location.href='index.html'" title="返回" aria-label="返回" style="margin-right:8px;flex-shrink:0;border:1px solid var(--border);background:var(--paper,#fff);border-radius:9px;padding:6px 12px;font:600 12px var(--sans);cursor:pointer;color:var(--text)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" style="vertical-align:middle" width="18" height="18"><path d="M15 5l-7 7 7 7"/></svg>
        </button>
        <div class="brand">大师对话</div>
        <span id="save-indicator" style="font-size:11px;color:var(--success);display:none;margin-left:8px">已保存</span>
        <div style="margin-left:auto;display:flex;gap:8px">
          <button class="btn btn-ghost btn-sm" id="btn-new" onclick="newConversation()" style="display:none">+ 新对话</button>
          <button class="btn btn-ghost btn-sm" id="btn-del" onclick="deleteCurrent()" style="display:none;color:var(--danger)">删除</button>
        </div>
      </header>
      <div class="masters-wrap">
        <div class="master-panel">
          <div class="head">
            <div class="t">与大师对话</div>
            <div class="mode-toggle" id="mode-toggle">
              <button class="active" data-mode="1v1">一对一</button>
              <button data-mode="round">圆桌</button>
            </div>
          </div>
          <div class="master-scroll" id="master-list"></div>
        </div>

        <div class="chat-panel" id="chat-panel">
          <div class="chat-head">
            <div>
              <div class="title" id="chat-title">选择一位大师</div>
              <div class="sub" id="chat-sub">从左侧选择开始对话</div>
            </div>
            <div class="spacer"></div>
            <div style="display:flex;align-items:center;gap:6px;font-size:10px;color:var(--ink-3)">
              <span>💬 交心</span>
              <input type="range" id="temp-slider" min="0" max="100" value="60" step="1" style="width:64px;height:4px;accent-color:var(--accent);cursor:pointer" oninput="onTempChange(this.value)">
              <span>📖 教学</span>
              <span style="margin:0 4px;border-left:1px solid var(--border);height:14px;display:inline-block"></span>
              <span>📝 简洁</span>
              <input type="range" id="detail-slider" min="0" max="100" value="50" step="1" style="width:64px;height:4px;accent-color:var(--accent);cursor:pointer" oninput="onDetailChange(this.value)">
              <span>📋 详尽</span>
            </div>
          </div>
          <div class="chat-body" id="chat-body">
            <div class="empty"><div class="big">与思想者对话</div>所有对话保存在本机，不上传任何服务器。<br>对话过长时自动生成摘要，延续脉络。</div>
          </div>
          <div class="chat-input">
            <textarea id="msg-input" placeholder="输入你的问题，回车发送。圆桌模式下可 @大师 指定发言" disabled onkeydown="if(event.key==='Enter'&&!event.shiftKey&&!event.isComposing&&event.keyCode!==229){event.preventDefault();sendMessage()}"></textarea>
            <button id="send-btn" onclick="sendMessage()" disabled>发送</button>
          </div>
          <div class="lock-overlay hidden" id="ai-lock">
            <div class="lock-emoji">💡</div>
            <div class="lock-title">AI 大师对话需要激活</div>
            <div class="lock-sub">试用期内可免费使用。如已过期，请到「设置 → 激活」输入激活码。</div>
            <button class="btn btn-primary btn-sm" onclick="openActivation()">去激活</button>
          </div>
        </div>
      </div>
      <!-- 右栏：历史对话 -->
      <div style="background:var(--paper-2,var(--bg-elevated,#fff));border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden">
        <div style="padding:10px 14px;border-bottom:1px solid var(--border);font:600 12px var(--sans);color:var(--text-secondary);display:flex;align-items:center;gap:8px"><span>历史对话</span><span class="sp" style="flex:1"></span><button class="btn btn-ghost btn-sm" onclick="exportCurrent()" title="导出当前对话为 Markdown" style="border:1px solid var(--border);border-radius:6px;padding:3px 8px;font:11px var(--sans);cursor:pointer;background:transparent;color:var(--ink-2)">📄 导出</button></div>
        <div id="hist-list" style="flex:1;overflow-y:auto;padding:6px"></div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="confirm-modal">
    <div class="modal" style="max-width:380px">
      <div class="modal-header"><h2>确认</h2></div>
      <div class="modal-body"><p id="confirm-message" style="font-family:var(--sans);font-size:14px;"></p></div>
      <div class="modal-footer"><button class="btn btn-ghost" onclick="App.closeModal('confirm-modal')">取消</button><button class="btn btn-primary" id="confirm-ok">确定</button></div>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
<script src="js/xiaojing-panel.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/prompts.builtin.js"></script>
  <script src="js/masters-data.js"></script>
  <script src="js/knowledge.builtins.js"></script>
  <script src="js/masters.js"></script>
</body>
</html>
