<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心镜 · 对话模式</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/components.css">
<style>
:root{--accent:#8b93c7;--accent-hover:#7a85bb;--ink:#2d2d3a;--ink-2:#5a5a6e;--ink-3:#8a8a9e;--border:#e2e2ec;--paper:#f8f8fc;--paper-2:#ffffff;--bg:#f0f0f8}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--ink);height:100vh;overflow:hidden;display:flex;flex-direction:column}

.chat-container{flex:1;display:flex;flex-direction:column;max-width:900px;margin:0 auto;width:100%;padding:0 24px}

.chat-header{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border);flex-shrink:0}
.chat-header .logo{display:flex;align-items:center;gap:10px}
.chat-header .logo-icon{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#9b8bc7);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700}
.chat-header .logo-title{font-size:18px;font-weight:600;color:var(--ink)}
.chat-header .logo-sub{font-size:12px;color:var(--ink-3);margin-top:1px}
.chat-header .actions{display:flex;align-items:center;gap:8px}
.chat-header .btn{padding:6px 14px;border:1px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer;background:var(--paper-2);color:var(--ink-2);transition:all .2s}
.chat-header .btn:hover{border-color:var(--accent);color:var(--accent)}
.chat-header .btn.pri{background:var(--accent);color:#fff;border-color:var(--accent)}
.chat-header .btn.pri:hover{background:var(--accent-hover)}

.chat-msgs{flex:1;overflow-y:auto;padding:20px 0;display:flex;flex-direction:column;gap:20px}
.chat-msgs::-webkit-scrollbar{width:6px}
.chat-msgs::-webkit-scrollbar-track{background:transparent}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.chat-msgs::-webkit-scrollbar-thumb:hover{background:var(--ink-3)}

.chat-msg{display:flex;gap:12px}
.chat-msg.user{flex-direction:row-reverse}
.chat-msg .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.chat-msg.assistant .avatar{background:linear-gradient(135deg,var(--accent),#9b8bc7);color:#fff}
.chat-msg.user .avatar{background:var(--border);color:var(--ink-2)}
.chat-msg .bubble{max-width:70%;padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.chat-msg.assistant .bubble{background:var(--paper-2);border:1px solid var(--border);border-radius:18px 18px 18px 4px}
.chat-msg.user .bubble{background:var(--accent);color:#fff;border-radius:18px 18px 4px 18px}

.chat-msg.system{justify-content:center}
.chat-msg.system .bubble{background:var(--paper);border:none;color:var(--ink-3);font-size:12px;padding:6px 12px;border-radius:6px}

.chat-msg.typing .bubble{background:var(--paper-2);border:1px solid var(--border)}
.typing-dots{display:flex;gap:4px;align-items:center;padding:4px 0}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:typing 1.4s infinite ease-in-out}
.typing-dots span:nth-child(1){animation-delay:-0.32s}
.typing-dots span:nth-child(2){animation-delay:-0.16s}
@keyframes typing{0%,80%,100%{opacity:.2}40%{opacity:1}}

.chat-input-row{padding:16px 0;border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:12px;align-items:flex-end}
.chat-input-area{flex:1;position:relative}
.chat-input{width:100%;min-height:44px;max-height:160px;padding:12px 52px 12px 16px;border:1px solid var(--border);border-radius:16px;font-size:14px;line-height:1.6;font-family:inherit;background:var(--paper-2);color:var(--ink);resize:none;transition:all .2s}
.chat-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(139,147,199,.1)}
.chat-input::placeholder{color:var(--ink-3)}
.chat-input-row .voice-btn{position:absolute;right:12px;bottom:12px;width:28px;height:28px;border-radius:50%;border:none;background:transparent;cursor:pointer;color:var(--ink-3);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.chat-input-row .voice-btn:hover{color:var(--accent)}
.chat-input-row .voice-btn.recording{color:#ff6b6b;animation:pulse 1.5s infinite}

.chat-send{width:44px;height:44px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.chat-send:hover{background:var(--accent-hover)}
.chat-send:disabled{opacity:.5;cursor:not-allowed}

.welcome-card{background:var(--paper-2);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px}
.welcome-card .title{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:12px}
.welcome-card .desc{font-size:13px;color:var(--ink-2);line-height:1.6;margin-bottom:16px}
.welcome-card .quick-actions{display:flex;flex-wrap:wrap;gap:8px}
.welcome-card .quick-btn{padding:8px 14px;border:1px solid var(--border);border-radius:999px;font-size:12px;color:var(--ink-2);cursor:pointer;background:transparent;transition:all .2s}
.welcome-card .quick-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(139,147,199,.05)}

.tier-banner{padding:8px 16px;border-radius:8px;font-size:12px;margin-bottom:16px;text-align:center}
.tier-banner.free{background:#fff8e7;color:#b8860b}
.tier-banner.pro{background:#e7f3ff;color:#1e88e5}
.tier-banner.custom{background:#f3e7ff;color:#7b1fa2}
</style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="logo">
        <div class="logo-icon">心</div>
        <div>
          <div class="logo-title">心镜</div>
          <div class="logo-sub">对话模式</div>
        </div>
      </div>
      <div class="actions">
        <button class="btn" onclick="switchToExpert()">专家模式</button>
        <button class="btn pri" onclick="openActivation()">激活专业版</button>
      </div>
    </div>

    <div class="chat-msgs" id="chat-msgs"></div>

    <div class="chat-input-row">
      <div class="chat-input-area">
        <textarea class="chat-input" id="chat-input" placeholder="对心镜说点什么...&#10;&#10;试试：&#10;• 帮我记录今天的咨询&#10;• 查看这个月的收入&#10;• 我有个案例需要督导" rows="1"></textarea>
        <button class="voice-btn" id="voice-btn" title="语音输入" onclick="toggleVoice()">🎤</button>
      </div>
      <button class="chat-send" id="chat-send" onclick="sendMsg()">→</button>
    </div>
  </div>

<script src="js/app.js"></script>
<script src="js/store.js"></script>
<script src="js/license.js"></script>
<script src="js/agent-tools.js"></script>
<script src="js/agent-core.js"></script>
<script src="js/chat-home.js"></script>
</body>
</html>
