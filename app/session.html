<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心镜 · 会话记录</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .tab-bar {
      display: flex;
      gap: var(--gap-sm);
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--gap-lg);
      overflow-x: auto;
    }
    .tab {
      padding: 10px 18px;
      font-family: var(--sans);
      font-size: 14px;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: var(--transition);
    }
    .tab:hover { color: var(--accent); }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 500;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; animation: fadeIn 0.2s ease; }

    .soap-grid {
      display: grid;
      gap: var(--gap);
    }
    .soap-block label {
      display: block;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 6px;
      color: var(--accent);
    }
    .soap-block label small {
      font-weight: 400;
      color: var(--muted);
      font-family: var(--sans);
    }

    .transcript-area {
      width: 100%;
      min-height: 400px;
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.8;
      padding: var(--gap);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text);
    }
    .transcript-area:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .session-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: var(--gap-sm);
      margin-bottom: var(--gap-lg);
    }
    .session-meta .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .session-meta label {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--sans);
    }

    .save-bar {
      position: sticky;
      bottom: 0;
      background: var(--bg);
      padding: var(--gap) 0;
      display: flex;
      gap: var(--gap);
      justify-content: flex-end;
      border-top: 1px solid var(--border);
      margin-top: var(--gap);
    }

    .ai-panel {
      background: var(--accent-light);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--gap-lg);
    }
    .ai-quick {
      display: flex;
      flex-wrap: wrap;
      gap: var(--gap-sm);
      margin-bottom: var(--gap);
    }
    .ai-chat {
      font-family: var(--sans);
      font-size: 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: var(--gap);
      min-height: 120px;
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: var(--gap);
    }
    .ai-msg { margin-bottom: var(--gap-sm); }
    .ai-msg.user { text-align: right; }
    .ai-msg .bubble {
      display: inline-block;
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      max-width: 80%;
      text-align: left;
    }
    .ai-msg.user .bubble { background: var(--accent); color: #fff; }
    .ai-msg.ai .bubble { background: var(--accent-soft); color: var(--text); }
    .ai-input-row { display: flex; gap: var(--gap-sm); }
    .ai-input-row input { flex: 1; }

    .ai-mode-bar {
      display: flex; gap: var(--gap-sm); margin-bottom: var(--gap);
      align-items: center; flex-wrap: wrap;
    }
    .ai-mode-bar .seg {
      display: inline-flex; border: 1px solid var(--border); border-radius: 999px; overflow: hidden;
    }
    .ai-mode-bar .seg button {
      border: 0; background: transparent; padding: 6px 16px; font-family: var(--sans);
      font-size: 13px; color: var(--muted); cursor: pointer;
    }
    .ai-mode-bar .seg button.active { background: var(--accent); color: #fff; }
    .ai-sup-row { display: flex; gap: var(--gap-sm); align-items: center; margin-bottom: var(--gap); flex-wrap: wrap; }
    .ai-sup-row select { flex: 1; min-width: 180px; }
    .ai-custom-prompt { margin-bottom: var(--gap); }
    .ai-custom-prompt textarea { width: 100%; min-height: 90px; }
    .ai-lock {
      position: absolute; inset: 0; background: rgba(246, 248, 252, .96);
      border-radius: var(--radius); display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; padding: var(--gap-lg);
      gap: var(--gap-sm);
    }
    .ai-lock .lock-emoji { font-size: 34px; }
    .ai-lock .lock-title { font-weight: 700; color: var(--accent); font-family: var(--sans); }
    .ai-lock .lock-sub { font-size: 13px; color: var(--muted); font-family: var(--sans); max-width: 280px; line-height: 1.6; }
    .dark .ai-lock, html.dark .ai-lock { background: rgba(24, 27, 36, .96); }
    .ai-panel { position: relative; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="layout">
    <div id="sidebar-mount"></div>
    <main class="main">
      <header class="main-header">
        <div id="page-header"></div>
      </header>
      <div class="content">
        <!-- 会话元信息 -->
        <div class="session-meta">
          <div class="field">
            <label>日期</label>
            <input class="form-control" id="s-date" type="date">
          </div>
          <div class="field">
            <label>开始</label>
            <input class="form-control" id="s-start" type="time">
          </div>
          <div class="field">
            <label>结束</label>
            <input class="form-control" id="s-end" type="time">
          </div>
          <div class="field">
            <label>时长(分钟)</label>
            <input class="form-control" id="s-duration" type="number" min="0">
          </div>
          <div class="field">
            <label>第几节</label>
            <input class="form-control" id="s-session-number" type="number" min="1">
          </div>
        </div>

        <!-- Tab 切换 -->
        <div class="tab-bar" id="tab-bar">
          <div class="tab active" data-tab="transcript" onclick="switchTab('transcript')">逐字稿</div>
          <div class="tab" data-tab="soap" onclick="switchTab('soap')">SOAP</div>
          <div class="tab" data-tab="dap" onclick="switchTab('dap')">DAP</div>
          <div class="tab" data-tab="reflection" onclick="switchTab('reflection')">反思</div>
          <div class="tab" data-tab="ai" onclick="switchTab('ai')">AI 助手</div>
        </div>

        <!-- 逐字稿 -->
        <div class="tab-panel active" id="panel-transcript">
          <div style="display:flex;gap:var(--gap-sm);margin-bottom:var(--gap-sm)">
            <button class="btn btn-ghost btn-sm" onclick="pasteTranscript()">粘贴</button>
            <button class="btn btn-primary btn-sm" onclick="generateSoapFromTranscript()">AI 生成 SOAP</button>
          </div>
          <textarea class="transcript-area" id="t-transcript" placeholder="在此录入会谈逐字稿，如：&#10;&#10;咨：你好，今天想聊些什么？&#10;来：我最近总是睡不好..."></textarea>
        </div>

        <!-- SOAP -->
        <div class="tab-panel" id="panel-soap">
          <div class="soap-grid">
            <div class="soap-block">
              <label>S <small>Subjective 主观资料</small></label>
              <textarea class="form-control" id="soap-s" placeholder="来访者的自述、主诉、主观体验"></textarea>
            </div>
            <div class="soap-block">
              <label>O <small>Objective 客观资料</small></label>
              <textarea class="form-control" id="soap-o" placeholder="可观察的行为、情绪、非言语信息"></textarea>
            </div>
            <div class="soap-block">
              <label>A <small>Assessment 评估</small></label>
              <textarea class="form-control" id="soap-a" placeholder="临床评估、动力学理解、诊断印象"></textarea>
            </div>
            <div class="soap-block">
              <label>P <small>Plan 计划</small></label>
              <textarea class="form-control" id="soap-p" placeholder="后续咨询方向、家庭作业、转介建议"></textarea>
            </div>
          </div>
        </div>

        <!-- DAP -->
        <div class="tab-panel" id="panel-dap">
          <div class="soap-grid">
            <div class="soap-block">
              <label>D <small>Data 资料</small></label>
              <textarea class="form-control" id="dap-d" placeholder="会谈中呈现的事实与素材"></textarea>
            </div>
            <div class="soap-block">
              <label>A <small>Assessment 评估</small></label>
              <textarea class="form-control" id="dap-a" placeholder="对资料的理解与评估"></textarea>
            </div>
            <div class="soap-block">
              <label>P <small>Plan 计划</small></label>
              <textarea class="form-control" id="dap-p" placeholder="后续计划"></textarea>
            </div>
          </div>
        </div>

        <!-- 反思 -->
        <div class="tab-panel" id="panel-reflection">
          <textarea class="form-control" id="t-reflection" style="min-height:300px" placeholder="咨询师的自我反思：反移情、技术选择、值得注意的瞬间..."></textarea>
        </div>

        <!-- AI 助手 -->
        <div class="tab-panel" id="panel-ai">
          <div class="ai-panel">
            <div class="ai-mode-bar">
              <div class="seg">
                <button id="mode-general" class="active" onclick="switchAiMode('general')">通用助手</button>
                <button id="mode-supervise" onclick="switchAiMode('supervise')">AI 督导</button>
              </div>
            </div>

            <!-- AI 督导专属区 -->
            <div id="ai-supervise-area" class="hidden">
              <div class="ai-sup-row">
                <select id="ai-supervisor" class="form-control"></select>
                <button class="btn btn-primary btn-sm" onclick="aiSupervise()">生成督导意见</button>
              </div>
              <div class="ai-custom-prompt">
                <details>
                  <summary style="cursor:pointer;font-size:13px;color:var(--muted);font-family:var(--sans)">自定义本次督导师提示词（可选，覆盖所选身份，不保存）</summary>
                  <div style="margin-top:8px">
                    <div style="display:flex;gap:8px;margin-bottom:6px">
                      <input type="file" id="ai-prompt-file" accept=".txt,.md,.text" style="font-size:12px;flex:1">
                      <button class="btn btn-ghost btn-sm" onclick="loadPromptFile()">读取文件</button>
                    </div>
                    <textarea id="ai-custom-prompt" class="form-control" placeholder="粘贴或输入自定义督导师的方法论/角色设定，本次生成有效..."></textarea>
                  </div>
                </details>
              </div>
            </div>

            <div style="font-weight:600;margin:var(--gap-sm) 0">快捷操作</div>
            <div class="ai-quick">
              <button class="btn btn-ghost btn-sm" onclick="aiGenerate('soap')">生成 SOAP</button>
              <button class="btn btn-ghost btn-sm" onclick="aiGenerate('summary')">生成总结</button>
              <button class="btn btn-ghost btn-sm" onclick="aiGenerate('theme')">分析主题</button>
              <button class="btn btn-ghost btn-sm" onclick="aiGenerate('next')">建议下次方向</button>
            </div>
            <div class="ai-chat" id="ai-chat">
              <div class="ai-msg ai"><div class="bubble">你好，我已经阅读了本次会谈的全部内容。你可以让我生成报告、分析主题，或就具体议题提问。</div></div>
            </div>
            <div class="ai-input-row">
              <input class="form-control" id="ai-input" placeholder="输入问题，回车发送" onkeydown="if(event.key==='Enter')aiSend()">
              <button class="btn btn-primary" onclick="aiSend()">发送</button>
            </div>

            <!-- 免费版锁定的遮罩 -->
            <div class="ai-lock hidden" id="ai-lock">
              <div class="lock-emoji">🔒</div>
              <div class="lock-title">AI 助手为付费功能</div>
              <div class="lock-sub">基础个案管理免费可用；AI 助手（含通用助手与 AI 督导）需激活后解锁。请到「设置 → 关于」输入激活码升级。</div>
              <button class="btn btn-primary btn-sm" onclick="openActivation()">去激活</button>
            </div>
          </div>
        </div>

        <!-- 保存栏 -->
        <div class="save-bar">
          <span id="confirm-hint" style="margin-right:auto;font-size:13px;color:var(--muted);font-family:var(--sans);align-self:center"></span>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;font-family:var(--sans);color:var(--muted);cursor:pointer">
            <input type="checkbox" id="s-confirmed"> 标记为已确认
          </label>
          <button class="btn btn-ghost" onclick="goBack()">返回</button>
          <button class="btn btn-primary" onclick="saveSession()">保存</button>
        </div>
      </div>
    </main>
  </div>

  <!-- 确认对话框 -->
  <div class="modal-overlay" id="confirm-modal">
    <div class="modal" style="max-width:380px">
      <div class="modal-header"><h2>确认</h2></div>
      <div class="modal-body"><p id="confirm-message" style="font-family:var(--sans);font-size:14px;"></p></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="App.closeModal('confirm-modal')">取消</button>
        <button class="btn btn-primary" id="confirm-ok">确定</button>
      </div>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/prompts.builtin.js"></script>
  <script src="js/supervisors.js"></script>
  <script src="js/session.js"></script>
</body>
</html>
