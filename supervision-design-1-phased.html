<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>督导方案1 · 分阶段工作台</title>
<style>
:root{--bg:#F6F8FC;--bg-el:#FFFFFF;--bg-soft:#EDF0F7;--border:#E2E7F0;--text:#2B3140;--t2:#646B7D;--t3:#99A1B3;--accent:#8B93C7;--a-hover:#777FBC;--a-soft:#ECEEF9;--success:#6FAE8F;--warn:#D6A85C;--danger:#D98C8C;--r:14px;--r-sm:10px;--serif:"Noto Serif SC",Georgia,serif;--sans:"Noto Sans SC",system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}
.topbar{display:flex;align-items:center;gap:14px;padding:12px 24px;background:var(--bg-el);border-bottom:1px solid var(--border)}
.topbar h2{font-family:var(--serif);font-size:19px;margin:0}
.phase-strip{display:flex;gap:0;padding:0 24px;background:var(--bg-el);border-bottom:1px solid var(--border);overflow-x:auto}
.phase-step{flex:1;padding:14px 18px;text-align:center;font-size:13px;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.2s;min-width:100px}
.phase-step.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.phase-step.done{color:var(--success)}
.phase-step .num{display:inline-block;width:22px;height:22px;border-radius:50%;border:2px solid var(--t3);line-height:19px;font-size:11px;margin-right:6px;font-weight:700}
.phase-step.active .num{border-color:var(--accent);background:var(--accent);color:#fff}
.phase-step.done .num{border-color:var(--success);background:var(--success);color:#fff}
.workspace{display:flex;flex:1;min-height:0;height:calc(100vh - 110px)}
.panel{flex:1;overflow-y:auto;padding:24px 28px;max-width:860px}
.panel h3{font-family:var(--serif);font-size:16px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.panel h3 .ln{flex:1;height:1px;background:var(--border)}
.side-dock{width:340px;flex-shrink:0;background:var(--bg-el);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:18px;gap:14px}
textarea{width:100%;border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;font:14px/1.8 var(--sans);resize:vertical;min-height:180px;background:var(--bg-el);color:var(--text)}
textarea:focus{outline:none;border-color:var(--accent)}
.btn{border:1px solid var(--border);background:var(--bg-el);border-radius:9px;padding:9px 18px;font-size:13px;cursor:pointer;color:var(--text)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:var(--a-hover)}
select{border:1px solid var(--border);border-radius:8px;padding:8px 12px;font:13px var(--sans);background:var(--bg-el);color:var(--text)}
.field-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.field-row label{font-size:12px;color:var(--t3);min-width:50px}
</style>
</head>
<body>
<div class="topbar">
  <h2>AI 督导</h2>
  <span style="color:var(--t3);font-size:13px">分阶段工作台</span>
</div>
<div class="phase-strip">
  <span class="phase-step active"><span class="num">1</span> 选择来访者与会谈</span>
  <span class="phase-step"><span class="num">2</span> 提交材料</span>
  <span class="phase-step"><span class="num">3</span> 生成整体印象</span>
  <span class="phase-step"><span class="num">4</span> 深化对话</span>
</div>
<div class="workspace">
  <div class="panel">
    <div class="field-row">
      <label>取向</label>
      <select style="flex:1;max-width:200px"><option>温尼科特</option><option>精神分析</option><option>CBT</option><option>通用整合</option></select>
      <label style="margin-left:12px">来访者</label>
      <select style="flex:1;max-width:200px"><option>选择来访者…</option><option>林小满</option><option>陈默</option><option>（纯个人笔记）</option></select>
    </div>
    <div class="field-row">
      <label>关联会话</label>
      <select style="flex:1;max-width:300px"><option>选择会话…</option><option>林小满 · 第5节 2026-07-10</option><option>不关联</option></select>
      <button class="btn" style="font-size:12px">载入该节逐字稿</button>
    </div>
    <h3>临床材料 <span class="ln"></span></h3>
    <textarea placeholder="在此书写案例报告，或拖入逐字稿…&#10;&#10;来访者，女，29岁，因「反复确认丈夫是否还爱自己」就诊。&#10;第三次会谈中，她谈到童年常被母亲以「再闹就不要你了」威胁……&#10;&#10;T: 当你说「再确认一次」的时候，身体有什么感觉？&#10;P: 胸口发紧，好像不确认下一秒他就不见了。"></textarea>
    <p style="font-size:11px;color:var(--t3);margin-top:6px">支持直接粘贴、拖入 .txt/.md/.docx 文件，或从会话记录一键载入逐字稿</p>
    <div style="margin-top:16px;display:flex;gap:8px">
      <button class="btn primary">提交并生成整体印象 →</button>
      <button class="btn">保存草稿</button>
    </div>
  </div>
  <div class="side-dock">
    <h4 style="margin:0;font-family:var(--serif)">AI 督导坞</h4>
    <p style="font-size:12px;color:var(--t3);line-height:1.7">当前取向：温尼科特 · 督导版本：女娲版（教你怎么督导）<br>提交材料后 AI 生成整体印象，可多轮深化讨论。</p>
    <div style="background:var(--a-soft);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;font-size:13px;line-height:1.8;color:var(--t2)">
      <b>整体印象（示例）</b><br>
      基于温尼科特框架，来访者对"被抛弃"的反复确认与童年被母亲威胁的关系模式构成核心议题。过渡性空间尚未建立，治疗师提供的抱持性环境正在逐渐被内化……
    </div>
    <div style="display:flex;gap:6px;margin-top:4px">
      <button class="btn" style="flex:1">深化讨论</button>
      <button class="btn" style="flex:1">就技术提问</button>
    </div>
    <div style="border-top:1px solid var(--border);padding-top:12px">
      <h4 style="margin:0 0 8px;font-family:var(--serif);font-size:13px">本次督导历史</h4>
      <div style="font-size:12px;color:var(--t3);line-height:1.6">整体印象已生成。可继续深化，或开始新一轮督导。</div>
    </div>
  </div>
</div>
</body>
</html>
