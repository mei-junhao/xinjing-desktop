<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>真人督导 · 方案C 双栏编辑</title>
<style>
:root{--bg:#F6F8FC;--paper:#fff;--soft:#EDF0F7;--border:#E2E7F0;--ink:#2B3140;--ink2:#646B7D;--ink3:#99A1B3;--accent:#8B93C7;--a-soft:#ECEEF9;--green:#6FAE8F;--red:#D98C8C;--orange:#D6A85C;--serif:"Noto Serif SC",Georgia,serif;--sans:system-ui,-apple-system,sans-serif;--r:14px;--r-sm:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);height:100vh;overflow:hidden;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--paper);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.topbar .back{font-size:13px;cursor:pointer;border:none;background:none;color:var(--ink2);padding:4px 8px;border-radius:6px}
.topbar h2{font-family:var(--serif);font-size:18px}
.topbar .sp{flex:1}
.topbar select,.topbar button{border:1px solid var(--border);background:var(--paper);border-radius:8px;padding:6px 12px;font:12px var(--sans);cursor:pointer;color:var(--ink2)}
.topbar .btn-p{background:var(--accent);color:#fff;border:none}
.dual{display:grid;grid-template-columns:1fr 1fr;flex:1;min-height:0}
.col{display:flex;flex-direction:column;overflow:hidden}
.col-left{border-right:1px solid var(--border)}
.col-head{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;background:var(--paper)}
.col-head .title{font-family:var(--serif);font-size:14px;font-weight:600}
.col-head .sp{flex:1}
.col-head .badge{font-size:10px;padding:2px 8px;border-radius:5px}
.col-head .badge.ref{background:rgba(214,168,92,.15);color:var(--orange)}
.col-head .badge.note{background:var(--a-soft);color:var(--accent)}
.col-head button{border:1px solid var(--border);background:var(--paper);border-radius:7px;padding:4px 10px;font:11px var(--sans);cursor:pointer;color:var(--ink2)}
.col-head .btn-p{background:var(--accent);color:#fff;border:none}
.col-body{flex:1;overflow-y:auto;padding:16px 20px}
/* 左：逐字稿/手打 */
.transcript-area{font-size:13.5px;line-height:1.9;color:var(--ink2);white-space:pre-wrap}
.transcript-area .turn{margin-bottom:14px;padding:12px 14px;border-radius:8px;background:var(--paper);border:1px solid var(--border)}
.transcript-area .turn.c{border-left:3px solid var(--accent)}
.transcript-area .turn.t{border-left:3px solid var(--green)}
.transcript-area .turn .role{font-size:11px;font-weight:600;margin-bottom:4px}
.transcript-area .turn.c .role{color:var(--accent)}
.transcript-area .turn.t .role{color:var(--green)}
.upload-zone{border:2px dashed var(--border);border-radius:var(--r);padding:40px 20px;text-align:center;color:var(--ink3);cursor:pointer;transition:.2s}
.upload-zone:hover{border-color:var(--accent);color:var(--accent)}
.upload-zone .icon{font-size:32px;margin-bottom:8px}
/* 右：督导笔记 */
.note-section{margin-bottom:20px}
.note-section h4{font-family:var(--serif);font-size:13px;margin-bottom:8px;color:var(--ink2)}
.note-section textarea{width:100%;min-height:80px;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font:13px var(--sans);line-height:1.7;resize:vertical;background:var(--paper);color:var(--ink)}
.note-section textarea:focus{outline:none;border-color:var(--accent)}
.tag-row{display:flex;gap:6px;margin-top:8px}
.tag-row .chip{font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);cursor:pointer;color:var(--ink3)}
.tag-row .chip.active{background:var(--a-soft);color:var(--accent);border-color:var(--accent)}
.save-bar{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;background:var(--paper)}
.save-bar button{flex:1;border:1px solid var(--border);background:var(--paper);border-radius:8px;padding:8px;font:12px var(--sans);cursor:pointer;color:var(--ink2)}
.save-bar .btn-p{background:var(--accent);color:#fff;border:none;flex:2}
</style>
</head>
<body>
<div class="topbar">
  <button class="back">← 返回</button>
  <h2>真人督导</h2>
  <span class="sp"></span>
  <select><option>林小满</option><option>陈默</option></select>
  <select><option>第5节 · 2026-07-10</option><option>第4节 · 2026-06-26</option></select>
  <button class="btn-p">保存案例报告</button>
</div>
<div class="dual">
  <div class="col col-left">
    <div class="col-head"><span class="title">参考材料</span><span class="badge ref">逐字稿</span><span class="sp"></span><button>上传逐字稿</button><button>手打</button></div>
    <div class="col-body">
      <div class="transcript-area">
        <div class="turn c"><div class="role">来访者</div>今天我确实不太好了，因为昨天和妈妈吵了一架。</div>
        <div class="turn t"><div class="role">咨询师</div>能具体说说吗，发生了什么？</div>
        <div class="turn c"><div class="role">来访者</div>就是我妈妈她又一直在说我什么都不行，然后我就很生气。</div>
        <div class="turn t"><div class="role">咨询师</div>她说你什么都不行，这个感觉一定很难受。</div>
        <div class="turn c"><div class="role">来访者</div>是的，我觉得自己好像永远都做不到她满意的样子。就像小时候，不管怎么努力……</div>
        <div class="turn t"><div class="role">咨询师</div>听起来这个被看到的感觉从很久以前就有了。</div>
      </div>
    </div>
    <div class="save-bar"><button>切换为手打模式</button></div>
  </div>
  <div class="col">
    <div class="col-head"><span class="title">督导笔记</span><span class="badge note">2026-07-10</span><span class="sp"></span><button class="btn-p">保存</button></div>
    <div class="col-body">
      <div class="note-section"><h4>督导主题</h4><textarea placeholder="本次督导的核心议题…">第5节咨询后的移情与反移情</textarea>
        <div class="tag-row"><span class="chip active">移情</span><span class="chip active">反移情</span><span class="chip">阻抗</span><span class="chip">防御</span><span class="chip">诠释</span><span class="chip">抱持</span></div>
      </div>
      <div class="note-section"><h4>督导师反馈</h4><textarea placeholder="督导师的主要观点和建议…">来访者反复提到母亲「什么都不行」的评价，注意移情线索——来访者可能在咨询关系中重演被否定的体验。建议在下一次咨询中关注咨询师自身的反移情。

注意不要过早诠释，先抱持足够时间。</textarea></div>
      <div class="note-section"><h4>我的收获</h4><textarea placeholder="个人反思与收获…">意识到自己在面对理想化移情时有些不适，可能是自身被「不够好」的经验触发。需要在抱持中容受这种不适。</textarea></div>
      <div class="note-section"><h4>下一步计划</h4><textarea placeholder="下一次咨询的方向…">关注过渡客体的呈现。容受沉默。不急于诠释。</textarea></div>
    </div>
    <div class="save-bar"><button>导出为报告</button><button class="btn-p">保存督导记录</button></div>
  </div>
</div>
</body>
</html>
