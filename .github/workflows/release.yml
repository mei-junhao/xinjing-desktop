name: Release

# 打 tag（如 v1.0.2）并 push 到 GitHub 时，自动构建并发布到 Releases
on:
  push:
    tags:
      - 'v*'

# 发布 Releases 需要写仓库内容的权限
permissions:
  contents: write

jobs:
  build-windows:
    name: Build & Publish (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Configure mirrors (npmmirror 加速 Electron 二进制下载)
        shell: pwsh
        run: |
          echo "ELECTRON_MIRROR=https://cdn.npmmirror.com/binaries/electron/" >> $env:GITHUB_ENV
          echo "ELECTRON_BUILDER_BINARIES_MIRROR=https://npmmirror.com/mirrors/electron-builder-binaries/" >> $env:GITHUB_ENV
          npm config set registry https://registry.npmmirror.com

      - name: Install dependencies
        shell: pwsh
        run: npm ci

      # 构建期注入 LICENSE_SECRET（来自 repo secret），生成 secret.generated.js（gitignored，不入库）
      - name: Generate license secret
        shell: pwsh
        run: node scripts/codegen-secret.js
        env:
          LICENSE_SECRET: ${{ secrets.LICENSE_SECRET }}

      # 构建但不让 electron-builder 自动发布：文件名与更新文件由 postbuild.js 精确控制
      - name: Build (no publish)
        shell: pwsh
        run: npm run dist -- --publish never
        env:
          LICENSE_SECRET: ${{ secrets.LICENSE_SECRET }}

      # 重命名为稳定 ASCII 资产名（中文前缀会被 GitHub 资产名吞掉致更新 404）+ 生成 latest-portable.yml（portable 增量更新）
      - name: Post-build (资产重命名 + portable 更新文件)
        shell: pwsh
        run: node scripts/postbuild.js

      # 用 gh 精确上传安装包 / 便携版 / latest.yml / latest-portable.yml（发布资产统一 ASCII，与 yml 逐字节一致）
      - name: Create GitHub Release
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          # 幂等保护：若同 tag 已存在发布（如重跑），先删除再建，避免 "release already exists"
          $existing = gh release view $tag --repo mei-junhao/xinjing-desktop 2>$null
          if ($existing) {
            Write-Host "已存在 $tag 发布，先删除再重建"
            gh release delete $tag --repo mei-junhao/xinjing-desktop --yes
          }
          $assets = @()
          $assets += Get-ChildItem dist\xinjing-setup-*.exe | ForEach-Object { $_.FullName }
          $assets += Get-ChildItem dist\xinjing-portable-*.exe | ForEach-Object { $_.FullName }
          $assets += Get-ChildItem dist\*.blockmap | ForEach-Object { $_.FullName }
          $assets += "dist\latest.yml"
          $assets += "dist\latest-portable.yml"
          gh release create $tag `
            --repo mei-junhao/xinjing-desktop `
            --title "心镜 XinJing $tag" `
            --notes "心镜 XinJing 桌面版 $tag 自动更新发布" `
            --latest `
            @assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
