name: Build Mac (dmg + zip) and publish to COS

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Codegen (secret / version / builtin prompts)
        env:
          LICENSE_SECRET: ${{ secrets.LICENSE_SECRET }}
        run: |
          node scripts/codegen-secret.js
          node scripts/codegen-version.js
          python3 scripts/gen-knowledge-builtins.py
          # gen-prompts-builtin 正则对当前 supervisors.js 脆弱，与 Windows cnb-build 一致：
          # 失败仅告警、不阻断（已提交的 app/js/prompts.builtin.js 会被打包使用）
          python3 scripts/gen-prompts-builtin.py || echo "gen-prompts-builtin 跳过（非致命，使用已提交的 prompts.builtin.js）"

      # electron-builder 24 捆绑的 7zip-bin 7za 16.02 在 macOS 15/26 创建 DMG 报
      # E_INVALIDARG（老二进制与新系统不兼容）。用官方新版 7zz（7-Zip 26，universal）
      # 覆盖，命令行参数兼容，不影响其它步骤。
      - name: Fix 7za for macOS 15+ (E_INVALIDARG)
        run: |
          set -e
          curl -fSL -o /tmp/7z-mac.tar.xz "https://github.com/ip7z/7zip/releases/download/26.02/7z2602-mac.tar.xz" \
            || curl -fSL -o /tmp/7z-mac.tar.xz "https://7-zip.org/a/7z2602-mac.tar.xz"
          rm -rf /tmp/7zmac && mkdir -p /tmp/7zmac
          tar -xf /tmp/7z-mac.tar.xz -C /tmp/7zmac
          SRC=$(find /tmp/7zmac -name '7zz' -type f | head -1)
          [ -n "$SRC" ] || SRC=$(find /tmp/7zmac -name '7zzs' -type f | head -1)
          [ -n "$SRC" ] || { echo "未找到 7zz 二进制"; exit 1; }
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ]; then P="mac/arm64/7za"; else P="mac/x64/7za"; fi
          DST="node_modules/7zip-bin/$P"
          mkdir -p "$(dirname "$DST")"
          cp -f "$SRC" "$DST"
          chmod +x "$DST"
          echo "7za 已替换为：$("$DST" i 2>&1 | head -3)"

      - name: Build Mac (unsigned, no notarization)
        run: npm run dist -- --mac --publish never

      # electron-builder 的 DMG 走 7za（7zip-bin 16.02 在 macOS 15+ 报 E_INVALIDARG/ E_NOTIMPL）。
      # 改为：上面的 zip 走 7zz 正常产出；DMG 用系统 hdiutil 生成「真正可挂载」的磁盘镜像，
      # 内含 App + /Applications 快捷方式，命名与 artifactName 一致（xinjing-${version}.dmg）。
      - name: Create DMG via hdiutil (real mountable DMG, bypass 7za)
        run: |
          set -e
          APP=$(find dist -maxdepth 2 -name '心镜 XinJing.app' -type d | head -1)
          [ -n "$APP" ] || { echo "未找到 心镜 XinJing.app"; ls -R dist | head -40; exit 1; }
          TMP=$(mktemp -d)
          cp -R "$APP" "$TMP/"
          ln -s /Applications "$TMP/Applications"
          hdiutil create -volname "XinJing" -srcfolder "$TMP" -ov -format UDZO "dist/xinjing-3.6.3.dmg"
          rm -rf "$TMP"
          echo "DMG 创建完成：$(du -h dist/xinjing-3.6.3.dmg)"

      - name: Postbuild (patch latest-mac.yml)
        run: node scripts/postbuild.js

      - name: Install coscli
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ]; then A="darwin-arm64"; else A="darwin-amd64"; fi
          VER=$(curl -s https://api.github.com/repos/tencentyun/coscli/releases/latest \
                | grep -o '"tag_name": *"[^"]*"' | head -1 \
                | sed 's/.*"tag_name": *"\([^"]*\)".*/\1/')
          echo "coscli version: $VER  arch: $A"
          URL="https://github.com/tencentyun/coscli/releases/download/${VER}/coscli-${VER}-${A}"
          echo "downloading $URL"
          curl -fSL -o coscli "$URL" || \
            curl -fSL -o coscli "https://ghproxy.net/${URL}"
          chmod +x coscli
          ./coscli --version

      - name: Upload to Tencent COS
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
        run: |
          cat > "$HOME/.cos.yaml" <<EOF
          cos:
            base:
              secretid: "$COS_SECRET_ID"
              secretkey: "$COS_SECRET_KEY"
            buckets:
              - name: $COS_BUCKET
                alias: $COS_BUCKET
                region: $COS_REGION
          EOF
          for f in dist/xinjing-*.dmg dist/xinjing-*.zip dist/*.blockmap dist/latest-mac.yml; do
            [ -f "$f" ] || continue
            echo "uploading $f"
            ./coscli cp "$f" "cos://$COS_BUCKET/$(basename "$f")" --acl public-read
          done
          echo "==> Done. COS latest-mac.yml: https://$COS_BUCKET.cos.$COS_REGION.myqcloud.com/latest-mac.yml"
