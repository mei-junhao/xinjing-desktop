<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心镜 · 记账</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    /* ── 导入数据 modal（三 Tab）── */
    .import-tabs {
      display: flex; gap: 4px; background: var(--bg-soft);
      border-radius: var(--r-btn, 999px); padding: 3px; border: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .import-tabs button {
      flex: 1; background: transparent; border: none; padding: 7px 14px;
      border-radius: var(--r-btn, 999px); font-size: 13px; cursor: pointer;
      color: var(--muted); white-space: nowrap; font-family: var(--sans); font-weight: 500;
      transition: background .2s, color .2s;
    }
    .import-tabs button:hover { color: var(--text); }
    .import-tabs button.active {
      background: var(--bg); color: var(--accent, #9E5A3C); font-weight: 600;
      box-shadow: inset 0 0 0 1px var(--border);
    }
    .import-tab-pane { display: none; }
    .import-tab-pane.active { display: block; animation: fadeIn .25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }

    .import-hint {
      font-size: 12.5px; line-height: 1.7; color: var(--muted);
      font-family: var(--sans); background: var(--bg-alt);
      border-radius: 10px; padding: 12px 14px; margin-bottom: 14px;
    }
    .import-hint code { background: var(--bg); padding: 1px 6px; border-radius: 5px; font-size: 12px; }

    #import-json, #meetings-json {
      width: 100%; min-height: 140px; font-family: 'Menlo', 'Consolas', monospace;
      font-size: 12px; padding: 10px 12px; border: 1.5px solid var(--border);
      border-radius: 10px; resize: vertical; background: var(--bg);
    }
    .import-result { font-size: 12.5px; color: var(--text-soft, var(--muted)); margin-top: 8px; min-height: 18px; }

    /* 预览表 */
    .preview-card {
      background: var(--bg-alt); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px; margin: 10px 0;
    }
    .preview-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .preview-pills .pill {
      padding: 4px 10px; border-radius: 999px; font-size: 11.5px;
      background: var(--bg); border: 1px solid var(--border); color: var(--muted);
    }
    .preview-pills .pill b { color: var(--text); margin-right: 3px; }
    .preview-pills .pill.add b { color: #6E7E62; }
    .preview-pills .pill.skip b { color: #9A8F82; }
    .preview-table { width: 100%; border-collapse: collapse; font-size: 12px; max-height: 200px; overflow-y: auto; display: block; }
    .preview-table th, .preview-table td { padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--border); }
    .preview-table th { font-size: 11px; color: var(--muted); font-weight: 600; background: var(--bg); position: sticky; top: 0; }
    .preview-table td.new { color: #6E7E62; font-weight: 600; }
    .preview-table td.skip { color: #9A8F82; }
    .preview-table .tag { padding: 1px 8px; border-radius: 999px; font-size: 10.5px; font-weight: 600; }
    .preview-table .tag.new { background: #ECEFE6; color: #6E7E62; }
    .preview-table .tag.skip { background: var(--bg-soft); color: #9A8F82; }

    /* 会议行 */
    .meeting-row {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px;
      background: var(--bg); flex-wrap: wrap;
    }
    .meeting-row .meta { flex: 1; min-width: 180px; }
    .meeting-row .subj { font-weight: 600; font-size: 13px; color: var(--text); }
    .meeting-row .time { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
    .meeting-row select {
      max-width: 160px; padding: 6px 10px; border-radius: 8px;
      border: 1.5px solid var(--border); background: var(--bg); color: var(--text);
      font-family: var(--sans); font-size: 12px;
    }
    .meeting-row .ptag { display: inline-block; padding: 1px 7px; border-radius: 999px; font-size: 10.5px; font-weight: 600; background: var(--bg-soft); color: var(--muted); margin-right: 4px; }

    .file-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
    .file-row input[type="file"] { font-family: var(--sans); font-size: 13px; }

    /* ====== 原生三栏记账工作区（v2.0 P0-2）====== */
    .ws.billing { min-height: 0; }
    /* 左栏：客户记账列表 */
    .rail { background: var(--paper-2, var(--bg-elevated, #fff)); border-right: 1px solid var(--border, var(--hair)); display: flex; flex-direction: column; min-height: 0; }
    .rail .top { padding: 14px; border-bottom: 1px solid var(--border, var(--hair)); }
    .rail .top input { width: 100%; border: 1px solid var(--border, var(--hair-strong)); border-radius: 10px; padding: 9px 12px; font-size: 13px; font-family: var(--sans); background: var(--paper, #fff); color: var(--text, var(--ink)); }
    .pills { display: flex; gap: 6px; padding: 12px 14px; flex-wrap: wrap; border-bottom: 1px solid var(--border, var(--hair)); }
    .pills .pill { border: 1px solid var(--border, var(--hair)); border-radius: 999px; padding: 5px 12px; font-size: 12.5px; color: var(--text-secondary, var(--ink-2)); cursor: pointer; background: var(--paper, #fff); user-select: none; transition: .15s; }
    .pills .pill:hover { border-color: var(--accent, var(--accent-2)); color: var(--accent); }
    .pills .pill.active { background: var(--accent, #9E5A3C); color: #fff; border-color: var(--accent, #9E5A3C); }
    .clist { overflow: auto; flex: 1; padding: 8px; }
    .ccard { border: 1px solid var(--border, var(--hair)); border-radius: 12px; padding: 11px 13px; margin-bottom: 8px; cursor: pointer; transition: .15s; background: var(--paper-2, var(--bg-elevated, #fff)); }
    .ccard:hover { border-color: var(--accent, #9E5A3C); }
    .ccard.active { border-color: var(--accent, #9E5A3C); background: var(--accent-soft, rgba(158,90,60,.08)); }
    .ccard .r1 { display: flex; justify-content: space-between; align-items: center; }
    .ccard .nm { font-weight: 600; font-size: 14.5px; color: var(--text, var(--ink)); }
    .ccard .mode { font-size: 11px; padding: 1px 8px; border-radius: 7px; background: var(--bg-sunken, var(--bg-soft)); color: var(--text-secondary, var(--ink-2)); }
    .ccard .meta { font-size: 12px; color: var(--text-muted, var(--muted)); margin-top: 5px; display: flex; gap: 12px; flex-wrap: wrap; }
    .ccard .meta .owe { color: var(--danger, #B85450); }
    .ccard-empty { color: var(--text-muted, var(--muted)); text-align: center; padding: 28px 12px; font-size: 13px; line-height: 1.7; }

    /* 中栏 */
    .center { overflow: auto; padding: 22px 26px; min-width: 0; background: var(--bg, var(--paper)); }
    .client-head { display: flex; align-items: flex-start; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .client-head h2 { font-family: var(--serif); margin: 0; font-size: 23px; color: var(--text, var(--ink)); }
    .client-head .mode { font-size: 12px; padding: 2px 10px; border-radius: 8px; background: var(--bg-sunken, var(--bg-soft)); color: var(--text-secondary, var(--ink-2)); }
    .stats { display: flex; gap: 22px; margin-left: auto; flex-wrap: wrap; }
    .stat b { display: block; font-size: 17px; font-family: var(--serif); }
    .stat span { font-size: 11.5px; color: var(--text-muted, var(--muted)); }
    .quick { display: flex; gap: 8px; margin-bottom: 16px; }
    .quick button { border: 1px solid var(--border, var(--hair-strong)); background: var(--paper, #fff); border-radius: 10px; padding: 8px 14px; font-size: 13px; font-family: var(--sans); cursor: pointer; color: var(--text, var(--ink)); transition: .15s; }
    .quick button:hover { border-color: var(--accent, #9E5A3C); color: var(--accent); }
    .quick button.primary { background: var(--accent, #9E5A3C); color: #fff; border-color: var(--accent, #9E5A3C); }
    .quick button.primary:hover { filter: brightness(1.07); color: #fff; }
    table.rec { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 18px; font-family: var(--sans); }
    table.rec th, table.rec td { border: 1px solid var(--border, var(--hair)); padding: 9px 10px; text-align: left; color: var(--text, var(--ink)); }
    table.rec th { background: var(--bg-sunken, var(--bg-soft)); color: var(--text-secondary, var(--ink-2)); font-weight: 600; }
    .tag { font-size: 11px; padding: 1px 8px; border-radius: 7px; background: var(--bg-sunken, var(--bg-soft)); color: var(--text-secondary, var(--ink-2)); }
    .paid-y { color: var(--success, #6E7E62); font-weight: 600; }
    .paid-n { color: var(--danger, #B85450); font-weight: 600; }
    .sectitle { font-family: var(--serif); font-size: 16px; margin: 18px 0 10px; display: flex; align-items: center; gap: 10px; color: var(--text, var(--ink)); }
    .sectitle .ln { flex: 1; height: 1px; background: var(--border, var(--hair)); }
    .inline-form { display: none; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; background: var(--bg-sunken, var(--bg-soft)); border: 1px solid var(--border, var(--hair)); border-radius: 12px; padding: 14px; margin-bottom: 16px; }
    .inline-form.show { display: grid; }
    .inline-form label { font-size: 11.5px; color: var(--text-muted, var(--muted)); display: block; margin-bottom: 4px; }
    .inline-form input, .inline-form select { border: 1px solid var(--border, var(--hair-strong)); border-radius: 8px; padding: 7px 9px; width: 100%; font-family: var(--sans); font-size: 13px; background: var(--paper, #fff); color: var(--text, var(--ink)); }
    .inline-form .row-actions { grid-column: 1/-1; display: flex; gap: 8px; justify-content: flex-end; }

    /* 分段控制（明细/趋势/账单） */
    .seg { display: flex; gap: 4px; background: var(--bg-sunken, var(--bg-soft)); border-radius: 999px; padding: 3px; margin-bottom: 16px; width: fit-content; }
    .seg-btn { padding: 7px 18px; border-radius: 999px; font-size: 13px; cursor: pointer; color: var(--text-secondary, var(--ink-2)); user-select: none; transition: .15s; font-family: var(--sans); }
    .seg-btn:hover { color: var(--accent); }
    .seg-btn.active { background: var(--paper, #fff); color: var(--accent, #9E5A3C); box-shadow: inset 0 0 0 1px var(--border, var(--hair)); font-weight: 600; }

    /* 趋势图 */
    .chart-area { height: 200px; display: flex; align-items: flex-end; gap: 7px; padding: 14px 16px 26px; position: relative; background: var(--bg-sunken, var(--bg-soft)); border-radius: var(--radius-sm, 10px); margin: 8px 0 6px; }
    .bar { flex: 1; background: linear-gradient(180deg, var(--accent, #9E5A3C), rgba(158,90,60,.28)); border-radius: 4px 4px 0 0; min-height: 4px; position: relative; cursor: pointer; transition: .2s; }
    .bar:hover { filter: brightness(1.12); }
    .b-lbl { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 9px; color: var(--accent, #9E5A3C); font-weight: 700; opacity: 0; transition: .2s; white-space: nowrap; }
    .bar:hover .b-lbl { opacity: 1; }
    .b-x { position: absolute; bottom: -20px; left: 0; width: 100%; text-align: center; font-size: 9.5px; color: var(--text-muted, var(--muted)); font-family: var(--sans); }
    .rank-row { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-bottom: 1px solid var(--border, var(--hair)); }
    .rank-row:last-child { border: none; }
    .rank-no { width: 22px; font-weight: 700; color: var(--text-muted, var(--muted)); }
    .rank-row .info { flex: 1; }
    .rank-row .name { font-weight: 600; font-size: 13.5px; color: var(--text, var(--ink)); }
    .rank-row .amt { font-weight: 600; font-size: 13.5px; color: var(--text, var(--ink)); }
    .rank-row .amt small { color: var(--text-muted, var(--muted)); font-weight: 400; margin-left: 6px; }

    /* 账单 */
    .invoice { background: var(--bg-sunken, var(--bg-soft)); border: 1px solid var(--border, var(--hair)); border-radius: var(--radius, 14px); padding: 24px; line-height: 1.85; font-family: var(--sans); }
    .invoice h4 { font-family: var(--serif); font-size: 17px; margin: 0 0 4px; color: var(--text, var(--ink)); }
    .invoice .meta-line { font-size: 11px; color: var(--text-muted, var(--muted)); margin-bottom: 16px; }
    .invoice table { width: 100%; border-collapse: collapse; margin: 12px 0; }
    .invoice th, .invoice td { padding: 7px 10px; border-bottom: 1px solid var(--border, var(--hair)); text-align: left; font-size: 12.5px; color: var(--text, var(--ink)); }
    .invoice .tl { display: flex; justify-content: space-between; padding: 5px 0; font-size: 14px; color: var(--text, var(--ink)); }
    .invoice .tl.final { font-weight: 700; font-size: 16px; border-top: 2px solid var(--text, var(--ink)); margin-top: 8px; padding-top: 8px; }
    .formline { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 14px; }
    .formline .fg { flex: 1; min-width: 150px; }
    .formline label { font-size: 11.5px; color: var(--text-muted, var(--muted)); display: block; margin-bottom: 4px; }
    .formline select, .formline input { border: 1px solid var(--border, var(--hair-strong)); border-radius: 8px; padding: 8px 10px; width: 100%; font-family: var(--sans); font-size: 13px; background: var(--paper, #fff); color: var(--text, var(--ink)); }
    .b-empty { color: var(--text-muted, var(--muted)); text-align: center; margin-top: 70px; font-size: 13.5px; line-height: 1.8; font-family: var(--sans); }
    .card-panel { background: var(--paper-2, #fff); box-shadow: var(--shadow-sm, 0 1px 3px rgba(0,0,0,.04)); padding: 18px; border: 1px solid var(--border, var(--hair)); border-radius: var(--radius, 14px); }
    .card-panel h2 { font-family: var(--serif); font-size: 16px; margin: 0 0 4px; color: var(--text, var(--ink)); }

    .dock-actions { display: flex; flex-direction: column; gap: 7px; }
    .dock-actions button { display: flex; gap: 9px; align-items: center; text-align: left; border: 1px solid var(--border, var(--hair-strong)); background: var(--paper, #fff); color: var(--text, var(--ink)); padding: 10px 13px; border-radius: 11px; cursor: pointer; font-size: 13px; font-family: var(--sans); transition: .15s; }
    .dock-actions button:hover { border-color: var(--accent, #9E5A3C); background: var(--accent-soft, rgba(158,90,60,.08)); color: var(--accent, #9E5A3C); }
    .dock-actions button.primary { background: var(--accent, #9E5A3C); color: #fff; border-color: var(--accent, #9E5A3C); }
    .dock-actions button.primary:hover { filter: brightness(1.07); color: #fff; }
    .chat-mini .u { color: var(--accent, #9E5A3C); font-weight: 600; margin-bottom: 6px; }
    .chat-mini .a { color: var(--text-secondary, var(--ink-2)); }

    /* 字母索引导航 */
    .letter-nav{display:flex;flex-wrap:wrap;gap:3px;padding:6px 12px;border-bottom:1px solid var(--border);overflow-x:auto}
    .letter-nav .ln{padding:2px 7px;border-radius:5px;font-size:11px;cursor:pointer;color:var(--ink-3);font-weight:600;min-width:20px;text-align:center;transition:.15s}
    .letter-nav .ln:hover{background:var(--accent-soft);color:var(--accent)}
    .letter-nav .ln.empty{opacity:.3;cursor:default}
    .letter-nav .ln.empty:hover{background:transparent;color:var(--ink-3)}
    .letter-group-header{display:flex;align-items:center;gap:6px;padding:6px 12px;cursor:pointer;font-size:11px;font-weight:700;color:var(--accent);background:var(--bg-sunken);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1}
    .letter-group-header .count{font-size:10px;color:var(--ink-3);font-weight:400}
    .letter-group-header .arrow{font-size:9px;transition:.2s;margin-left:auto}
    .letter-group.collapsed .letter-group-header .arrow{transform:rotate(-90deg)}
    .letter-group.collapsed .ccard{display:none}
    .inout-tabs{display:flex;gap:4px;background:var(--bg-sunken);border-radius:999px;padding:3px;margin-bottom:12px;width:fit-content}
    .inout-tabs button{flex:1;border:none;background:transparent;padding:6px 16px;border-radius:999px;font:600 12px var(--sans);cursor:pointer;color:var(--ink-2);transition:.15s}
    .inout-tabs button.active{background:var(--paper,#fff);color:var(--accent);box-shadow:inset 0 0 0 1px var(--border)}

    /* ============================================================
       三栏记账布局（收入 | 明细 | 支出），三状态切换
       ============================================================ */
    .dual-billing{display:grid;grid-template-columns:1fr 0px 1fr;gap:0;flex:1;min-height:0;overflow:hidden;background:var(--paper-2,#fff);transition:grid-template-columns .35s cubic-bezier(.4,0,.2,1)}
    /* 默认双栏（无选中）：收入 | (隐藏) | 支出 */
    .dual-billing.state-default{grid-template-columns:1fr 0px 1fr}
    .dual-billing.state-default .detail-col{opacity:0;pointer-events:none}
    /* 聚焦收入：收入列表 | 明细 | 支出窄条 */
    .dual-billing.state-income{grid-template-columns:280px 1fr 56px}
    /* 聚焦支出：收入窄条 | 明细 | 支出列表 */
    .dual-billing.state-expense{grid-template-columns:56px 1fr 280px}
    .dual-billing .col{display:flex;flex-direction:column;overflow:hidden;min-width:0}
    .dual-billing .col-left{border-right:1px solid var(--border)}
    .dual-billing .col-right{border-left:1px solid var(--border)}
    .dual-billing .col-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;background:var(--paper-2,#fff)}
    .dual-billing .col-head .title{font-family:var(--serif);font-size:16px;font-weight:600}
    .dual-billing .col-head .sp{flex:1}
    .dual-billing .col-head button{border:1px solid var(--border);background:var(--paper-2,#fff);border-radius:7px;padding:4px 10px;font:11px var(--sans);cursor:pointer;color:var(--ink-2)}
    .dual-billing .col-head button.primary{background:var(--accent);color:#fff;border:none}
    .dual-billing .col-body{flex:1;overflow-y:auto;padding:14px 16px}
    .dual-billing .badge{font-size:10px;padding:2px 8px;border-radius:5px;font-weight:600}
    .dual-billing .badge.in{background:rgba(107,174,143,.15);color:var(--green)}
    .dual-billing .badge.out{background:rgba(217,140,140,.15);color:var(--red)}
    .dual-billing .empty-state{text-align:center;color:var(--ink-3);padding:40px 20px;font-size:13px}

    /* 窄边栏样式（支出被缩小 / 收入被缩小时） */
    .dual-billing.state-income .exp-col .col-body,
    .dual-billing.state-income .exp-col .billing-search-row{display:none}
    .dual-billing.state-income .exp-col .col-head{
      writing-mode:vertical-rl;text-orientation:mixed;padding:16px 0;
      justify-content:flex-start;border-bottom:none;border-right:1px solid var(--border);height:100%
    }
    .dual-billing.state-income .exp-col .col-head .title{font-size:14px}
    .dual-billing.state-income .exp-col .col-head .badge,
    .dual-billing.state-income .exp-col .col-head .sp,
    .dual-billing.state-income .exp-col .col-head button{display:none}
    .dual-billing.state-income .exp-col{cursor:pointer;background:var(--bg-alt,#faf8f5);transition:background .2s}
    .dual-billing.state-income .exp-col:hover{background:var(--bg-soft,#f0ebe4)}

    .dual-billing.state-expense .income-col .col-body,
    .dual-billing.state-expense .income-col .billing-search-row{display:none}
    .dual-billing.state-expense .income-col .col-head{
      writing-mode:vertical-rl;text-orientation:mixed;padding:16px 0;
      justify-content:flex-start;border-bottom:none;border-left:1px solid var(--border);height:100%
    }
    .dual-billing.state-expense .income-col .col-head .title{font-size:14px}
    .dual-billing.state-expense .income-col .col-head .badge,
    .dual-billing.state-expense .income-col .col-head .sp,
    .dual-billing.state-expense .income-col .col-head button{display:none}
    .dual-billing.state-expense .income-col{cursor:pointer;background:var(--bg-alt,#faf8f5);transition:background .2s}
    .dual-billing.state-expense .income-col:hover{background:var(--bg-soft,#f0ebe4)}

    /* 中间明细栏 */
    .detail-col{background:var(--bg-alt,#faf8f5);display:flex;flex-direction:column;overflow:hidden;transition:opacity .2s}
    .detail-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--ink-3);font-size:13px;gap:8px}
    .detail-empty .big{font-size:40px;opacity:.3}
    .detail-header{padding:18px 24px;background:var(--paper-2,#fff);border-bottom:1px solid var(--border);flex-shrink:0}
    .detail-header h2{font-size:20px;font-family:var(--serif);margin-bottom:4px}
    .detail-stats{display:flex;gap:20px;margin-top:12px}
    .detail-stats .stat{text-align:center}
    .detail-stats .stat b{display:block;font-size:18px;font-family:var(--serif)}
    .detail-stats .stat span{font-size:11px;color:var(--ink-3)}
    .detail-body{flex:1;overflow-y:auto;padding:16px 24px}
    .detail-section-title{font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:10px;display:flex;align-items:center;gap:8px}
    .detail-section-title::after{content:'';flex:1;height:1px;background:var(--border)}

    /* 收入左侧列表项 */

    .bin-item .ava{width:32px;height:32px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}

    .bin-item .nm{font-weight:600;font-size:13.5px}
    .bin-item .mt{font-size:11px;color:var(--ink-3)}
    .bin-item .amt{font-family:var(--serif);font-size:14px;font-weight:600;color:var(--text)}

    .bin-detail-table .dup-row{background:rgba(217,140,140,.06)}

    .bin-detail-table .paid-y{color:var(--success);font-weight:600}.bin-detail-table .paid-n{color:var(--danger);font-weight:600}
    /* 支出分类卡 */

    .exp-cat:hover{border-color:var(--accent)}
    .exp-cat .icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .exp-cat .info{flex:1}
    .exp-cat .name{font-weight:600;font-size:14px}
    .exp-cat .cnt{font-size:11px;color:var(--ink-3)}
    .exp-cat .amt{font-family:var(--serif);font-size:16px;color:var(--danger);font-weight:600}
    .exp-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border)}

    .cat-tag{font-size:10px;padding:2px 7px;border-radius:5px;flex-shrink:0;width:64px;text-align:center;font-weight:600}

    .cat-individual{background:var(--accent-soft);color:var(--accent)}

    /* 搜索折叠 */

  <script>
  /* ============================================================
     心镜 · 记账 · v2.0 壳页（原生三栏，无 iframe）
     职责：① 6 统计卡渲染 ② 左客户列表+中客户明细+三分段（明细/趋势/账单）
            ③ 内联「记一笔 / 月结」表单 ④ AI 记账坞 ⑤ 拖拽分隔条
            ⑥ 「导入数据」modal 三 Tab 统一入口（保留）
     ============================================================ */
  // 记账页不使用侧边栏（noSidebar）
  // document.getElementById('sidebar-mount').outerHTML = App.renderSidebar();

  // ====== 内部状态 ======
  let bCurMode = 'all';
  let bCurClient = null;
  let bCurCtab = 'detail';
  let inoutFilter = 'all';
  let bQuery = '';
  const MODE_TEXT = { 'per-session': '次结', monthly: '月结', prepaid: '预付费' };

  // ====== 账本边界 ======
  // 临床记录（billing:null 或缺失）只属于咨询记录，绝不显示或计入记账。
  // 明确 billing:{fee:0} 的免费/减免咨询仍属于账本。
  function billableSessionsFor(clientId) {
    return Store.getSessionsByClient(clientId).filter(function (s) { return Store.isBillableSession(s); });
  }
  function billableSessions(allSessions) {
    return (allSessions || []).filter(function (s) { return Store.isBillableSession(s); });
  }
  function billingTypeLabel(billing) {
    var source = billing && billing.source;
    if (source === 'billing' || source === 'import') return '导入';
    if (source === 'manual') return '手动';
    if (source === 'agent') return 'AI录入';
    if (source === 'tmeet') return '会议';
    if (billing && billing.billingMode === 'monthly') return '月结';
    if (billing && billing.billingMode === 'prepaid') return '预付费';
    return billing ? '未标注' : '';
  }

  // ====== 聚合某 client 的应收/已收/欠费 ======
  function clientAgg(c) {
    const sessions = billableSessionsFor(c.id);
    let total = 0, received = 0;
    sessions.forEach(function (s) {
      const fee = (s.billing && Number(s.billing.fee)) || 0;
      if (fee > 0) {
        total += fee;
        if (s.billing && s.billing.paid) received += fee;
      }
    });
    if (c.billing && Array.isArray(c.billing.monthlyPayments)) {
      c.billing.monthlyPayments.forEach(function (mp) {
        const amt = Number(mp.amount) || 0;
        if (amt > 0) received += amt;
      });
    }
    return { total: total, received: received, owe: total - received };
  }

  // ====== 6 统计卡渲染 ======
  function renderBillingStats() {
    try {
      const clients = Store.getClients();
      const allSessions = billableSessions(Store.getSessions());
      const allExpenses = Store.getExpenses ? Store.getExpenses() : [];
      const ym = new Date().toISOString().slice(0, 7);
      let mRec = 0, mPaid = 0, tRec = 0, tPaid = 0;
      allSessions.forEach(function (s) {
        const fee = (s.billing && Number(s.billing.fee)) || 0;
        if (fee <= 0) return;
        tRec += fee;
        if (s.billing && s.billing.paid) tPaid += fee;
        if (s.date && s.date.slice(0, 7) === ym) {
          mRec += fee;
          if (s.billing && s.billing.paid) mPaid += fee;
        }
      });
      clients.forEach(function (c) {
        if (c.billing && Array.isArray(c.billing.monthlyPayments)) {
          c.billing.monthlyPayments.forEach(function (mp) {
            const amt = Number(mp.amount) || 0;
            if (amt > 0) {
              tPaid += amt;
              if (mp.month === ym) mPaid += amt;
            }
          });
        }
      });
      document.getElementById('stat-m-receivable').textContent = '¥' + mRec.toLocaleString();
      document.getElementById('stat-m-received').textContent = '¥' + mPaid.toLocaleString();
      document.getElementById('stat-m-balance').textContent = '¥' + Math.max(0, mRec - mPaid).toLocaleString();
      document.getElementById('stat-t-receivable').textContent = '¥' + tRec.toLocaleString();
      document.getElementById('stat-t-received').textContent = '¥' + tPaid.toLocaleString();
      document.getElementById('stat-t-balance').textContent = '¥' + Math.max(0, tRec - tPaid).toLocaleString();
      // 汇总三卡（收入/支出/净收入）
      var expTotal = allExpenses.reduce(function (s, e) { return s + (Number(e.amount) || 0); }, 0);
      var sumI = document.getElementById('sum-income');
      var sumE = document.getElementById('sum-expense');
      var sumN = document.getElementById('sum-net');
      if (sumI) sumI.textContent = '¥' + tRec.toLocaleString();
      if (sumE) sumE.textContent = '¥' + expTotal.toLocaleString();
      if (sumN) sumN.textContent = '¥' + (tPaid - expTotal).toLocaleString();
    } catch (e) { console.warn('[billing stats]', e); }
  }
  window.renderBillingStats = renderBillingStats;

  // ====== 左栏客户列表 ======
  function renderBRail() {
    var q = (bQuery || '').toLowerCase();
    var list = Store.getClients().filter(function (c) {
      var mode = (c.billing && c.billing.billingMode) || 'per-session';
      if (bCurMode !== 'all' && mode !== bCurMode) return false;
      if (q && (c.name || '').toLowerCase().indexOf(q) < 0) return false;
      return c.status !== 'ended';
    });
    var total = list.length;
    var useGroups = total > 15;
    var letterNav = document.getElementById('b-letter-nav');
    if (useGroups && !q) {
      var letters = [];
      var groups = {};
      list.forEach(function (c) {
        var first = (c.name || '?')[0].toUpperCase();
        if (!groups[first]) { groups[first] = []; letters.push(first); }
        groups[first].push(c);
      });
      letters.sort();
      letterNav.style.display = 'flex';
      letterNav.innerHTML = letters.map(function (l) {
        return '<span class="ln" onclick="scrollToLetter(\'' + l + '\')">' + l + '</span>';
      }).join('');
      var html = '';
      letters.forEach(function (l) {
        var group = groups[l];
        html += '<div class="letter-group" id="lg-' + l + '"><div class="letter-group-header" onclick="toggleLetterGroup(\'' + l + '\')">' + l + '<span class="count">' + group.length + '人</span><span class="arrow">▼</span></div>';
        group.forEach(function (c) { html += buildClientCard(c); });
        html += '</div>';
      });
      document.getElementById('b-clist').innerHTML = html;
    } else {
      letterNav.style.display = 'none';
      var html = list.length ? list.map(function (c) { return buildClientCard(c); }).join('') : '<div class="ccard-empty">无匹配来访者<br>请先在「来访者」页创建</div>';
      document.getElementById('b-clist').innerHTML = html;
    }
  }
  function buildClientCard(c) {
    var mode = (c.billing && c.billing.billingMode) || 'per-session';
    var agg = clientAgg(c);
    var ym = new Date().toISOString().slice(0, 7);
    var monthSessions = billableSessionsFor(c.id).filter(function (s) { return s.date && s.date.slice(0, 7) === ym; });
    var monthPaid = monthSessions.reduce(function (acc, s) { return acc + ((s.billing && s.billing.paid) ? Number(s.billing.fee) || 0 : 0); }, 0);
    return '<div class="ccard' + (bCurClient && bCurClient.id === c.id ? ' active' : '') + '" onclick="selectBClient(\'' + c.id + '\')">'
      + '<div class="r1"><span class="nm">' + App.escapeHtml(c.name) + '</span><span class="mode">' + (MODE_TEXT[mode] || '次结') + '</span></div>'
      + '<div class="meta"><span>应收 ¥' + agg.total.toLocaleString() + '</span><span>已收 ¥' + agg.received.toLocaleString() + '</span>'
      + (agg.owe > 0 ? '<span class="owe">欠 ¥' + agg.owe.toLocaleString() + '</span>' : '')
      + '<span>本月 ¥' + monthPaid.toLocaleString() + '</span></div></div>';
  }
  window.scrollToLetter = function (l) { var el = document.getElementById('lg-' + l); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' }); };
  window.toggleLetterGroup = function (l) { var el = document.getElementById('lg-' + l); if (el) el.classList.toggle('collapsed'); };
  function selectBClient(id) {
    bCurClient = Store.getClients().find(function (c) { return c.id === id; }) || null;
    renderBRail();
    if (bCurCtab !== 'detail') { bCurCtab = 'detail'; updateCtabActive(); }
    renderBDetail();
    // 切到明细面板显示
    document.getElementById('cpanel-detail').style.display = '';

  // ====== 中栏 · 趋势 ======
  function renderBTrend() {
    const months = [];
    const now = new Date();
    for (let i = 11; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      months.push(d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0'));
    }
    const allSess = billableSessions(Store.getSessions());
    const allC = Store.getClients();
    const data = months.map(function (ym) {
      let total = 0;
      allSess.forEach(function (s) {
        if (s.date && s.date.slice(0, 7) === ym) {
          const fee = (s.billing && Number(s.billing.fee)) || 0;
          if (fee > 0 && s.billing && s.billing.paid) total += fee;
        }
      });
      allC.forEach(function (c) {
        if (c.billing && Array.isArray(c.billing.monthlyPayments)) {
          c.billing.monthlyPayments.forEach(function (mp) {
            if (mp.month === ym) total += Number(mp.amount) || 0;
          });
        }
      });
      return total;
    });
    const max = Math.max.apply(null, data.concat([1]));
    const chartBars = data.map(function (v) {
      const h = Math.max(4, v / max * 150);
      return '<div class="bar" style="height:' + h + 'px;"><span class="b-lbl">¥' + (v / 1000).toFixed(1) + 'k</span></div>';
    }).join('');
    const xAxis = months.map(function (ym) {
      return '<span style="font-size:9.5px;text-align:center;flex:1">' + ym.slice(5) + '月</span>';
    }).join('');
    const ranked = allC.map(function (c) {
      const a = clientAgg(c);
      return { name: c.name, total: a.total, received: a.received };
    }).filter(function (r) { return r.total > 0; }).sort(function (x, y) { return y.total - x.total; }).slice(0, 10);
    document.getElementById('cpanel-trend').innerHTML =
      '<div class="card-panel"><h2>月度已收趋势（近 12 个月）</h2>'
      + '<div class="chart-area">' + chartBars + '</div>'
      + '<div style="display:flex;gap:7px;padding:0 16px 4px;box-sizing:border-box">' + xAxis + '</div>'
      + '<div style="font-size:10.5px;color:var(--text-muted,var(--muted));text-align:center">悬停柱体查看数值 · 仅统计已收金额</div>'
      + '</div>'
      + '<div class="sectitle">来访者应收排行 <span class="ln"></span></div>'
      + '<div class="card-panel" style="padding:6px 14px">'
      + (ranked.length ? ranked.map(function (r, i) {
        return '<div class="rank-row"><span class="rank-no">' + (i + 1) + '</span>'
          + '<div class="info"><div class="name">' + App.escapeHtml(r.name) + '</div></div>'
          + '<span class="amt">¥' + r.total.toLocaleString() + '<small>已收 ¥' + r.received.toLocaleString() + '</small></span></div>';
      }).join('') : '<div class="b-empty" style="margin-top:16px">暂无来访者应收数据</div>')
      + '</div>';
  }

  // ====== 中栏 · 账单 ======
  function renderBInvoice() {
    const opts = Store.getClients().map(function (c) {
      return '<option value="' + c.id + '"' + (bCurClient && bCurClient.id === c.id ? ' selected' : '') + '>' + App.escapeHtml(c.name) + '</option>';
    }).join('');
    const ym = new Date().toISOString().slice(0, 7);

      '<div class="card-panel"><h2>生成来访者账单</h2>'
      + '<div class="formline">'
      + '<div class="fg"><label>来访者</label><select id="bill-client" onchange="renderBillPreview()">' + opts + '</select></div>'
      + '<div class="fg"><label>月份</label><input type="month" id="bill-month" value="' + ym + '" onchange="renderBillPreview()"></div>'
      + '<div style="display:flex;align-items:flex-end"><button class="btn btn-primary" onclick="exportInvoice()">导出 HTML 账单</button></div>'
      + '</div><div id="bill-preview"></div></div>';
    renderBillPreview();
  }
  function renderBillPreview() {
    const sel = document.getElementById('bill-client');
    if (!sel) return;
    const cid = sel.value;
    const c = Store.getClients().find(function (x) { return x.id === cid; });
    const box = document.getElementById('bill-preview');
    if (!c) { box.innerHTML = ''; return; }
    const monthEl = document.getElementById('bill-month');
    const month = monthEl ? monthEl.value : '';
    const mode = (c.billing && c.billing.billingMode) || 'per-session';
    const fee = (c.billing && Number(c.billing.feePerSession)) || 0;
    const rs = billableSessionsFor(c.id).filter(function (s) {
      return s.date && s.date.slice(0, 7) === month;
    }).sort(function (a, b) { return (a.date || '').localeCompare(b.date || ''); });
    const totalDue = rs.reduce(function (acc, s) { return acc + ((s.billing && Number(s.billing.fee)) || 0); }, 0);
    const paidThis = rs.reduce(function (acc, s) {
      return acc + ((s.billing && s.billing.paid) ? Number(s.billing.fee) || 0 : 0);
    }, 0);
    const monthlyThis = ((c.billing && c.billing.monthlyPayments) || []).filter(function (m) { return m.month === month; }).reduce(function (s, m) { return s + (Number(m.amount) || 0); }, 0);
    const totalPaid = paidThis + monthlyThis;
    const pending = totalDue - totalPaid;
    box.innerHTML = '<div class="invoice">'
      + '<h4>' + App.escapeHtml(c.name) + ' · ' + month.replace('-', '年') + '月 咨询账单</h4>'
      + '<div class="meta-line">单价 ¥' + fee + '/次 · ' + (MODE_TEXT[mode] || '次结') + '</div>'
      + '<table><thead><tr><th>日期</th><th>次数</th><th>金额</th><th>状态</th></tr></thead><tbody>'
      + (rs.length ? rs.map(function (r) {
        const sf = (r.billing && Number(r.billing.fee)) || 0;
        return '<tr><td>' + App.escapeHtml(r.date || '') + '</td><td>第' + (r.sessionNumber || '?') + '节</td>'
          + '<td>¥' + sf.toLocaleString() + '</td><td>' + ((r.billing && r.billing.paid) ? '已缴' : '未缴') + '</td></tr>';
      }).join('') : '<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:16px">本月无记录</td></tr>')
      + '</tbody></table>'
      + (monthlyThis > 0 ? '<div class="tl"><span>月结已付</span><span style="color:var(--success,#6E7E62)">¥' + monthlyThis.toLocaleString() + '</span></div>' : '')
      + '<div class="tl"><span>小计</span><span>¥' + totalDue.toLocaleString() + '</span></div>'
      + '<div class="tl"><span>已付</span><span style="color:var(--success,#6E7E62)">¥' + totalPaid.toLocaleString() + '</span></div>'
      + '<div class="tl final"><span>' + (pending > 0 ? '待付' : '余额') + '</span><span style="color:' + (pending > 0 ? 'var(--warning,#D6A85C)' : 'var(--success,#6E7E62)') + '">¥' + Math.abs(pending).toLocaleString() + '</span></div>'
      + '</div>';
  }
  function exportInvoice() {
    const cid = document.getElementById('bill-client').value;
    const month = document.getElementById('bill-month').value;
    const c = Store.getClients().find(function (x) { return x.id === cid; });
    if (!c) return;
    const html = document.querySelector('.invoice') ? document.querySelector('.invoice').outerHTML : '';
    const fname = c.name + '_' + month + '_账单.html';
    App.downloadFile(fname, '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>' + App.escapeHtml(fname) + '</title><style>body{font-family:sans-serif;padding:24px}.invoice{max-width:560px;border:1px solid #ccc;padding:24px;border-radius:14px}.tl{display:flex;justify-content:space-between}table{width:100%;border-collapse:collapse}th,td{padding:7px 10px;border-bottom:1px solid #ddd;text-align:left}</style></head><body>' + html + '</body></html>', 'text/html');
    App.showToast('账单已导出', 'success');
  }
  window.renderBillPreview = renderBillPreview;
  window.exportInvoice = exportInvoice;

  var addModalDates = [];

      '</div>' +
      '<div style="display:flex;flex-direction:column;gap:14px">' +
      '<div><label style="font:11px var(--sans);color:var(--ink-3);display:block;margin-bottom:3px">来访者</label>' +

      '<select id="am-client" style="border:1px solid var(--border);border-radius:8px;padding:9px 12px;font:13px var(--sans);flex:1;background:var(--paper,#fff)">' +
      '<option value="">选择来访者…</option>' + clientOpts +

      '<button onclick="amNewClient()" style="border:1px dashed var(--accent);border-radius:8px;padding:9px 14px;font:12px var(--sans);cursor:pointer;color:var(--accent);background:transparent;white-space:nowrap">＋ 新建</button>' +
      '</div></div>' +

      '<div><label style="font:11px var(--sans);color:var(--ink-3);display:block;margin-bottom:3px">节次</label><input type="number" id="am-snum" value="1" min="1" style="border:1px solid var(--border);border-radius:8px;padding:9px 12px;font:13px var(--sans);width:100%"></div>' +
      '<div><label style="font:11px var(--sans);color:var(--ink-3);display:block;margin-bottom:3px">费用(元)</label><input type="number" id="am-fee" value="' + defaultFee + '" min="0" style="border:1px solid var(--border);border-radius:8px;padding:9px 12px;font:13px var(--sans);width:100%"></div>' +

      '<div style="display:flex;align-items:center;gap:8px;margin-top:6px">' +
      '<label style="font:11px var(--sans);color:var(--ink-3);cursor:pointer;display:flex;align-items:center;gap:4px"><input type="checkbox" id="am-multi"> 多选多天</label>' +
      '<span style="font:11px var(--sans);color:var(--ink-3)">勾选后每次选日期自动添加</span></div>' +
      '<div id="am-dates" style="display:flex;flex-wrap:wrap;gap:4px;min-height:0;margin-top:4px"></div>' +
      '</div>' +
      '<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:4px">' +
      '<button onclick="this.closest(\'.modal-overlay\').remove()" style="border:1px solid var(--border);border-radius:8px;padding:9px 20px;font:13px var(--sans);cursor:pointer;background:transparent">取消</button>' +
      '<button id="am-save" style="border:none;border-radius:8px;padding:9px 20px;font:13px var(--sans);cursor:pointer;background:var(--accent);color:#fff;font-weight:600">保存</button>' +

    overlay.addEventListener('click', function (e) { if (e.target === overlay) overlay.remove(); });
    document.getElementById('am-date').addEventListener('change', function () {
      var multi = document.getElementById('am-multi');
      if (multi && multi.checked && this.value) {
        if (addModalDates.indexOf(this.value) < 0) addModalDates.push(this.value);
        addModalDates.sort();
        this.value = '';
        renderAddDates();
      }
    });
    document.getElementById('am-save').addEventListener('click', function () {
      var cid = document.getElementById('am-client').value;
      if (cid === '__new__') { amNewClient(); return; }
      if (!cid) { App.showToast('请选择来访者', 'warning'); return; }
      var multi = document.getElementById('am-multi');
      var dates = [];
      if (multi && multi.checked && addModalDates.length > 0) dates = addModalDates.slice();
      else { var dv = document.getElementById('am-date').value; if (dv) dates = [dv]; }
      if (!dates.length) { App.showToast('请选择日期', 'warning'); return; }
      var snum = parseInt(document.getElementById('am-snum').value, 10) || 1;
      var fee = Number(document.getElementById('am-fee').value) || 0;
      var paid = document.getElementById('am-paid').value === '1';
      if (fee <= 0) { App.showToast('费用需 > 0', 'warning'); return; }
      var client = Store.getClients().find(function (c) { return c.id === cid; });
      if (!client) { App.showToast('来访者不存在', 'error'); return; }
      var mode = (client.billing && client.billing.billingMode) || 'per-session';
      dates.forEach(function (date) {
        var nextNo = Store.nextSessionNumber(cid);
        for (var i = 0; i < snum; i++) {
          Store.createSession({
            clientId: cid, date: date, sessionNumber: nextNo + i, durationMinutes: 0,
            billing: { fee: fee, paid: paid, source: 'manual', billingMode: mode },
            notes: '来源：手动记账｜¥' + fee + '｜' + (paid ? '已缴' : '未缴')
          });
        }
      });
      App.showToast('已记 ' + (dates.length * snum) + ' 笔', 'success');
      overlay.remove();
      bCurClient = Store.getClients().find(function (c) { return c.id === cid; }) || null;
      binCurClient = bCurClient;
      refreshAll();
      if (typeof renderIncomeList === 'function') renderIncomeList();
      if (typeof renderExpensePanel === 'function') renderExpensePanel();
    });
    setTimeout(function () { var sel = document.getElementById('am-client'); if (sel) sel.focus(); }, 100);
  }

  // ====== 表格内联编辑（节次 / 费用 / 已收切换）======
  document.addEventListener('click', function handleBillingEdit(e) {
    // 已收/未收 切换
    var paidCell = e.target.closest('.editable-paid');
    if (paidCell && e.target.tagName !== 'INPUT') {
      var sid = paidCell.parentElement.getAttribute('data-sid');
      if (!sid) return;
      var currPaid = paidCell.getAttribute('data-paid') === '1';
      var session = Store.getSession(sid);
      if (!session) return;
      var newBilling = Object.assign({}, session.billing || {}, { paid: !currPaid });
      Store.updateSessionFull(Object.assign({}, session, { billing: newBilling }));
      paidCell.setAttribute('data-paid', !currPaid ? '1' : '0');
      paidCell.textContent = !currPaid ? '已收' : '未收';
      paidCell.style.color = !currPaid ? 'var(--success,#6E7E62)' : 'var(--danger,#B85450)';
      refreshBillingStats();
      renderBRail();
      e.stopPropagation();
      return;
    }
    // 节次 / 费用 编辑
    var cell = e.target.closest('.editable');
    if (!cell || e.target.tagName === 'INPUT') return;
    var field = cell.getAttribute('data-field');
    var sid = cell.parentElement.getAttribute('data-sid');
    if (!sid || !field) return;
    var session = Store.getSession(sid);
    if (!session) return;

    var oldVal, suffix = '';
    if (field === 'sessionNumber') { oldVal = session.sessionNumber || 0; suffix = '节'; }
    else { oldVal = (session.billing && session.billing.fee) || 0; suffix = '¥'; }
    cell.textContent = suffix;
    var input = document.createElement('input');
    input.type = 'number'; input.min = field === 'sessionNumber' ? '1' : '0';
    input.value = oldVal;
    input.style.cssText = 'width:60px;border:1px solid var(--accent);border-radius:6px;padding:3px 6px;font:13px var(--sans);text-align:center;background:var(--paper,#fff);color:var(--text)';
    cell.appendChild(input);
    input.focus();
    input.select();

    function save() {
      var newVal = field === 'sessionNumber' ? parseInt(input.value, 10) : Number(input.value);
      if (isNaN(newVal) || newVal < 0) { cell.textContent = suffix + oldVal + (field === 'sessionNumber' ? '节' : ''); return; }
      if (field === 'sessionNumber') { newVal = Math.max(1, newVal); }
      if (newVal === oldVal) { cell.textContent = suffix + oldVal + (field === 'sessionNumber' ? '节' : ''); return; }

      if (field === 'sessionNumber') {
        var shift = newVal - oldVal;
        // 账本页只能调整账务记录；临床会谈的节次属于临床时间线，不得被财务编辑连带重排。
        var allSessions = billableSessionsFor(session.clientId);
        allSessions.forEach(function(s) {
          if (s.sessionNumber >= oldVal && s.id !== session.id) {
            Store.updateSessionFull(Object.assign({}, Store.getSession(s.id), { sessionNumber: Math.max(1, s.sessionNumber + shift) }));
          }
        });
        Store.updateSessionFull(Object.assign({}, session, { sessionNumber: newVal }));
      } else {
        var newB = Object.assign({}, session.billing || {}, { fee: newVal });
        Store.updateSessionFull(Object.assign({}, session, { billing: newB }));
      }
      renderBDetail();
      refreshBillingStats();
      renderBRail();
    }

    input.addEventListener('blur', save);
    input.addEventListener('keydown', function(ev) { if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); } if (ev.key === 'Escape') { input.value = oldVal; input.blur(); } });
    e.stopPropagation();
  }, true);

  /* ──────────────────────────────────────────────────────────
     Tab 1：旧版记账（JSON/CSV → Store 幂等导入）
     ────────────────────────────────────────────────────────── */
  const BillingImport = (() => {
    let parsed = null;
    function reset() { parsed = null; }
    function setResult(msg, color) {
      const el = document.getElementById('billing-result');
      el.textContent = msg;
      el.style.color = color || 'var(--muted)';
    }
    function normDate(s) {
      if (!s) return '';
      s = String(s).trim();
      const m = s.match(/(\d{4})[-/年.](\d{1,2})[-/月.](\d{1,2})/);
      if (m) return `${m[1]}-${String(m[2]).padStart(2, '0')}-${String(m[3]).padStart(2, '0')}`;
      const d = new Date(s);
      return isNaN(d) ? '' : d.toISOString().slice(0, 10);
    }
    function parseCSVrows(text) {
      text = text.replace(/^﻿/, '');
      const rows = []; let row = [], field = '', inQ = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        if (inQ) {
          if (ch === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else inQ = false; }
          else field += ch;
        } else {
          if (ch === '"') inQ = true;
          else if (ch === ',') { row.push(field); field = ''; }
          else if (ch === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
          else if (ch === '\r') {}
          else field += ch;
        }
      }
      if (field.length > 0 || row.length > 0) { row.push(field); rows.push(row); }
      return rows;
    }
    function parseInput(text) {
      text = text.trim();
      if (text.startsWith('{') || text.startsWith('[')) {
        return parseJSON(JSON.parse(text));
      }
      if (text.includes('来访者') || text.includes(',')) {
        return parseCSV(text);
      }
      throw new Error('无法识别格式，请粘贴 JSON 或 CSV');
    }
    function parseJSON(data) {
      if (!Array.isArray(data.clients) || !Array.isArray(data.records)) {
        throw new Error('JSON 应为 { clients, records, monthlyPayments } 结构');
      }
      const idToName = {};
      const clients = data.clients.map(c => {
        const name = (c.name || '').trim();
        if (c.id) idToName[c.id] = name;
        return { name, feePerSession: Number(c.feePerSession) || 0, billingMode: c.billingMode === 'monthly' ? 'monthly' : 'per-session', status: c.status === 'paused' ? 'paused' : 'active', manualSessions: Number(c.manualSessions) || 0 };
      }).filter(c => c.name);
      const records = data.records.map(r => ({
        clientName: (r.clientId && idToName[r.clientId]) || '',
        date: normDate(r.date),
        sessions: Math.max(1, parseInt(r.sessions) || 1),
        feePerSession: Number(r.feePerSession) || 0,
        paid: !!r.paid,
        billingMode: r.billingMode || 'per-session',
        key: 'rec_' + (r.id || (r.clientId + '_' + r.date + '_' + r.sessions))
      })).filter(r => r.clientName && r.date);
      return { format: 'json', clients, records, raw: data };
    }
    function parseCSV(text) {
      const rows = parseCSVrows(text);
      if (rows.length < 2) throw new Error('CSV 内容为空或缺少数据行');
      const header = rows[0].map(h => String(h || '').trim());
      const idx = {
        name: header.indexOf('来访者'),
        date: header.indexOf('日期'),
        sessions: header.indexOf('次数'),
        fee: header.indexOf('单价'),
        paid: header.indexOf('缴费状态'),
        mode: header.indexOf('结算方式')
      };
      if (idx.name < 0 || idx.date < 0) throw new Error('CSV 缺少「来访者」或「日期」列');
      const clientsMap = {};
      const records = [];
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        const name = String(row[idx.name] || '').trim();
        if (!name) continue;
        const date = normDate(row[idx.date]);
        if (!date) continue;
        const sessions = Math.max(1, parseInt(row[idx.sessions] || '1') || 1);
        const fee = Number(row[idx.fee] || 0) || 0;
        const paid = idx.paid >= 0 ? /已缴/.test(String(row[idx.paid] || '')) : false;
        var isMonthly = false;
        if (idx.mode >= 0 && /月结/.test(String(row[idx.mode] || ''))) isMonthly = true;
        if (idx.mode >= 0 && /预付费|预付/.test(String(row[idx.mode] || ''))) isMonthly = false;
        // If no mode column, check if client name suggests monthly
        var clientMode = isMonthly ? 'monthly' : 'per-session';
        records.push({ clientName: name, date, sessions, feePerSession: fee, paid, billingMode: clientMode, key: 'csv_' + name + '_' + date + '_' + sessions });
        if (!clientsMap[name]) {
          clientsMap[name] = { name, feePerSession: fee, billingMode: clientMode, status: 'active', manualSessions: 0 };
        }
      }
      const clients = Object.values(clientsMap);
      if (!clients.length) throw new Error('CSV 中未解析到任何来访者记录');
      return { format: 'csv', clients, records };
    }
    function importSessionKey(batchKey, index) {
      return String(batchKey || '') + '#' + (index + 1);
    }
    // 兼容旧版：此前同一批多节记录共享 key，只能按数量占位；
    // 新版每一节使用独立 key，保证重试与跨库合并不会压缩多节账单。
    function importedSessionCount(sessions, batchKey) {
      var key = String(batchKey || '');
      if (!key) return 0;
      return (sessions || []).filter(function (s) {
        var b = s && s.billing;
        var importKey = b && b.importKey != null ? String(b.importKey) : '';
        return (b && String(b.importBatchKey || '') === key) ||
          importKey === key || importKey.indexOf(key + '#') === 0 ||
          String(s && s.notes || '').indexOf('[billing:' + key + ']') >= 0;
      }).length;
    }
    function missingImportSessionKeys(sessions, record) {
      var batchKey = String(record.key || '');
      if (!batchKey) return [];
      var all = sessions || [];
      var exact = new Set(all.map(function (s) { return String(s && s.billing && s.billing.importKey || ''); }).filter(Boolean));
      var legacySlots = all.filter(function (s) {
        var b = s && s.billing;
        var importKey = b && b.importKey != null ? String(b.importKey) : '';
        return importKey === batchKey || String(s && s.notes || '').indexOf('[billing:' + batchKey + ']') >= 0;
      }).length;
      var missing = [];
      for (var i = 0; i < (record.sessions || 0); i++) {
        var key = importSessionKey(batchKey, i);
        if (exact.has(key)) continue;
        if (legacySlots > 0) { legacySlots--; continue; }
        missing.push(key);
      }
      return missing;
    }
    function computePlan(p) {
      const nameToId = {};
      Store.getClients().forEach(c => { nameToId[c.name.trim()] = c.id; });
      const byClient = {};
      p.clients.forEach(c => { const n = c.name.trim(); byClient[n] = byClient[n] || { newCount: 0, skipCount: 0, fee: c.feePerSession, billingMode: c.billingMode, status: c.status, manualSessions: c.manualSessions }; });
      p.records.forEach(r => {
        const n = (r.clientName || '').trim();
        byClient[n] = byClient[n] || { newCount: 0, skipCount: 0, dupCount: 0 };
        const cid = nameToId[n];
        let already = 0;
        if (cid) {
          // 不按同日/同金额猜测重复：同日可能有多次真实会谈；只使用稳定导入业务键。
          var existing = Store.getSessionsByClient(cid);
          already = Math.min(r.sessions, importedSessionCount(existing, r.key));
        }
        byClient[n].newCount += Math.max(0, r.sessions - already);
        byClient[n].skipCount += already;
      });
      let newClientCount = 0, newSessionCount = 0, skipCount = 0;
      Object.keys(byClient).forEach(n => {
        if (!nameToId[n]) newClientCount++;
        newSessionCount += byClient[n].newCount;
        skipCount += byClient[n].skipCount;
      });
      return { nameToId, byClient, newClientCount, newSessionCount, skipCount };
    }
    function renderPreview(p) {
      const plan = computePlan(p);
      let rows = '';
      Object.keys(plan.byClient).forEach(name => {
        const info = plan.byClient[name];
        const isNew = !plan.nameToId[name];
        const cls = isNew ? 'new' : 'skip';
        rows += `<tr><td class="${cls}">${App.escapeHtml(name)}</td><td><span class="tag ${cls}">${isNew ? '新增' : '已有'}</span></td><td>${info.newCount}</td><td>${info.skipCount}</td></tr>`;
      });
      document.getElementById('billing-preview').innerHTML = `
        <div class="preview-card">
          <div class="preview-pills">
            <span class="pill add"><b>${plan.newClientCount}</b>新增来访者</span>
            <span class="pill add"><b>${plan.newSessionCount}</b>新增节次</span>
            <span class="pill skip"><b>${plan.skipCount}</b>跳过(已存在)</span>
            <span class="pill"><b>${p.clients.length}</b>总来访者</span>
            <span class="pill"><b>${p.records.length}</b>总记录</span>
          </div>
          <div style="max-height:200px;overflow-y:auto">
            <table class="preview-table"><thead><tr><th>来访者</th><th>状态</th><th>新增节次</th><th>跳过节次</th></tr></thead><tbody>${rows}</tbody></table>
          </div>
        </div>`;
      setResult(plan.newSessionCount > 0 ? '预览就绪，点「确认导入」写入。' : '全部记录已存在，无需重复导入。', 'var(--text)');
    }
    function parseText() {
      const text = document.getElementById('billing-input').value;
      if (!text.trim()) { setResult('请先粘贴或选择文件', 'var(--accent)'); return; }
      try { parsed = parseInput(text); renderPreview(parsed); }
      catch (e) { setResult('解析失败：' + e.message, 'var(--accent)'); parsed = null; }
    }
    function parseFile() {
      const f = document.getElementById('billing-file').files[0];
      if (!f) { setResult('请先选择文件', 'var(--accent)'); return; }
      const reader = new FileReader();
      reader.onload = () => {
        document.getElementById('billing-input').value = reader.result;
        parseText();
      };
      reader.readAsText(f);
    }
    function doImport() {
      if (!parsed) { setResult('请先解析数据', 'var(--accent)'); return false; }
      const plan = computePlan(parsed);
      if (plan.newSessionCount === 0 && plan.newClientCount === 0) {
        setResult('全部已存在，无需导入', 'var(--text)'); return false;
      }
      const nameToId = plan.nameToId;
      // 1) 来访者
      parsed.clients.forEach(c => {
        const name = c.name.trim();
        if (!nameToId[name]) {
          const created = Store.createClient({
            name: c.name, status: c.status || 'active', tags: ['记账同步'],
            billing: { feePerSession: c.feePerSession || 0, billingMode: c.billingMode || 'per-session', manualSessions: c.manualSessions || 0 },
            notes: ['来源：旧版记账导入', '单价 ¥' + (c.feePerSession || 0), c.billingMode === 'monthly' ? '月结' : '次结', c.manualSessions ? '手动次数 ' + c.manualSessions : ''].filter(Boolean).join('｜')
          });
          nameToId[name] = created.id;
        } else {
          const ec = Store.getClient(nameToId[name]);
          if (ec && (!ec.billing || !ec.billing.feePerSession) && c.feePerSession) {
            Store.updateClient(ec.id, { billing: Object.assign({}, ec.billing, { feePerSession: c.feePerSession, billingMode: ec.billing?.billingMode || c.billingMode || 'per-session', manualSessions: ec.billing?.manualSessions || c.manualSessions || 0 }) });
          }
        }
      });
      // 2) 按来访者分组，组内按日期排序后再分配节次号
      var byClient = {};
      parsed.records.forEach(function(r) {
        var n = (r.clientName || '').trim();
        if (!byClient[n]) byClient[n] = [];
        byClient[n].push(r);
      });
      var added = 0;
      Object.keys(byClient).forEach(function(name) {
        var cid = nameToId[name.trim()];
        if (!cid) return;
        // 按日期升序排列
        var recs = byClient[name].sort(function(a, b) { return (a.date || '').localeCompare(b.date || ''); });
        // 获取该来访者已有的最大节次数
        var existingSessions = Store.getSessionsByClient(cid);
        var maxExistingNo = 0;
        existingSessions.forEach(function(s) { if (s.sessionNumber > maxExistingNo) maxExistingNo = s.sessionNumber; });
        var sessionNo = maxExistingNo + 1;
        recs.forEach(function(r) {
          // 继承 client 的 billingMode
          var clientObj = Store.getClient(cid);
          var recordMode = r.billingMode || (clientObj && clientObj.billing && clientObj.billing.billingMode) || 'per-session';
          var missingKeys = missingImportSessionKeys(existingSessions, r);
          missingKeys.forEach(function(importKey) {
            Store.createSession({
              clientId: cid, sessionNumber: sessionNo, date: r.date, durationMinutes: 0, type: 'individual',
              billing: { fee: r.feePerSession || 0, paid: !!r.paid, source: 'billing', billingMode: recordMode, importKey: importKey, importBatchKey: r.key || null },
              notes: ['来源：旧版记账导入', r.feePerSession ? '单价 ¥' + r.feePerSession : '', '方式：' + ((recordMode === 'monthly') ? '月结' : (recordMode === 'prepaid' ? '预付费' : '次结')), r.paid !== undefined ? (r.paid ? '已缴' : '未缴') : '', '[billing:' + importKey + ']'].filter(Boolean).join('｜')
            });
            sessionNo++;
            added++;
          });
        });
      });
      setResult(`导入完成：新增节次 ${added}，跳过 ${plan.skipCount}（已存在）`, 'var(--green, #6E7E62)');
      return true;
    }
    return { parseText, parseFile, doImport, reset };
  })();

  /* ──────────────────────────────────────────────────────────
     Tab 2：腾讯会议（latest_meetings.json → 匹配 → Store）
     ────────────────────────────────────────────────────────── */
  const MeetingsImport = (() => {
    const SELF_HINTS = ['mei', '梅', 'admin', '我'];
    let parsedMeetings = [];
    let rows = [];
    function reset() { parsedMeetings = []; rows = []; }
    function isSelf(name) {
      const n = (name || '').toLowerCase();
      return SELF_HINTS.some(h => n.includes(h.toLowerCase()));
    }
    function fmtDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d)) return iso;
      const p = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
    }
    function matchClient(name) {
      if (!name) return null;
      const clients = Store.getClients();
      const lower = name.trim().toLowerCase();
      let hit = clients.find(c => (c.name || '').toLowerCase() === lower);
      if (hit) return hit;
      hit = clients.find(c => (c.name || '').toLowerCase().includes(lower) || lower.includes((c.name || '').toLowerCase()));
      return hit || null;
    }
    function setResult(msg, color) {
      const el = document.getElementById('meetings-result');
      el.textContent = msg;
      el.style.color = color || 'var(--muted)';
    }
    function parseText() {
      const raw = document.getElementById('meetings-json').value.trim();
      if (!raw) { setResult('请先粘贴或选择文件', 'var(--accent)'); return; }
      let data; try { data = JSON.parse(raw); } catch (e) { setResult('JSON 解析失败', 'var(--accent)'); return; }
      let list = Array.isArray(data) ? data : (data.meetings || data.data || []);
      if (!Array.isArray(list) || !list.length) { setResult('未找到会议数组', 'var(--accent)'); return; }
      parsedMeetings = list;
      buildRows();
    }
    function parseFile() {
      const f = document.getElementById('meetings-file').files[0];
      if (!f) { setResult('请先选择文件', 'var(--accent)'); return; }
      const reader = new FileReader();
      reader.onload = () => {
        document.getElementById('meetings-json').value = reader.result;
        parseText();
      };
      reader.readAsText(f);
    }
    function buildRows() {
      rows = [];
      parsedMeetings.forEach(m => {
        const subj = m.subject || m.title || m.topic || '(无主题)';
        const start = m.start_time || m.startTime || m.start || '';
        const end = m.end_time || m.endTime || m.end || '';
        const participants = m.participants || m.members || [];
        participants.forEach(p => {
          const pname = p.user_name || p.name || p.userName || '';
          if (!pname || isSelf(pname)) return;
          const matched = matchClient(pname);
          rows.push({ meeting: { subj, start, end }, participant: pname, duration: p.duration_min || p.durationMin || p.duration || 0, matched, selected: true, newChoice: matched ? matched.id : '' });
        });
      });
      renderList();
      setResult(`共解析 ${rows.length} 位参会者（非本人）。${rows.filter(r => !r.matched).length} 位需手动匹配。`, 'var(--text)');
    }
    function renderList() {
      if (rows.length === 0) {
        document.getElementById('meetings-list').innerHTML = '';
        return;
      }
      const clientOpts = Store.getClients().map(c => `<option value="${c.id}">${App.escapeHtml(c.name)}</option>`).join('');
      const html = rows.map((r, i) => {
        const tagClass = r.matched ? 'var(--green, #6E7E62)' : 'var(--accent, #9E5A3C)';
        const tagText = r.matched ? '匹配' : '需选';
        return `<div class="meeting-row">
          <input type="checkbox" data-i="${i}" ${r.selected ? 'checked' : ''} style="flex-shrink:0">
          <div class="meta">
            <div class="subj">${App.escapeHtml(r.meeting.subj)} <span class="ptag" style="color:${tagClass}">${tagText}</span></div>
            <div class="time">${fmtDate(r.meeting.start)} → ${fmtDate(r.meeting.end)} · ${r.duration} 分钟</div>
          </div>
          <span style="color:var(--muted);font-size:12px">${App.escapeHtml(r.participant)} →</span>
          <select data-i="${i}" class="client-select">
            <option value="">+ 新建来访者</option>
            ${clientOpts}
          </select>
        </div>`;
      }).join('');
      document.getElementById('meetings-list').innerHTML = html;
    }
    document.getElementById('meetings-list').addEventListener('change', e => {
      const i = +e.target.dataset.i;
      if (e.target.type === 'checkbox') rows[i].selected = e.target.checked;
      else rows[i].newChoice = e.target.value;
    });
    function importSelected() {
      const sel = rows.filter(r => r.selected);
      if (sel.length === 0) { setResult('请至少选择一行', 'var(--accent)'); return false; }
      let createdClients = 0, createdSessions = 0, skipped = 0;
      sel.forEach(r => {
        const start = new Date(r.meeting.start);
        if (isNaN(start)) { skipped++; return; }
        const date = start.toISOString().slice(0, 10);
        let cid = r.newChoice;
        if (!cid) {
          // 新建来访者
          const c = Store.createClient({ name: r.participant, status: 'active', tags: ['会议同步'], notes: '来源：腾讯会议参会' });
          cid = c.id;
          createdClients++;
        }
        const exist = Store.getSessionsByClient(cid).find(s => s.notes && s.notes.includes('[tmeet:' + r.meeting.start + ':' + r.participant + ']'));
        if (exist) { skipped++; return; }
        Store.createSession({
          clientId: cid, sessionNumber: Store.nextSessionNumber(cid), date,
          durationMinutes: r.duration, type: 'individual',
          billing: { fee: 0, paid: false, source: 'tmeet' },
          notes: ['会议：' + r.meeting.subj, r.duration ? '时长 ' + r.duration + ' 分钟' : '', '[tmeet:' + r.meeting.start + ':' + r.participant + ']'].filter(Boolean).join('｜')
        });
        createdSessions++;
      });
      setResult(`导入完成：新建来访者 ${createdClients}，生成 session ${createdSessions}，跳过 ${skipped}（重复）`, 'var(--green, #6E7E62)');
      return true;
    }
    return { parseText, parseFile, importSelected, reset };
  })();

  /* ──────────────────────────────────────────────────────────

    { key: 'personal', name: '个人体验', icon: '🧘', bg: 'rgba(107,174,143,.15)' },

    populateMonthSelect();

  function populateMonthSelect() {
    var sel = document.getElementById('bin-month');
    if (!sel) return;
    var months = [];
    var today = new Date();
    for (var i = 11; i >= 0; i--) {
      var d = new Date(today.getFullYear(), today.getMonth() - i, 1);
      months.push(d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0'));
    }
    sel.innerHTML = '<option value="all">全部月份</option>' + months.map(function (m) {
      return '<option value="' + m + '">' + m + '</option>';
    }).join('');
  }

  function renderIncomeList() {
    var q = (document.getElementById('bin-search') || {}).value || '';
    binMonthFilter = (document.getElementById('bin-month') || {}).value || 'all';
    q = q.toLowerCase();
    var clients = Store.getClients().filter(function (c) {
      if (c.status === 'ended') return false;
      if (q && (c.name || '').toLowerCase().indexOf(q) < 0) return false;
      if (binMonthFilter !== 'all') {
        var hasSessions = billableSessionsFor(c.id).some(function (s) {
          return s.date && s.date.slice(0, 7) === binMonthFilter;
        });
        var hasMP = (c.billing && c.billing.monthlyPayments || []).some(function (mp) {
          return mp.month === binMonthFilter;
        });
        if (!hasSessions && !hasMP) return false;
      }
      return true;
    });
    var body = document.getElementById('bin-body');
    if (!body) return;
    if (!clients.length) {
      body.innerHTML = '<div class="empty-state">无匹配来访者<br>请先在「来访者」页创建</div>';
      return;
    }
    var html = clients.map(function (c) {
      var agg = clientAgg(c);
      var mode = (c.billing && c.billing.billingMode) || 'per-session';
      var ym = new Date().toISOString().slice(0, 7);
      var monthSessions = billableSessionsFor(c.id).filter(function (s) { return s.date && s.date.slice(0, 7) === ym; });
      var active = binCurClient && binCurClient.id === c.id;
      return '<div class="bin-item' + (active ? ' active' : '') + '" onclick="selectIncomeClient(\'' + c.id + '\', event)">' +
        '<div class="ava">' + (c.name ? c.name[0] : '?') + '</div>' +
        '<div class="info"><div class="nm">' + App.escapeHtml(c.name) + '</div>' +
        '<div class="mt">' + monthSessions.length + '节 · ' + (MODE_TEXT[mode] || '次结') + ' · 应收¥' + agg.total.toLocaleString() + '</div></div>' +
        '<div class="amt' + (agg.owe > 0 ? ' owe' : '') + '">' + (agg.owe > 0 ? '¥' + agg.owe.toLocaleString() : '¥0') + '</div></div>';
    }).join('');
    body.innerHTML = html;
  }

    var month = (document.getElementById('settle-bf-month') || {}).value || '';
    var amount = Number((document.getElementById('settle-bf-amount') || {}).value) || 0;
    if (!month) { App.showToast('请选择月份', 'warning'); return; }
    if (amount <= 0) { App.showToast('月结金额需 > 0', 'warning'); return; }
    var billing = Object.assign({}, binCurClient.billing || {});
    billing.monthlyPayments = Array.isArray(billing.monthlyPayments) ? billing.monthlyPayments.slice() : [];
    var exist = billing.monthlyPayments.findIndex(function (m) { return m.month === month; });
    if (exist >= 0) billing.monthlyPayments[exist].amount = amount;
    else billing.monthlyPayments.push({ month: month, amount: amount });
    Store.updateClient(binCurClient.id, { billing: billing });
    App.showToast('月结已保存', 'success');
    closeBinForm('settle-bf-form');
    binCurClient = Store.getClients().find(function (c) { return c.id === binCurClient.id; }) || binCurClient;
    renderIncomeList();
    renderBillingStats();
  };

  function renderExpensePanel() {
    var body = document.getElementById('bexp-body');
    if (!body) return;
    var q = '';
    var searchEl = document.getElementById('bexp-search');
    if (searchEl) q = (searchEl.value || '').toLowerCase();
    var monthFilter = '';
    var monthEl = document.getElementById('bexp-month');
    if (monthEl) monthFilter = monthEl.value || '';
    var allExpenses = Store.getExpenses ? Store.getExpenses() : [];
    // 月份选项填充
    if (monthEl) {
      var months = [];
      allExpenses.forEach(function (e) { if (e.date) { var ym = e.date.slice(0, 7); if (months.indexOf(ym) < 0) months.push(ym); } });
      months.sort().reverse();
      var cur = monthEl.value;
      monthEl.innerHTML = '<option value="">全部月份</option>' + months.map(function (m) {
        return '<option value="' + m + '"' + (m === cur ? ' selected' : '') + '>' + m + '</option>';
      }).join('');
    }
    var filtered = allExpenses.filter(function (e) {
      if (q) {
        var desc = (e.description || '').toLowerCase();
        var cat = (e.category || '').toLowerCase();
        if (desc.indexOf(q) < 0 && cat.indexOf(q) < 0) return false;
      }
      if (monthFilter && (!e.date || e.date.slice(0, 7) !== monthFilter)) return false;
      return true;
    });
    var stats = Store.getExpenseStats ? Store.getExpenseStats() : { total: 0, byCat: {}, count: 0 };
    var html = '';
    EXPENSE_CATEGORIES.forEach(function (cat) {
      var cs = (stats.byCat && stats.byCat[cat.key]) || { count: 0, total: 0 };
      html += '<div class="exp-cat" onclick="openExpenseCat(\'' + cat.key + '\', event)">' +
        '<div class="icon" style="background:' + cat.bg + '">' + cat.icon + '</div>' +
        '<div class="info"><div class="name">' + cat.name + '</div><div class="cnt">' + cs.count + '笔</div></div>' +
        '<div class="amt">¥' + cs.total.toLocaleString() + '</div></div>';
    });
    html += '<div class="add-expense" onclick="openExpenseForm(null, event)">+ 记一笔支出</div>';
    body.innerHTML = html;
  }

  window.openExpenseCat = function (cat, event) {
    if (event) event.stopPropagation();
    var body = document.getElementById('bexp-body');
    if (!body) return;
    // 切到支出聚焦状态：收入缩小，中间显示支出明细
    setBillingState('expense');
    binCurClient = null;
    renderIncomeList();

    var name = CAT_NAMES[cat] || cat;
    var expenses = Store.getExpensesByCategory ? Store.getExpensesByCategory(cat) : [];
    var catInfo = EXPENSE_CATEGORIES.find(function (c) { return c.key === cat; });
    var totalAmt = expenses.reduce(function(s,e){return s+(Number(e.amount)||0);},0);

    // 右栏显示分类列表（保持高亮选中态）
    renderExpensePanel();

    // 中间栏显示支出明细
    showDetailContent();
    document.getElementById('detail-header').innerHTML =
      '<h2>' + (catInfo ? catInfo.icon + ' ' : '') + name + ' · 支出明细</h2>' +
      '<div style="font-size:12px;color:var(--ink-3)">共 ' + expenses.length + ' 笔</div>' +
      '<div class="detail-stats">' +
        '<div class="stat"><b style="color:var(--danger)">¥' + totalAmt.toLocaleString() + '</b><span>总支出</span></div>' +
        '<div class="stat"><b style="color:var(--text)">' + expenses.length + '</b><span>笔数</span></div>' +
        (expenses.length ? '<div class="stat"><b style="color:var(--accent)">¥' + Math.round(totalAmt/expenses.length).toLocaleString() + '</b><span>平均</span></div>' : '') +
      '</div>';

    var html = '';
    if (!expenses.length) {
      html += '<div style="text-align:center;color:var(--ink-3);padding:16px;font-size:13px">暂无记录</div>';
    } else {
      html += '<div class="detail-section-title">支出记录</div>';
      expenses.forEach(function (e) {
        html += '<div class="exp-row" style="background:var(--paper-2,#fff);border-radius:8px;margin-bottom:6px;border:1px solid var(--border)"><div class="info"><div class="desc">' + App.escapeHtml(e.description || '未命名') + '</div><div class="dt">' + App.escapeHtml(e.date || '') + '</div></div>' +
          '<span class="amt">¥' + (Number(e.amount) || 0).toLocaleString() + '</span></div>';
      });
    }
    document.getElementById('detail-body').innerHTML = html;
  };

  window.openExpenseForm = function (preCat, event) {
    if (event) event.stopPropagation();
    var cat = preCat || 'other';
    var body = document.getElementById('bexp-body');
    if (!body) return;
    var formHtml = '<div class="exp-form" id="exp-form-card">' +
      '<div style="display:flex;gap:8px;flex-wrap:wrap">' +
      '<div style="flex:1;min-width:100px"><label>分类</label><select id="exp-form-cat">' +
      EXPENSE_CATEGORIES.map(function (c) { return '<option value="' + c.key + '"' + (c.key === cat ? ' selected' : '') + '>' + c.icon + ' ' + c.name + '</option>'; }).join('') +
      '</select></div>' +
      '<div style="flex:1;min-width:100px"><label>日期</label><input type="date" id="exp-form-date" value="' + App.todayStr() + '"></div>' +
      '<div style="flex:1;min-width:80px"><label>金额</label><input type="number" id="exp-form-amount" value="0" min="0"></div></div>' +
      '<div style="margin-top:8px"><label>描述</label><input type="text" id="exp-form-desc" placeholder="如：温尼科特式个人体验" style="width:100%"></div>' +
      '<div class="row-actions"><button class="btn btn-ghost" onclick="closeExpForm()">取消</button>' +
      '<button class="btn btn-primary" onclick="doAddExpense()">保存</button></div></div>';
    var old = document.getElementById('exp-form-card');
    if (old) old.remove();
    body.insertAdjacentHTML('afterbegin', formHtml);
  };

  window.closeExpForm = function () {
    var el = document.getElementById('exp-form-card');
    if (el) el.remove();
    setBillingState('default');
    showDetailEmpty();
    renderExpensePanel();
  };

  window.doAddExpense = function () {
    var cat = (document.getElementById('exp-form-cat') || {}).value || 'other';
    var date = (document.getElementById('exp-form-date') || {}).value || '';
    var amount = Number((document.getElementById('exp-form-amount') || {}).value) || 0;
    var desc = (document.getElementById('exp-form-desc') || {}).value || '';
    if (!date) { App.showToast('请选择日期', 'warning'); return; }
    if (amount <= 0) { App.showToast('金额需 > 0', 'warning'); return; }
    if (Store.createExpense) {
      Store.createExpense({ category: cat, date: date, amount: amount, description: desc });
      App.showToast('支出已记录', 'success');
    }
    closeExpForm();
    renderBillingStats();
  };
  </script>
</body>
</html>
