<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>设置B · 左导航右内容</title>
<style>
:root{--bg:#F6F8FC;--paper:#fff;--soft:#EDF0F7;--border:#E2E7F0;--ink:#2B3140;--ink2:#646B7D;--ink3:#99A1B3;--accent:#8B93C7;--a-soft:#ECEEF9;--green:#6FAE8F;--red:#D98C8C;--serif:"Noto Serif SC",Georgia,serif;--sans:system-ui,-apple-system,sans-serif;--r:14px;--r-sm:10px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--sans);background:var(--bg);color:var(--ink);height:100vh;overflow:hidden;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--paper);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.topbar .back{font-size:13px;cursor:pointer;border:none;background:none;color:var(--ink2);padding:4px 8px;border-radius:6px}
.topbar h2{font-family:var(--serif);font-size:18px}
.ws{display:grid;grid-template-columns:200px 1fr;flex:1;min-height:0}
.nav{background:var(--paper);border-right:1px solid var(--border);padding:16px 10px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;margin-bottom:4px;transition:.15s;font:14px var(--sans);color:var(--ink2)}
.nav-item:hover{background:var(--a-soft)}.nav-item.active{background:var(--a-soft);color:var(--accent);font-weight:600}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.content{overflow-y:auto;padding:28px 32px}
.content-inner{max-width:560px}
.content h3{font-family:var(--serif);font-size:18px;margin-bottom:16px}
.field{margin-bottom:18px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--ink2)}
.field input,.field select{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 12px;font:14px var(--sans);outline:none;background:var(--paper)}
.field input:focus{border-color:var(--accent)}
.field .hint{font-size:12px;color:var(--ink3);margin-top:4px}
.btn{border:1px solid var(--border);background:var(--paper);border-radius:8px;padding:9px 18px;font:14px var(--sans);cursor:pointer;color:var(--ink2)}
.btn.pri{background:var(--accent);color:#fff;border:none}
.btn.danger{border-color:var(--red);color:var(--red)}
.toggle{width:40px;height:22px;border-radius:999px;background:var(--soft);cursor:pointer;position:relative;transition:.2s}
.toggle.on{background:var(--accent)}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s}
.toggle.on::after{left:20px}
.badge{font-size:11px;padding:2px 8px;border-radius:5px}
.badge.ok{background:rgba(107,174,143,.15);color:var(--green)}
.section-divider{height:1px;background:var(--border);margin:20px 0}
</style>
</head>
<body>
<div class="topbar"><button class="back">← 返回</button><h2>设置</h2></div>
<div class="ws">
  <div class="nav">
    <div class="nav-item active"><span class="icon">🔑</span> AI 接口</div>
    <div class="nav-item"><span class="icon">💾</span> 数据管理</div>
    <div class="nav-item"><span class="icon">🎨</span> 外观</div>
    <div class="nav-item"><span class="icon">🔄</span> 更新</div>
    <div class="nav-item"><span class="icon">ℹ️</span> 关于</div>
  </div>
  <div class="content"><div class="content-inner">
    <h3>AI 接口配置</h3>
    <div class="field"><label>API 提供商</label><select><option>DeepSeek</option><option>SiliconFlow</option><option>OpenAI 兼容</option></select></div>
    <div class="field"><label>API Key</label><input type="password" placeholder="sk-..." style="width:100%"><div class="hint">密钥仅存储在本地，不会上传</div></div>
    <div class="field"><label>模型</label><select><option>deepseek-chat</option><option>deepseek-coder</option></select></div>
    <div class="field"><label>自定义 API 地址（可选）</label><input placeholder="https://api.example.com/v1" style="width:100%"></div>
    <div style="display:flex;gap:10px;align-items:center"><button class="btn pri">测试连接</button><span class="badge ok">已连接 · deepseek-chat</span></div>
    <div class="section-divider"></div>
    <h3>激活状态</h3>
    <div class="field"><label>当前状态</label><span class="badge ok">已激活 · 会员版</span></div>
    <div class="field"><label>输入新激活码</label><input placeholder="XXXX-XXXX-XXXX" style="width:200px"><div class="hint">如需更换激活码</div></div>
    <button class="btn">验证激活码</button>
  </div></div>
</div>
</body>
</html>
