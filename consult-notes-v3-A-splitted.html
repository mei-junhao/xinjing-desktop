<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心镜 · 咨询记录 A · 双栏整理</title>
<style>
:root{--bg:#F6F8FC;--paper:#FFFFFF;--soft:#EDF0F7;--border:#E2E7F0;--ink:#2B3140;--ink2:#646B7D;--ink3:#99A1B3;--accent:#8B93C7;--a-hover:#777FBC;--a-soft:#ECEEF9;--green:#6FAE8F;--red:#D98C8C;--serif:"Noto Serif SC","Songti SC",Georgia,serif;--sans:system-ui,-apple-system,"Segoe UI",sans-serif;--radius:14px;--radius-sm:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:14px;padding:12px 24px;background:var(--paper);border-bottom:1px solid var(--border);flex-shrink:0}
.topbar .back{color:var(--ink2);font-size:13px;cursor:pointer;border:none;background:none;display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px}
.topbar .back:hover{color:var(--accent);background:var(--a-soft)}
.topbar h2{font-family:var(--serif);font-size:18px;margin:0}
.topbar .spacer{flex:1}
.topbar select{border:1px solid var(--border);border-radius:8px;padding:6px 10px;font:13px var(--sans);background:var(--paper)}
.prompt-strip{display:flex;gap:8px;padding:10px 24px;background:var(--soft);border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0}
.prompt-strip .chip{border:1px solid var(--border);border-radius:999px;padding:5px 12px;font-size:12px;cursor:pointer;color:var(--ink2);background:var(--paper)}
.prompt-strip .chip:hover{border-color:var(--accent);color:var(--accent)}
.prompt-strip .chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.split{display:flex;flex:1;min-height:0}
.left{flex:1;overflow-y:auto;padding:24px;min-width:0}
.left .guide{font-size:12px;color:var(--ink3);margin-bottom:14px;line-height:1.6;padding:10px 14px;background:var(--soft);border-radius:var(--radius-sm);border-left:3px solid var(--accent)}
.left .field{margin-bottom:16px}
.left .field label{display:block;font-size:12px;color:var(--accent);font-weight:600;margin-bottom:6px}
.left .field textarea{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;font:14px/1.8 var(--sans);color:var(--ink);resize:vertical;min-height:80px;outline:none;background:var(--paper)}
.left .field textarea:focus{border-color:var(--accent)}
.left .field textarea.tall{min-height:140px}
.right{width:360px;flex-shrink:0;background:var(--paper);border-left:1px solid var(--border);display:flex;flex-direction:column}
.rdock-head{padding:14px 16px;border-bottom:1px solid var(--border);font-family:var(--serif);font-size:14px;font-weight:600;color:var(--accent)}
.rdock-chat{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px}
.rmsg{font-size:13px;line-height:1.7;padding:10px 14px;border-radius:12px;max-width:88%}
.rmsg.ai{background:var(--a-soft);align-self:flex-start;border-bottom-left-radius:4px}
.rmsg.me{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.rdock-input{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border)}
.rdock-input input{flex:1;border:1px solid var(--border);border-radius:9px;padding:9px 12px;font:13px var(--sans);outline:none;background:var(--bg)}
.rdock-input button{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:9px 16px;font:600 13px var(--sans);cursor:pointer}
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:10px 24px;font:600 14px var(--sans);cursor:pointer;margin-top:8px}
.btn-primary:hover{background:var(--a-hover)}
.quick-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.quick-row button{border:1px solid var(--border);background:var(--paper);border-radius:7px;padding:6px 12px;font-size:12px;cursor:pointer;color:var(--ink2)}
.quick-row button:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<div class="topbar">
  <button class="back" onclick="location.href='index.html'">&#x2190; 返回</button>
  <h2>咨询记录</h2>
  <span class="spacer"></span>
  <select style="max-width:180px"><option>林小满 · 第5节 · 今天</option><option>陈默 · 第2节 · 5月20日</option><option>新建记录</option></select>
</div>
<div class="prompt-strip">
  <span class="chip active">APA 引导</span>
  <span class="chip">自由笔记</span>
  <span class="chip" style="margin-left:auto">小镜问答 ✦</span>
</div>
<div class="split">
  <div class="left">
    <div class="guide"><b>APA 结构化提示</b> — 以下 5 个维度帮助你快速梳理本次咨询的关键信息。右侧小镜可以帮你展开任何一条。</div>
    <div class="field">
      <label>1. 主诉与咨询目标</label>
      <textarea placeholder="来访者本次提出的主要问题或咨询目标……">来访者主诉本周反复确认丈夫是否还爱自己，伴随睡眠质量下降。咨询目标是理解这种不安的来源。</textarea>
    </div>
    <div class="field">
      <label>2. 行为观察与非言语信息</label>
      <textarea placeholder="咨询中观察到的身体语言、情绪状态、互动模式……">会谈中身体前倾、语速在谈及童年时明显加快。提到母亲时握拳，眼眶泛红但未落泪。</textarea>
    </div>
    <div class="field">
      <label>3. 情绪状态与情感反应</label>
      <textarea placeholder="来访者的主要情绪、咨询师的反移情体验……">焦虑为主，伴有间歇性悲伤。咨询师感到保护欲与无力感交织——想安抚她但又觉得不够。</textarea>
    </div>
    <div class="field">
      <label>4. 关键对话片段</label>
      <textarea placeholder="一段代表性对话，尽量还原原话……" class="tall">咨：那种「不确认就消失」的感觉，身体在哪里？</textarea>
    </div>
    <div class="field">
      <label>5. 下次咨询方向</label>
      <textarea placeholder="计划在下次咨询中探索的方向或具体技术……">继续探索早期依恋经历与当前关系模式的关联。考虑布置"安全感时刻记录"的家庭作业。</textarea>
    </div>
    <div class="quick-row">
      <button>保存到咨询记录</button>
      <button>发送给小镜展开</button>
      <button class="btn-primary" style="margin-left:auto">完成并跳转撰写报告</button>
    </div>
  </div>
  <div class="right">
    <div class="rdock-head">小镜</div>
    <div class="rdock-chat" id="rdock-chat">
      <div class="rmsg ai">我已阅读了你填写的 APA 记录。林小满的核心议题围绕"被抛弃"的焦虑与童年依恋创伤。需要我帮你展开哪一条？</div>
      <div class="rmsg ai">第 4 条"关键对话"的片段很有价值——来访者「胸口发紧」的身体反应是重要的移情线索。要深入探讨吗？</div>
    </div>
    <div class="rdock-input"><input placeholder="问小镜……"><button>发送</button></div>
  </div>
</div>
</body>
</html>
