<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>督导方案4 · 沉浸文档</title>
<style>
:root{--bg:#F6F8FC;--bg-el:#FFFFFF;--border:#E2E7F0;--text:#2B3140;--t2:#646B7D;--t3:#99A1B3;--accent:#8B93C7;--a-soft:#ECEEF9;--success:#6FAE8F;--warn:#D6A85C;--purple:#9B85C7;--r:14px;--serif:"Noto Serif SC",Georgia,serif;--sans:"Noto Sans SC",system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:12px;padding:10px 24px;background:var(--bg-el);border-bottom:1px solid var(--border)}
.topbar h2{font-family:var(--serif);font-size:18px;margin:0}
.topbar select{border:1px solid var(--border);border-radius:8px;padding:5px 10px;font:12px var(--sans);background:var(--bg-el)}
.topbar .spacer{flex:1}
.doc-area{padding:32px 48px;max-width:820px;margin:0 auto;height:calc(100vh - 54px);overflow-y:auto}
.doc-header{display:flex;gap:12px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.doc-header input{border:none;border-bottom:2px solid var(--border);font:24px var(--serif);color:var(--text);padding:4px 0;outline:none;background:transparent;flex:1;min-width:200px}
.doc-header input:focus{border-bottom-color:var(--accent)}
.doc-meta{font-size:12px;color:var(--t3);display:flex;gap:12px}
.doc-body{font:15px/2 var(--sans);color:var(--text);min-height:400px;outline:none;padding:0}
.doc-body[contenteditable]:empty:before{content:attr(data-ph);color:var(--t3);font-style:italic}
.doc-body h3{font-family:var(--serif);font-size:18px;margin:24px 0 8px;color:var(--accent)}
.doc-body blockquote{border-left:3px solid var(--accent);margin:12px 0;padding:6px 16px;background:var(--a-soft);border-radius:0 8px 8px 0;color:var(--t2)}
mark.ai{background:var(--a-soft);border-left:3px solid var(--accent);display:block;padding:9px 14px;margin:10px 0;border-radius:0 8px 8px 0;white-space:pre-line;font-size:14px}

.ai-panel{position:fixed;right:24px;top:50%;transform:translateY(-50%);width:320px;background:var(--bg-el);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 4px 24px rgba(0,0,0,.1);display:flex;flex-direction:column;max-height:70vh;z-index:10}
.ai-panel-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:move}
.ai-panel-body{padding:14px 16px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:10px}
.ai-panel-body .btn{display:flex;gap:8px;align-items:center;text-align:left;border:1px solid var(--border);background:var(--bg-el);border-radius:10px;padding:10px 14px;font-size:13px;cursor:pointer;color:var(--text);width:100%}
.ai-panel-body .btn:hover{border-color:var(--accent);background:var(--a-soft);color:var(--accent)}
.ai-panel-body .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}

.floating-tb{position:fixed;display:none;gap:3px;background:var(--bg-el);border:1px solid var(--border);border-radius:10px;padding:4px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:20}
.floating-tb button{border:none;background:transparent;width:30px;height:28px;border-radius:7px;cursor:pointer;font-size:14px;color:var(--t2)}
.floating-tb button:hover{background:var(--a-soft);color:var(--accent)}
.panel-collapsed{display:none !important}

.tab-float{position:fixed;right:16px;top:50%;transform:translateY(-36px);display:flex;flex-direction:column;gap:4px}
.tab-float button{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--bg-el);cursor:pointer;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.tab-float button:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<div class="topbar">
  <h2>AI 督导 · 沉浸文档</h2>
  <span class="spacer"></span>
  <select style="max-width:150px"><option>温尼科特</option><option>精神分析</option><option>CBT</option></select>
  <select style="max-width:150px"><option>女娲版</option><option>仓颉版</option></select>
  <select style="max-width:150px"><option>关联：林小满 · 第5节</option><option>关联：陈默 · 第2节</option><option>不关联（纯笔记）</option></select>
</div>
<div class="doc-area">
  <div class="doc-header">
    <input value="林小满 · 第5节 督导材料" placeholder="标题…">
    <span class="doc-meta">2026-07-13 · 温尼科特取向 · 女娲版</span>
  </div>
  <div class="doc-body" contenteditable="true" data-ph="在此像编辑 Word 一样书写督导材料。&#10;选中文字会出现格式工具栏。右侧 AI 坞浮动在窗外，可随时拖到任意位置。&#10;支持粘贴逐字稿、载入已有会话的 SOAP/DAP/反思。">
    <h3>个案背景</h3>
    <p>来访者，女，29岁，因「反复确认丈夫是否还爱自己」就诊。第三次会谈中，她谈到童年常被母亲以「再闹就不要你了」威胁……</p>
    <blockquote>T: 当你说「再确认一次」的时候，身体有什么感觉？<br>P: 胸口发紧，好像不确认下一秒他就不见了。</blockquote>
  </div>
</div>

<div class="ai-panel" id="aip">
  <div class="ai-panel-head"><b style="font-family:var(--serif);font-size:14px">AI 督导坞</b><button onclick="document.getElementById('aip').classList.toggle('panel-collapsed')" style="border:none;background:none;cursor:pointer;font-size:16px;color:var(--t2)">−</button></div>
  <div class="ai-panel-body">
    <button class="btn primary"><span>✨</span> 生成整体印象（插入光标）</button>
    <button class="btn"><span>🔍</span> 深化选中讨论</button>
    <button class="btn"><span>📝</span> 总结选区</button>
    <button class="btn"><span>💡</span> 润色选区</button>
    <button class="btn"><span>🗣</span> 就此议题开启大师对话</button>
    <button class="btn"><span>📼</span> 整理真人督导录音</button>
  </div>
</div>

<div class="floating-tb" id="ftb">
  <button data-cmd="bold"><b>B</b></button><button data-cmd="italic"><i>I</i></button>
  <button data-cmd="formatBlock" data-val="H3">H</button>
  <button data-cmd="insertUnorderedList">•</button>
  <button data-cmd="formatBlock" data-val="BLOCKQUOTE">❝</button>
</div>

<div class="tab-float" id="toggle-float">
  <button onclick="var p=document.getElementById('aip');p.classList.toggle('panel-collapsed');this.textContent=p.classList.contains('panel-collapsed')?'▶':'◀'" title="切换AI坞显示">◀</button>
</div>

<script>
// 浮动工具栏
var ed=document.querySelector('.doc-body'),ftb=document.getElementById('ftb');
ed.addEventListener('mouseup',()=>{setTimeout(()=>{var s=window.getSelection();if(!s||s.isCollapsed){ftb.style.display='none';return}var r=s.getRangeAt(0).getBoundingClientRect();ftb.style.display='flex';ftb.style.left=(r.left-10)+'px';ftb.style.top=(r.top-ftb.offsetHeight-8)+'px'},10)});
ftb.querySelectorAll('button').forEach(b=>b.onclick=()=>{document.execCommand(b.dataset.cmd,b.dataset.cmd==='formatBlock',b.dataset.val||null);ed.focus()});
// 拖动AI面板
var aip=document.getElementById('aip'),drag=false,dx=0,dy=0;
aip.querySelector('.ai-panel-head').addEventListener('mousedown',e=>{drag=true;dx=e.clientX-aip.offsetLeft;dy=e.clientY-aip.offsetTop;aip.style.position='fixed';aip.style.right='auto';aip.style.top='';aip.style.transform='none';e.preventDefault()});
document.addEventListener('mousemove',e=>{if(!drag)return;aip.style.left=(e.clientX-dx)+'px';aip.style.top=(e.clientY-dy)+'px'});
document.addEventListener('mouseup',()=>{drag=false});
</script>
</body>
</html>
