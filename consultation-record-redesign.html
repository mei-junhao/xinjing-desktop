<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心镜 · 咨询记录主工作区（预览）</title>
<link rel="stylesheet" href="app/css/tokens.css">
<link rel="stylesheet" href="app/css/style.css">
<style>
  :root{
    --bg:#F6F8FC; --bg-elevated:#FFFFFF; --bg-sunken:#EDF0F7; --bg-glass:rgba(255,255,255,.72);
    --border:#E2E7F0; --border-strong:#D2D9E6;
    --text:#2B3140; --text-secondary:#646B7D; --text-muted:#99A1B3;
    --accent:#8B93C7; --accent-hover:#777FBC; --accent-soft:#ECEEF9; --accent-2:#9DB8D6;
    --success:#6FAE8F; --warning:#D6A85C; --danger:#D98C8C;
    --radius:14px; --radius-sm:10px; --radius-lg:22px;
    --shadow-sm:0 1px 3px rgba(43,49,64,.05); --shadow-md:0 4px 16px rgba(43,49,64,.07); --shadow-lg:0 12px 36px rgba(43,49,64,.10);
    --blur:14px;
    --font-serif:"Noto Serif SC","Songti SC",Georgia,serif;
    --font-sans:"Noto Sans SC",system-ui,-apple-system,"Segoe UI",sans-serif;
    --dock-w:380px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font-sans);background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
  .topbar{display:flex;align-items:center;gap:16px;padding:12px 22px;background:var(--bg-elevated);border-bottom:1px solid var(--border)}
  .brand{font-family:var(--font-serif);font-size:19px;font-weight:600}
  .brand small{font-family:var(--font-sans);color:var(--text-muted);font-weight:400;font-size:12px;margin-left:8px}
  .viewswitch{margin-left:auto;display:inline-flex;border:1px solid var(--border);border-radius:999px;overflow:hidden}
  .viewswitch button{border:0;background:transparent;padding:7px 18px;font-size:13px;color:var(--text-secondary);cursor:pointer}
  .viewswitch button.active{background:var(--accent);color:#fff}

  .ws{display:grid;grid-template-columns:288px 1fr 6px var(--dock-w);height:calc(100vh - 59px)}

  /* 左栏 */
  .rail{background:var(--bg-elevated);border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0}
  .rail .search{padding:14px;border-bottom:1px solid var(--border)}
  .rail .search input{width:100%;border:1px solid var(--border);border-radius:10px;padding:9px 12px;font-size:13px;font-family:var(--font-sans)}
  .status-pills{display:flex;gap:6px;padding:12px 14px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
  .status-pills .pill{border:1px solid var(--border);border-radius:999px;padding:5px 12px;font-size:12.5px;color:var(--text-secondary);cursor:pointer}
  .status-pills .pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .clist{overflow:auto;flex:1;padding:8px}
  .ccard{border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:.15s;background:var(--bg-elevated)}
  .ccard:hover{border-color:var(--accent)}
  .ccard.active{border-color:var(--accent);background:var(--accent-soft)}
  .ccard .row1{display:flex;align-items:center;gap:8px}
  .dot{width:9px;height:9px;border-radius:50%}
  .dot.active{background:var(--success)} .dot.paused{background:var(--warning)} .dot.ended{background:var(--text-muted)}
  .ccard .nm{font-weight:600;font-size:14.5px}
  .ccard .meta{font-size:12px;color:var(--text-muted);margin-top:4px;display:flex;gap:12px;flex-wrap:wrap}
  .ccard .owe{color:var(--danger)}

  /* 中栏 */
  .center{overflow:auto;padding:22px 26px;min-width:0}
  .client-head{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:18px}
  .client-head h2{font-family:var(--font-serif);margin:0;font-size:24px}
  .badge{font-size:12px;padding:3px 10px;border-radius:999px;background:var(--accent-soft);color:var(--accent)}
  .tags{display:flex;gap:6px;flex-wrap:wrap}
  .tag{font-size:11.5px;background:var(--bg-sunken);color:var(--text-secondary);padding:2px 9px;border-radius:8px}
  .stats{display:flex;gap:22px;margin-left:auto;flex-wrap:wrap}
  .stat{text-align:center}.stat b{display:block;font-size:18px;font-family:var(--font-serif)}.stat span{font-size:11.5px;color:var(--text-muted)}
  .quick{display:flex;gap:8px;margin-bottom:16px}
  .quick button{border:1px solid var(--border);background:var(--bg-elevated);border-radius:10px;padding:8px 14px;font-size:13px;cursor:pointer}
  .quick button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .subtabs{display:flex;gap:6px;border-bottom:1px solid var(--border);margin-bottom:16px}
  .subtabs .st{padding:9px 16px;font-size:13.5px;color:var(--text-secondary);cursor:pointer;border-bottom:2px solid transparent}
  .subtabs .st.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
  .subpanel{display:none}.subpanel.active{display:block}

  .timeline{position:relative;margin-left:8px;padding-left:20px;border-left:2px solid var(--border)}
  .tnode{position:relative;margin-bottom:12px}
  .tnode:before{content:"";position:absolute;left:-27px;top:14px;width:11px;height:11px;border-radius:50%;background:var(--accent);border:2px solid var(--bg-elevated)}
  .tcard{border:1px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;background:var(--bg-elevated);transition:.15s}
  .tcard:hover{border-color:var(--accent)}
  .tcard .t1{display:flex;justify-content:space-between;font-size:13.5px}
  .tcard .t1 b{font-weight:600}
  .tcard .flags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
  .flag{font-size:11px;padding:2px 8px;border-radius:7px;background:var(--bg-sunken);color:var(--text-secondary)}
  .flag.has{background:var(--accent-soft);color:var(--accent)}

  table.matrix{width:100%;border-collapse:collapse;font-size:13px}
  table.matrix th,table.matrix td{border:1px solid var(--border);padding:9px 10px;text-align:left}
  table.matrix th{background:var(--bg-sunken);color:var(--text-secondary);font-weight:600}
  table.matrix td.cell{cursor:pointer}
  table.matrix td.cell:hover{background:var(--accent-soft)}
  .chk{display:inline-block;width:16px;height:16px;border:1px solid var(--border-strong);border-radius:4px;vertical-align:middle}

  /* 右栏 编辑器 */
  .resizer{background:transparent;cursor:col-resize;position:relative}
  .resizer::after{content:"";position:absolute;left:2px;top:50%;transform:translateY(-50%);width:2px;height:40px;background:var(--border-strong);border-radius:2px}
  .resizer:hover::after{background:var(--accent)}
  .editor-pane{background:var(--bg-elevated);border-left:1px solid var(--border);display:flex;flex-direction:column;min-width:0;min-height:0}
  .ep-head{padding:14px 18px;border-bottom:1px solid var(--border);font-size:13.5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .ep-head .x{color:var(--text-muted);font-size:12px}
  .ed-tabs{display:flex;gap:4px;padding:10px 14px 0;border-bottom:1px solid var(--border)}
  .ed-tabs .et{padding:8px 14px;font-size:13px;color:var(--text-secondary);cursor:pointer;border-bottom:2px solid transparent}
  .ed-tabs .et.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
  .ed-body{flex:1;overflow:auto;padding:18px}
  .empty{color:var(--text-muted);text-align:center;margin-top:60px;font-size:13.5px;line-height:1.8}
  .word{border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--bg-elevated);padding:26px 30px;min-height:100%;font-size:15px;line-height:1.85;outline:none}
  .word h3{font-family:var(--font-serif)}
  .word blockquote{border-left:3px solid var(--accent);margin:12px 0;padding:6px 14px;background:var(--accent-soft);border-radius:0 8px 8px 0;color:var(--text-secondary)}
  .soap-grid{display:grid;gap:14px}
  .soap-block label{display:block;font-weight:600;font-size:13.5px;margin-bottom:6px;color:var(--accent)}
  .soap-block textarea{width:100%;min-height:120px;border:1px solid var(--border);border-radius:10px;padding:10px;font-family:var(--font-sans);font-size:14px;resize:vertical}
  .save-bar{display:flex;gap:10px;justify-content:flex-end;padding:12px 18px;border-top:1px solid var(--border);align-items:center}
  .save-bar label{margin-right:auto;font-size:13px;color:var(--text-muted)}

  /* AI 坞（复用督导坞） */
  .aidock{display:none}
  .aidock.show{display:flex;flex-direction:column;padding:14px;gap:12px;border-top:1px solid var(--border);overflow:auto;max-height:46%}
  .aidock h4{margin:0;font-size:13px}
  .aidock .hint{font-size:11.5px;color:var(--text-muted);line-height:1.6}
  .ai-actions{display:flex;flex-direction:column;gap:7px}
  .ai-actions button{display:flex;gap:9px;align-items:center;text-align:left;border:1px solid var(--border);background:var(--bg-elevated);color:var(--text);padding:9px 12px;border-radius:11px;cursor:pointer;font-size:13px}
  .ai-actions button:hover{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
  .ai-actions button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .orient-mini{display:flex;gap:5px;flex-wrap:wrap}
  .orient-mini button{border:1px solid var(--border);background:var(--bg-elevated);border-radius:999px;padding:5px 11px;font-size:12px;color:var(--text-secondary);cursor:pointer}
  .orient-mini button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .floating-tb{position:absolute;display:none;gap:2px;background:var(--bg-elevated);border:1px solid var(--border-strong);border-radius:10px;box-shadow:var(--shadow-md);padding:4px;z-index:30}
  .floating-tb button{border:none;background:transparent;width:30px;height:28px;border-radius:7px;cursor:pointer;font-size:14px;color:var(--text)}
  .floating-tb button:hover{background:var(--accent-soft);color:var(--accent)}
  mark.ai{background:var(--accent-soft);border-left:3px solid var(--accent);display:block;padding:9px 13px;margin:10px 0;border-radius:0 8px 8px 0;white-space:pre-line}
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand">心镜 <small>咨询记录主工作区（预览）</small></div>
    <div class="viewswitch">
      <button id="vw-workspace" class="active" onclick="setView('workspace')">工作区</button>
      <button id="vw-matrix" onclick="setView('matrix')">全站报告矩阵</button>
    </div>
  </div>

  <div class="ws" id="ws">
    <!-- 左栏 -->
    <div class="rail">
      <div class="search"><input placeholder="搜索姓名、标签、备注…"></div>
      <div class="status-pills" id="statusPills">
        <span class="pill active" data-s="all">全部</span>
        <span class="pill" data-s="active">咨询中</span>
        <span class="pill" data-s="paused">暂停</span>
        <span class="pill" data-s="ended">已结束</span>
      </div>
      <div class="clist" id="clist"></div>
    </div>

    <!-- 中栏 -->
    <div class="center" id="center"></div>

    <!-- 拖拽 -->
    <div class="resizer" id="resizer"></div>

    <!-- 右栏 编辑器 -->
    <div class="editor-pane" id="epane">
      <div class="ep-head" id="epHead">未选择会谈 <span class="x">← 在左侧选择来访者，于中栏点击某次会谈</span></div>
      <div class="ed-tabs" id="edTabs" style="display:none">
        <span class="et active" data-et="word">逐字稿</span>
        <span class="et" data-et="soap">SOAP</span>
        <span class="et" data-et="dap">DAP</span>
        <span class="et" data-et="reflection">反思</span>
        <span class="et" data-et="ai" id="etAi">AI 坞</span>
      </div>
      <div class="ed-body" id="edBody"><div class="empty">尚未选择会谈。<br>从左侧选一位来访者，再在中栏「时间线」点击某次咨询，<br>即可在此进行深度文字整理。</div></div>
      <div class="aidock" id="aidock">
        <h4>⚙ AI 督导坞</h4>
        <div class="orient-mini" id="orientMini">
          <button class="active" data-o="winnicott">温尼科特</button>
          <button data-o="psychoanalysis">精神分析</button>
          <button data-o="cbt">CBT</button>
          <button data-o="rogers">人本</button>
          <button data-o="yalom">存在</button>
          <button data-o="generic">通用</button>
        </div>
        <div class="hint">结果直接插入当前 tab 光标处。取向/模板与 AI 督导通用版共用。</div>
        <div class="ai-actions">
          <button class="primary" onclick="aiInsert('【整体印象/报告】\n（示例：按所选取向生成的整体印象，将插入此处）')"><span>✨</span> 生成整体印象/报告</button>
          <button onclick="aiInsert('【深化讨论】\n（示例：就选区给出的深化提问）')"><span>🔍</span> 就选区深化</button>
          <button onclick="aiInsert('【润色后】\n（示例：选区润色版本）')"><span>💡</span> 润色选区</button>
          <button onclick="alert('桥接 masters.html（预览提示）')"><span>🗣</span> 开启大师对话</button>
        </div>
      </div>
      <div class="save-bar" id="saveBar" style="display:none">
        <label><input type="checkbox"> 标记为已确认</label>
        <button class="btn btn-ghost">返回</button>
        <button class="btn btn-primary">保存</button>
      </div>
    </div>
  </div>

  <div class="floating-tb" id="floatTb">
    <button data-cmd="bold"><b>B</b></button><button data-cmd="italic"><i>I</i></button>
    <button data-cmd="formatBlock" data-val="H3">H</button>
    <button data-cmd="insertUnorderedList">•</button>
    <button data-cmd="formatBlock" data-val="BLOCKQUOTE">❝</button>
  </div>

<script>
  // ---------- 示例数据 ----------
  const clients=[
    {id:'c1',name:'林小满',status:'active',tags:['焦虑','长程'],sessions:[
      {n:5,date:'2026-07-10',fee:300,paid:true,flags:{transcript:1,soap:1,sup:1}},
      {n:4,date:'2026-06-26',fee:300,paid:true,flags:{transcript:1,soap:1}},
      {n:3,date:'2026-06-12',fee:300,paid:false,flags:{transcript:1}}
    ]},
    {id:'c2',name:'陈默',status:'paused',tags:['抑郁'],sessions:[
      {n:2,date:'2026-05-20',fee:280,paid:true,flags:{transcript:1,reflection:1}},
      {n:1,date:'2026-05-06',fee:280,paid:true,flags:{transcript:1}}
    ]},
    {id:'c3',name:'王芳',status:'ended',tags:['婚恋'],sessions:[
      {n:8,date:'2026-03-15',fee:320,paid:true,flags:{transcript:1,soap:1,dap:1,sup:1}}
    ]}
  ];
  const statusText={active:'咨询中',paused:'暂停',ended:'已结束'};
  let curStatus='all', curClient=null, curSession=null, curView='workspace', curEt='word';

  // ---------- 左栏渲染 ----------
  function renderRail(){
    const list=clients.filter(c=>curStatus==='all'||c.status===curStatus);
    document.getElementById('clist').innerHTML=list.map(c=>{
      const last=c.sessions[0]; const owe=c.sessions.reduce((a,s)=>a+((!s.paid)?s.fee:0),0);
      return `<div class="ccard ${curClient&&curClient.id===c.id?'active':''}" onclick="selectClient('${c.id}')">
        <div class="row1"><span class="dot ${c.status}"></span><span class="nm">${c.name}</span></div>
        <div class="meta"><span>${statusText[c.status]}</span><span>末次 ${last?last.date:'—'}</span><span>${c.sessions.length} 节</span>
        ${owe?`<span class="owe">欠¥${owe}</span>`:''}</div></div>`;
    }).join('')||'<div class="empty" style="margin-top:20px">无匹配来访者</div>';
  }
  document.querySelectorAll('#statusPills .pill').forEach(p=>p.onclick=()=>{
    document.querySelectorAll('#statusPills .pill').forEach(x=>x.classList.remove('active'));
    p.classList.add('active'); curStatus=p.dataset.s; renderRail();
  });

  // ---------- 中栏渲染 ----------
  function selectClient(id){curClient=clients.find(c=>c.id===id);curSession=null;renderRail();renderCenter();closeEditor();}
  function renderCenter(){
    const c=curClient;
    if(!c){document.getElementById('center').innerHTML='<div class="empty" style="margin-top:80px">从左侧选择一位来访者开始工作。</div>';return;}
    const owe=c.sessions.reduce((a,s)=>a+((!s.paid)?s.fee:0),0);
    const first=c.sessions[c.sessions.length-1].date, last=c.sessions[0].date;
    document.getElementById('center').innerHTML=`
      <div class="client-head">
        <h2>${c.name}</h2><span class="badge">${statusText[c.status]}</span>
        <div class="tags">${c.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        <div class="stats">
          <div class="stat"><b>${c.sessions.length}</b><span>节数</span></div>
          <div class="stat"><b>${first}</b><span>首访</span></div>
          <div class="stat"><b>${last}</b><span>末次</span></div>
          <div class="stat"><b style="color:${owe?'var(--danger)':'inherit'}">¥${owe}</b><span>欠费</span></div>
        </div>
      </div>
      <div class="quick">
        <button class="primary" onclick="alert('新建咨询记录（预览）')">+ 新建咨询记录</button>
        <button onclick="alert('导出（预览）')">导出</button>
      </div>
      <div class="subtabs">
        <div class="st active" data-st="timeline" onclick="switchSub('timeline')">时间线</div>
        <div class="st" data-st="matrix" onclick="switchSub('matrix')">报告矩阵</div>
      </div>
      <div class="subpanel active" id="sub-timeline">
        <div class="timeline">${c.sessions.map(s=>`
          <div class="tnode"><div class="tcard" onclick="openSession('${c.id}',${s.n})">
            <div class="t1"><b>第 ${s.n} 节</b><span>${s.date} · ¥${s.fee}${s.paid?' 已收':' 未收'}</span></div>
            <div class="flags">
              <span class="flag ${s.flags.transcript?'has':''}">逐字稿</span>
              <span class="flag ${s.flags.soap?'has':''}">SOAP</span>
              <span class="flag ${s.flags.dap?'has':''}">DAP</span>
              <span class="flag ${s.flags.reflection?'has':''}">反思</span>
              <span class="flag ${s.flags.sup?'has':''}">督导</span>
            </div>
          </div></div>`).join('')}</div>
      </div>
      <div class="subpanel" id="sub-matrix">
        <table class="matrix">
          <thead><tr><th><span class="chk"></span></th><th>节次</th><th>逐字稿</th><th>SOAP</th><th>DAP</th><th>反思</th><th>督导</th></tr></thead>
          <tbody>${c.sessions.map(s=>`<tr>
            <td><span class="chk"></span></td><td onclick="openSession('${c.id}',${s.n})">第${s.n}节 ${s.date}</td>
            <td class="cell" onclick="openSession('${c.id}',${s.n})">${s.flags.transcript?'有':'—'}</td>
            <td class="cell" onclick="openSession('${c.id}',${s.n},'soap')">${s.flags.soap?'有':'—'}</td>
            <td class="cell" onclick="openSession('${c.id}',${s.n},'dap')">${s.flags.dap?'有':'—'}</td>
            <td class="cell" onclick="openSession('${c.id}',${s.n},'reflection')">${s.flags.reflection?'有':'—'}</td>
            <td class="cell" onclick="openSession('${c.id}',${s.n})">${s.flags.sup?'有':'—'}</td>
          </tr>`).join('')}</tbody>
        </table>
        <div style="margin-top:12px"><button class="btn btn-primary" onclick="alert('打包导出选中（预览）')">打包导出</button></div>
      </div>`;
  }
  function switchSub(st){document.querySelectorAll('.subtabs .st').forEach(x=>x.classList.toggle('active',x.dataset.st===st));
    document.getElementById('sub-timeline').classList.toggle('active',st==='timeline');
    document.getElementById('sub-matrix').classList.toggle('active',st==='matrix');}

  // 全站矩阵视图
  function setView(v){curView=v;
    document.getElementById('vw-workspace').classList.toggle('active',v==='workspace');
    document.getElementById('vw-matrix').classList.toggle('active',v==='matrix');
    if(v==='matrix'){
      const rows=[];
      clients.forEach(c=>c.sessions.forEach(s=>rows.push({c,s})));
      document.getElementById('center').innerHTML=`<h2 style="font-family:var(--font-serif);margin-top:0">全站报告矩阵</h2>
        <p class="hint" style="color:var(--text-muted);font-size:12.5px">行=节次，列=各类产出；点击单元格直达右栏对应 tab 编辑（原报告中心已吞并于此）。</p>
        <table class="matrix"><thead><tr><th>来访者</th><th>节次</th><th>逐字稿</th><th>SOAP</th><th>DAP</th><th>反思</th><th>督导</th></tr></thead>
        <tbody>${rows.map(({c,s})=>`<tr>
          <td>${c.name}</td><td class="cell" onclick="openSession('${c.id}',${s.n})">第${s.n}节 ${s.date}</td>
          <td class="cell" onclick="openSession('${c.id}',${s.n})">${s.flags.transcript?'有':'—'}</td>
          <td class="cell" onclick="openSession('${c.id}',${s.n},'soap')">${s.flags.soap?'有':'—'}</td>
          <td class="cell" onclick="openSession('${c.id}',${s.n},'dap')">${s.flags.dap?'有':'—'}</td>
          <td class="cell" onclick="openSession('${c.id}',${s.n},'reflection')">${s.flags.reflection?'有':'—'}</td>
          <td class="cell" onclick="openSession('${c.id}',${s.n})">${s.flags.sup?'有':'—'}</td></tr>`).join('')}</tbody></table>`;
    } else { curClient?renderCenter():renderCenter(); }
  }

  // ---------- 右栏编辑器 ----------
  function openSession(cid,n,tab){const c=clients.find(x=>x.id===cid);curClient=c;curSession=c.sessions.find(s=>s.n===n);
    renderRail();renderCenter();
    document.getElementById('edTabs').style.display='flex';
    document.getElementById('saveBar').style.display='flex';
    document.getElementById('epHead').innerHTML=`${c.name} · 第 ${n} 节 <span class="x">${curSession.date}</span>`;
    setEt(tab||'word');
  }
  function closeEditor(){document.getElementById('edTabs').style.display='none';document.getElementById('saveBar').style.display='none';
    document.getElementById('epHead').innerHTML='未选择会谈 <span class="x">← 在左侧选择来访者，于中栏点击某次会谈</span>';
    document.getElementById('edBody').innerHTML='<div class="empty">尚未选择会谈。<br>从左侧选一位来访者，再在中栏「时间线」点击某次咨询，<br>即可在此进行深度文字整理。</div>';
    document.getElementById('aidock').classList.remove('show');}
  function setEt(et){curEt=et;
    document.querySelectorAll('#edTabs .et').forEach(x=>x.classList.toggle('active',x.dataset.et===et));
    const body=document.getElementById('edBody');
    if(et==='word') body.innerHTML=`<div class="word" id="word" contenteditable="true">
      <h3>第 ${curSession.n} 节 · 逐字稿</h3>
      <p>咨：今天想从哪里开始？<br>来：这周我又开始反复确认他是不是还爱我……</p>
      <blockquote>咨：那种「不确认就消失」的感觉，身体在哪里？<br>来：胸口发紧。</blockquote></div>`;
    else if(et==='soap') body.innerHTML=soapGrid('soap');
    else if(et==='dap') body.innerHTML=soapGrid('dap');
    else if(et==='reflection') body.innerHTML=`<textarea class="soap-block" style="width:100%;min-height:300px;border:1px solid var(--border);border-radius:10px;padding:12px;font-family:var(--font-sans);font-size:14px" placeholder="咨询师的自我反思：反移情、技术选择、值得注意的瞬间…"></textarea>`;
    else if(et==='ai'){document.getElementById('aidock').classList.add('show');body.innerHTML='<div class="empty">已打开 AI 督导坞（下方）。<br>选择上方 tab 的文字后点坞内动作，结果将插入对应位置。</div>';return;}
    document.getElementById('aidock').classList.remove('show');
    bindFloat();
  }
  function soapGrid(k){
    const map={soap:['S 主观','O 客观','A 评估','P 计划'],dap:['D 资料','A 评估','P 计划']};
    return `<div class="soap-grid">${map[k].map(l=>`<div class="soap-block"><label>${l}</label><textarea placeholder="${l} 内容…"></textarea></div>`).join('')}</div>`;
  }
  document.querySelectorAll('#edTabs .et').forEach(t=>t.onclick=()=>setEt(t.dataset.et));

  // 选区浮动工具栏
  const floatTb=document.getElementById('floatTb');
  function bindFloat(){
    const ed=document.getElementById('word'); if(!ed)return;
    ed.addEventListener('mouseup',()=>{setTimeout(()=>{const sel=window.getSelection();
      if(!sel||sel.isCollapsed||!ed.contains(sel.anchorNode)){floatTb.style.display='none';return;}
      const r=sel.getRangeAt(0).getBoundingClientRect(),wr=ed.getBoundingClientRect();
      floatTb.style.display='flex';floatTb.style.left=(r.left-wr.left+ed.scrollLeft+8)+'px';floatTb.style.top=(r.top-wr.top+ed.scrollTop-floatTb.offsetHeight-8)+'px';
    },10);});
  }
  floatTb.querySelectorAll('button').forEach(b=>b.onclick=()=>{const ed=document.getElementById('word');if(ed){document.execCommand(b.dataset.cmd,b.dataset.cmd==='formatBlock',b.dataset.val||null);ed.focus();}});

  // AI 插入
  function aiInsert(html){const ed=document.getElementById('word');const mark=document.createElement('mark');mark.className='ai';mark.innerHTML=html;
    if(ed){const sel=window.getSelection();if(sel&&sel.rangeCount&&ed.contains(sel.anchorNode)){const r=sel.getRangeAt(0);r.collapse(false);r.insertNode(mark);}else ed.appendChild(mark);ed.focus();}
    else alert('请先在「逐字稿」tab 选择文字或定位光标。');}
  document.querySelectorAll('#orientMini button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#orientMini button').forEach(x=>x.classList.remove('active'));b.classList.add('active');});

  // 坞可拖拽调宽
  const resizer=document.getElementById('resizer'),ws=document.getElementById('ws'),root=document.documentElement;
  let drag=false;
  resizer.addEventListener('mousedown',e=>{drag=true;document.body.style.cursor='col-resize';e.preventDefault();});
  window.addEventListener('mousemove',e=>{if(!drag)return;const rect=ws.getBoundingClientRect();let w=rect.right-e.clientX;w=Math.max(300,Math.min(620,w));root.style.setProperty('--dock-w',w+'px');});
  window.addEventListener('mouseup',()=>{if(drag){drag=false;document.body.style.cursor='';}});

  // 初始化
  renderRail();
</script>
</body>
</html>
