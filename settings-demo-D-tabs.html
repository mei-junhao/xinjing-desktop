<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>设置D · 选项卡式</title>
<style>
:root{--bg:#F6F8FC;--paper:#fff;--soft:#EDF0F7;--border:#E2E7F0;--ink:#2B3140;--ink2:#646B7D;--ink3:#99A1B3;--accent:#8B93C7;--a-soft:#ECEEF9;--green:#6FAE8F;--red:#D98C8C;--serif:"Noto Serif SC",Georgia,serif;--sans:system-ui,-apple-system,sans-serif;--r:14px;--r-sm:10px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--sans);background:var(--bg);color:var(--ink);height:100vh;overflow:hidden;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--paper);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.topbar .back{font-size:13px;cursor:pointer;border:none;background:none;color:var(--ink2);padding:4px 8px;border-radius:6px}
.topbar h2{font-family:var(--serif);font-size:18px}
.topbar .sp{flex:1}
.topbar .ver{font-size:12px;color:var(--ink3)}
.topbar .badge{font-size:11px;padding:2px 8px;border-radius:5px;background:rgba(107,174,143,.15);color:var(--green)}
/* Tab */
.tabs{display:flex;gap:0;padding:0 20px;background:var(--paper);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.tab{padding:12px 22px;font:13px var(--sans);cursor:pointer;border-bottom:2px solid transparent;color:var(--ink3);transition:.2s;white-space:nowrap}
.tab:hover{color:var(--ink2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
/* 内容 */
.content{flex:1;overflow-y:auto;padding:24px 32px}
.content-inner{max-width:640px;margin:0 auto}
.field{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border)}
.field:last-child{border:none}
.field .lbl{flex:1}.field .lbl .t{font-size:14px;font-weight:500}.field .lbl .d{font-size:12px;color:var(--ink3);margin-top:2px}
.field input[type=text],.field input[type=password]{border:1px solid var(--border);border-radius:8px;padding:8px 12px;font:13px var(--sans);width:220px;outline:none;background:var(--bg)}
.field input:focus{border-color:var(--accent)}
.field select{border:1px solid var(--border);border-radius:8px;padding:8px 12px;font:13px var(--sans);background:var(--paper)}
.btn{border:1px solid var(--border);background:var(--paper);border-radius:8px;padding:8px 16px;font:13px var(--sans);cursor:pointer;color:var(--ink2)}
.btn.pri{background:var(--accent);color:#fff;border:none}
.btn.danger{border-color:var(--red);color:var(--red)}
.toggle{width:40px;height:22px;border-radius:999px;background:var(--soft);cursor:pointer;position:relative;transition:.2s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s}
.toggle.on::after{left:20px}
.badge{font-size:11px;padding:2px 8px;border-radius:5px;flex-shrink:0}
.badge.ok{background:rgba(107,174,143,.15);color:var(--green)}
.badge.warn{background:rgba(214,168,92,.15);color:#D6A85C}
/* 分段标题 */
.sec-title{font-family:var(--serif);font-size:15px;color:var(--ink2);margin:20px 0 8px}
</style>
</head>
<body>
<div class="topbar">
  <button class="back">← 返回</button><h2>设置</h2><span class="sp"></span>
  <span class="ver">v3.0.1</span><span class="badge">已激活</span>
</div>
<div class="tabs">
  <div class="tab active">AI 接口</div>
  <div class="tab">数据管理</div>
  <div class="tab">外观</div>
  <div class="tab">更新</div>
  <div class="tab">关于</div>
</div>
<div class="content"><div class="content-inner">
  <div class="sec-title">AI 接口配置</div>
  <div class="field"><div class="lbl"><div class="t">API 提供商</div><div class="d">选择 AI 模型来源</div></div><select><option>DeepSeek</option><option>SiliconFlow</option></select></div>
  <div class="field"><div class="lbl"><div class="t">API Key</div><div class="d">密钥仅存储在本地</div></div><input type="password" placeholder="sk-..." style="width:240px"></div>
  <div class="field"><div class="lbl"><div class="t">模型</div><div class="d">选择具体模型</div></div><select><option>deepseek-chat</option></select></div>
  <div class="field"><div class="lbl"><div class="t">自定义 API 地址</div><div class="d">可选，留空则使用默认</div></div><input type="text" placeholder="https://api.example.com/v1" style="width:280px"></div>
  <div class="field"><div class="lbl"><div class="t">连接状态</div><div class="d">验证 API 是否可用</div></div><button class="btn pri">测试连接</button><span class="badge ok">已连接</span></div>
  <div class="sec-title">激活管理</div>
  <div class="field"><div class="lbl"><div class="t">当前状态</div><div class="d">会员版已激活</div></div><span class="badge ok">已激活</span></div>
  <div class="field"><div class="lbl"><div class="t">更换激活码</div><div class="d">输入新的激活码</div></div><input type="text" placeholder="XXXX-XXXX-XXXX" style="width:180px"><button class="btn">验证</button></div>
</div></div>
</body>
</html>
