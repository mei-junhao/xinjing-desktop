# .cnb.yml — 心镜 XinJing 桌面版 CNB 云原生构建
#
# 触发：推送 tag（如 v1.0.5）到 CNB 仓库时，在「自托管 Windows runner」上
#       构建 Windows 安装包/便携版，并上传到腾讯云 COS（国内分发，绕开 GitHub 被封 CDN）。
#
# 前置条件（一次性）：
#   1. 在 CNB 注册一台 Windows 自托管 runner，并打标签 windows
#      （仓库设置 → Runner → 新建 Runner → 选 Windows → 按提示在本机运行注册命令，标签填 windows）
#   2. 新建一个 CNB 密钥仓库（建议私有，如 MEI.tzc/xinjing-secrets），根目录放 cos.yml：
#        COS_SECRET_ID:  COS_SECRET_ID_REMOVED
#        COS_SECRET_KEY: COS_SECRET_KEY_REMOVED
#        COS_BUCKET:     xinjing-1439314927
#        COS_REGION:     ap-guangzhou
#        LICENSE_SECRET: <在此填入你的许可证密钥（与 GitHub Secrets 中一致）>
#   3. 将本文件推送至 CNB 仓库根目录（git push cnb <branch> 或 PR 合入 main）
#
# 密钥通过 imports 注入为环境变量，cnb-build.ps1 中直接读取 $env:COS_* / $env:LICENSE_SECRET。

$:
  tag_push:
    - name: release-to-cos
      imports: https://cnb.cool/MEI.tzc/xinjing-secrets/-/blob/main/cos.yml
      runner:
        tags: windows
      stages:
        - name: build-and-upload
          jobs:
            - name: win
              script: pwsh -ExecutionPolicy Bypass -File scripts/cnb-build.ps1
