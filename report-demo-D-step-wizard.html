<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>报告方案D · 分步向导式</title>
<style>
:root{--bg:#F6F8FC;--paper:#fff;--soft:#EDF0F7;--border:#E2E7F0;--ink:#2B3140;--ink2:#646B7D;--ink3:#99A1B3;--accent:#8B93C7;--a-soft:#ECEEF9;--green:#6FAE8F;--serif:"Noto Serif SC",Georgia,serif;--sans:system-ui,-apple-system,sans-serif;--r:14px;--r-sm:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);height:100vh;overflow:hidden;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--paper);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.topbar .back{font-size:13px;cursor:pointer;border:none;background:none;color:var(--ink2);padding:4px 8px;border-radius:6px}
.topbar h2{font-family:var(--serif);font-size:18px}
.topbar .sp{flex:1}
.topbar select{border:1px solid var(--border);border-radius:8px;padding:5px 10px;font:12px var(--sans);background:var(--paper)}
.topbar button{border:1px solid var(--border);background:var(--paper);border-radius:8px;padding:6px 14px;font:12px var(--sans);cursor:pointer;color:var(--ink2)}
.topbar .btn-p{background:var(--accent);color:#fff;border:none}
/* 步骤导航 */
.steps{display:flex;gap:0;padding:0 24px;background:var(--paper);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.step{display:flex;align-items:center;gap:8px;padding:12px 18px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.2s;min-width:fit-content}
.step:hover{color:var(--accent)}
.step.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.step.done{color:var(--green)}
.step .dot{width:24px;height:24px;border-radius:50%;border:2px solid var(--ink3);display:flex;align-items:center;justify-content:center;font:700 11px var(--sans);flex-shrink:0}
.step.active .dot{border-color:var(--accent);background:var(--accent);color:#fff}
.step.done .dot{border-color:var(--green);background:var(--green);color:#fff}
.step .stxt{font-size:13px}
/* 单步内容区——占满剩余空间 */
.step-content{flex:1;overflow-y:auto;padding:32px 48px}
.step-inner{max-width:760px;margin:0 auto}
.step-title{font-family:var(--serif);font-size:22px;color:var(--ink);margin-bottom:6px}
.step-desc{font-size:13px;color:var(--ink3);margin-bottom:24px}
.step-inner textarea{width:100%;min-height:280px;border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;font:15px/2 var(--sans);color:var(--ink);resize:vertical;outline:none;background:var(--paper);transition:.2s}
.step-inner textarea:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(139,147,199,.06)}
.ai-suggest{margin-top:14px;padding:14px 18px;background:var(--a-soft);border-radius:var(--r);font:14px/1.85 var(--sans);border-left:3px solid var(--accent);color:var(--ink2)}
.ai-suggest .label{font-size:11px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.ai-suggest .accept{margin-top:8px;display:inline-block;padding:5px 16px;border-radius:7px;background:var(--accent);color:#fff;font-size:12px;cursor:pointer;border:none}
/* 底部导航 */
.step-foot{display:flex;align-items:center;gap:12px;padding:14px 48px;border-top:1px solid var(--border);flex-shrink:0;max-width:760px;margin:0 auto;width:100%}
.step-foot .sp{flex:1}
.step-foot button{padding:10px 24px;border-radius:9px;font:600 14px var(--sans);cursor:pointer}
.step-foot .prev{border:1px solid var(--border);background:var(--paper);color:var(--ink2)}
.step-foot .next{background:var(--accent);color:#fff;border:none}
.step-foot .ai-btn{border:1px solid var(--accent);background:var(--a-soft);color:var(--accent);border-radius:9px}
</style>
</head>
<body>
<div class="topbar">
  <button class="back">← 返回</button>
  <h2>撰写报告</h2>
  <span class="sp"></span>
  <select><option>林小满</option></select>
  <button>上传模板</button>
  <button class="btn-p">导出 Word</button>
</div>
<div class="steps">
  <div class="step active"><span class="dot">1</span><span class="stxt">基本信息</span></div>
  <div class="step"><span class="dot">2</span><span class="stxt">主诉</span></div>
  <div class="step"><span class="dot">3</span><span class="stxt">发展史</span></div>
  <div class="step"><span class="dot">4</span><span class="stxt">动力学理解</span></div>
  <div class="step"><span class="dot">5</span><span class="stxt">治疗过程</span></div>
  <div class="step"><span class="dot">6</span><span class="stxt">展望</span></div>
</div>
<div class="step-content"><div class="step-inner">
  <div class="step-title">来访者基本信息与转介来源</div>
  <div class="step-desc">填写来访者的基本信息。可点击"AI 填"自动从数据库提取。</div>
  <textarea placeholder="姓名、年龄、性别、职业、婚姻状况、转介渠道等…">林小满（化名），女，29岁，已婚，公司行政人员。自行通过网络搜索找到咨询师。</textarea>
  <div class="ai-suggest">
    <div class="label">AI 建议 · 基于数据库来访者档案</div>
    林小满（化名），女，29岁，已婚，公司行政人员。标签：焦虑、长程。首访日期 2026-03-20。无转介渠道，自行通过网络搜索找到咨询师。联系电话已登记但未使用。
    <br><button class="accept">采用此段</button>
  </div>
</div></div>
<div class="step-foot">
  <button class="prev">← 上一步</button>
  <button class="ai-btn">AI 填写本步 ✨</button>
  <span class="sp"></span>
  <span style="font-size:12px;color:var(--ink3)">步骤 1/6</span>
  <button class="next">下一步 →</button>
</div>
</body>
</html>
