<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>逐字稿整理 · 方案D 差异视图</title>
<style>
:root{--bg:#F6F8FC;--paper:#fff;--soft:#EDF0F7;--border:#E2E7F0;--ink:#2B3140;--ink2:#646B7D;--ink3:#99A1B3;--accent:#8B93C7;--a-soft:#ECEEF9;--green:#6FAE8F;--red:#D98C8C;--orange:#D6A85C;--serif:"Noto Serif SC",Georgia,serif;--sans:system-ui,-apple-system,sans-serif;--mono:"JetBrains Mono","SF Mono",monospace;--r:14px;--r-sm:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh}
.topbar{display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--paper);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;flex-wrap:wrap}
.topbar .back{font-size:13px;cursor:pointer;border:none;background:none;color:var(--ink2);padding:4px 8px;border-radius:6px}
.topbar h2{font-family:var(--serif);font-size:18px}
.topbar .sp{flex:1}
.topbar select,.topbar button{border:1px solid var(--border);background:var(--paper);border-radius:8px;padding:6px 12px;font:12px var(--sans);cursor:pointer;color:var(--ink2)}
.topbar .btn-p{background:var(--accent);color:#fff;border:none}
.toolbar{display:flex;align-items:center;gap:8px;padding:8px 20px;background:var(--soft);border-bottom:1px solid var(--border);flex-wrap:wrap}
.toolbar .stat{font-size:12px;color:var(--ink3)}.toolbar .stat b{color:var(--red)}
.toolbar .sp{flex:1}
.toolbar button{border:1px solid var(--border);background:var(--paper);border-radius:7px;padding:4px 10px;font:11px var(--sans);cursor:pointer;color:var(--ink2)}
.page{max-width:900px;margin:0 auto;padding:20px;display:flex;flex-direction:column;gap:0}
/* diff 块 */
.diff-block{background:var(--paper);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.diff-head{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--soft);font-size:11px;color:var(--ink3);border-bottom:1px solid var(--border)}
.diff-head .role{font-weight:600}
.diff-head .role.client{color:var(--accent)}
.diff-head .role.consultant{color:var(--green)}
.diff-head .sp{flex:1}
.diff-head .badge{font-size:10px;padding:1px 6px;border-radius:5px}
.diff-head .badge.pending{background:rgba(217,140,140,.15);color:var(--red)}
.diff-head .badge.applied{background:rgba(107,174,143,.15);color:var(--green)}
.diff-body{padding:14px 18px;font-size:13.5px;line-height:1.9}
.diff-del{background:rgba(217,140,140,.12);color:var(--red);text-decoration:line-through;text-decoration-color:var(--red);padding:1px 3px;border-radius:2px}
.diff-add{background:rgba(107,174,143,.12);color:var(--green);font-weight:500;padding:1px 3px;border-radius:2px}
.diff-same{color:var(--ink2)}
.diff-actions{padding:8px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--bg)}
.diff-actions .sp{flex:1}
.diff-actions button{border:1px solid var(--border);background:var(--paper);border-radius:7px;padding:4px 10px;font:11px var(--sans);cursor:pointer;color:var(--ink2)}
.diff-actions .btn-apply{background:var(--green);color:#fff;border:none}
.diff-actions .btn-skip{border-color:var(--ink3);color:var(--ink3)}
.diff-actions .batch-note{font-size:11px;color:var(--accent)}
/* 记忆面板 */
.memory-bar{position:fixed;bottom:0;left:0;right:0;padding:8px 20px;background:var(--a-soft);border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;font-size:12px;color:var(--accent)}
.memory-bar .sp{flex:1}
</style>
</head>
<body>
<div class="topbar">
  <button class="back">← 返回</button>
  <h2>逐字稿整理</h2>
  <span class="sp"></span>
  <select><option>选择来访者…</option><option>林小满</option></select>
  <button>上传逐字稿</button>
  <button class="btn-p">完成整理</button>
</div>
<div class="toolbar">
  <span class="stat">共 <b>7</b> 处差异</span>
  <span class="stat">已应用 <b>3</b> 处</span>
  <span class="stat">待确认 <b>4</b> 处</span>
  <span class="sp"></span>
  <button>全部应用</button>
  <button>全部跳过</button>
</div>
<div class="page">
  <!-- diff 1 -->
  <div class="diff-block">
    <div class="diff-head"><span class="role consultant">咨询师</span><span>第2轮</span><span class="sp"></span><span class="badge applied">✓ 已应用</span></div>
    <div class="diff-body"><span class="diff-same">能具体说说吗，发生了什么</span><span class="diff-del">事情</span><span class="diff-same">？</span></div>
    <div class="diff-actions"><span class="batch-note">已批量替换 3 处</span><span class="sp"></span><button class="btn-skip">撤销</button></div>
  </div>
  <!-- diff 2 -->
  <div class="diff-block">
    <div class="diff-head"><span class="role client">来访者</span><span>第3轮</span><span class="sp"></span><span class="badge applied">✓ 已应用 · 已记忆</span></div>
    <div class="diff-body"><span class="diff-same">就是我妈妈她又</span><span class="diff-del">在次</span><span class="diff-add">一直在</span><span class="diff-same">说我什么都不行，然后我就很生气。</span></div>
    <div class="diff-actions"><span class="batch-note">🧠 已存入记忆，下次自动修正</span><span class="sp"></span><button class="btn-skip">撤销</button></div>
  </div>
  <!-- diff 3 -->
  <div class="diff-block">
    <div class="diff-head"><span class="role consultant">咨询师</span><span>第4轮</span><span class="sp"></span><span class="badge applied">✓ 已应用 · 已记忆</span></div>
    <div class="diff-body"><span class="diff-same">她说你什么都不行，这个感觉一定很</span><span class="diff-del">南瘦</span><span class="diff-add">难受</span><span class="diff-same">。</span></div>
    <div class="diff-actions"><span class="batch-note">🧠 已存入记忆</span><span class="sp"></span><button class="btn-skip">撤销</button></div>
  </div>
  <!-- diff 4 -->
  <div class="diff-block">
    <div class="diff-head"><span class="role client">来访者</span><span>第5轮</span><span class="sp"></span><span class="badge pending">待确认</span></div>
    <div class="diff-body"><span class="diff-same">是的，我觉得自己好像永远都做不到她满意的样子。就像小时候</span><span class="diff-del">也是</span><span class="diff-same">，不管怎么努力……</span></div>
    <div class="diff-actions"><span class="sp"></span><button class="btn-skip">跳过</button><button class="btn-apply">应用删除</button></div>
  </div>
  <!-- diff 5 -->
  <div class="diff-block">
    <div class="diff-head"><span class="role consultant">咨询师</span><span>第6轮</span><span class="sp"></span><span class="badge pending">待确认</span></div>
    <div class="diff-body"><span class="diff-same">听起来这个</span><span class="diff-del">被看透</span><span class="diff-add">被看到</span><span class="diff-same">的感觉从很久以前就有了。</span></div>
    <div class="diff-actions"><span class="sp"></span><button class="btn-skip">跳过</button><button class="btn-apply">应用</button></div>
  </div>
</div>
<div class="memory-bar">
  <span>🧠 记忆文档</span>
  <span class="sp"></span>
  <span>已记忆 2 条 · 待记忆 5 条</span>
  <button style="border:1px solid var(--accent);background:var(--paper);color:var(--accent);border-radius:7px;padding:4px 10px;font:12px var(--sans);cursor:pointer">查看记忆</button>
</div>
</body>
</html>
