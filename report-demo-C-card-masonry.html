<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>报告方案C · 卡片瀑布流</title>
<style>
:root{--bg:#F6F8FC;--paper:#fff;--soft:#EDF0F7;--border:#E2E7F0;--ink:#2B3140;--ink2:#646B7D;--ink3:#99A1B3;--accent:#8B93C7;--a-soft:#ECEEF9;--serif:"Noto Serif SC",Georgia,serif;--sans:system-ui,-apple-system,sans-serif;--r:14px;--r-sm:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);height:100vh;overflow:hidden;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--paper);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.topbar .back{font-size:13px;cursor:pointer;border:none;background:none;color:var(--ink2);padding:4px 8px;border-radius:6px}
.topbar h2{font-family:var(--serif);font-size:18px}
.topbar .sp{flex:1}
.topbar select{border:1px solid var(--border);border-radius:8px;padding:5px 10px;font:12px var(--sans);background:var(--paper)}
.topbar button{border:1px solid var(--border);background:var(--paper);border-radius:8px;padding:6px 14px;font:12px var(--sans);cursor:pointer;color:var(--ink2)}
.topbar .btn-p{background:var(--accent);color:#fff;border:none}
/* 控制条 */
.ctrl-bar{display:flex;align-items:center;gap:10px;padding:10px 24px;background:var(--soft);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.ctrl-bar .lbl{font-size:12px;color:var(--ink3);font-weight:600}
.sess-chip{display:flex;align-items:center;gap:5px;padding:4px 10px 4px 4px;border:1px solid var(--border);border-radius:999px;font-size:12px;cursor:pointer;background:var(--paper)}
.sess-chip input{margin:0}
.sess-chip.checked{border-color:var(--accent);background:var(--a-soft)}
.ctrl-bar .sp{flex:1}
.ctrl-bar .ai-all{border:1px solid var(--accent);background:var(--a-soft);color:var(--accent);border-radius:999px;padding:6px 16px;font:12px var(--sans);cursor:pointer}
/* 瀑布流卡片 */
.cards-area{flex:1;overflow-y:auto;padding:24px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:18px;max-width:1200px;margin:0 auto}
.card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column}
.card-head{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border)}
.card-head .num{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font:700 12px var(--serif);flex-shrink:0}
.card-head .title{font-family:var(--serif);font-size:15px;color:var(--ink);flex:1}
.card-head .ai-btn{font-size:11px;border:1px solid var(--accent);background:var(--a-soft);color:var(--accent);border-radius:6px;padding:3px 10px;cursor:pointer;white-space:nowrap}
.card-body{padding:16px 18px;flex:1;display:flex;flex-direction:column}
.card-body textarea{width:100%;flex:1;min-height:120px;border:1px solid var(--border);border-radius:var(--r-sm);padding:14px;font:14px/1.9 var(--sans);color:var(--ink);resize:vertical;outline:none;background:var(--bg);transition:.2s}
.card-body textarea:focus{border-color:var(--accent);background:var(--paper)}
.card-body .ai-suggest{display:none;margin-top:10px;padding:10px 14px;background:var(--a-soft);border-radius:8px;font:13px/1.7 var(--sans);border-left:3px solid var(--accent);color:var(--ink2)}
.card-body .ai-suggest.show{display:block}
.card-body .ai-suggest .accept{margin-top:4px;display:inline-block;padding:3px 12px;border-radius:5px;background:var(--accent);color:#fff;font-size:11px;cursor:pointer;border:none}
.card-foot{padding:8px 18px;border-top:1px solid var(--border);font-size:11px;color:var(--ink3);display:flex;align-items:center;gap:8px}
.card-foot .word-count{margin-left:auto}
</style>
</head>
<body>
<div class="topbar">
  <button class="back">← 返回</button>
  <h2>撰写报告</h2>
  <span class="sp"></span>
  <select><option>林小满</option></select>
  <button>上传模板</button>
  <button class="btn-p">导出 Word</button>
</div>
<div class="ctrl-bar">
  <span class="lbl">基于节次：</span>
  <label class="sess-chip checked"><input type="checkbox" checked> 第1节</label>
  <label class="sess-chip checked"><input type="checkbox" checked> 第2节</label>
  <label class="sess-chip checked"><input type="checkbox" checked> 第3节</label>
  <label class="sess-chip checked"><input type="checkbox" checked> 第4节</label>
  <label class="sess-chip checked"><input type="checkbox" checked> 第5节</label>
  <span class="sp"></span>
  <button class="ai-all">AI 填写全部 ✨</button>
</div>
<div class="cards-area"><div class="cards-grid">
  <div class="card"><div class="card-head"><span class="num">1</span><span class="title">来访者基本信息与转介来源</span><button class="ai-btn">AI 填</button></div><div class="card-body"><textarea placeholder="姓名、年龄、性别、职业、婚姻状况…">林小满（化名），女，29岁，已婚，公司行政人员。自行通过网络搜索找到咨询师。</textarea></div><div class="card-foot">基本信息<span class="word-count">37字</span></div></div>
  <div class="card"><div class="card-head"><span class="num">2</span><span class="title">主诉与求助原因</span><button class="ai-btn">AI 填</button></div><div class="card-body"><textarea placeholder="来访者自述的困扰…"></textarea><div class="ai-suggest show">AI 建议：核心困扰为反复确认丈夫是否还爱自己，持续约6个月。每日花费1-2小时反复回忆对话细节。伴有睡眠质量下降。第3节起睡眠有所改善，但确认行为频率未明显下降。<span class="accept">采用</span></div></div><div class="card-foot">主诉<span class="word-count">0字</span></div></div>
  <div class="card"><div class="card-head"><span class="num">3</span><span class="title">个人发展史与家庭背景</span><button class="ai-btn">AI 填</button></div><div class="card-body"><textarea placeholder="童年经历、家庭关系、重要生活事件…"></textarea></div><div class="card-foot">发展史<span class="word-count">0字</span></div></div>
  <div class="card"><div class="card-head"><span class="num">4</span><span class="title">心理动力学评估与个案概念化</span><button class="ai-btn">AI 填</button></div><div class="card-body"><textarea placeholder="运用所选理论取向对个案形成理解…"></textarea></div><div class="card-foot">动力学理解<span class="word-count">0字</span></div></div>
  <div class="card"><div class="card-head"><span class="num">5</span><span class="title">治疗过程概述与关键转折</span><button class="ai-btn">AI 填</button></div><div class="card-body"><textarea placeholder="历次咨询的进展、关键转折…"></textarea></div><div class="card-foot">治疗过程<span class="word-count">0字</span></div></div>
  <div class="card"><div class="card-head"><span class="num">6</span><span class="title">后续方向与反思</span><button class="ai-btn">AI 填</button></div><div class="card-body"><textarea placeholder="下一阶段的目标、可能的挑战…"></textarea></div><div class="card-foot">展望<span class="word-count">0字</span></div></div>
</div></div>
</body>
</html>
