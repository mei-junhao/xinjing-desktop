<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>督导方案3 · 纵向时间线</title>
<style>
:root{--bg:#F6F8FC;--bg-el:#FFFFFF;--border:#E2E7F0;--text:#2B3140;--t2:#646B7D;--t3:#99A1B3;--accent:#8B93C7;--a-soft:#ECEEF9;--success:#6FAE8F;--warn:#D6A85C;--r:14px;--serif:"Noto Serif SC",Georgia,serif;--sans:"Noto Sans SC",system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:14px;padding:10px 20px;background:var(--bg-el);border-bottom:1px solid var(--border);flex-shrink:0}
.topbar h2{font-family:var(--serif);font-size:18px;margin:0}
.topbar select{border:1px solid var(--border);border-radius:8px;padding:6px 10px;font:13px var(--sans)}
.topbar .spacer{flex:1}
.sessions{width:260px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg-el)}
.sess-head{padding:14px;border-bottom:1px solid var(--border)}
.sess-head input{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font:13px var(--sans)}
.sess-list{flex:1;overflow-y:auto;padding:8px}
.scard{border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:.15s}
.scard:hover{border-color:var(--accent)}
.scard.active{border-color:var(--accent);background:var(--a-soft)}
.scard .dt{font-weight:600;font-size:13px}.scard .sn{font-size:11px;color:var(--t3)}
.scard .tags{display:flex;gap:4px;margin-top:4px}
.scard .t{font-size:10px;padding:1px 6px;border-radius:5px;background:var(--bg-el);border:1px solid var(--border)}
.scard .t.has{background:var(--a-soft);border-color:var(--accent);color:var(--accent)}
.main-area{flex:1;display:flex;flex-direction:column;min-width:0}
.tool-row{display:flex;align-items:center;gap:6px;padding:10px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0}
.chip{border:1px solid var(--border);border-radius:999px;padding:5px 12px;font-size:12px;cursor:pointer;color:var(--t2);background:var(--bg-el)}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.editor{flex:1;overflow-y:auto;padding:24px 28px;max-width:780px;margin:0 auto;width:100%}
.editor textarea{width:100%;min-height:100%;border:none;background:transparent;font:15px/1.9 var(--sans);color:var(--text);resize:none;outline:none;padding:0}
.aidock{width:340px;flex-shrink:0;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;background:var(--bg-el);padding:16px;gap:12px}
.aidock h4{margin:0;font-family:var(--serif);font-size:14px}
.btn{border:1px solid var(--border);background:var(--bg-el);border-radius:9px;padding:8px 16px;font-size:13px;cursor:pointer;color:var(--text)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
</head>
<body>
<div class="topbar">
  <h2>AI 督导 · 纵向时间线</h2>
  <span class="spacer"></span>
  <select style="max-width:150px"><option>温尼科特</option><option>精神分析</option></select>
  <select style="max-width:150px"><option>女娲版</option><option>仓颉版</option></select>
</div>
<div style="display:flex;flex:1;min-height:0">
  <div class="sessions">
    <div class="sess-head"><input placeholder="搜索来访者或日期…"></div>
    <div class="sess-list">
      <div class="scard active"><div class="dt">林小满</div><div class="sn">第5节 · 07-10 · ¥300未收</div><div class="tags"><span class="t has">逐字稿</span><span class="t has">SOAP</span><span class="t">督导</span></div></div>
      <div class="scard"><div class="dt">林小满</div><div class="sn">第4节 · 06-26 · ¥300</div><div class="tags"><span class="t has">SOAP</span></div></div>
      <div class="scard"><div class="dt">陈默</div><div class="sn">第2节 · 05-20 · ¥280</div><div class="tags"><span class="t has">反思</span></div></div>
      <div class="scard"><div class="dt">王芳（已结束）</div><div class="sn">第8节 · 03-15</div><div class="tags"><span class="t has">SOAP</span><span class="t has">DAP</span></div></div>
      <div style="text-align:center;padding:16px;color:var(--t3);font-size:13px;border-top:1px dashed var(--border);margin-top:8px">
        + 新建个人笔记<br><span style="font-size:11px">不关联任何来访者</span>
      </div>
    </div>
  </div>
  <div class="main-area">
    <div class="tool-row">
      <span style="font-size:12px;color:var(--t2);font-weight:600">林小满 · 第5节</span>
      <span class="chip active">逐字稿</span><span class="chip">SOAP</span><span class="chip">反思</span>
      <span class="chip">督导讨论</span><span style="color:var(--t3);font-size:12px;margin-left:8px">→ 选中文字可发送到右侧AI督导坞</span>
    </div>
    <div class="editor">
      <textarea placeholder="林小满 · 第5节 · 2026-07-10&#10;&#10;咨：今天想从哪里开始？&#10;来：这周我又开始反复确认他是不是还爱我……&#10;咨：那种「不确认就消失」的感觉，身体在哪里？&#10;来：胸口发紧。好像不确认下一秒他就不见了。&#10;咨：当你小时候，有没有人说过类似的话？&#10;来：（沉默）我妈常说「再闹就不要你了」，我不敢哭……&#10;&#10;--- 以下为 AI 生成 ---&#10;【整体印象 · 温尼科特取向】&#10;来访者对关系丧失的确认需求与童年被母亲威胁的模式高度关联。&#10;治疗师提供了抱持性的沉默空间，使来访者得以触及原始恐惧。"></textarea>
    </div>
  </div>
  <div class="aidock">
    <h4>AI 督导坞</h4>
    <p style="font-size:11px;color:var(--t3);line-height:1.5">温尼科特 · 女娲版。选中左栏文字后点下方按钮，结果直接插入左栏光标位置。</p>
    <button class="btn primary">生成整体印象</button>
    <button class="btn">深化选区讨论</button>
    <button class="btn">润色选区</button>
    <button class="btn">技术提问</button>
    <div style="border-top:1px solid var(--border);padding-top:10px">
      <p style="font-size:11px;color:var(--t3)">历史记录</p>
      <div style="font-size:12px;color:var(--t2);line-height:1.6;background:var(--bg);border-radius:8px;padding:8px">07-13 整体印象已生成<br>07-13 深化讨论 · 移情议题</div>
    </div>
  </div>
</div>
</body>
</html>
